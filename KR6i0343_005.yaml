body:
  text: 宋天竺三藏沙門求那跋陀羅譯明建鄴海印沙門釋德清筆記一切佛語心品第三之上此下舉果驗因以示一乘真因相分二初舉意生身真果相爾時世尊告大慧菩薩摩訶薩言意生身分別通相我今當説諦聽諦聽善思念之大慧白佛言善哉世尊唯然受教記曰此復辨果德以驗真因相也由前二卷初大慧問無間行如來答云成就四法得修行者大方便乃至得無生法忍住第八地得離心意識五法自性二無我相得意生身故次從説因緣已下直至二卷終通明緣起妄想無性以顯離心意識五法三自性二無我相廣釋無間大方便行已意明行成得果故此即説意生身差別相也前自釋云意生身者譬如意去速疾無礙故名意生以前但言八地所得故名通相今言地地皆得故云分別通相中之差別相有三種耳佛告大慧有三種意生身云何為三所謂三昧樂正受意生身覺法自性性意生身種類俱生無行作二譯皆云無作行意生身修行者了知初地上上增進相得三種身記曰此列意生身差別名也然三昧樂正受意生身從初地至七地所得覺法自性性意生身從八地至十地所得種類俱生無行作意生身從等入妙所證其相自有深淺差別梵語三昧此云正定以智體不動名為正定為揀偏邪所謂首楞嚴大定是也正受者以不受諸受名為正受乃正定中受用也以三昧樂為其受用故云三昧樂正受大慧云何三昧樂正受意生身謂第三第四第五地三昧樂正受故種種自心寂靜安住心海起浪識相不生知自心現境界性非性是名三昧樂正受意生身記曰此釋初身相也謂初登地證平等真如直至七地盡真如際已捨藏識故云種種自心寂靜七識波浪不生故云安住心海起浪識相不生已斷俱生我執我執既斷則境界無依故云知自心現境界性非性此乃定力所持亦名力持身故云三昧樂正受意生身七地證此而云三四五地者舉中以該初後也大慧云何覺法自性性意生身謂第八地觀察覺了如幻等法悉無所有身心轉變唐譯云了法如幻皆無有相心轉所依得如幻三昧及餘三昧門無量相力自在明唐譯云能現無量自在神通如妙華莊嚴迅疾如意猶如幻夢水月鏡像非造非所造如造所造一切色種種支分具足莊嚴魏譯云非四大生似四大相具足身分隨入一切佛剎大衆通達自性法故是名覺法自性性意生身記曰此釋次身相也謂八地菩薩證一心真如進至九地發真如用得如幻三昧於一心轉變能現無量自在神通一時俱發如華開敷譬如意去石壁無礙故云迅疾如意非身現身故如幻夢水月鏡像非四大生似四大相身分宛然故云具足莊嚴進至十地隨所憶念本願化諸衆生故云隨入一切佛剎大衆十方諸佛所有法雲法雨悉能含受故云通達自性法故是名覺法自性性意生身大慧云何種類俱生無行作意生身所謂覺一切佛法緣自得樂相唐譯云了達諸佛自證法性是名種類俱生無行作意生身記曰此釋第三身相也前十地菩薩於諸佛法但能受之而已今從等入妙則能了達諸佛自證法相已得諸佛自覺聖智善樂深入妙莊嚴海逆流而出現十界身無思而應所謂妙相莊嚴聖種類身一時俱現猶如意生身土自他無有障礙故云覺一切佛種類俱生無行作意生身也緣自得樂相者所謂生滅滅已寂滅為樂乃諸佛自證所受用之法樂也故觀音大士以如幻聞熏聞修金剛三昧力故生滅既滅寂滅現前忽然超越世出世間即得上與十方諸佛同一慈力下與六道衆生共一悲仰故能一身普現即得三十二應四不思議十四無畏十九説法正得此種類俱生無行作意生身也大慧於彼三種身相觀察覺了應當修學爾時世尊欲重宣此義而説偈言非我乘大乘魏譯我乘非大乘唐譯我大乘非乘非説亦非字非諦非解脫非無有境界然乘摩訶衍三摩提自在種種意生身自在華莊嚴記曰此頌結前所説大乘非乘但所證者三種意生身而已非是實有大乘可得也然外道二乘修行不得如來真三摩地但以名言習氣故於所取妄有證得故外道妄立神我冥諦二乘妄取孤調解脫以為究竟故世尊一往破其偏邪示之以真因正果至此廣明三種意生身已而頌總結前義云我説大乘非是實有大乘可乘亦非言説文字可到亦非外道之冥諦神我亦非二乘之孤調解脫一切俱離亦非斷滅故云非無有境界然我所乘者但乘摩訶衍止觀之力以此證得三種意生身如此而已然前云外道有四種涅槃而我所説者妄想識滅名為涅槃以此證之蓋轉八識成四智今束四智作三身耳是則三昧樂意生身者乃依六識起二空智證平等真如轉第七識為平等性智是即五蘊妄身證得素法身也然此法身未能純淨入定則明出定則昧故但得三昧樂正受意生身耳至捨三昧樂進入九地十地廣修稱真度生之業鑑機説法利樂有情萬行莊嚴是從平等真如發大利用乃依平等性智起妙觀察智得如幻三昧應十地機現廣大尊特他受用報身故云覺法自性性意生身耳故如幻夢水月鏡像以萬德圓備故如妙華莊嚴實報身也至若以金剛心斷彼生相無明轉第八識成大圓鏡智則前五識一時俱轉為成所作智即彼有作而成無作故云種類俱生無行作意生身以依大圓鏡智平等顯現則千種萬類之身一時普應至此無一物不彰遮那妙體無一時不修普賢行門是乃從法報二身而垂他受用及大小隨類化身也斯由轉心意意藏識為大涅槃則四智三身一念頓得此豈彼外道二乘無因邪因而可得哉故此結云我大乘非乘等一往所談萃極於此行人當識通途大旨請深觀之決不可執愚昧於宗説二通也以前云意生身依無間行而得故向下問五無間行正顯轉心意意藏識為大涅槃耳上辨真果相下示五無間行以辨真因相爾時大慧菩薩摩訶薩白佛言世尊如世尊説若男子女人行五無間業不入無擇魏譯云無間地獄世尊云何男子女人行五無間業不入無擇地獄記曰由前問修無間行佛答以四種三昧即得意生身故此廣明三種意生身辨果已竟隨便而問無間行之差別相以辨真因也大慧意謂五無間業乃入無間地獄之因而世尊又説行五間業有不入無間地獄者不知何等五無間業不入無間地獄故特請問欲令行人知其所擇且意顯依智而得意生身依識而得五蘊身今轉識成智是即彼五蘊妄身而轉為意生法身也故次第明之佛告大慧諦聽諦聽善思念之當為汝説大慧白佛言善哉世尊唯然受教佛告大慧云何五無間業所謂殺父母及害羅漢破壞衆僧魏唐二譯皆云破和合僧惡心出佛身血大慧云何衆生母謂愛更受生貪喜俱魏譯云更受後生貪喜俱出如緣母立二譯此下俱有何者為父四字無明為父生入處聚落斷二根本名害父母記曰此言貪愛無明為生死根能斷此二則生死永斷頓證一乘即能轉五蘊業識身而成清淨法身故名殺父母為無間行也愛更受生者乃發業無明謂愛欲為生死根本故貪喜俱出乃潤生無明謂將受生時以愛因緣見所愛境復發愛涎取所愛境流愛為種納想為胎故云貪喜俱出以貪依愛生結生相續故云如緣母立然單愛不生要與潤生無明和合方能生名色芽成六受用根故云無明為父生入處聚落入六入處十二處聚落謂五蘊身也然因癡與愛發業潤生故有生死是則生死實從二根本而生若能斷彼則生死頓斷而即此五蘊業身當下轉為清淨法身矣彼諸使不現如鼠毒發諸法究竟斷彼名害羅漢記曰此言能斷微細結習故名害阿羅漢為無間行也舊注云鼠之齧人瘡雖已愈其毒遇雷即發羅漢諸使亦爾雖隱而不現遇緣即發能斷微細習使名害羅漢然羅漢之名正由未斷習氣而立今能斷彼即阿羅漢當得如來法身也云何破僧謂異相諸陰和合積聚究竟斷彼名為破僧記曰此言破諸陰和合名破僧為無間行也異相即色受想行識也諸陰和合積聚為人然僧以和合為義今稱陰為僧者以妄和合故能斷彼陰集名破和合僧諸緣和合既斷則本有法身自顯此即緣生而證實相也大慧不覺外自共相自心現量七識身以三解脫無漏惡想究竟斷彼七種識佛二譯皆作八識名為惡心出佛身血記曰此言轉識成智故名出佛身血為無間行也然八識原是諸佛如來根本法身但以前七轉識妄實見習染污故謂之血今能以空無相無願三無漏智斷彼七識染污無知名為出佛身血即彼八識轉為根本正智而得如來清淨法身矣若男子女人行此無間事者名五無間亦名無間等記曰此結無間行也謂能行此五無間即名證無間等真實法也故魏譯云名證如實法唐譯云即得現證實法復次大慧有外五無間今當演説汝及餘菩薩摩訶薩聞是義已於未來世不墮愚癡記曰此防邪見也謂行內五無間即證聖智法門行外五無間定入無間地獄故世尊復説外五無間業誡令後世衆生知此義已不墮愚癡之惑也云何五無間謂先所説無間若行此者於三解脫一一不得無間等法記曰此言行外五無間不但於三解脫一一不得證真實法抑令入無間獄受無間苦也先所説即指上五無間事是也除此已餘化神力現無間等謂聲聞化神力菩薩化神力如來化神力為餘作無間罪者除疑悔過為勸發故神力變化現無間等無有一向作無間事不得無間等記曰此釋疑也恐疑者云可有造五無間業而不入無間獄者故唐譯釋云唯除如來諸大菩薩及大聲聞見其有造無間業者為欲勸發令其改過以神通力示其同事尋即悔除證於解脫此皆化現非是實造未有一向實造無間事而不入無間獄者蓋言因果報應無一毫可爽者除覺自心現量離身財妄想離我我所攝受或時遇善知識解脫餘趣相續妄想記曰此言能觀罪性本空亦能解脫五無間也謂但凡造五無間業未有不入地獄者唯除了悟自心現量達身心本空離我我所分別執著者或於多生曾種般若緣熟今時遇善知識開導頓悟自心離諸妄想永斷諸趣生死根本者此則不墮非此無不墮者爾時世尊欲重宣此義而説偈言貪愛名為母無明則為父覺境識為佛諸使為羅漢陰集名為僧無間次第斷記曰此頌以無間智次第斷彼無明貪愛等故為無間行也謂是五無間不入無擇獄記曰長行正意明五無間行證真實法乃因釋疑故説外五無間耳故此不頌此上二章舉果驗因示一乘真因相竟已前大科第二返妄歸真初辨邪正頓示一乘理行因果相中辨明因地心已竟文從初卷五法章來止此計一萬七千餘言下辨果地覺分三初明三身以顯法身常德又三初總示佛之知覺爾時大慧菩薩復白佛言世尊惟願為説佛之知覺世尊何等是佛之知覺記曰上辨因地心已竟此明果地覺也佛之知覺果地覺也由前云我説一乘道覺名為大乘意謂一乘乃佛之知覺也不知何等是佛之知覺故此辨之佛告大慧覺人法無我了知二障離二種死斷二煩惱是名佛之知覺聲聞緣覺得此法者亦名為佛以是因緣故我説一乘記曰此總示佛之知覺相也二障即煩惱所知二死即分段變易二煩惱即根本支末舊注為四住并無明亦不出此謂但能斷如上諸過即名佛之知覺所謂五住究盡二死永亡人法雙空諸障永寂方稱佛之知覺耳爾時世尊欲重宣此義而説偈言善知二無我二障煩惱斷永離二種死是名佛知覺記曰此總明果覺之相也然果佛有二謂一緣生報佛二法身真佛若緣生報佛乃歷劫修生此法報冥一三身不二若法身真佛則有佛無佛性相常住也次顯報化二身爾時大慧菩薩白佛言世尊何故世尊於大衆中唱如是言我是過去一切佛及種種受生我爾時作曼陀轉輪聖王二譯皆作頂生王六牙大象及鸚鵡鳥釋提桓因善眼仙人如是等百千生經説魏譯云如是等百千經皆説本生唐譯云説百千本生之事記曰此下將明緣生報化二身以顯佛佛道同果德不二故致此問也因上佛説覺無我等名之為佛大慧意謂世尊既因覺法為佛乃現在修成蓋非已成之佛來應世者如何世尊乃云我是過去佛耶既云是過去佛何以又言如來過去受種種身又説為頂生王又説為禽獸若象若鸚鵡等又説為天帝又説為仙人如是等説百千本生之事者何也如此則自語相違也此蓋常情所疑故興此問佛告大慧以四等故唐譯云依四平等祕密意故如來應供等正覺於大衆中唱如是言我爾時作拘留孫拘那含牟尼迦葉佛云何四等謂字等語等法等身等是名四等以四種等故如來應供等正覺於大衆中唱如是言云何字等若字稱我為佛彼字亦稱一切諸佛唐譯云謂我名佛一切如來亦名為佛彼字自性無有差別是名字等記曰此明佛佛名等謂化等也然名者實之賓也以實等故名亦等其他三乘皆不得此名者以未臻其實故云何語等謂我六十四種梵音言語相生彼諸如來應供等正覺亦如是六十四種梵音言語相生無增無減無有差別迦陵頻伽梵音聲性記曰此明佛佛音聲相等謂報等也六十四種梵音者舊注引密迹力士經説佛聲有八轉謂體業具為從屬於呼是八轉聲各具八德所謂調和聲柔軟聲諦了聲易解聲無錯謬聲無雌小聲廣大聲深遠聲八八即成六十四聲非唯釋迦一佛一切諸佛音聲亦皆如是迦陵頻伽此云妙聲鳥正法念經云迦陵頻伽出妙音聲若天若人緊那羅等無能及者唯除如來音聲故諸經稱佛音聲必引為喻楞嚴云迦陵仙音遍十方界云何身等謂我與諸佛法身及色身相好無有差別除為調伏彼彼諸趣差別衆生故示現種種差別色身是名身等云何法等謂我及彼佛得三十七菩提分法記曰此明佛佛身等法等以法等故身等也華嚴云一身一智慧力無畏亦然蓋此明三身皆等也三身者法報化也然法身唯一報身有二謂自受用及他受用化身有三謂大化千丈盧舍那及無邊相好等小化丈六釋迦隨類化即所云種種受生頂生天帝大象鸚鵡乃至猿鹿異類無處不入此中色身即自他受用報身及大小化身種種身即隨類化也宗鏡問云諸佛唯一法身云何説三身差別答約用分三其體常一識論云如是法身有三相別一自性身謂如來真淨法界受用變化平等所依離相寂然絶諸戲論具無邊際真常功德是一切法平等實性即此自性亦名法身大功德法所依止故二受用身此有二種一自受用謂諸如來修集無量福慧資糧所起無邊真實功德及圓淨常遍色身相續湛然盡未來際恆自受用廣大法樂二他受用謂諸如來由平等智示現微妙淨功德身居純淨土為住十地諸菩薩衆現大神通轉正法輪決衆疑網令彼受用大乘法樂三變化身謂諸如來由成事智變現無量隨類化身居淨穢土為未登地諸菩薩衆二乘異生稱彼機宜現通説法令各獲得諸利樂事是以轉滅三心得三身一根本心即第八識轉得法身二依本心即第七識轉得報身三起事心即前六識轉得化身又名三德一斷德謂斷一切煩惱即法身二智德謂總四智為報身三恩德謂恩憐悲育一切有情為化身且三身四智皆依一心轉八識而成故佛佛咸證此心故身等也然此身智皆修行者究竟所歸乃正所顯故不可不知至若三十七品乃念處正勤神足根力覺道隨處有説恐煩不引蓋能斷煩惱者三十七品所顯者法身耳以稱真而修故身等法等依真而證故法等身等也故此道品亦名法身乃法身因故略説佛法無障礙智是名四等是故如來應供等正覺於大衆中唱如是言記曰此結四等之所以也謂佛佛所以四等者蓋依一真法界無障礙智故然而此智為法界總統佛佛所宗由宗無障礙智法法皆等不獨此四而已故云略説爾時世尊欲重宣此義而説偈言迦葉拘留孫拘那含是我以此四種等我為佛子説上明緣生報化二身已竟下明本有常住法身大慧復白佛言如世尊所説我從某夜得最正覺乃至某夜入般涅槃於其中間乃至不説一字亦不已説當説不説是佛説世尊如來應供等正覺何因説言不説是佛説記曰此將顯本有法身常住真佛故致此問也由上佛言我以六十四種梵音聲為衆生説法大慧故舉昔所聞而致疑曰世尊常言始終不説一字且云不説是佛説意謂我見世尊未嘗不説敢問世尊何因自言不説是佛説耶向下佛答以二義謂一者緣自得法乃離言之道本無有説是則我説其不説耳二者本住法有佛無佛此法常住如趣城道即諸佛出世特由之而已蓋本有法身非分外有所作也既無所作更復何説然而所説者乃説其不可説處故云不説是佛説佛告大慧我因二法故作如是説云何二法謂緣自得法及本住法是名二法因此二法故我如是説記曰此示不説説之所以也不從他得曰自得本來寂滅湛然不動曰本住唐譯云謂自證法云何緣自得法若彼如來所得我亦得之無增無減緣自得法究竟境界離言説妄想離字二趣記曰此言自證法乃離言之道故無法可説也謂諸佛所證自得之法我亦得之無一毫增減然此法究竟離言説妄想離文字二種趣然我所説乃離言説文字境界無説處説故説其不説也云何本住法謂古先聖道如金銀等性法界常住若如來出世若不出世法界常住如趣彼城道譬如士夫行曠野中見向古城平坦正道即隨入城受如意樂唐譯云云何本住法謂法本性如金在礦若佛出世若不出世法是法位法界法性皆悉常住譬如有人行曠野中見向古城平坦舊道即便隨入止息遊戲大慧於意云何彼作是道及城中種種樂耶魏譯云彼人始作是道隨入城耶始作種種諸莊嚴耶答言不也佛告大慧我及過去一切諸佛法界常住亦復如是唐譯云我及諸佛所證真如常住法性亦復如是是故説言我從某夜得最正覺乃至某夜入般涅槃於其中間不説一字亦不已説當説記曰此言佛佛所證本住法我但由之而已故亦無可説也本住者言法性本自常住所謂諸法從本來常自寂滅相是法住法位世間相常住如趣王城坦路衆聖共由佛佛出世但由之而已非是始作以無作故無可説是則如來所説者乃佛佛所經途路邊事耳至若大道及自受用處唯在自行自知默契而已豈得而説之耶以自得者乃本住法皆不可説是故始終中間不説一字爾時世尊欲重宣此義而説偈言我某夜成道至某夜涅槃於此二中間我都無所説緣自得法住故我作是説彼佛及與我悉無有差別記曰此頌言佛佛道同意顯非但我不説一字即一切諸佛亦皆無法可説也躡迹至此究竟已極向下明究竟一心離有無相以破二見以顯涅槃離過爾時大慧菩薩復請世尊惟願為説一切法有無有相令我及餘菩薩摩訶薩離有無有相疾得阿耨多羅三藐三菩提佛告大慧諦聽諦聽善思念之當為汝説大慧白佛言善哉世尊唯然受教記曰此因上佛説有佛無佛法界常住故此特問有無相以明究竟本際有無二俱離以顯涅槃離過也淨名云本際不可得以生死涅槃本來平等有無二俱離故蓋此二見乃依佛法而起者由衆生不達三界唯心妄執諸法以為實有故佛説緣生以破彼計而聞法者又執緣生之法以為實有二乘妄計實有生死可斷實有涅槃可證故佛説究竟常住生死涅槃本來平等以破彼計而聞者不得佛意又以為絶無由此有無二見但隨語生解故於本住法不能自得耳大慧因上佛説究竟至此意將密防斯計故特興此問佛告大慧此世間依有二種謂依有及無唐譯云世間衆生多墮二見謂有見無見墮性非性欲見不離離相記曰此示二見過也依有者謂依佛説緣生以不達無生故妄計以為實有能生所生者是也依無者謂依佛説妄想無性生死涅槃本來平等以不了唯心故妄計絶無而起撥無之見者是也計有則墮性同於外道無因計無則墮非性墮一闡提撥無因果故魏譯云以見有諸法見無諸法故非究竟法生究竟想故云欲見不離離相然皆不達自心現量故於佛法中不能離言得義但依言説妄想分別起二見耳古德云不用求真唯須息見然有佛無佛法界常住是則衆生日用現證何假外求但一念不生前後際斷能所雙忘妄見斯絶自與本法相應耳然此二見正謂執佛教門而生煩惱不得入理所云學佛法成外道見者也大論云若不得般若方便入阿毗曇即墮有中入空即墮無中倒執正法還成邪人正此輩也大慧云何世間依有謂有世間因緣生非不有從有生非無有生唐譯云謂有因緣而生諸法非不實有實有諸法從因緣生非無法生大慧彼如是説者是説世間無因記曰此明依佛教門聞因緣生法執為實有能生之因緣所生之諸法為墮有見也謂諸衆生妄執世間定有因緣能生諸法此計因緣實有也故云非不實有且既有能生之因緣必有所生之諸法此計諸法實有也故云非無法生然彼若謂實有因緣能生諸法作如是説者則墮外道無因故云是説世間無因以外道妄計實有生因謂勝性四大時和合微塵自在等以為生法之本然本不能生而妄以為生因是無因也以非因計因故云無因然此無因從計有而出以不達諸法本自無生故上破墮有見下破墮無見大慧云何世間依無謂受貪恚癡性已然後妄想計著貪恚癡性非性大慧若不取有性者性相寂靜故記曰此明依佛教門聞説生死涅槃本來平等遂撥無因果為墮無見也由佛一往所説惑亂是常煩惱性空妄想無性等句即有增上慢人遂執此語為實乃云煩惱即菩提生死即涅槃淫怒癡為梵行乃率意狂為步步行有口口談空謂飲酒食肉不礙菩提行盜行淫無妨般若且云但不取有罪福之性則自然心境寂靜矣行之何礙故云受貪恚癡性已然後妄想計著貪恚癡性非性唐譯云知受貪恚癡性已而妄計言無謂明知故為妄言性空無罪也故佛指彼所見而責問之曰若不取有性者性相寂靜故意謂彼若果然不取貪恚癡為有性者性相寂靜故也性心相境直欲令彼自揣其心若心境果然寂靜否心境若果寂靜則蹈湯赴火如處虗空啖糞飲醇無分淨穢如此則可然今既不然定非真知見也乃妄想橫計撥無因果之見耳魏譯云無有諸法以不見諸物相故唐譯云及彼分別諸法而不受諸法有以二譯證之故知此寂靜句乃佛出彼執者妄計之辭所謂將佛了義回為己解者是也觀者當善於義謂諸如來聲聞緣覺不取貪恚癡性為有為無記曰此言撥無者妄擬三乘聖人亦同己見也謂彼妄説三乘聖人亦是先有貪瞋癡但不取性者耳以彼聖人知貪瞋癡本來寂靜故不取為有亦不斷貪瞋癡故不取為無唐譯云復有知諸如來聲聞緣覺無貪瞋癡性而妄計為非有謂妄計如己之不取為非有也此實惡見增上慢人未得謂得未證謂證誠大闡提斷佛種性撥無因果者所謂學佛法之外道也如來懸見末法多此等輩故此特出其過令知所警不墮邪見耳大慧此中何等為壞者記曰此佛問大慧此二人誰為壞善根墮空見斷佛種者壞墮義斷滅義大慧白佛言世尊若彼取貪恚癡性後不復取記曰大慧言墮空見為壞者佛告大慧善哉善哉汝如是解唐譯云汝解我問大慧非但貪恚癡性非性為壞者於聲聞緣覺及佛亦是壞者所以者何謂內外不可得故煩惱性異不異故記曰此出撥無者之謬見也謂彼撥無之人不但自以貪瞋癡無性為斷壞善根者彼且亦將聲聞緣覺及佛所證妄同己見又是斷滅佛種者是則彼人不止自壞而又壞滅佛法也何故説彼自壞又壞佛法以彼謬解佛語妄謂內外不可得故煩惱性異不異故然內外心境也又內業因外苦果也煩惱即貪恚癡異謂多種不異謂一真所謂煩惱即菩提也以彼撥無之人妄謂內外心境因果皆不可得故無因無果而云生死即涅槃煩惱即菩提故略無忌憚縱放身心以為解脫將謂聲聞緣覺及佛所證亦如此而已此真斷滅佛種者也大慧貪恚癡若內若外不可得貪恚癡性無身故無取故非佛聲聞緣覺是壞者佛聲聞緣覺自性解脫故縛與縛因非性故記曰此正示三乘聖人之實證也然三乘聖人所證於貪恚癡若內若外不可得者以觀慧之力明見貪恚癡性本無體故無可取故豈可同彼撥無之人現行貪恚癡境造種種業而妄自謂內外不可得耶即今身心苦惱處處纏縛豈可妄謂煩惱性異不異耶是故我説乃彼撥無之人自起惡見斷滅善根耳非佛聲聞緣覺是壞者也以佛聲聞緣覺自性解脫故縛與縛因非性故解脫涅槃也縛生死也縛因五住煩惱也佛證無餘二乘證有餘通名涅槃故皆云自性解脫四住煩惱為分段因無明住地為變易因二乘度分段死佛度變易死故皆云縛與縛因非性且三乘聖人實證如此豈彼撥無者同日而語耶大慧若有縛者應有縛是縛因故大慧如是説壞者是名無有相記曰此出撥無者之過也然彼撥無者自謂同於三乘聖人且彼聖人皆得自性解脫者至於生死之縛煩惱縛因皆已盡淨而彼自揣果有生死苦縛耶無苦縛耶若果無苦縛可爾若尚有生死苦縛者是應必有煩惱與苦為因故今既業因未盡苦果難逃生死迅輪正當電轉何得妄謂無因無果然業惑方熾豈可妄擬三乘聖人引為濟苦之翣資而為自欺之媒筏耶愚之甚也如是故我説之名為壞者是為墮無見者其相如此悲哉末法當痛識之大慧因是故我説寧取人見如須彌山不起無所有增上慢空見記曰此甚言空見之過意在痛勉遠離也人見有見也唐譯云我依此義密意而説寧起我見如須彌山不起空見懷增上慢然依密意説寧起我見如須彌山非是許起我見蓋甚言空見之不可起也然我見雖固難化而外道中有利根者尚可一言而轉至若空見最不可治然權教菩薩尚不識真空名空亂意況懷增上慢起撥無者乎永嘉云豁達空撥因果莽莽蕩蕩招殃禍謂是故也大慧無所有增上慢者是名為壞墮自共相見希望不知自心現量唐譯云若起此見名為壞者墮自共見樂欲之中不了諸法唯心所現見外性無常剎那展轉壞陰界入相續流注變滅離文字相妄想是名為壞者記曰此結責空見大過之所以也所以我説增上慢人名為壞者以彼墮自共相見樂欲之中不了諸法唯心所現故也自共相謂五蘊根塵等希望樂欲者謂內受根身外染六塵起貪瞋癡堅著五欲其實不了自心現量外逐世界無常剎那展轉遷謝內依蘊界處相念念不停流注生死如燈焰焰似水涓涓未嘗一念之停息者爾乃自謂已證不生不滅妄言生死平等煩惱性空復妄分別諸佛如來所證涅槃離文字相以為己解此實未得謂得未證謂證增上慢人故我説為破壞佛法斷善根者餘經中説寧起有見如須彌山不起無見如芥子許以墮大險坑諸佛所不化故爾時世尊欲重宣此義而説偈言有無是二邊乃至心境界唐譯云心所行淨除彼境界平等心寂滅無取境界性滅非無所有有事悉如如如賢聖境界記曰此頌撥無之見非真寂滅亦非聖賢境界也謂有無二邊皆是妄想所行之境界然平等寂滅非心行處必須淨除彼妄想境界方默契耳且彼增上慢人妄謂不取貪瞋癡性以為滅者此乃撥無斷滅之滅非真無所有也故云滅非無所有若果日用現前有為事上頭頭物物一念不動心境如如如此方同聖賢境界況彼日用現行無明業識茫茫隨情造業豈可妄擬同聖賢耶此一頌總頌壞者之過無種而有生生已而復滅因緣有非有不住我教法非外道非佛非我亦非餘唐譯云非餘衆因緣所集起云何而得無誰集因緣有而復説言無記曰此頌借外道以斥撥無者之大過也初偈皆指外道邪論謂彼外道以不達諸法本自無生而妄計無種而有生種因也或計生已而復滅或計四大微塵等和合因緣能生諸法或計諸法亦有亦無此等雖云邪見然而尚未絶滅諸法我已痛斥之云此皆邪論不住我教法矣彼撥無者妄謂不取貪瞋癡性便為寂滅因果皆無而此惡見又非外道之論又非佛法又非我所説又非我其餘弟子所論況彼現在煩惱因緣集起生死業果之中起心動念無非是業無非是罪云何而得無因無果耶且煩惱集積因緣而有三界生死業果善惡報應如影隨形誰敢於此現前集起因緣有中而復説言為絶無耶故云誰集因緣有而復説言無痛之甚也責之深也觀者可不懼乎邪見論生法妄想計有無若知無所生亦復無所滅觀此悉空寂有無二俱離記曰此頌總結指歸觀心也謂佛法外外道乃邪見論生法學佛法之外道則妄想計有無是皆不知諸法本自無生今亦無滅耳彼苟知本無所生則今亦復無滅能觀諸法不生不滅則當體空寂心境雙忘其有無二見自俱離矣二見既離則於自得本住法當一念頓證不期而得矣上顯涅槃離過已竟下示二通以明果海離言爾時大慧菩薩復白佛言世尊唯願為我及諸菩薩説宗通相若善分別宗通相者我及諸菩薩通達是相通達是相已速成阿耨多羅三藐三菩提不隨覺想及衆魔外道唐譯云善達此義不隨一切衆邪妄解記曰此下明忘言契證將顯果海離言故致此問也因上學佛法者不得佛意遂起撥無之見以彼不得自性宗通故謬解佛言以致誤墮如此蓋以名言習氣未離不能忘言默契故大慧承前便問宗通相也佛意謂彼人不但不善宗通而亦不善説通所以錯會佛意故問一答二佛告大慧諦聽諦聽善思念之當為汝説大慧白佛言世尊唯然受教佛告大慧一切聲聞緣覺菩薩有二種通相謂宗通及説通記曰由問宗通相而併示之以説通相故教之以離言觀心也宗鏡云內住自心第一義理住自覺地入聖智門以此相應名宗通相此是行時非是解時因解成行行成解絶則言語道斷心行處滅故魏譯云為我及諸菩薩建立修行正法之相佛答云有二種法一者建立正法相二者説建立正法相唐譯云宗趣法相言説法相是知此二通乃佛示三乘行人入理之要門也謂諸修行者第一要了悟自心通達唯心現量次要善達如來所説一切教法皆是隨順衆生樂欲而説如止啼黃葉本無實法與人凡觀佛教不可依語作解隨妄想轉如此了達自心又能善知佛法離言之旨自然不墮外道邪見亦不執了義大乘回為己見誤墮闡提破壞佛法也以偈觀之則聖旨的然因上而發也大慧宗通者謂緣自得勝進相遠離言説文字妄想趣無漏界自覺地自相遠離一切虗妄覺想降伏一切外道衆魔緣自覺趣光明輝發是名宗通相記曰此示宗通相也魏譯云能取無漏正戒證諸地修行相法離諸外道虗妄覺觀諸魔境界降伏一切外道諸魔顯示自身內證之法唐譯云超過一切不正思覺伏魔外道生智慧光由是觀之修行之士初心入禪五蘊未破則所見境界皆非實證故楞嚴詳辨五十重魔境是則前三陰未破而所現境界即此經所云虗妄覺想後三陰未破所起諸見即此經一切外道衆魔今欲離之伏之方名緣自覺趣正行而自性本有智慧光明自然輝發也然欲離之伏之非金剛心秉自性金剛無漏寶戒斷斷不能故魏譯云能取無漏正戒證諸地相也故楞嚴云識陰若盡則汝現前諸根互用從互用中能入菩薩金剛乾慧圓明精心於中發化如是乃超十信十住十行十回向乃至十地等覺入於如來妙莊嚴海此所謂取無漏正戒證諸地修行相方名緣自得勝進相也彼撥無者既不能了達自心即有志修行又不能善達如來所説真修行門故不能遠離妄想覺觀墮諸魔境界而自以為得者以未秉無漏正戒而為惡習所使故無怪乎所作所為以魔業為正行也云何説通相謂説九部種種教法離異不異有無等相以巧方便隨順衆生如應説法令得度脫是名説通相記曰此示説通相也佛説十二部經此云九部者以大小通該故然説通者非是但能通曉九部大小教法而善講説已也蓋要了達本來無説無示離異不異有無等相乃依如來所證自得離妄想無言説處而以善巧方便隨順衆生希望之心各隨所應稱機而説令彼得度如渡河之筏既已得度即便捨之非實法也觀者若能了達無説之説則自當離言觀義不取法相亦不取非法相矣彼撥無者不了自心故不善於義但執言説以為實法將如來了義大乘回為己見恣其貪瞋所謂醍醐返成毒藥耳佛云我所説法如標月指故凡學者聞教自合觀心離指方能識月所謂了法不在言善入無言際而能示言説如響遍世間如此方名説通相也大慧汝及餘菩薩應當修學爾時世尊欲重宣此義而説偈言宗及説通相緣自與教法善見善分別不隨諸覺想記曰此總頌二通義也善見謂得宗通善分別謂得説通此二皆善則自不隨妄想轉矣非有真實性如愚夫妄想云何起妄想非性為解脫記曰此頌責愚夫不善二通故起顛倒見也華嚴云法性本空寂無取亦無見性空即是佛不可得思量如此豈有實法如愚夫之所分別者耶既無可分別如何愚夫於無分別法中而妄想貪瞋非性為解脫耶故云非有真實等觀察諸有為生滅等相續增長於二見顛倒無所知記曰此頌前章結責之文以明倒見之所以也謂彼愚夫所以倒見如此者以不善二通故不知法性空寂但隨妄想分別觀察內外根塵識界諸有為法以為實有故妄生取著念念攀緣心心不住生滅相續日夜無隙唯直增長二見顛倒恣情造諸惡業於佛所説修行正法離言説相盲無所知是故我説此輩名為壞者一是為真諦無罪為涅槃魏譯云涅槃離於識唯此一法實唐譯云涅槃離心識唯此一法實觀察世妄想如幻夢芭蕉雖有貪恚癡而實無有人從愛生諸陰有皆如幻夢記曰此頌直指一心教之以修行正法相也真諦真實也涅槃此云寂滅謂真實處為是也罪舊注云妄想佛意謂凡所分別皆非真實唯有一法是真實處謂無妄想寂滅心體以言語道斷心行處滅乃最真實處唯此一事實餘二則非真若了此真實住如實處則能觀察一切世間身心境界妄想分別處皆如幻夢芭蕉都不實矣幻夢喻心識四蘊芭蕉喻色蘊既能了此身心不實則我執頓空我執既空縱有貪恚癡性而無作者亦無受者故云而實無有人既無作無受則心境雙亡即此從愛所生五蘊妄身雖有而處之皆如幻夢矣所謂却來觀世間猶如夢中事摩登伽在夢誰能留汝形若能作如是觀豈復以不取貪瞋癡性為得耶如此觀者名為正觀若他觀者則名邪觀此所謂建立修行正法相即此可以轉煩惱而作菩提轉生死而為涅槃斯則即此五蘊煩惱身心當下即得常住二轉依果矣智者請深觀之上從前初卷問五法自性章起至此通辨一乘理行因果行相已竟此下明依前理行頓示斷證因果相分二初顯因行分二初自利次利他初中又四且初明妄想不實以破我執斷煩惱障爾時大慧菩薩白佛言世尊惟願為説不實妄想相問妄想相不實妄想云何而生問妄想云何而生説何等法名不實妄想問妄想體唐譯云是何而生因何而生於何等法中不實妄想問妄想處唐譯云誰之所生記曰從前通辨一乘理行因果行相已竟此下明依行造修斷惑證真之次第也由前果德章云覺人法無我了知二障離二種死斷二煩惱是名佛之知覺將明依行造修先破二執斷二障為要此問妄想云云乃先斷煩惱障破我執也問妄想者謂一切衆生及外道闡提惡見皆因妄想而有又云妄想無性又云無妄想即寂滅真實處大慧意謂即云妄想不實不知如何是妄想且無妄想即真實處寂滅不生不知此妄云何而生是何所生因何而生從何處生蓋妄想乃煩惱之根本故此科云破煩惱障佛告大慧善哉善哉能問如來如是之義多所饒益多所安樂哀愍世間一切天人諦聽諦聽善思念之當為汝説大慧白佛言善哉世尊唯然受教佛告大慧種種義種種不實妄想計著妄想生記曰此答妄想相及妄想生也種種乃一切聖凡心境世出世間真妄諸法義乃名相也謂於此諸法不了唯心於中而起虗妄分別者即名妄想但一念計著即妄想生此總答問義下文釋其所以大慧攝所攝計著不知自心現量及墮有無見增長外道見妄想習氣計著外種種義心心數妄想計著我我所生記曰此釋成妄想之所以也唐譯云一切衆生於種種境不能了達自心所現計能所取虗妄執著起諸分別墮有無見增長外道妄見習氣心心所法相應起時執有外義種種可得計著於我及以我所是故名為虗妄分別意謂無明是妄想因以無明不覺自心現量故見似外境執以為實能取所取虗妄計著分別有無者是名妄想謂妄想之名相依士釋其我我所乃妄想生處謂名相之妄想依主釋也以心境互為緣起故妄想習氣皆煩惱障計我我所皆為我執心心數者心乃八識心王數乃五十一心所法謂是心家所有之法也分為六位一遍行五二別境五三善十一四根本煩惱六五隨煩惱二十六不定有四八識各具隨分多寡識論具明大慧白佛言世尊若種種義種種不實妄想計著妄想生攝所攝計著不知自心現量及墮有無見增長外道見妄想習氣計著外種種義心心數妄想我我所計著生記曰此大慧牒上佛語以起下難唐譯無此文世尊若如是外種種義相墮有無相離性非性離見相世尊第一義亦如是離量根分譬因相唐譯云離諸根量宗因譬喻世尊何故一處妄想不實義種種性計著妄想生非計著第一義處相妄想生將無世尊説邪因論耶魏譯云墮世間論唐譯云所言乖理説一生一不生記曰將明以不生滅心為本修因故此問妄想生不生也此因世尊上言不實妄想從計著種種不實義生故大慧即躡所説而設難世尊亦墮有無二見將以辨明不生滅心耳意謂若妄想從彼種種世諦不實義相生者且彼世諦向墮有無四句見相而世尊頻言彼諸法體離性非性離四句見且離四句即彼世諦而為第一義諦矣經云世間諸因量求過不可得故云第一義亦如是離量根分譬因相既二諦平等無二世尊何故偏於世諦處言生妄想於第一義處而不言生妄想耶將無世尊説邪因論耶然二諦同離有無何故一處説生一處説不生此其世尊亦似愚夫起二種計墮邪因論矣佛告大慧非妄想一生一不生所以者何謂有無妄想不生故外現性非性覺自心現量妄想不生記曰此釋不墮二見之所以也佛言我非計世諦處生妄想亦非計第一義諦不生妄想所以者何以我不起有無分別心故以不見有世諦相故故云外現性非性以了彼諸法但唯自心所現故分別不生故云覺自心現量妄想不生大慧我説餘愚夫自心種種妄想相故事業在前種種妄想性相計著生記曰此釋説愚夫妄想之所以也謂我所説非是説世諦處能生妄想但説愚夫自心所生種種妄想耳以彼愚夫妄見現前種種事業不了唯心故取以為實妄生種種分別計著是故我説為妄想生也所謂境緣無好醜好醜起於心心若不強名境界何由立故凡所分別皆分別自心經云若不了自心云何知正道故隨次明之云何愚夫得離我我所計著見離作所作因緣過覺自妄想心量身心轉變究竟明解一切地如來自覺境界離五法自性事見妄想以是因緣故我説妄想從種種不實義計著生知如實義得解脫自心種種妄想記曰此世尊自述説法之本懷也謂我因見衆生於種種諸法而生種種計著分別堅執不捨如此愚夫云何能得離我我所執著邪見云何能離作所作善惡因緣生死過患云何能覺自妄想心量云何能得轉五蘊身得意生身變無明識成究竟智明解一切地得到如來自覺境界離五法自性事見想相我為愍彼愚衆生故以是因緣故我説妄想從種種不實義計著生欲令衆生知如實義庶得解脫自心中種種不實妄想耳我為要衆生各各了悟自心故非是説世諦處能生妄想也離五法自性事見妄想者以五法自性皆迷悟邊事若究竟自覺聖智悉皆離故爾時世尊欲重宣此義而説偈言諸因及與緣從此生世間妄想著四句不知我所通記曰此頌總責愚夫不達佛意隨語生解也謂我説因緣生諸世間者意顯諸法本無生故而愚夫不達乃又依因緣復起四句妄見分別此不知我所通義也世間非有生亦復非無生不從有無生亦非非有無諸因及與緣云何愚妄想非有亦非無亦復非有無如是觀世間心轉得無我記曰此頌諸法本自無生也謂世間諸法不屬有無四句而生故我説因緣以顯彼無生意耳云何愚夫於因緣法中復起妄想作有無四句見耶若能離四句而觀諸法者則當下心轉得無我矣一切性不生以從緣生故一切緣所作所作非自有記曰此頌釋諸法無生之所以也謂一切法本自無生者以從緣生故既從緣生則生但緣生非自生也作但緣作非自作也故云所作非自有以自體不有故不生耳事不自生事有二事過故無二事過故非有性可得記曰此頌由因緣故顯不生也唐譯云果不自生果有二果失故無有二果故非有性可得然事果皆言緣也謂緣不自緣必由於因如果不自果必由於華若不待華而果則果有二果之過是無因也故緣不由因而緣徑生者則是世間計四大能生墮無因過矣如從因緣生則無二過也然緣必待因是緣不生也因必待緣是因不生也因緣既皆不生則所生之法亦無自性可得矣以無性可得故生本無也故云不生觀諸有為法離攀緣所緣無心之心量我説為心量量者自性處緣性二俱離性究竟妙淨我説名心量記曰此頌示自心現量觀也由上言愚夫於種種諸法不實義起種種不實妄想分別者以不了唯心現量故第恐聞者不知如何是自心現量故此特示之曰若正當觀諸有為法時不起心分別於所緣境斯無第二念則但是一心即此離念之心便是自心現量故云無心之心量我説為心量也現量者謂五識之初同明了意識映五塵實境時分明顯現無少差謬不起第二念分別是名現量若剎那流入意地起心分別長短方圓青黃等假法時便是比量心矣今云諸有為法即五塵境攀緣即第六意識能分別心所緣即彼諸法所分別境離猶絶也無心無第二念分別心也故魏譯云離念及所念謂觀有為法時但不起心分別自然心境雙絶寂爾靈知經云譬如眼光曉了前境其光圓滿得無憎愛以無憎愛念故云無心論云心體離念離念相者等虗空界此所謂無心之心量也然量之自體能所雙絶心境俱離究竟妙淨故説有自心現量耳施設世諦我彼則無實事諸陰陰施設無事亦復然有四種平等相及因性生第三無我等第四修修者記曰此言觀成得益也彼世諦我乃一切衆生五蘊各各執為我者諸陰即內五蘊乃自計為我者總名諸有為法皆所緣境也謂若觀自他根身時但不起心分別研醜美惡則心體寂爾虗間自然愛憎之念不起如云恰似木人見華鳥斯則一心不生萬境俱寂而所觀者但如鏡中無別分析故彼我根身盡皆不實不實則自然平等如如矣相即自他根身因乃生因性謂不生性修乃能修之人修者即所修之法所言平等者謂相與無相生與無生我與無我若人若法皆平等矣故云有四種平等此唯心現量觀成法爾如此妄想習氣轉有種種心生境界於外現是世俗心量記曰此言六七二識轉似外境為世俗心量也妄想六識習氣七識染污無知也謂第六識依染污末那引起八識含藏種子習氣熏發轉變而有種種分別心生似外境現執為實我實法不離唯心但妄見耳故云是世俗心量外現而非有心見彼種種建立於身財我説為心量記曰此言前五識心量也謂外境雖現其實不有彼乃八識親相分但以妄見執取而作種種諸法事業以為資生自處依之建立五識身財然皆不離唯心故我亦説為心量離一切諸見及離想所想無得亦無生我説為心量記曰此言轉識成智以明真唯心現量也謂能了別者八識之見分所分別者八識之相分然真如自性心境雙絶一切皆離故云離一切見及想所想到此泯絶無寄而自亦不可得當體獨立寂滅無生故我説此為真唯心現量也非性非非性性非性悉離謂彼心解脫我説為心量如如與空際涅槃及法界種種意生身我説為心量記曰此言真如一心現量真妄雙絶以明究竟真無我義也以心境雙絶故非性真亦不立故非非性以真妄俱離方為寂滅一心究竟解脫故我説此名為自心現量如是則凡所言如如言空言實際言涅槃言法界言種種意生身等皆此一心現量之異稱耳以如來藏中求於去來迷悟生死了不可得故此則五法三自性皆離八識二無我俱遣方名如來自覺聖智究竟境界行人必如是觀察方能知如實義始得解脫自心種種煩惱妄想故我説為自心現量也上明妄想不實以破我執斷煩惱障已竟下明言説性空以破法執斷所知障有四初明言説為法執之本爾時大慧菩薩白佛言世尊如世尊所説菩薩摩訶薩當善語義云何為菩薩善語義云何為語云何為義記曰此承前置問將以破法執斷所知障也初明言説為法執之本良以世出世法皆依語言分別執為實有故以語義為法執名所知障由先世尊誡云當依於義莫著言説次以不善語義隨言生解故致誤墮二見起撥無之過皆所知障乃法執也故次教以二通相且云依如實義則能解脫自心種種妄想良由不善語義生多種過故大慧至此因問不知如何為善語義此問善語義之方便將以破法執也又不知云何為語云何為義此問其相佛告大慧諦聽諦聽善思念之當為汝説大慧白佛言善哉世尊唯然受教佛告大慧云何為語謂言字妄想和合依咽喉脣舌齒齗頰輔因彼我言説妄想習氣計著生是名為語記曰此示語相也唐譯云語者所謂分別習氣而為因依於喉舌脣齶齒輔而出種種音聲文字相對談説是名為語輔口輔齗齒根大慧云何為義謂離一切妄想相言説相是名為義記曰此示義相也謂言語道斷心行處滅即是義相故云離離猶不帶也大慧菩薩摩訶薩於如是義獨一靜處聞思修慧緣自覺了向涅槃城習氣身轉變已自覺境界唐譯云以聞思修慧思惟觀察向涅槃道自智境界轉諸習氣觀地地中間勝進義相是名菩薩摩訶薩善義記曰此示善義之方便也聞思修三慧也謂從聞中思而修之以依知識所演大智教光從耳達心聲入心通遺言得義安心觀照思惟審察寂滅真如自知境界念念深入以之熏修漸令習氣轉變滅無明暗發智慧光以至心智路絶一念相應是名得入自覺聖智斯乃善義之方便也智者應如是觀復次大慧善語義菩薩摩訶薩觀語與義非異非不異觀義與語亦復如是若語義異者則不因語辨義而以語入義如燈照色記曰此示因言顯義以明語義兼善也由上云義本離言第恐愚夫執為斷滅故此示之以因語入義所謂雖復不依言語道亦復不著無言説總持無文字文字顯總持以此方真教體清淨在音聞但於語義不可作一異見故如燈照色然因燈見色故不得言異而色非燈也故不得言一此又教以善語義之方便也復次大慧不生不滅自性涅槃三乘一乘心自性等如緣言説義計著墮建立及誹謗見異建立異妄想如幻種種妄想現譬如種種幻凡愚衆生作異妄想非聖賢也記曰此責外道妄執名言成所知障故教於語義當如實觀不可隨語生解也唐譯云若有於不生不滅自性涅槃三乘一乘五法諸心自性等中如言取義則墮建立及誹謗見以異於彼起分別故如見幻事計以為實是愚夫見非聖賢也謂若於不生滅等染淨諸法中如言取義計著言説與義一者名建立計言説與義異者名誹謗以於種種言説處起種種分別故云異建立異妄想皆以為實故云如幻種種妄想現以計種種幻事而以為實者真愚夫見也古曰所知不是障被障障所知然所知者真諦寂滅豈是障哉但以執取名言以為障礙不能證入所謂四相潛神非覺違拒耳爾時世尊欲重宣此義而説偈言彼言説妄想建立於諸法以彼建立故死墮泥犂中記曰此頌計言説諸法為實者惡見過也謂佛説一切種種染淨諸法者為對治一切衆生妄想心病乃因事而設本非實法雖因言顯義而義不在言若計種種真妄諸法一一皆為實有者乃惡見也故死墮泥犂陰中無有我陰非即是我不如彼妄想亦復非無我記曰此以五陰喻諸法言説義也以但有言説都無實義故如陰中無有我義本離言言非是義故如陰非即是我言説諸法本非實有故不如彼妄想計陰為我雖非實有不入斷滅故如彼陰亦復非無我如此觀語與義則不墮有無一異見也一切悉有性如凡愚妄想若如彼所見一切應見諦一切法無性淨穢悉無有不實如彼見亦非無所有記曰此以法合上喻也前偈反顯諸法本非實有謂一切諸法果然悉有自性如彼愚夫所分別者則一一應當見真實處今但有語言未見實義如説火口不熱談冰齒不寒以此觀之足徵一切言説諸法皆無性矣以皆無性故言説淨穢非實有也然聖人所見諸法與凡愚無別但愚夫計以為實聖人視之如幻化耳故云不實如彼見亦非無所有上明言説為法執之本已竟下示智識為縛脫之源復次大慧智識相今當説若善分別智識相者汝及諸菩薩則能通達智識之相疾得阿耨多羅三藐三菩提記曰此因上教菩薩當善語義故特説智識相意令依智不依識也然有分別是識無分別是智依識則兩傷依智則兼善以生滅不生滅故苟以智而觀則彼名言自絶矣大慧彼智有三種謂世間出世間出世間上上記曰此列智相有三種也其識即前所云略説有三種廣説有八是已故此不具云何世間智謂一切外道凡夫計著有無記曰此世間智即六粗中智相是也外道自稱一切智而此方所言仁智老氏所言棄智皆此智也佛云世智辨聰難以依此智不得入無生理故云計著有無云何出世間智謂一切聲聞緣覺墮自共相希望計著記曰此二乘偏空智也以聲聞知苦斷集修道證滅法類忍智及緣覺推因審因七十七智以見有三界五蘊生死可厭不了唯心故云墮自共相以計有涅槃可證故云希望計著所以計著者以未離識性不了無明故云何出世間上上智謂諸佛菩薩觀無所有法見不生不滅離有無品如來地人法無我緣自得生記曰此出世間上上智也八地聖人證無相真如創得此智故云觀無所有然知不生滅唯佛與佛乃能究盡故云緣自得生謂從自覺聖智境界而生也大慧彼生滅者是識不生不滅者是智復次墮相無相及墮有無種種相因是識超有無相是智記曰有無相者謂斷常二見也種種相因因即生因謂勝妙等復次長養相是識非長養相是智記曰長養者相續義謂集諸種子起諸現行相續不斷故然此辨識智相以明識智覿體無二唯在生與不生墮與不墮之分要令即識成智也所以智識不二者直如耳聞説法語言音聲時最初一念得聲自性乃現量境即是根本智照不屬生滅不墮有無當體常住若剎那流入意地分別義理起第二念即是生滅便墮有無則相續不住隨他言語流轉即智轉成識所謂大智居於目前翻為名相之境矣古德云大衆見聞只可一度其有得於此乎愚觀曹山三墮歎曰非一切智無師智念念現前者何以與此智者請深觀此自當善語義矣復次有三種智謂知生滅知自共相知不生不滅記曰此如來自述自覺聖智以明出世間上上智相也謂凡夫外道不知生滅故計著有無二乘不知自共相故墮自共相三賢菩薩不知不生滅故任運長養不能超凡聖見墮在識情佛謂我自覺聖智無他唯知此三者而已以超凡聖量故為出世間上上智也復次無礙相是智境界種種礙相是識唐譯云著境界相是識不著境界相是智復次三事和合生方便相是識無事方便自性相是智唐譯云三和合相應生是識無礙相應自性相是智復次得相是識不得相是智自得聖智境界不出不入故如水中月記曰此釋上自覺聖智相也謂如來自覺聖智亦不離識外別求然於一切境界與凡夫三乘見處無異但有礙與不礙和合不和合得相不得相之分耳以於境界著即成和合相應有相可得故即智名識即有明暗去來出入之相以不著不和合無相可得故即識名智則於諸境界不出不入如水中月然水中月不獨不出不入抑且波濤洶湧而月體湛然不動不搖自覺聖智若然者以境智混融無二故爾時世尊欲重宣此義而説偈言採集業為識不採集為智觀察一切法通達無所有逮得自在力是則名為慧魏譯云識能集諸業智能了分別慧能得無相及妙莊嚴境縛境界為心覺想生為智無所有及勝慧則從是生記曰此頌識智之相也謂集諸業行縛著境界者為識能觀察諸法照了妄想生滅者為智若了心境皆空達無所有而入勝妙佛境界者則為慧矣是則三賢皆慧力不充以至登地從發光𦦨慧而入無所有佛地者方名慧具足也心意及與識遠離思惟想得無思想法佛子非聲聞記曰識本是智但以思惟妄想故不真也今既遠離即識成智此無思惟離心識處唯八地及佛境界故非聲聞可知寂靜勝進忍如來清淨智生於善勝義所行悉遠離記曰此頌釋上離妄想境界也舊注引仁王經中説有五忍謂伏信順無生寂滅各有下中上品三賢但伏忍登地至九如次配次三忍十地等覺及佛得寂滅忍故云寂靜勝進忍是如來清淨智也此忍智從勝義諦生一切妄想心識所行境界皆悉遠離故上云無思想法非聲聞可得我有三種智聖開發真實於彼想思惟悉攝受諸性二乘不相應智離諸所有記曰此頌出世間上上自覺聖智相也然三種智即上知生滅等謂以我知此三種故得聖智之名能開發衆生真實然於凡愚思想攝受諸法之識及二乘不如實相應之智而我此智一切都離故云智離諸所有故魏譯云我有三種慧依彼得聖名唐譯云分別於諸相開示一切法我智離諸相超過於二乘計著於自性從諸聲聞生超度諸心量如來智清淨記曰此頌釋成上意也唐譯云以諸聲聞等執著諸法有如來智無垢了達唯心故謂凡夫執有諸法二乘執有涅槃皆不離心量我以法界海慧照了一切悉無所有故皆超之是名如來自覺聖智為出世間上上智也上示智識相竟下即轉變相以明動本不動復次大慧外道有九種轉變論外道轉變見生所謂形處轉變相轉變因轉變成轉變見轉變性轉變緣分明轉變所作分明轉變事轉變大慧是名九種轉變見一切外道因是起有無生轉變論記曰此言識智見境不同以明動本不動意也謂外道依諸妄想分別故所見之境轉變不一如來依智觀察無有一法若生若滅可動轉者所謂我不見有衆生相故然此九種轉變蓋外道依五蘊而立謂內身既爾諸法皆然總謂之形事即根境耳其中七法乃形勢相因依之立言故名轉變論也形處轉變等者謂六道受身其狀不一或從鬼畜而至人天或由人天而入異類各各身形轉此變彼隨處不同故云形處轉變其所受身其相各別從生至死生住異滅剎那剎那念念遷謝故云相轉變然此身相從無適有必藉生因轉變而來故云因轉變既成此身不能久留漸至壞滅故云成轉變少壯鮮澤衰老皴皺隨其變狀所見不同故云見轉變榮枯不同苦樂亦異如轉生作熟變甘作苦其性各別故云性轉變其能造者四大之緣各各分明和合為一故云緣分明轉變所造五根支節宛然故云所作分明轉變內身既爾外法皆然故云事轉變外道見其身境如此轉變不常或無而忽有或有而忽無因是遂起有無二見妄生分別作轉變論此皆依識不依智故所見生滅不了唯心一真境界故耳此但標九名下舉始終形事二義釋之云何形處轉變謂形處異見譬如金變作諸器物則有種種形處顯現非金性變一切性變亦復如是或有外道作如是妄想乃至事變妄想彼非如非異妄想故記曰此釋轉變義也上列九名今舉始末釋之其義自足言形處轉變者謂外道於形處起種種異見故且自譬曰如金作種種器形狀變而金性不變如來曉之曰此乃外道作如是妄想分別見耳於形既爾於事亦然故曰乃至事變亦妄想耳何者以彼諸法非如非異不容起見故凡所分別皆不如實但妄想故然金器之喻世尊於餘教中蓋嘗約以示人今則斥為外道見以此一乘頓教法門貴在現量實證不許比擬以舉心動念即乖法體墮見網故若形變而性不變正祖師所謂佛性有一半生滅一半不生滅之過故為外道見也如是一切性轉變當知如乳酪酒果等熟外道轉變妄想彼亦無有轉變若有若無自心現外性非性記曰此喻明諸法本無轉變之相不可作一異見也謂乳酪酒果熟味雖異而性不異其實無有可轉變相諸法亦爾以外道不達唯心故妄作轉變分別然彼諸法亦無有轉變之相所以不轉變者以諸法不屬有無無實體故故云若有若無自心現外性非性唐譯云自心所見無外物故大慧如是凡愚衆生自妄想修習生大慧無有法若生若滅如見幻夢色生記曰此釋上諸法不轉變之所以也問曰若言諸法不轉變者則是諸法不生滅矣不妨現見諸法生滅可耶答曰如是諸法本自無生亦復無滅而見有生滅者皆是凡愚衆生自妄想習氣熏變而生其實無有一法若生若滅即其所見皆當體不實故唐譯云如因幻夢所見諸色如石女兒説有生死爾時世尊欲重宣此義而説偈言形處時轉變四大種諸根中陰漸次生妄想非明智記曰此總頌外道二乘皆不如實也然長行雖云外道九種轉變未言二乘其九中因緣轉變與二乘類此頌形處時四大種諸根轉變皆外道見其計有中陰漸續後陰則是二乘轉變見也然皆依識分別故云妄想非明智中陰即中有身俱舍云死生二中間五蘊名中有最勝於緣起非如彼妄想然世間緣起如犍闥婆城記曰此頌如來如實知見也謂彼外道二乘於緣起諸法不了如幻計以為實故作轉變分別如來於緣起諸法不如彼作妄想分別但見從緣起者皆不實故如犍闥婆城上明轉變相竟下明斷相續心以顯生本無生爾時大慧菩薩復白佛言世尊惟願為説一切法相續義解脫義記曰此承上義致問以明斷相續心以顯生本無生也由上佛説轉變不轉變義大慧意謂若見諸法有轉變相則生死相續若不見諸法有轉變相則當體真常釋然解脫故此致問相續不相續義也言解脫者即不相續義唐譯云深密義及解脫深密者謂結生相續深密難斷故然轉變者生滅見也相續者生滅不斷也以微細流注潛續藏識堅固難破故云深密此俱生二執也故此執一破則生相頓寂其身轉勝證大涅槃故云解脫若善分別一切法相續不相續相我及諸菩薩善解一切相續巧方便不墮如所説義計著相續善於一切諸法相續不相續相及離言説文字妄想覺唐譯云令我及諸菩薩摩訶薩善知此法不墮如言取義深密執著離文字語言虗妄分別遊行一切諸佛剎土無量大衆力自在通總持之印種種變化光明照耀覺慧善入十無盡句無方便行猶如日月摩尼四大於一切地離自妄想相見唐譯云住於諸地離分別見見一切法如幻夢等入佛地身於一切衆生界隨其所應而為説法而引導之悉令安住一切諸法如幻夢等離有無品及生滅妄想異言説義其身轉勝記曰若善分別下敘法有勝益所以致問之意也謂行人若能於相續法中得不相續則一念頓證無生頓登佛地即得安住一切諸法如夢如幻自在法門離有無品斷生滅執不著言説令轉所依得法身最勝也有此勝益故此請問然非二障俱寂何以有此勝益佛告大慧善哉善哉諦聽諦聽善思念之當為汝説大慧白佛言唯然受教佛告大慧無量一切諸法如所説義計著相續唐譯云於一切法如言取義執著深密其數無量所謂相計著相續緣計著相續性非性計著相續生不生妄想計著相續滅不滅妄想計著相續乘非乘妄想計著相續有為無為妄想計著相續地地自相妄想計著相續自妄想無間妄想計著相續有無品外道依妄想計著相續三乘一乘無間妄想計著相續唐譯云所謂相執著緣執著有非有生非生滅非滅乘非乘為無為地地自相自分別現證外道宗有無品三乘一乘等皆言執著復次大慧此及餘凡愚衆生自妄想相續以此相續故凡愚妄想如蠶作繭以妄想絲自纏纏他有無有相續相計著記曰此明如言取義法執不忘己見猶存故深密執著乃所知障為變易生死根也生死有二謂一變易死所知障招二分段死煩惱障招此十一相續皆如言取義所知障也亦名俱生我法二執三乘十地皆墮此執故云深密後三相續乃煩惱障愚夫所得分段死也相即五蘊妄想相及自覺聖智相緣即因緣及自得法緣有非有乃至三乘一乘等皆佛一往所説者然其所説皆應機之談本無實法所謂佛説一切法為治一切心若無一切心何用一切法然所説法如空谷響如天鼓音凡愚不了妄以為實隨言取義深密執著文字語言虗妄分別重增生死故唐譯云此等密執有無量種皆是凡愚自分別執而密執著此諸分別如蠶作繭以妄想絲自纏纏他執著有無欲樂堅密由堅密故生死不斷問曰十一相續既云所知障三乘人有何以外道亦預之耶答曰此乃學佛人不得佛意不了唯心如言取義皆外道故此所謂學佛法成外道見者也得次大慧彼中亦無相續及不相續相見一切法寂靜妄想不生故菩薩摩訶薩見一切法寂靜記曰此示諸法如實義也謂此法中本無相續不相續相但由衆生執著不執著耳若於聖法中而生執著即墮凡情則生死相續若於妄法而不執著即是聖解則當念解脫是則縛脫在人非干法也所謂萬法本間唯人自鬧是故法中無有相續不相續相故唐譯云此中實無密不密相以菩薩摩訶薩見一切法住寂靜故無分別故苟能明見諸法寂靜不起分別則生死涅槃皆剩語矣復次大慧覺外性非性自心現相無所有隨順觀察自心現量有無一切性無相見相續寂靜故於一切法無相續不相續相記曰此教如實而觀諸法以釋上本無相續不相續義也唐譯云若了諸法唯心所現無有外物皆同無相隨順觀察於若有若無分別密執悉見寂靜是故無有密非密相是則徹見唯心現量而能如實觀諸法者本自無縛今又何脫是故無有相續不相續相復次大慧彼中無有若縛若解餘墮不如實覺知有縛有解所以者何謂於一切法有無有無衆生可得故記曰此言由如實觀故無縛脫之相也以有相續故有縛以無相續故有解而此法中一切皆無何以故以一切諸法雖有而本不有以求其體性不可得故若一切法可得可言縛脫既無衆生可得又誰縛誰脫所謂皮既不存毛將安附故真妄兩忘聖凡情盡復次大慧愚夫有三相續謂貪恚癡及愛未來有喜愛俱魏譯云及愛樂生唐譯云及愛來生與貪喜俱以此相續故有趣相續彼相續者續五趣唐譯云令諸衆生續生五趣大慧相續斷者無有相續不相續相記曰此言煩惱障為五趣分段生死根也謂前十一相續為所知障乃三乘人有今煩惱障乃凡夫所有者但三種耳故云愚夫有三相續然貪嗔癡乃發業無明其貪喜俱及愛來生之習氣乃潤生無明此實三界生死根本故云彼相續者續五趣然貪恚癡等雖能令衆生生死相續苟生滅見亡狂心歇滅者彼亦不可得以煩惱性空故故云相續斷者無有相續不相續相問曰此三相續與楞嚴三種相續何別答曰名同義別彼三種者謂世界衆生業果耳彼以無明為因而起淫殺盜三貪為緣以是因緣故令世界衆生業果相續不斷今此中但説貪恚癡等為煩惱障能令衆生生死相續不斷是故名同義別學者應知復次大慧三和合緣作方便計著識相續無間生方便計著則有相續三和合緣識斷見三解脫一切相續不生記曰此總示二種生死相續皆依七識而有也論云眼識九緣生耳識唯從八鼻舌身三七後三五三四故八識具緣多少不同唯第七識三緣而生謂第七識有漏位中緣第八見分為我時唯具三緣一根本緣即第八識二作意三種子故云三和合緣作方便計著識相續無間生然方便計著識言雖通該八識而義實單指第七識也由此末那雙計粗細我法二執故云計著識以六轉呼為染淨依故為染依故煩惱障由之而生為淨依故所知障由之而起故云方便識唐譯云有執著故則有密縛以第八識本是如來藏清淨法身真體但因七識無明業力纏眠生死故不解脫若此識一斷則生死頓脫諸障永寂二死永亡故云三和合識斷見三解脫一切相續皆悉不生而云識斷者足知非八識但言七識耳前云但轉識滅而自真相藏識實不滅藏識若滅者無始流注應斷則同外道斷滅論後文云七識不流轉以念念生滅無實體故由無實體故可言斷但一念不生則前後際斷永嘉云斷相續心謂是故也爾時世尊欲重宣此義而説偈言不真實妄想是説相續相若知彼真實相續網則斷記曰此頌真妄不異隨見不一也謂不了妄即真隨念流轉故相續是生若了妄即真則當體無生相續網斷也於諸性無知隨言説攝受譬如彼蠶蟲結網而自纏愚夫妄想縛相續不觀察記曰此頌愚夫見過也謂凡愚無知不能了達諸法不實隨言取義執著故妄想纏縛如蠶作繭無有出期此蓋於生滅相續法中不善觀察故耳意顯若善觀察則無如是之過已上破二執通斷二障已竟下文雙遣境智
