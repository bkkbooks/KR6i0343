body:
  text: 宋天竺三藏沙門求那跋陀羅譯明建鄴海印沙門釋德清筆記一切佛語心品第四之下前接辨七種無常文以顯涅槃真常德已竟下示如來藏自性清淨以顯涅槃真淨德爾時大慧菩薩復白佛言世尊惟願世尊更為我說陰界入生滅彼無有我誰生誰滅愚夫者依於生滅不覺苦盡不識涅槃記曰此將示如來藏自性清淨以顯法身真淨德故興此問然云更為我說陰界入生滅等者由前二卷初顯理究竟處已問如來藏自性清淨轉三十二相入一切衆生身中而為陰界入垢衣所纏貪欲愚癡不實妄想塵勞所污且疑世尊說如來藏同外道我世尊已為決擇云我說如來藏不同外道之我且我有時說空無相無願真如實際法性法身涅槃離自性不生不滅本來寂靜自性涅槃如是等句說如來藏已然彼但以顯理究竟以顯法身無我以破外道神我之計故特舉如來藏以問今此斷證業已究竟將顯法身本淨但為陰界入客塵所污直欲淨彼染污以顯涅槃淨德故特舉所治陰界入生滅等染污義以請將啓世尊如來藏自性清淨之談以顯涅槃真淨德也故云更為我說陰界入等此大慧約染污邊問向下世尊約如來藏自性清淨答佛言善哉諦聽當為汝說大慧白佛言唯然受教佛告大慧如來之藏是善不善因能遍興造一切趣生譬如伎兒變現諸趣離我我所不覺彼故三緣和合方便而生外道不覺計著作者為無始虗僞惡習所熏名為識藏生無明住地與七識俱如海浪身長生不斷離無常過離於我論自性無垢畢竟清淨記曰此言如來藏自性清淨以顯法身真淨德也如來藏者乃自性清淨心在纏之名大慧疑謂五陰無我若無有我則誰生誰滅誰知苦盡誰證涅槃佛言陰界入雖無我而有如來藏為衆生佛性惟此藏性能為世出世間善不善因能遍興造六道生死形色染法猶如伎兒變現諸事然本無我我所亦能成就出世淨法以二乘不知此如來藏性為生死因乃謂根塵識三緣和合方便而為生因外道不知此如來藏性而妄計神我作者以為生因然此藏性蓋為無始虗僞惡習之所熏變失其如來藏名但名識藏耳故云佛說如來藏即是阿賴耶依此藏識生無明住地變起前七識浪生滅不停故如來藏亦隨七識流轉生死如海波澄因風起浪故生死相續長劫不斷其實如來藏性本自常住離於二乘無常之見本自無我離於外道神我之論雖在纏眠染污之中其實自性無垢畢竟清淨是所謂迷此性而為生死悟此性而為涅槃以此藏性無常不能壞故為真常衆苦不能侵故為真樂生死不能拘故為真我煩惱不能污故為真淨此所以為如來無上涅槃真實果體也其餘諸識有生有滅意意識等念念有七因不實妄想取諸境界種種形處計著名相不覺自心所現色相不覺苦樂不至解脫名相諸纏貪生生貪記曰此言藏識本不生滅但七識生滅以明如來藏為生死染因也大慧疑問陰界入既無我誰生誰滅而彼愚夫因何不知苦盡不知解脫佛答意云陰界入者本如來藏不生不滅今雖在纏名識藏其體本真亦不生不滅其生滅者非是藏識乃前七識有生滅耳故唐譯云其餘七識意意識等念念生滅然彼七識所以生滅者特以妄想為因境界為緣和合而生計著名相以為實有以不了此境界色等諸法唯是自心之所顯現以不了故貪著名相逆順境界生憎愛心起苦樂受為此名相纏縛既從貪生復生於貪以是因緣愚癡衆生隨生死流不知苦盡不求解脫此所以如來藏變現六趣為生死染因也若因若攀緣彼諸受根滅次第不生餘自心妄想不知苦樂入滅受想正受第四禪善真諦解脫修行者作解脫想不離不轉名如來藏唐譯云若因及所緣諸取根滅不相續生自慧分別苦樂受者或得滅定或得四禪或復善入諸諦解脫便妄生於得解脫想而實未捨未轉如來藏中識藏之名識藏七識流轉不滅唐譯云若無藏識七識則滅所以者何彼因攀緣諸識生故非聲聞緣覺修行境界不覺無我自共相攝受生陰界入記曰此言依如來藏為無想外道及二乘因也若因若攀緣者上云妄想為因境相為緣蓋妄想指前七識乃八識之見分境相乃八識之相分今言諸受根滅次第不生者謂前六識不取諸境而七識自然不起也以外道及鈍根那含俱能灰滅六識以不了唯心又無多聞智慧但依自心分別妄計厭苦趣樂或入滅受想定而居五那含或墮無想而入四禪外道若有利根羅漢善修四諦出於三界得真諦解脫證偏空理其實未得究竟涅槃便自妄生滅度解脫之想此但盡生死謂為解脫其實未得一切解脫以彼其實未捨未轉如來藏中識藏之名故也藏識七識流轉不滅者謂彼外道二乘所以非真滅者以藏識未轉故七識流轉不滅何者以依彼轉緣彼互為緣起故故唐譯云若無藏識七識則滅何以故因彼及所緣而得生故意在若轉藏識之名而七識亦隨之而滅矣所以七地已前未捨藏識但依自妄想修心境不如以心外求法故多墮邪見二乘不了故墮自共相見以彼未淨藏識中無始虗僞習氣故故唐譯云然非一切外道二乘諸修行者所知境界以彼唯了人無我性於蘊界處取於自相及共相故然藏識者亦名阿賴耶識又云阿陀那識此云無沒識以在生死流而不沒故偈曰阿陀那識甚深細習氣種子成瀑流我於凡愚不開演恐彼分別執為我故非彼境界見如來藏五法自性人法無我則滅地次第相續轉進餘外道見不能傾動唐譯云若見如來藏五法自性諸法無我隨地次第而漸轉滅不為外道惡見所動是名住菩薩不動地得十三昧道門樂三昧覺所持觀察不思議佛法自願不受三昧門樂及實際唐譯云為三昧力諸佛所持觀察不思議佛法及本願力不住實際及三昧樂向自覺聖趣不共一切聲聞緣覺及諸外道所修行道得十賢聖種性道及身智意生離三昧行是故大慧菩薩摩訶薩欲求勝進者當淨如來藏及識藏名記曰此言如來藏為出世淨因也謂轉藏識名見如來藏即得八地無功用道方證法無我智偈曰不動地前才捨藏以捨此藏識染污之名即是如來清淨之藏非別有所得也所言法執者謂五法三自性八識二無我等一切對治真妄之法以未轉藏識時而七識未滅皆有所執取以為我故今藏識既轉則七識滅七識滅則五法自性人法無我當下隨滅以五法等皆依藏識而立故今識轉而彼亦滅所謂皮既不存毛將安附此所以為得法無我而進八地到此生滅既滅對治亦亡無功可用故云無功用道既無功用得法無我則一切外道惡見不能傾動故名住不動地住此地已即得十種三昧門樂但此菩薩向在生滅勞慮覺識煩動未得真樂今生滅既滅寂滅現前樂無可喻則味著三昧不起了無度生之念若不蒙佛力加持引拔令出則墮二乘故為諸佛三昧神力之所加持又以昔本願之力所持故所以雖證涅槃而不住實際而亦不取三昧之樂故以如幻三昧現意生身利益衆生以趣自覺聖智究竟之果此所以不同外道二乘所修行道也是故菩薩修如實行求勝法者當淨如來藏中識藏之名如是而已此外別無可證得也上正顯涅槃真淨德竟下文釋疑勸修大慧若無識藏名如來藏者則無生滅大慧然諸凡聖悉有生滅修行者自覺聖智現法樂住不捨方便記曰此釋疑也問曰既轉識藏名如來藏然識藏有生滅而如來藏亦有生滅否答曰若無識藏名而如來藏則無生滅又問一切凡愚未轉藏識故心有生滅一切聖人既轉藏識心亦有生滅否答曰等覺已還雖轉藏識而容有生滅以雖趣自覺聖智住現法樂而不捨於勇猛精進度生事業且異熟未空尚有微細生相無明未盡所謂真常流注故亦有生滅故云然諸凡聖悉有生滅修行者自覺聖趣現法樂住不捨方便問曰生滅者七識也上云若無藏識七識則滅七識既滅而諸聖者已轉如來藏復何生滅耶答曰以但轉名言無實性故下經云七識不流轉不受苦樂非涅槃因如來藏者受苦樂與因俱若生若滅由是觀之向之生滅者非七識乃如來藏也何者以如來藏有隨緣義不變義故不生滅者不變義也而生滅者隨緣義也以隨染緣則為生死因而衆生念念生滅造諸惡業故沈淪生死此凡夫生滅也若隨淨緣則為涅槃因而菩薩念念無生起大智用利樂有情故證趣涅槃此聖人生滅也是故凡聖悉有生滅以生而無生無生而生故凡聖平等六祖云佛性無常又云若法身寂滅則同草木瓦石誰當受樂又云法性是生滅之體五蘊是生滅之用一體五用故生滅是常此非深證無生達法性緣起者何以與此大慧此如來藏識藏一切聲聞緣覺心想所見雖自性清淨客塵所覆故猶見不淨非諸如來大慧如來者現前境界猶如掌中視阿摩勒果記曰此釋轉難也問曰既云如來藏自性清淨凡聖平等何以有聖凡之別答曰以所見不同故也唐譯云此如來藏識藏本性清淨客塵所染而為不淨一切二乘及諸外道憶度起見不能現證如來於此分明現見如觀掌中庵摩勒果以凡夫不覺故為不淨外道妄覺二乘偏覺皆屬比非二量故所見不淨菩薩分覺以十地菩薩觀佛性如隔穀見月故猶屬比量亦未盡淨唯有如來現前境界視如來藏如觀掌果方為現量究竟清淨是故此經貴唯心現量頓見佛性義現乎此大慧我於此義以神力建立令勝鬘夫人及利智滿足諸菩薩等宣揚演設如來藏及識藏名七識俱生聲聞計著見人法無我唐譯云令諸聲聞見法無我故勝鬘夫人承佛威神說如來境界非聲聞緣覺及外道境界如來藏識藏唯佛及餘利智依義菩薩智慧境界是故汝及餘菩薩摩訶薩於如來藏識藏當勤修學莫但聞覺作知足想記曰此顯涅槃淨德究竟已極於此故結勸修也唐譯云我為勝鬘夫人及餘深妙淨智菩薩說如來藏名藏識與七識俱起令諸聲聞見法無我大慧為勝鬘夫人說佛境界非是外道二乘境界大慧此如來藏藏識是佛境界與汝等比淨智菩薩隨順義者所行之處非是一切執著文字外道二乘之所行處法華云鈍根小智人著相憍慢者不能信是法故非所行處以智未淨故又云有佛子心淨柔軟亦利根無量諸佛所而行深妙道為此諸佛子說是大乘經故為利智滿足者說如來藏即識藏與七識俱生所以說此者正為策進二乘見法無我故所言淨智者謂依義不依語也寶鏡云但形文彩即屬染污百丈云本無名目謂之佛是染污謂之法是染污噫喚作佛法蚤是染污況貪嗔癡及種種邪見憶想圖度耶此所以非深妙淨智者不能入也故勉之曰莫但聞覺作知足想爾時世尊欲重宣此義而說偈言甚深如來藏而與七識俱二種攝受生智者則遠離記曰此頌如來藏自性清淨也謂如來藏本自清淨第以無始惡習所熏而為識藏生住地無明與七識俱故染淨因緣依之而立故云二種攝受生以此藏性染淨俱非聖凡情盡故云智者則遠離二種攝受謂能取所取即見相二分以有心境故生忘則不生如鏡像現心無始習所熏如實觀察者諸事悉無事記曰此頌釋上遠離義也以一切凡聖生死涅槃諸法於藏性中悉如鏡現像本來不有但以無始染淨二習之所熏故然如來藏中求於去來迷悟生死了不可得故云如實觀察者諸事悉無事古德云盡大地求一無事人不可得誠哉如愚見指月觀指不觀月計著名字者不見我真實記曰此頌愚夫計著名言不得真實義也前云我所說法如標月指心為工伎兒意如和伎者五識為伴侶妄想觀伎衆記曰此頌愚夫隨識而行不隨智也永嘉云損法財滅功德莫不由茲心意識心謂八識能變能現故如伎兒意謂七識仗因托緣故如和伎者五識叢生故為伴侶六識分別故為觀者本來不有如幻不實故譬之伎所以貴如實觀王文公觀俳優偈曰諸優戲場中一貴復一賤心知本自同所以無欣怨寂音謂此老人通身是眼瞞渠一點不得從初卷分別自性章起破名相妄想以來止此通約五法三自性八識二無我以辨邪正因果相已竟此下明五法三自性八識二無我究竟差別相分二初總明迷悟因依先問爾時大慧菩薩白佛言世尊惟願為說五法自性識二種無我究竟分別相二譯皆云差別之相我及餘菩薩摩訶薩於一切地次第相續分別此法入一切佛法入一切佛法者乃至如來自覺地記曰此問明五法自性究竟差別相也由前一往所言世出世間凡聖邪正一切因果皆依五法三自性八識二無我建立今所建立者邪正因果既周但未明能建立者五法自性識無我等差別之相故此請問冀佛甄明庶令行人了達無疑則可依之分別無謬而入一切佛法乃至入於自覺聖智究竟地也次答中初總明迷悟因依次別顯四門攝入且初佛告大慧諦聽諦聽善思念之大慧白佛言唯然受教佛告大慧五法自性識二種無我分別趣相者謂名相妄想正智如如若修行者修行入如來自覺聖趣離於斷常有無等見現法樂正受住現在前大慧不覺彼五法自性識二無我自心現外性凡夫妄想非諸聖賢記曰此總明真妄迷悟因依也意謂若修行者因觀察五法自性八識無我明見無謬則於如來自證境界則離斷常有無等見得現法樂甚深三昧若諸愚夫因不了此法則妄見心外實有諸法妄生分別執取故流轉生死是則迷悟聖凡皆依此法也次別顯四門攝入分五初總明五法差別相分二初明差別之法大慧白佛言世尊云何愚夫妄想生非諸聖賢佛告大慧愚夫計著俗數名相隨心流散流散已種種相像貌墮我我所見希望計著妙色計著已無知覆障故生染著染著已貪恚癡所生業積集積集已妄想自纏如蠶作繭墮生死海諸趣曠野如汲井輪以愚癡故不能知如幻野馬水月自性離我我所起於一切不實妄想離相所相及生住滅從自心妄想生非自在時節微塵勝妙生愚癡凡夫隨名相流記曰此總言五法中名相生起差別之因及外道妄計之所以也唐譯云凡愚不知名是假立心隨流動見種種相計我我所染著於色覆障聖智起貪嗔癡造作諸業如蠶作繭妄想自纏墮於諸趣生死大海如汲井輪循環不絶不知諸法如幻如𦦨如水中月自心所見妄分別起離能所取及生住滅謂從自在時節微塵勝性而生隨名相流蓋言凡夫不知名相虗假不實故妄取為我及為我所依之造作種種諸業自取生死苦果不休而外道不知名相唯自心現依妄計分別能所生滅因緣而生乃別起異見謂從自在時節微塵勝性而生斯則名相本無但依他起從遍計執而有也下正釋五法差別大慧彼相者眼識所照名為色耳鼻舌身意意識所照名為聲香味觸法是名為相記曰此釋五法中名相也名相謂色心耳意識為名五根六塵通名為相又相各有名亦名名相故云眼識所照名為色等蓋五根所對為實色意根所緣法塵為假色然實則可見有對假則不可見無對唯識百法具明此中但約為名相大慧彼妄想者施設衆名顯示諸相如此不異唐譯云此事如是決定不異象馬車步男女等名是名妄想記曰此釋五法中妄想也設施衆名顯示諸相者謂名依相立相逐名生名相本無依分別有故名妄想大慧正智者彼名相不可得猶如過客諸識不生不斷不常不墮一切外道聲聞緣覺之地記曰此釋五法中正智也不住為客於名相不住故不可得以不可得故諸識不生然識既不生非智而何以智觀諸法則不分別不顛倒不斷不常則自不墮一切聲聞緣覺之地矣以不墮偏邪故名正智復次大慧菩薩摩訶薩以此正智不立名相非不立名相捨離二見建立及誹謗知名相不生是名如如記曰此言五法中如如也若以識而知則名相橫生若以正智而觀則名相不立斯即名相之本如非離名相外別有如也但於名相不起有無二見建立誹謗以知名相本自不生故名如如耳故云非不立名相等所謂唯如如智獨存然名相不生境如也所以知名相不生者心如也心境如如故一法不立上明差別之法下顯住如如之人大慧菩薩摩訶薩住如如者得無所有境界故得菩薩歡喜地得菩薩歡喜地已永離一切外道惡趣正住出世間趣法相成熟分別幻等一切法自覺法趣相離諸妄想見性異相記曰此言住如如者之實證也得無所有境界者以唯如故法相成熟者以不被相縛故以得自覺法趣故離諸妄想以得真如用故見性異相所謂除滅無明見本法身自滅而有不思議業種種之用即與真如等遍一切處此蓋從初地以至九地之行相也唯識登地證十真如以彼約勝德故此唯一如無二如約實證故次第乃至法云地於其中間三昧力自在神通開敷魏譯云入法雲地已次以三昧力自在神通諸華莊嚴如來之地得如來地已種種變化圓照示現成熟衆生如水中月善究竟滿足十無盡句為種種意解衆生分別說法法身離意所作是名菩薩入如如所得記曰此明行成得果之相也以轉識藏得如來藏名故云法身離意所作是名菩薩入如如所論云真如自體相者從本已來自性滿足一切功德所謂自體有大智慧光明義故遍照法界義故真實識知義故自性清淨心義故常樂我淨義故清涼不變自在義故具足如是過於恆沙不離不斷不異不思議佛法乃至滿足無有所少義故名為如來藏亦名如來法身乃至云如是淨法無量功德即是一心更無所念是故滿足名為法身如來之藏以無所念方得滿足是故此言法身離意所作是名入如如所故登地以來至究竟地法爾具有如是業用上明五法差別相已竟下明三門入五法分二初三自性入五法爾時大慧菩薩白佛言世尊云何世尊為三種自性入於五法為各有自相宗佛告大慧三種自性及八識二種無我悉入五法記曰此問明四門互相攝入以顯一心真如染淨融通以顯如來藏性含攝之妙也舊注云大慧前舉四門而問如來但約五法一門而答故此再問為三自性入於五法中耶為別有自相宗耶佛答言餘三門悉入五法中者以但修一門則諸門備攝餘三亦爾然所以互相攝備者以法性融通隨緣轉變故大慧彼名及相是妄想自性記曰此言妄想自性入五法中名相也以有名相故起分別名相若無分別何起故此妄想入彼名相攝也大慧若依彼妄想生心心法名俱時生如日光俱種種相各別分別持是名緣起自性記曰此言緣起自性入五法中妄想也謂彼五法中妄想名相乃相因而起以妄想生心心所法時則諸法假名依之而生如日與光謂心境不相離故既有種種名則有種種相復起種種分別互相依持所謂心生則種種法生以心境互為緣起故此緣起自性即入彼五法中妄想攝也大慧正智如如者不可壞故名成自性記曰此言成自性入五法中正智如如也謂正智如如乃妙性天然非可作法故不可壞以不可壞故本自圓成即名成自性上明三自性入五法竟下明八識二無我入五法復次大慧自心現妄想八種分別謂識藏意意識及五識身相者不實相妄想故我我所二攝受滅二無我生記曰此言八識二無我入五法中也謂於自心所現妄法是為名相於此執著生起八識即是妄想若了此妄相皆是不實則分別不生即為正智如如此八識入五法中也若於心境妄計實有我及我所即是名相妄想若了心境不實二攝受滅二無我生即是正智如如此二無我入五法中也三明四門攝一切法是故大慧此五法者聲聞緣覺菩薩如來自覺聖智諸地相續次第一切佛法悉入其中記曰此言四門攝一切法也謂非但五法攝餘三門即聲聞緣覺菩薩如來若因若果一切諸法悉入其中四明總歸如如以示正觀復次大慧五法者相名妄想如如正智大慧相者若處所形相色像等現是名為相唐譯云此中相者謂所見色等形狀各別是名為相若彼有如是相名為瓶等即此非餘是說為名唐譯云依彼諸相立瓶等名此如是此不異是名為名施設衆名顯示諸相瓶等心心法是名妄想彼名彼相畢竟不可得始終無覺於諸法無展轉離不實妄想是名如如唐譯云彼名彼相畢竟無有但是妄心展轉分別如是觀察乃至覺滅是名如如真實決定究竟自性不可得彼是如相我及諸佛隨順入處普為衆生如實演說施設顯示於彼隨入正覺不斷不常妄想不起隨順自覺聖趣一切外道聲聞緣覺所不得相是名正智記曰此言修行五法之方便也前言五法相因而有謂名相因妄想而有如如因正智而得且彼名相通約心境相待而言所以攝入三性此單言一切諸法總謂之相相各有名分別名者謂之妄想謂此名相妄想本自如如唯能了此如如之相而復能為衆生顯示者乃名正智即所謂自覺聖智也故前後五法之次不同而立意亦別耳彼名相畢竟不可得者境本如也始終無覺者謂既無所知之境亦無能知之心則心本如也心境如如故於諸法無展轉生滅而離不實妄想矣此真如相以無相故故真實決定究竟自性不可得斯乃我及諸佛所證入處而所以普為衆生開示說者亦說此如如實相顯示於彼令彼衆生隨順入此不墮斷常不生妄想入自覺聖智趣超過一切外道二乘境界如此方名正智也是則我所證所說者唯此而已即令衆生所證者亦唯此而已故法華云唯此一事實餘二則非真下結勸修學大慧是名五法三種自性八識二種無我一切佛法悉入其中是故大慧當自方便學亦教他人勿隨於他記曰此結勸修也唐譯云於此法中汝應以自智善巧通達亦勸他人令其通達通達此已心則決定不隨他轉然通達如如其心方決定不隨他轉此所以七地未離心識而亦恐墮外道邪徑也爾時世尊欲重宣此義而說偈言五法三自性及與八種識二種無有我悉攝摩訶衍記曰此總頌上四門攝盡一切大乘佛法也梵語摩訶衍此云大乘名相虗妄想自性二種相正智及如如是則為成相記曰此頌五法攝三自性也上示五法三自性八識二無我以明究竟差別相已竟下明法身常住以示生死涅槃平等相分二初明法身常住爾時大慧菩薩復白佛言世尊如世尊所說句過去諸佛如恆河沙未來現在亦復如是云何世尊為如說而受為更有餘義惟願如來哀愍解說佛告大慧莫如說受三世諸佛量非如恆河沙所以者何過世間望非譬所譬記曰前一往通顯法界真妄因果究竟總歸如如此將示法身常住以顯法界平等如如故舉恆沙之喻以請問也蓋尋常舉多多之數以恆沙喻之大慧意謂果是三世諸佛如恆沙之多耶故云如說而受為復別有餘義耶佛言不可謂三世諸佛如恆沙之多何者以如來最勝超諸世間無與等者不可以量求故云過世間望非譬所譬經云三界有無一切法不能與佛為譬喻以凡愚計常外道妄想唐譯云我以凡愚諸外道等心恆執著常與無常長養惡見生死無窮欲令厭離生死趣輪精勤勝進故為彼說言諸佛易見非如優曇鉢華難得見故息方便求有時復觀諸受化者作是說言佛難值遇如優曇鉢華優曇鉢華無已見今見當見如來者世間悉見不以建立自通故說言如來出世如優曇鉢華大慧自建立自通者過世間望彼諸凡愚所不能信自覺聖智境界無以為譬真實如來過心意意識所見之相不可為譬記曰此言法身常住不可以言說心量譬喻求也然法身離言不墮諸數豈可以數量比擬而求之耶然以恆沙喻佛易見者蓋為䇿發懈怠衆生破其執著怖遠之情欲令厭離生死發精進心耳故為彼說諸佛易見如恆河沙非如優曇華如曰寶處在近是也若言佛難值遇彼必退怯謂難見故不肯進求故我以易見之言以啓發之非實言也若有根熟堪受化者恐其懈怠欲令精進速趣菩提故我便說言佛難值遇如優曇華使生渴仰戀慕之心故此亦寓言非實然也且優曇華並無已見今見當見之者而如來出世悉知悉見豈可以優曇華比如來耶如是以曇華喻佛者乃說化佛誘衆生之方便耳非是建立說法身自通處也故說如來如優曇華然自建立自通法者乃內證聖智法身境界世間無等故云過世間望彼諸凡愚不能信受自覺聖智境界無以為譬妄謂可以比喻而知殊不知真實如來法身乃超過心意意識所見之相不可於中而立譬喻以求之也故般若云若以色見我以音聲求我是人行邪道不能見如來大慧然我說譬佛如恆河沙無有過咎記曰此釋疑也疑曰然如來法身既無可譬而又喻佛如恆河沙豈不墮自語相違過耶故此釋云然我有時而說譬佛如恆河沙者無有相違過咎何者以我所言恆河沙者非多多之謂也以有深義故故下以七種深義釋之大慧譬如恆沙一切魚鱉輸收摩羅失獸摩羅云殺子魚師子象馬人獸踐踏沙不念言彼惱亂我而生妄想自性清淨無諸垢污如來應供等正覺自覺聖智恆河大力神通自在等沙一切外道諸人獸等一切惱亂如來不念而生妄想如來寂然無有念想如來本願以三昧樂安衆生故無有惱亂猶如恆沙等無有異又斷貪恚故記曰此喻顯法身離念也如來自覺聖智法性如河大力神通自在等如恆河中沙雖被踐踏而不起一念惱亂之想而諸外道天魔等惱亂如來而如來寂然不生一念厭捨之心以利益衆生本願三昧力所持故又斷無始貪恚愛憎習氣故以此離念之智故如恆河沙殆非多多之謂也以菩提所緣緣苦衆生故云本願三昧樂譬如恆沙是地自性劫盡燒時燒一切地而彼地大不捨自性與火大俱生故其餘愚夫作地燒想而地不燒以火因故如是大慧如來法身如恆沙不壞記曰此喻顯法身不壞也如來法身在無情謂之法性在有情謂之佛性故如沙為地之自性無情世界成住壞空而有情衆生生老病死雖為八相遷流無明三毒之火燒煮而法身湛然曾無加損於其間何者以俱無生無二故故如大地被燒而沙不失自性以沙與火俱生故而愚夫謂地被燒而地實不燒地以火為因故火能生土故火是地之因以譬愚夫將謂三毒火燒法身亦壞而法身實不壞何者以三毒煩惱是法身因故大慧譬如恆沙無有限量如來光明亦復如是無有限量為成熟衆生故普照一切諸佛大衆記曰此喻法身無限量也論云所謂自體有大智慧光明義故遍照法界義故又云以智性即色故說名法身遍一切處所現之色無有分齊隨心能示十方世界無量菩薩無量報身無量莊嚴各各差別皆無分齊而不相妨此非心識分別能知以真如自在用義故故云光明無有限量等大慧譬如恆沙別求異沙永不可得如是大慧如來應供等正覺無生死生滅有因緣斷故記曰此喻法身一相也謂法身遠離生住異滅以永斷三有生死因故論云本來平等同一覺故故云譬如恆沙別求異沙永不可得大慧譬如恆沙增減不可得知如是大慧如來智慧成熟衆生不增不減非身法故身法者有壞如來法身非是身法記曰此喻法身離增減過也論云一者體大謂一切法真如平等不增減故所言如來智慧約成熟衆生而說不增不減者蓋約權智利物即十方無量衆生皆取如來智慧而如來不減皆契佛心亦無所增所謂既已為人己愈有既已與人己愈多也何者以法身非身故故唐譯云譬如恆沙取不知減投不見增諸佛亦爾以方便智成熟衆生無減無增何以故如來法身無有身故如壓恆沙油不可得二譯皆有大慧譬如四字如是一切極苦衆生逼迫如來乃至衆生未得涅槃不捨法界自三昧願樂以大悲故記曰此喻顯同體大悲也以衆生業性盡是如來法身是則衆生受大極苦皆是逼迫如來矣故衆生未盡涅槃而如來亦不得常樂我淨所以乃至一微細衆生不入涅槃而如來亦不捨法界自三昧願樂度生事業以同體大悲所持故油喻嗔心魏譯云諸佛如來為諸衆生苦惱所壓瞋不可得大慧譬如恆沙隨水而流非無水也如是大慧如來所說一切諸法隨涅槃流是故說言如恆河沙如來不隨諸去流轉去是壞義故大慧生死本際不可知不可知故云何說去大慧去者斷義而愚夫不知記曰此喻言說法身也沙喻一切生死法水喻法身涅槃法然法身流轉五道名曰衆生若衆生以無明業識說涅槃法而涅槃法皆隨生死流而如來以自覺聖智說生死法而生死法皆隨涅槃流不但所說之法隨涅槃而言說即涅槃以言辭相寂滅故是故如來說法不隨諸去流轉所以不隨流轉者以不見有生死法故故云生死本際不可知既生死本際尚不可知我云何而說生死有去義耶且去是斷義然生死本際即涅槃常住又何說斷但此非愚夫所知上明法身常住下明生死涅槃平等大慧白佛言世尊若衆生生死本際不可知者云何解脫可知佛告大慧無始虗僞過惡妄想習氣因滅自心現知外義妄想身轉解脫不滅唐譯云了知外境自心所現分別轉依名為解脫非滅壞也是故無邊非都無所有為彼妄想作無邊等異名觀察內外離於妄想無異衆生智及爾𦦨一切諸法悉皆寂靜唐譯云離分別心無別衆生以智觀察內外諸法知與所知悉皆寂滅不識自心現妄想故妄想生若識則滅記曰此明生死涅槃本來平等以顯佛界如衆生如一如無二如也唐譯云若生死本際不可知者云何衆生在生死中而得解脫大慧意謂離生死外別求解脫也佛言生死本際即涅槃故以衆生迷本際而為生死故有無始虗僞過惡妄想習氣因此所以妄見心外實有諸法今但滅彼妄想習氣則能了知心外無法即此妄想便是涅槃非離此妄想外別有涅槃也故云妄想身轉解脫不滅是故無邊非都無所有以本際全成妄想即此妄想乃本際之異名耳故魏譯云本際者是分別心一體異名離分別心更無衆生斯則本際即妄想妄想即衆生故本際如而衆生亦如也以皆如故以智觀察內外諸法知與所知皆悉寂滅但以不了妄想說自心生故妄想生若了唯心即妄想頓滅由是觀之生死涅槃本無二致惟在迷悟之間悉由自心轉變耳豈更有他哉爾時世尊欲重宣此義而說偈言觀察諸導師猶如恆河沙不壞亦不去亦復不究竟是則為平等記曰此頌法身平等也然不壞不去亦不究竟斷滅此所以為平等如如觀察諸如來猶如恆沙等悉離一切過隨流而性常是則佛正覺記曰此頌法身常住也以隨流而性常是所謂真實常住上明法身常住以顯生死涅槃平等相竟下示藏心自性以顯真妄生滅平等相爾時大慧菩薩復白佛言世尊惟願為說一切諸法剎那壞相世尊云何一切法剎那記曰此將顯衆生如故問剎那生滅之法也魏譯云為我說一切法生滅之相云何如來說一切法念念不住然一切法者極而言之乃世出世間聖凡之法無不該盡略而言之乃衆生五蘊身心之法耳總而言之皆屬生滅故謂之衆生若以妄心分別都是生滅之法即大慧初所請問百八句者是已前大慧致問世尊總斥之曰非意顯真如理中本無此事故今一往約生滅門中以五法自性識無我等一一開示以至真妄一如究竟已極將明生滅本如以顯不獨佛界如而衆生界亦如如也故大慧已聞法身常住故此特舉生滅之法以問之以真妄之法不出一心故世尊攝如來藏以舉之佛告大慧諦聽諦聽善思念之當為汝說佛告大慧一切法者謂善不善無記有為無為世間出世間有罪無罪有漏無漏受不受魏譯云內法外法唐譯云有受法無受法大慧略說心意意識及習氣是五受陰因是心意意識習氣長養唐譯云舉要言之五取蘊法以心意意識習氣為因而得增長凡愚善不善妄想大慧修三昧樂三昧正受現法樂住名為賢聖善無漏唐譯云凡愚於此而生分別謂善不善聖人現證三昧樂住是則名為善無漏法記曰此明世出世間凡聖之法總依五蘊身心而有也謂一切法者大約不越世出世間善惡無記及有無心境有漏無漏之法耳此等諸法通以五蘊身心為因然凡愚執此五蘊以為實有故依之造作世間善惡無記罪過有漏之業外道不知五蘊無我故妄執以為神我而起有無二見故謂之生滅出世聖人以三昧力觀此五蘊身心如幻如化現住法樂而成善無漏法故謂之不生滅通皆唯一五蘊身心良由所見不同故有凡聖之別據實而論總皆不離生滅謂之剎那何者以皆未離心意識故所謂菩提心生生滅心滅猶是生滅但存有所得心皆為生滅況妄計分別者乎然此生滅之法本自無生何者以皆不離如來藏故然如來藏中本無去來迷悟生死而彼諸法又豈生滅耶是知剎那者妄見也大慧善不善者謂八識何等為八謂如來藏名識藏心意意識及五識身非外道所說記曰此言如來藏為善不善因以顯生滅本不生滅也然上云諸生滅法不出善與不善今云善惡二法皆是八識八識即如來藏而如來藏本不生滅即彼八識雖是生滅而亦不生滅何者以如來藏隨染淨緣之所熏變故也若無明熏真如而如來藏隨染緣起即名八識而有生滅若真如熏無明而如來藏隨淨緣起即彼八識名如來藏而不生滅是則染淨隨緣起滅自彼而如來藏性湛然常住了無生滅善惡去來之相此非外道所知也故論云依無明熏習所起識者非凡夫能知亦非二乘智慧所覺乃至菩薩究竟地不能盡知唯佛窮了何以故是心從本以來自性清淨而有無明為無明所染有其染心雖有染心而常恆不變是故此義唯佛能知又云熏習義有二種一者根本熏習以能成就業識義故二者所起見愛熏習以能成就分別事識義故故此云如來藏名識藏心意意識及五識身然首云生滅者諸識也今至此云不生滅者亦諸識也以識藏即如來藏故大慧五識身者心意意識俱善不善相展轉變壞相續流注不壞身生亦生亦滅唐譯云無異體生生已即滅不覺自心現次第滅餘識生形相差別攝受記曰此言前五識生滅之狀也心意意識俱者謂前五識起時各無自性必依第六同時意識而起然意識必依七識意根然七識依內外門轉若依外門同六識轉時必內托八識而為根本依以七識無體故故云五識起時必與心意意識俱時而轉故作善作惡展轉變壞相續流注生滅不停然皆不離八識自證分故雖各了自境而無異體生故云不壞身生既無異體生則雖生不生故云生已即滅謂正生時即滅故下偈云物生則有滅此顯真無生意也但以不覺自心現者妄見生滅差別執取耳其實本自無生也次第滅餘識生者謂五識最初一念攬境之時未有分別謂之現量及第二念分別美惡之時前五已謝即屬第六明了意識起心分別形相好醜差別而生執受故云次第滅餘識生意識五識俱相應生剎那時不住名為剎那記曰此言六識生滅之狀也然意識不自生必待五識緣境之時而意識同時相應而起故唐譯云與彼五識共俱取於種種差別形相剎那不住我說此等名剎那法由是觀之五七八識皆本不生其所以生滅者但意識耳故前二卷涅槃章云妄想識滅名為涅槃此與前文對觀自當洞明深旨大慧剎那者名識藏如來藏魏譯云阿黎耶識名如來藏唐譯云如來藏名識藏意俱生識習氣剎那無漏習氣非剎那非凡愚所覺計著剎那論故不覺一切法剎那非剎那以斷見壞無為法記曰此正顯生滅本不生滅以明不變隨緣隨緣不變義也意謂所言剎那者非他乃識藏也且識藏即如來藏然如來藏既非剎那而識藏又豈是剎那耶是則剎那非剎那足知生滅本不生滅矣然其生滅者殆非識藏蓋是七識俱生之六識所攬染污有漏習氣所熏彼自生滅耶斯則生從緣生滅從緣滅與我藏體了不干涉故云意俱生識習氣剎那若以無漏習氣所熏則彼生滅者亦不生滅矣故云無漏習氣非剎那但此非凡愚所知以彼計著剎那論故以彼不知一切諸法剎那本非剎那故妄計無為真如亦同諸法壞故墮於斷見此剎那者魏譯文雖不倫其義更顯彼云剎尼迦者名之為空阿黎耶識名如來藏無共意轉識熏習故名之為空具足無漏熏習法故名為不空此與論覺體相四義中前二正相符合論云覺體相者有四種大義與虗空等猶如淨鏡云何為四一者如實空鏡遠離一切心識境界相無法可現非覺照義故二者因熏習鏡謂如實不空一切世間境界悉於中現不出不入不失不壞常住一心以一切法即真實性故又一切染法所不能染智體不動具足無漏熏衆生故然魏譯無共意轉識熏習即論遠離一切心境界相以此對觀足知生滅本不生滅也大慧七識不流轉不受苦樂非涅槃因大慧如來藏者受苦樂與因俱若生若滅四住地無明住地所醉凡愚不覺剎那見妄想熏心記曰此釋上生本不生義也尋常皆言七識生滅流轉招致生死此言七識不流轉者正顯無生深義也七識所以不流轉者以無自性故蓋生死善惡苦樂等法而造作者乃前六識而受熏持種致未來果者乃八識也然七識無造無受故不能為生死因況生處即滅故不流轉尚不能為生死因又豈能作涅槃因耶既不能為染淨因則無自性明矣自性尚無誰當生滅然如來藏自性清淨本不生滅不受苦樂非生死因今云受苦樂與因俱若生若滅者殆非如來藏也乃是四住煩惱及無因緣為彼所醉故有苦樂與生死俱妄生滅耳然此藏性體恆清淨湛然常住又何嘗有生死苦樂生滅之相耶是則內外諦觀畢竟了無生滅而凡愚不覺此義妄起剎那之見是乃妄想熏心非明智也下以喻明復次大慧如金金剛佛舍利得奇特性終不損壞大慧若得無間魏譯云如來證法唐譯云若得證法有剎那者聖應非聖而聖未曾不聖如金金剛雖經劫數稱量不減云何凡愚不善於我隱覆之說於內外一切法作剎那想記曰此以喻結成究竟寂滅相也謂如來藏自性清淨堅固雖在生死體常不壞如金剛佛骨以得奇特性故此乃一切諸佛證之以為自覺聖智無上涅槃在一切衆生得之而為心性所謂聖凡平等無間之法也若衆生得此無間之性有生滅者而聖人得之亦非聖人矣今既聖人得之未嘗不聖而凡夫得之又豈真凡夫耶然而此性既如金剛雖經劫數稱量不減豈可在聖有增在凡而又減之耶既聖凡平等如何於一切法又有生滅故云云何愚夫不善於我隱覆之說於內外一切法作剎那想此經直指衆生業識頓示如來藏心故從初卷生滅章起一往所談辨明邪正因果皆依八識迷悟而立至此所顯理行因果已極故復結歸如來藏識藏今明八識本不生滅以示平等如如以顯從生滅門入真如門會歸一心以為究竟此通途之大旨也故此後便明修本無修無得示法身離過以終其說焉向後空無常剎那偈文應屬於此乃譯人錯簡觀者幸會取觀之理更昭著上顯生滅平等相竟下廣明六度以示妙行無修相大慧菩薩復白佛言世尊如世尊說六波羅蜜滿足得成正覺何等為六二譯俱有云何滿足記曰此廣明六度以示妙行無修無得以成上平等義也因前一往所言但了自心現量證自覺聖智即名為佛是則不勞多劫廣修六度矣云何世尊於餘經中常說六度滿足方得成佛耶此乃聖教相違也但不知何等六度今云成佛如何滿足故興此問向下世尊答以三種六度即此所云滿足者蓋一念頓修亦非廣歷多劫以明無修無得以示究竟如如智也佛告大慧波羅蜜有三種分別謂世間出世間出世間上上記曰大慧問何等六度而世尊答以三種之名也世間即人天行出世間即二乘行出世間上上乃一乘行也大慧世間波羅蜜者我我所攝受計著攝受二邊為種種受生處樂色聲香味觸故滿足檀波羅蜜唐譯云謂諸凡愚著我我所執取二邊求諸有身貪色等境如是修行檀波羅蜜戒忍精進禪定智慧亦如是凡夫神通及生梵天記曰此言世間有漏六度也謂凡愚著相修行布施乃計我能施計有所施物依有無二見為求未來受生人天勝處乃具足六塵五欲境界而行布施乃至戒等五度亦如是以有漏因感有漏果故得生梵天獲凡夫五通不離生死故稱世間永嘉云住相布施生天福猶如仰箭射虗空勢力盡箭還墜招得來生不如意謂是故也大慧出世間波羅蜜者聲聞緣覺墮攝受涅槃故行六波羅蜜樂自己涅槃樂記曰此言二乘六度也謂二乘人為厭捨生死欣趣涅槃求於自度修習六種劣無漏行故不得作佛以著涅槃相故出世間上上波羅蜜者覺自心現妄想量攝受及自心二故不生妄想於諸趣攝受非分自心色相不計著為安樂一切衆生故生檀波羅蜜起上上方便記曰此言最上一乘行首布施度也謂大菩薩了唯心現量作如實觀而於自心內外二法覺知唯妄分別現所行布施善達三輪體空不起施者妄想不生受者執著不取中間施物色相但為安樂一切衆生故而恆行布施故以捨性障為檀度也論云於真如法中深解現前所修離相以知法性體無慳貪故隨順修行檀波羅蜜然檀能擅於六度論曰檀義攝於六資生無畏法此中一二三是名修行住故云上上方便即於彼緣妄想不生戒是尸波羅蜜記曰此戒度也梵語具云尸羅此云清涼又云止得正翻為戒此所言戒非有作持之相乃性戒也諸度皆然即於彼緣妄想不生戒者謂於彼施受一切染淨境緣妄想不生則自性清淨戒相如空有何持犯以性淨為戒度也論云以知法性無染離五欲過故隨順修行尸羅波羅蜜即彼妄想不生忍知攝所攝是羼提波羅蜜記曰此忍度也梵語羼提此云安忍又云忍辱以心能安忍外所辱境故名忍辱謂即於彼持犯妄想不生以此無生法忍可於心乃無生忍非忍辱之謂也然無生非所可忍而之忍者以知能取所取性空寂故以此為忍度也論云以知法性無苦離嗔惱故隨順修行羼提波羅蜜初中後夜精勤方便隨順修行方便妄想不生是毗黎耶波羅蜜記曰此精進度也梵語毗黎耶此云精進以稱如實修行於修行方便亦不起方便之想法華頓捨二執是真精進故以此為進度也論云以知法性無身心相離懈怠故隨順修行毗離耶波羅蜜妄想悉滅不墮聲聞涅槃攝受是禪波羅蜜記曰此禪度也梵語具云禪那此云思惟修正翻靜慮謂心意意識妄想悉滅而以大悲大願救度衆生雖得涅槃而不取證故不墮聲聞涅槃以二乘禪有執取故此以不取涅槃為禪度也論云以知法性常定體無亂故隨順修行禪波羅蜜自心妄想非性智慧觀察不墮二邊先身轉勝而不可壞得自覺聖趣是般若波羅蜜記曰此智度也梵語般若此云智慧謂了知三界之相從自心妄想現而非實有以智慧觀察不墮有無二見而法身轉勝了無生滅而不可壞得入自覺聖智趣以此為智度也論云以法性體明離無明故隨順修行般若波羅蜜然此六度皆約性而修也華嚴云心常不與世心和合名為精進悲智利俗不與識俱名之禪定已踐佛果出世妙慧名為智慧以皆稱性而修故修無修相此所謂一念滿足無上菩提故云無所得相所以為如實行也爾時世尊欲重宣此義而說偈言空無常剎那愚夫妄想作如河燈種子而作剎那想剎那息煩亂寂靜離所作一切法不生我說剎那義物生則有滅魏譯云初生則有滅不為愚者說記曰此頌前剎那章義也譯人錯簡於此謂愚夫妄想分別諸法以為實有計以為常故世尊說空無常剎那如河流如燈焰如種子迅速遷逝剎那不住以破彼計而愚夫不善隱密之意復執言說為實而定作剎那之想殊不知剎那之法本非剎那息於動亂當體寂靜離於所作爾乃妄作生滅之見以一切法本自無生故我方說剎那義耳然一切法生處即滅當體無生此無生義豈可為愚者說之耶故云初生即有滅不為愚者說楞嚴云當處發生隨處滅盡幻妄稱相其性真為妙覺明體此豈易與愚者說耶無間相續性妄想之所熏無明為其因心則從彼生乃至色未生中間有何分魏譯云若無明為因能生諸心者乃至色未生中間依何住相續次第滅魏譯云即生即有滅餘心隨彼生不住於色時何所緣而生以從彼生故不如實因生云何無所成而知剎那壞唐譯云若緣彼心起其因則虗妄因妄體不成云何剎那滅記曰此頌展轉發明心境無生以釋剎那非剎那義也謂三界上下六趣住來本自空洞無物當體常住了無纖毫起滅之相若謂六趣相續生滅之相以妄想所熏無明為因心從彼境而有生滅者此亦不然何者若果有色境與心為緣可說心從彼生若色未生時此心又依何法所住而生分別耶故云乃至色未生中間依何住此則計心從境生者妄矣故般若云不應住色生心然不住色生心本無生也若謂諸法相續次第生滅而餘心心所亦因隨彼境變滅而生者此亦不然何者若彼色境果是有住可說隨彼而生且彼諸法當處發生隨處滅盡自體寂然了無生相是則色本無住色既無住又有何法為心所緣而生之耶故云不住於色時何所緣而生此則計境有生滅者妄矣色既無住則境本無生也若謂因從彼無生之境而生心者此因如石女兒亦成虗妄矣故云以從彼生故不如實因生因既虗妄而所生之體不成云何於無所成而妄見有剎那生滅之法耶由是觀之展轉諦窮心境寂然了無生滅此所以我說剎那也所以不生滅者以心境不相到故故大經云譬如河中水湍流競奔逝諸法不相知各各亦如是修行者正受金剛佛舍利光音天宮殿世間不壞事住於正法得如來智具足比丘得平等云何見剎那犍闥婆幻等色無有剎那於不實色等視之若真實記曰此言諸法無生唯智眼明見而非妄想邪見所可知也謂修如實行者於正定中觀諸世間法法真常當體堅固猶如金剛舍利光音天宮常住不壞以光音天水火不到故然修行者定心觀之尚已如此何況八地菩薩安住正法已得如來聖智滿足證平等真如之比丘云何而見諸法又有剎那生滅之相耶且一切色法本來不實如乾城幻事無有剎那生滅以不實故云何愚夫於不實中妄為真實計四大種為能造色既大種不實云何而說能造耶此皆愚夫妄見也已上頌文當隨剎那章觀之其義自見上明妙行無修相已竟下廣破衆疑總顯法身離過爾時大慧菩薩復白佛言世尊世尊記阿羅漢得成阿耨多羅三藐三菩提與諸菩薩等無差別一切衆生法不涅槃誰至佛道記曰此廣釋衆疑總顯法身離過也大慧因世尊一往所說語頗相違第恐後人不善如來隱覆密意便生疑惑故此一一舉而徵明之以顯如來法身永離諸過也然此問答舊注分為十段今諦審語勢及觀答意對彼二譯皆合前六為二故止有六疑但語意展轉耳然如來出世以身口意三輪應物永離諸過今六問中其授記說識施設本際等口業也金剛侍衛遭魔受報等身業也不說一字常定無慮無察等意業也以三業清淨故非身現身無說示說不慮而應不察而知此所謂法身普遍如水中月不出不入故永離諸過也且此首疑世尊為二乘授記作佛與菩薩不異等者蓋因六度章言聲聞緣覺樂自己涅槃雖行六波羅蜜不能成佛此則二乘與菩薩異也何故於前不定性中云三昧樂住聲聞當得如來最勝之身於滅正受章中而云六地菩薩與聲聞緣覺同入滅正受耶此則菩薩二乘又不異也然二乘既有成佛之分何故剎那章中又言七識不流轉不受苦樂非涅槃因然七識者一切衆生識也既云非涅槃因此則衆生絶無成佛之分矣而二乘亦衆生耳既衆生法不至涅槃又誰至於佛道耶魏譯皆有如來復說四字此合舊注三問為一問從初得佛至般涅槃於其中間不說一字亦無所答如來常定故亦無慮亦無察化佛化作佛事記曰此中展轉含有三疑而向下答文合為一義也謂四等章中言如來有六十四種梵音為衆生說法何故本住章中云從初成佛至般涅槃於其中間不說一字而恆沙章中又云如來寂然無有念想然無念想則是如來心常在定無慮無察矣且說法者乃意言分別何得又以多種音聲而說法耶且四頓章中云法佛者離心自性今無慮察即是離心自性乃法佛也若無慮察而能說法則是法佛說法矣何故又說化佛化作佛事耶斯則展轉紆疑故冀佛甄別此亦合舊注三問為一何故說識剎那展轉壞相記曰此第三疑也剎那章中言七識不流轉何故又云五識身心意意識俱善不善相展轉變壞相續流注耶金剛力士常隨侍衛記曰此第四疑也恆沙章中言如來法身過世間望則是不可見相矣金剛力士又何從而侍衛耶何不施設本際記曰此第五疑也恆沙章中言生死本際不可知本際者始也解脫者終也既不知本際之始云何復說衆生得解脫之終耶衆生既得解脫是有本際可知矣何不施設本際耶現魔魔業惡業果報旃遮摩納孫陀利女空鉢而出惡業障現云何如來得一切種智而不離諸過記曰此第六疑也恆沙章偈云觀察諸如來悉離一切過且如佛初成道時而天魔興四兵持苦具詣樹下繞佛此魔業也及旃遮婆羅門女以木盂繫腹與外道孫陀利女共相謗佛又佛曾入娑那村巡門乞食無施之者持空鉢而出至若食馬麥頭痛背痛刺傷足調達推山壓佛設火窟醉象毒飯等事此皆惡業障現不能悉舉皆過惡也何言如來悉離諸過耶然二譯問惡業作二問今亦合為一問答矣佛告大慧諦聽諦聽善思念之當為汝說大慧白佛言善哉世尊唯然受教佛告大慧為無餘涅槃故說誘進行菩薩行者故此及餘世界修菩薩行者樂聲聞乘涅槃為令離聲聞乘進向大乘化佛授聲聞記非是法佛大慧因是故記諸聲聞與菩薩不異記曰此答第一問也謂所以與二乘授記者有其二意一為聲聞自取有餘涅槃今欲策進大乘以證無餘涅槃故二為初心菩薩怖畏大乘自生退縮樂聲聞行亦令捨小趣大故有此二意故為二乘授成佛記且此乃是化佛方便之所為非法佛也因此故說聲聞與菩薩不異下釋不異之所以大慧不異者聲聞緣覺諸佛如來煩惱障斷解脫一味非智障斷大慧智障者見法無我殊勝清淨煩惱障者先習見人無我斷七識滅法障解脫識藏習滅究竟清淨記曰此釋二乘不異菩薩之所以也謂二乘所以不異菩薩者以聲聞緣覺菩薩及藏教果佛同斷煩惱障證人無我所得但空涅槃無差別故非斷智障證法無我也台教云同除四住此處為齊若伏無明三藏則劣故云聲聞緣覺諸佛如來煩惱障斷一味解脫非智障斷若智障斷則得真殊勝清淨矣以二乘所證劣無漏故所言煩惱障者乃先習也先習者謂三界生因潤生枝末無明即見思也二乘證我空理已斷三界生因無復分段生死故云先習見人無我斷然煩惱障斷但滅前六識耳唯此與菩薩同若七識滅則分斷根本無明方得法障解脫若藏識種子習氣生相無明滅盡方得究竟清淨此又非二乘所知也因本住法故前後非性無盡本願故如來無慮無察而演說法正智所化故念不妄故無慮無察四住地無明住地習氣斷故二煩惱斷離二種死覺人法無我及二障斷記曰此答第二問也前問世尊從初成佛乃至涅槃中間不說一字等佛謂所以不說者因我證本住法故然本住法者所謂諸法實相有佛無佛法界常住常住則無始終無始終則無成佛及涅槃相故云前後非性前後際斷寂然不生念慮永絶又有何法可說耶然於無可說中而有說者但以諸佛如來曠劫修因所發救護衆生無盡本願所熏於湛然法界無慮無察寂定心中應衆生機而演說法即其所說乃從正智稱性所流無有妄念不待思慮然後說也如來所以無思無慮者以如來久已斷盡五住習氣及根本枝末二種煩惱離二種死覺人法二無我煩惱所知二障永寂故以諸障永寂即得種類俱生無作意生身自然而有不思議業用而能現應化身化作佛事此所以無說示說非身現身是名如來真法身也大慧心意意識眼識等七剎那習氣因善無漏品離不復輪轉大慧如來藏者輪轉涅槃苦樂因空亂意慧愚癡凡夫所不能覺記曰此答第三問也前疑剎那章云七識不流轉何故云五識身心意意識俱善不善展轉變壞相續流注既云七識變壞剎那不住即是流轉一等七識何故又云流轉又云不流轉耶今佛答意謂心等七識所以言流注者以前七識本無自性但以如來藏被無明所熏而有習氣以此習氣為因熏起前七妄想影子念念生滅剎那不住因此但說七識生滅非言流轉也所言流轉者謂順法性而流入生死轉生死而為涅槃作世出世間善不善因以具此勝能有大業用方名流轉今前七識但能為世間有漏不善之因不能作出世善無漏因是故我言不流轉耳故云無漏善品離故不復輪轉至說如來藏輪轉者以自性清淨體不生滅但以無自性故隨緣轉變以受有漏善不善熏則為人天六道生死苦樂因若受純淨無漏善法所熏則能為出世涅槃真樂因以具有如此轉變業用故云如來藏輪轉涅槃苦樂因但此祕密深意非三乘劣解外道愚夫所知也故云空亂意慧愚癡凡夫所不能覺空亂意慧者乃創修大乘未達真空無決定信者大慧金剛力士所隨護者是化佛耳非真如來大慧真如來者離一切根量一切凡夫聲聞緣覺及外道根量悉滅得現法樂住無間法智忍故非金剛力士所護一切化佛不從業生化佛者非佛不離佛因陶家輪等衆生所作相而說法非自通處說自覺境界記曰此答第四問也前問意因恆沙章言如來法身過世間望遂疑何以又有金剛力士常隨侍衛今佛答云金剛力士所隨護者乃化佛耳非真如來也真如來者離一切根量以滅一切凡夫外道二乘根量故得現法樂安住無間法智忍中故不假守護然一切化佛乃從衆生機感應現而生非是業報所生所謂應化非真佛雖非真佛然亦從真起故云不離佛以應不離真故其所說法亦非真法乃隨衆生種種心行樂欲不同施設方便各令歡喜成辦事業故云因陶家輪等衆生所作相而說法蓋陶家以輪繩泥水因緣造作種種器物隨其所求各適其用故然所說法乃隨他意語非隨自通處說自覺境界也復次大慧愚夫依七識身滅起斷見不覺識藏故起常見自妄想故不知本際自妄想慧滅故解脫記曰此答第五問也前問因恆沙章云生死本際不可知遂疑謂既不知生死之始云何而知解脫之終耶故問何不施設本際今佛答意謂本際者實際理地也然實際中本無生死又何有始終然我所言生死本際不可知者蓋責凡愚外道但隨妄想生滅不達實際耳非是說生死有本際而不可知也然彼愚夫依七識念念滅處起於斷見不知藏識但以相續流注不斷處起於常見此皆自生妄想分別故不知本際耳非言生死有始但彼自妄想滅便是解脫亦非涅槃有終也四住地無明住地習氣斷故一切過斷記曰此答第六問也前問因恆沙章言如來悉離一切過遂以魔冤惡業果報致疑今佛答意謂如來離一切過者五住煩惱習氣究竟永斷故然又遭魔者此定業也以示身堪忍調伏剛強衆生須具無生法忍慈心三昧力故所以有惡業果報者以為衆生示現定業難逃在佛不免欲令衆生明信因果懼惡報應將使怖果絶因離生死苦趣故此皆化佛方便權智示現與民同患之意耳非是如來實有惡業報應具諸過惡也且以五住煩惱永斷故言離過殆非言不受定業為離過也爾時世尊欲重宣此義而說偈言三乘亦非乘如來不磨滅唐譯云無有佛涅槃一切佛所起說離諸過惡為諸無間智及無餘涅槃誘進諸下劣是故隱覆說諸佛所起智即分別說道諸乘非為乘彼則非涅槃記曰此頌通共五偈單頌授記一義耳初一偈意言法界理中本無三乘故云亦非乘法身如來亦無涅槃之事故云不磨滅然既無三乘亦無涅槃而云無一切聲聞悉授佛記者因為說諸二乘狹劣過惡欲令捨離小心趣向大道究竟無間種智證入無餘涅槃誘進諸下劣人捨近習想是故密意隱覆說有佛果可成令彼生歡喜耳非是實有涅槃待彼證之也斯蓋權智方便施設若以諸佛所證根本實智即依自智說自證真實之道則諸乘非為乘矣以十方佛土中唯有一乘法無二亦無三故是則彼二乘所證非真涅槃明矣故云諸佛所起智即分別說道等欲色有及見說是四住地意識之所起識宅意所住意及眼識等斷滅說無常或作涅槃見而為說常住記曰此頌授記中煩惱障斷非智障斷意也所言煩惱障者乃四住煩惱也謂欲愛住地色愛住他有愛住地見一切住地此四煩惱乃意識之所起而第七末那內熏八識堅住以為生死種子故云識宅意所住以前七識念念生滅無常而彼見為斷以不知藏識流注而便以為常遂作涅槃之見故我說彼非涅槃也此常住言乃出二乘妄計耳故唐譯云見意識眼等無常故說斷迷意藏起常邪智謂涅槃觀此偈文即頌授記文義亦尚不足其餘五問之意亦當有頌或經文脫略耳此上廣決衆疑以顯法身離過已竟下特示真修佛性戒本以彰生佛平等爾時大慧菩薩以偈問曰彼諸菩薩等志求佛道者酒肉及與葱飲食為云何惟願無上尊哀愍為演說愚夫所貪著臭穢無名稱虎狼所甘嗜云何而可食食者生諸過不食為福善惟願為我說食不食罪福大慧菩薩說偈問已復白佛言惟願世尊為我等說食不食肉功德過惡我及諸菩薩於現在未來當為種種希望食肉衆生分別說法令彼衆生慈心相向得慈心已各於住地清淨明了唐譯云為未來現在非習所熏食肉衆生而演說之令捨肉味求於法味於一切衆生起大慈心更相親愛如一子想住菩薩地疾得究竟無上菩提聲聞緣覺自地止息已亦得速成無上菩提記曰此因上世尊一往開示理行因果究竟已極而大慧至此特以食肉為請者將示真修如實行者當以性戒為本故也如楞嚴進修五十五位初以三種漸次為首悲夫衆生所以常寢生死者獨以淫殺盜妄四種根本重罪牽纏不得出離也彼首斷淫此專斷殺皆為真修之要但此經來文未盡不能畢見如來清淨垂範耳或曰諸經首唱斷殺楞嚴獨唱斷淫說者以真修以斷淫為本利生以斷殺為先何言斷肉便為真修耶愚曰不然如來說法各隨所因初無執一之談也彼因阿難誤墮便唱斷淫此因夜叉王宮便唱斷殺各隨性習偏重所謂痛處著錐耳良以衆生貪著五欲因緣沈淪生死五欲者財色名食睡也豈獨色欲偏令人生死而食便不致生死耶楞嚴三相續中以三貪為本所謂淫貪殺貪盜貪也彼首淫貪而此重殺盜二貪蓋為末世衆生迷於性真昧於同體相吞相殺尤甚羅剎故如來大慈特因夜叉鬼王而發之也彼首刳正性此先除助因違現業蓋相須也然恨未見畢竟之論耳矧前云一切衆生皆攝受欲食不能攝受法食此云欲令衆生捨於肉味求於法味於一切衆生慈心相向如一子地苟非深得法味悟平等性何以不食肉者便能住菩薩地速得無上菩提耶此示真修性戒而因鬼王發之者無疑矣且曰聲聞住自涅槃亦因不食肉故而能疾得無上菩提者豈不以貪涅槃味攝受欲食為戕害法身而違平等自性者耶二乘苟能捨此欲味則一念頓證無上菩提成佛之速無過於此是愚所謂性戒也智者請深觀之惡邪論法唐譯云路伽耶等此云順世又云善論諸外道輩邪見斷常顛倒計著尚有遮法不聽食肉況復如來世間救護正法成就而食肉耶記曰此言外道邪見尚有遮禁不聽食肉何況如來大悲含育世所依怙而許自他俱食肉耶深明必應制斷也佛告大慧善哉善哉諦聽諦聽善思念之當為汝說大慧白佛言唯然受教佛告大慧有無量因緣不應食肉然我今當為汝略說謂一切衆生從本心來展轉因緣嘗為六親以親想故不應食肉唐譯云一切衆生從無始來在生死中輪回不息靡不曾作父母兄弟男女眷屬乃至朋友親愛侍使易生而受鳥獸等身云何於中取而食之驢騾駱駝狐狗牛馬人獸等肉屠者雜賣故不應食肉不淨氣分所生長故不應食肉衆生聞氣悉生恐怖如旃陀羅此云屠者及談婆此云食狗肉人又獵師也等狗見憎惡驚怖羣吠故不應食肉又令修行者慈心不生故不應食肉凡愚所嗜臭穢不淨無善名稱故不應食肉令諸呪術不成就故不應食肉以殺生者見形起識深味著故不應食肉彼食肉者諸天所棄故不應食肉令口氣臭故不應食肉多惡夢故不應食肉空閒林中虎狼聞香故不應食肉令飲食無節故不應食肉令修行者不生厭離故不應食肉我嘗說言凡所飲食作食子肉想作服藥想故不應食肉聽食肉者無有是處記曰此甚言食肉之過患也其實不應食肉有無量因緣今略說者如是耳首稱一切衆生於生死中靡不曾為父母兄弟六親眷屬朋友知識者此所謂法性平等同體之慈也以親因而觀衆生則無肉可食以佛性而觀衆生則無物可取無物可取則衆生相空無肉可食則自性清淨相空性淨此所以為性戒成就一念而登佛地也不食之利既能遠取菩提而食之之害則當斷佛慧命永殞善根矣由是觀之如上略說之過猶舉易信者言之為遮衆生恐怖故耳復次大慧過去有王名師子蘇陀娑食種種肉遂至食人臣民不堪即便謀反斷其奉祿以食肉者有如是過故不應食肉記曰此甚言昧於同體故致食人違背性真故致反逆順逆由己而依違應之矣二譯此中有多因緣當合觀之復次大慧凡諸殺者為財利故殺生屠販彼諸愚癡食肉衆生以錢為網而捕諸肉魏譯云是故買者與殺無異彼殺生者若以財物若以鈎綱取彼空行水陸衆生種種殺害屠販求利大慧亦無不教不求不想而有魚肉以是義故不應食肉記曰此言因食肉而資殺業也彼殺生為利而殺食肉以錢而網是以食之者衆而殺之者多殺之者日益多而食肉者業益甚是故買與殺者其罪均也總之皆以妄想貪求故耳所以殺者求利而想愈增食者求味而想愈熾是以殺食相誨同惡相資故云亦無不教不求不想而有魚肉者此其所以業等也魏譯云我觀世間無有是肉而非命者故我說食肉之罪斷如來種大慧我有時說遮五種肉或制十種今於此經一切種一切時開除方便一切悉斷記曰此明開權顯實意也佛謂我餘經中亦曾許食五種淨肉制斷十種生物而已今則一切頓斷一切生命盡不許食何者以昔機未純未示佛性義權且遮制以將就之欲待時故今則衆志貞純說時已至若不頓斷食肉以頓示佛性種子令其成實則我以小乘化人自墮吝法之慳此事定為不可故我於楞伽此會一切盡斷都不許食也五種淨肉者謂不見不聞不疑鳥殘自死是也應斷十種者謂人蛇象馬龍狐猪狗獅子獼猴是也大慧如來應供等正覺尚無所食況食魚肉亦不教人以大悲前行故視一切衆生猶如一子唐譯云聲聞緣覺及諸菩薩尚唯法食豈況如來大慧如來法身非雜食身大慧我已洗滌一切習氣我已善擇諸心智慧大悲平等普視衆生猶如一子云何而許聲聞弟子食於子肉何況自食是故不聽令食子肉記曰此世尊廣說食肉之過而以同體大悲結示之也然如來法身非雜食身故以法喜為食此正欲行人捨離欲食攝受法食耳所以切戒行人勿食衆生血肉者以如來視一切衆生如一子故然子之於父母氣分同也良以法身流轉五道名曰衆生而一切衆生皆以如來法身為體故以同體而觀猶如一子則無衆生苟食其肉豈非戕法身斷慧命耶不食則自性無虧法身常住矣成佛之要莫速於此不食肉章長行之文二譯甚廣今此文正當魏譯十分之一當唐譯十分之三耳顧此長行雖略而偈文頗詳詳略相因蓋譯人善義之體勢殆非佛語有出入也觀者於此三譯全經悉當以義會之爾時世尊欲重宣此義而說偈言曾悉為親屬鄙穢不淨雜不淨所生長聞氣悉恐怖記曰此總頌不淨氣分等文所謂長詳偈略且偈又先後互明一切肉與葱及諸韭蒜等種種放逸酒修行常遠離亦常離麻油及諸穿孔牀以彼諸細蟲於中極恐怖記曰此長略偈詳也葱韭韭蒜所謂生噉生恚熟食發淫故與酒肉併食之則生諸放逸增長淫欲也不食麻油不驚細蟲況食血肉耶飲食生放逸放逸生諸覺唐譯云生邪覺從覺生貪欲是故不應食由食生貪欲貪令心迷醉迷醉長愛欲生死不解脫記曰此明因殺盜而致淫欲也楞嚴謂酒肉葱蒜等為助因此言食之而生貪欲貪心迷醉增長愛欲故生死不脫者由彼食貪無明滋培欲根故增長耳令絶食貪則無明之水既涸欲愛之田自乾名色之芽自枯此所以因斷味食而生死頓絶速至菩提也為利殺衆生以財網諸肉二俱是惡業死墮叫呼獄若無教想求則無三淨肉彼非無有因是故不應食記曰無有不生之肉故云彼非無有因彼諸修行者由是悉遠離十方佛世尊一切咸訶責展轉更相食死墮虎狼類臭穢可厭惡所生常愚癡多生旃陀羅臘師談婆種或生陀夷尼魏譯作羅剎女及諸食肉性羅剎猫狸等遍於是中生記曰言好食腥膻必多墮於此類性皆然也縛象與大雲央掘利魔羅記曰縛象魏譯云象掖唐譯云象脅央掘利魔羅唐譯云央掘摩皆經名也及此楞伽經我悉制斷肉諸佛及菩薩聲聞所訶責食已無慚愧生生常癡冥先說見聞疑已斷一切肉妄想不覺知故生食肉處記曰此言如來元不曾許食淨肉也佛謂我先所說見聞疑殺不許食者其密意已是斷一切肉總不許食矣以一切肉總不出此三種殺故所言不見不聞不疑殺除此則無肉可食矣而衆生妄想無知將謂如來許不見等是為淨肉遂生可食之想此愚之甚也如彼貪欲過障礙聖解脫酒肉葱韭蒜悉為聖道障未來世衆生於肉愚癡說言此淨無罪佛聽我等食食如服藥想唐譯云淨食尚如藥亦如食子肉知足生厭離修行行乞食記曰此責衆生無知妄謂如來許食淨肉也謂衆生所以妄謂淨肉可食者以彼貪欲過患所致耳名雖淨肉其實障礙聖解脫道與酒肉葱蒜等無差別而衆生愚癡言此是淨而無罪過是佛所聽食者謬之甚矣然佛每誡比丘節量時食勿生貪求若受信施淨食之時應當觀察如服藥想亦如饑世食子肉想為欲慚愧知足生厭離心行乞食法故然於淨食尚然如此何況教彼食淨肉耶安住慈心者我說常厭離虎狼諸惡獸恆可同遊止若食諸血肉衆生悉恐怖是故修行者慈心不食肉食肉無慈慧永背正解脫及違聖表相是故不應食記曰食肉無慈慧謂傷同體無正知見故永背正解脫謂不隨順法性行邪險道入生死故違聖表相謂虧護生威儀不能化利衆生故有此多失故修行者不應食也得生梵志種及諸修行處智慧富貴家斯由不食肉記曰此結不食肉者之利益也凡善惡之報有三謂現報生報後報如長行歷言身口臭穢物見驚怖及王臣反逆等皆現報也如偈中前云墮號叫獄及虎狼臭類猫狸羅剎及屠兒等惡種類中皆生報後報也今偈不食肉而得生梵種諸修行處及智慧富貴之家此乃善業生報後報若是而驗現報可知矣以遠穢惡故生梵種以能順法界性故生修行處所謂不離道場也以捨愚癡故生智慧以永絶貪求堪為佛子故生富貴家以如來富有法界貴為世尊唯達法性平等而能不食肉者可以克紹家業耳其他復何與焉悲夫一切衆生同迷法性而受五蘊幻妄身心也觀相雖異觀性實同昧者迷同而忽異爾乃仇視自心恣殺以快己豈不謬哉此所謂自心取自心非幻成幻法能了達自心現量則物我兼忘人法雙泯一種平懷蕩然自盡豈非不以忘取著之情而為成佛之梯筏耶此所以真修之行而以斷肉為第一清淨明誨也然考之四重此雖一隅智者倘能深觀而諦思之即此可以思過半矣此經傳云大部有四十卷一百五十一品此來者四卷唯此一品以經來未盡故闕流通其百八問中今別問別答者五法三自性八識二無我總別迷悟因果邪正階差修證始終根性差等義已問答明白具足其未明答者但名相差別之事耳如誰生諸寶性已下至若天地人物萬象之差人欲好樂之別及佛所補大慧問不及者算數之事并華藏世界形狀不同等具如華嚴世界成就華藏世界及阿僧祗壽量諸品證之則其未至之文特名相耳先覺所以不持來者以所重在唯心唯識法門欲頓悟一心即此更無餘法至其所未來者縱盡法界數量第不過一心之影現耳達磨指此為心印豈此外更有剩法乎觀者應知偈曰稽首寂滅海莊嚴妙色身圓滿總持門永離文字相隨緣和合者自性清淨僧蒙以同體慈哀愍攝受我能以思惟心入此甚深藏于一毛端頭現自覺境界普使見聞者頓悟法性空一切幻化緣了達唯心現願法界量滅同入平等觀普於一切時一切塵中現凡在有情身共登極樂國觀楞伽寶經閣筆記觀楞伽寶經記蓋為觀經而作也以此經直指衆生識藏即如來藏顯發日用現前境界令其隨順觀察自心現量頓證諸佛自覺聖智故名佛語心非文字也又豈可以文字而解之哉故今不曰注疏而曰觀經記蓋以觀游心所記觀中之境耳此經為發最上乘者說所謂是法甚深奧小有能信者以文險義幽老師宿學讀之不能句況遺言得義以入自心現量乎昔達磨授二祖以此為心印自五祖教人讀金剛則此經不獨為文字且又束之高閣而知之者希望崖者衆矣惟我聖祖以廣大不二真心御寰宇修文之暇乃以楞伽金剛佛祖三經以試僧得度如儒科特命僧宗泐等注釋之頒布海內浸久而奉行者亦希清幼入空門切志向上事愧未多歷講肆嘗見古人謂文字之學不能洞當人之性源貴在妙悟自心心一悟則回觀文字如推門落臼固不難矣因入山習枯禪直至一字不識之地一旦脫然自信回視諸經果了然如視歸家故道獨於此經苦不能句余居海上時萬歷壬辰夏偶患足痛不可忍因請此經置案頭潛心力究忽寂爾亡身及開卷讀百八義了然如眂白黑因憶昔五臺梵師言遂落筆記之至生滅章其患即愈及乙未春因弘法罹難幽囚困楚中一念孤光未昧實仗此法門威德力也頃蒙恩遣雷陽丙申春過吉州遇大行王公性海於淨土中請益是經因出前草二章公首肯遂以正受注并三譯本稽首屬余請卒業焉余攜之以是年三月十日抵戍所於四月朔即命筆時值其地飢且癘死傷蔽野余坐毒霧尸陀林中日究此經至忘寢食了然如處清涼國至七月朔甫完卷半比與柯孝廉復元率諸父老掩胔骼至四千頭有奇建盂蘭會說幽冥戒普濟之時天乃雨而癘隨止遂令蔑戾車地大生歡喜心無乃借此性海一滴潤此焦枯乎余亦奉鎮檄來五羊憩東郭壘壁間又首事於十月朔至明年佛成道日乃閣筆焉愚竊思多生以謗法因緣今感斯報荷蒙聖慈以萬里之行而調伏之使入其難入期年之內奔走居半而能了此積劫廣大因緣非荷諸佛神力加持何能以思惟心測度如來自覺聖智境界乃爾以是彌感聖恩析骨難酬也稿成觀察海門周公欲梓之以入賀未果戊戌冬適侍御樊公友軒以建儲議謫雷陽與余同伍道過仙城見訪問雷陽風景何如余笑曰在人不在境因出此草示之曰此余雷陽風景也公嘆曰信光明幢哉願廣法施遂為疏募衆幸諸宰官長者居士各歡喜成之願將此勝因回向楞伽法性海中仰憑慧光圓照破此夙愆蚤登解脫冀見聞隨喜同入自心現量共轉此法輪直至未來際以斯功德上報聖恩下拔苦趣齊登涅槃彼岸耳第此經單破外道二乘偏邪之見令生正智以一心為真宗以摧邪顯正為大用其所破之執各有所據皆載彼宗以瘴鄉苦無經論參考即所引證咸以起信唯識提挈綱宗務在融會三譯血脈貫通若夫單提向上直指一心枝詞異說刷洗殆盡冥契祖印何敢讓焉因為述其始末如此萬歷己亥年夏望日海印沙門德清記牢山憨老人觀世得無生蓋游心於自覺聖智以皈極也余從之游出楞伽筆記一帙為余誦余觀其三分分科則祖之彌天氏五義約釋則本天台氏而又會三譯以絡脉引二論以明宗節其章解而理貫華疊其句釋而文暢矢不牽枝引蔓不穿地撩天可謂中原絶唱虗壤玄根誠義學之司南亦詮經之正軌也募刻棗梨布諸芻草萬歷癸卯首夏佛生日楚雲陽門人僧一書於五雲之來陽祠
