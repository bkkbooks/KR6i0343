body:
  text: 宋天竺三藏沙門求那䟦陀羅譯明建鄴海印沙門釋德清筆記一切佛語心品第四之上前轉依涅槃果已竟下轉依菩提果四德分四初顯法身真我德又二初顯三德祕藏次顯一心真如且初爾時大慧菩薩白佛言世尊惟願為說三藐三佛陀我及餘菩薩摩訶薩善於如來自性自覺覺他記曰前顯轉涅槃果已竟此顯轉依菩提果先明三德祕藏以示究竟真我故請正徧正覺善於如來自性也三藐此云正徧三佛陀此云正覺如來自性即法身自性乃究竟真我也一往所談盖由凡夫著五蘊假我外道妄計神我故世尊以無我破之今妄執已破果德已顯故說法身真我且云如來自性者即法身真我也以彼妄計實有自性能生諸法故以空無生無二離自性破之今妄計既破法身乃顯故此言如來真常法身自性以顯自覺聖智究竟真我也佛告大慧恣所欲問我當為汝隨所問說大慧白佛言世尊如來應供等正覺為作耶為不作耶為事耶二譯皆為果為因耶為相耶為所相耶為說耶為所說耶為覺耶為所覺耶如是等辭句為異為不異記曰將顯法身離過絕非以示斷德故約過非以請也辭句異不異者謂異此等辭句有如來法身耶為不異此等辭句是如來法身耶故下如來所答直指究竟一心真源故云一切皆非論曰當知真如非有相非無相非一相非異相等佛告大慧如來應供等正覺於如是等辭句非事非因所以者何俱有過故記曰此直指一心真源離過絕非也若言法身是作是不作是果是因等俱有過咎故唐譯總云非大慧若如來是事者或作或無常無常故一切事應是如來我及諸佛皆所不欲若非所作者無所得故方便則空同於兔角槃大之子以無所有故記曰此出上有過之所以也若言如來法身是果事者則同有作凡有作者皆無常若以無常為法身者則一切世間無常之事皆如來矣安有如來法身是無常耶經云若以色見我以音聲求我是人行邪道不能見如來故魏譯云不許此法斯計如來是事是作者則墮無常過矣若言如來非所作者則法身絕無體性如是則雖修方便而亦無所得悉空無利益枉費辛勤故云方便則空同於兔角石女之子畢竟空無此計法身非作者則墮斷滅過矣斯則作與不作若果若因都皆有過大慧若無事無因者則非有非無若非有非無則出於四句四句者是世間言說若出四句者則不墮四句不墮四句故智者所取一切如來句義亦如是慧者當知記曰此明法身句義也經云如來藏中求於去來迷悟生死了不可得是故法身為因果宗而不屬因果由不屬因果故非有無非有無故離四句四句者是世間言說非聖言量也四句既離百非自遣離過絕非故為智者所取智者應知一切法說如來句義皆若此如我所說一切法無我當知此義無我性是無我一切法有自性無他性如牛馬記曰此以五陰諸法皆有自性以比顯法身實有真我以明雖超因果不入斷滅也意謂我說如來離有無四句者非是絕無淪於斷滅蓋有法身真我自性存焉何者且如我尋常所說一切諸法悉皆無我當知此無我句然我者主宰義自在義以諸法中無有主宰不得自在以此義故故說無我非絕無諸法自性也故云當知此義無我性是無我譬如他人身中無有我性我自身中無有他性非無彼此自身也故云一切法有自性無他性如牛馬如來真我句義應知亦然大慧譬如非牛馬性非牛馬性其實非有非無彼非無自性如是大慧一切諸法非無自相有自相但非無我愚夫之所能知以妄想故如是一切法空無生無自性當如是知記曰此以喻釋法身有自性義也然五蘊法身非異非不異以法身隱於五蘊之內則法身無自性而非無五蘊自性如牛中無馬性非無牛性也法身顯於諸法之中則諸法無自性而非無法身自性如馬中無牛性非無馬性也故云如牛馬其實非有非無彼非無自性是故一切諸法皆有法身常住自相但非無我愚夫之所能知無我謂二乘愚夫謂外道然彼所以不知者以妄想分別諸法自性故不但法身句義如然即我所說一切法空一切法無生一切法無自性一一皆當作如是知也然前一往由彼二乘外道妄計諸法以為實有自性有生故說空無生無自性以遮遣之所謂但破其執不破其法非是實無法身常住自性也如來如是魏譯云如來法身亦復如是與陰非異非不異若不異陰者應是無常若異者方便則空若二者應有異如牛角相似故不異長短差別故有異一切法亦如是記曰此正明法身五陰離異不異以顯法身平等也永嘉云幻化空身即法身故法身與陰不可言異不異也若法身與陰不異者然陰乃無常而法身亦墮無常矣若法身與陰異者然五陰有相而法身無相無相則空空則斷滅滅則雖修而無取證矣故云方便則空如此則異不異者不出名言皆非量也既離一異則無有二若二者即應有異但法身與陰同出而異名如牛兩角本唯一體故不異爭奈五蘊生滅而法身湛然如角之長短差別故有異耳不獨陰與法身即諸法皆然故云一切法亦如是大慧如牛右角異左角左角異右角如是長短種種色各各異大慧如來於陰界入非異非不異記曰此言法身比類不及也謂法身與陰界入雖曰同體不異如牛兩角牛角尚有左右長短一定各異之相而法身與陰界入畢竟不異故魏譯云如是如來法身之相於五陰中不可說一不可說異也上明法身與世間五陰離異不異如是如來解脫非異非不異如是如來以解脫名說記曰此明法身與出世解脫離異不異以顯解脫德也魏譯云於解脫中不可說一不可說異如是依解脫故說名如來法身之相若如來異解脫者應色相成色相成故應無常若不異者修行者得相應無分別而修行者見分別是故非異非不異記曰此釋法身與解脫離異不異以顯解脫德也謂法身若異解脫者然解脫即涅槃而涅槃無相若法身異此則屬色相凡是色相皆是無常而法身同此應墮無常此則計異者過矣若法身不異解脫者則無能所若無能所則因果不分不妨修行者現有能證所證差別故非不異也故魏譯云若如來法身不異解脫者則無能證所證差別而修行者則見能證及以所證且有能所非不異也如是智及爾𦦨非異非不異記曰此明能觀智與所觀境非異不異以顯般若德也故唐譯云如是智與所知非異不異斯歷法身解脫般若非異非不異以顯究竟一心三德祕藏非縱非橫圓滿融攝故永嘉云法身不癡即般若般若無著即解脫解脫寂滅即法身舉一即具三言三體即一是以三諦一境法身之理恒清三智一心般若之明常照境智冥合解脫之應隨機非縱非橫圓之道玄會故知三德妙性宛爾無乖一心深廣難思何出要而非路是以即心為道者可謂尋流而得源矣故下釋其根量俱非以顯究竟一心極果大慧智及爾𦦨非異非不異者非常非無常非作非所作非有為非無為非覺非所覺非相非所相非陰非異陰非說非所說非一非異非俱非不俱非一非異非俱非不俱故悉離一切量離一切量則無言說無言說則無生無生則無滅無滅則寂滅寂滅則自性涅槃自性涅槃則無事無因無事無因則無攀緣無攀緣則出過一切虗偽出過一切虗偽則是如來如來則是三藐三佛陀大慧是名三藐三佛陀記曰此直顯寂滅一心真如自性轉依極果以酬近請通結前途究竟歸趣以顯法身離一切相也論云當知真如自性非有相非無相非非有相非非無相非有無俱相非一相非異相非非一相非非異相非一異俱相乃至總說依一切眾生以有妄心念念分別皆不相應故說為空若離妄心實無可空故以實無可空故說如來有真實自性也經云如來者即諸法如義以一切法皆同如故故云出過一切虗偽即是如來以但涉言詮皆墮戲論故大慧初問一百八義而世尊直答一切皆非由一心真如平等寂滅本無言說故今從生滅門中方便攝引歸極於此故顯理行斷證因果已竟而以一心真如涅槃菩提總結之以真如究竟離一切相故一切皆非此蓋別答門中即言說以顯無言也以此中正明菩提而但稱如來法身恐昧者不知故結示云如來即是三藐三佛陀大慧三藐三佛陀佛陀者離一切根量記曰此總結如來法身離心意識境界也一往大慧所問世尊所答乃至重重展轉徵辯唯顯此離心意識境界而已不獨此會即四十九年三百餘會所說亦不過顯此乃至三世諸佛之所證歷代祖師之所傳亦唯此而已更無別法故云唯此一事實餘二則非真斯正古德所云心識不到處故云佛陀者離一切根量爾時世尊欲重宣此義而說偈言悉離諸根量無事亦無因已離覺所覺亦離相所相記曰此總頌法身離諸過也根量乃見聞知識境界以法身離念非心行處故因果能所一切皆離陰緣等正覺一異莫能見若無見有者云何而分別記曰此頌五陰法身平等無二也以正眼而觀真妄平等故一異莫能見既無一異可見云何而可分別耶非作非不作非事亦非因非陰非在陰亦非有餘雜亦非有諸性如彼妄想見當知亦非無此法法亦爾記曰此頌法身湻淨也以法身湻淨故一切皆非雖無諸相如彼妄見而真如自性亦復非無以法法皆真故云亦爾以有故有無以無故有有若無不應受若有不應想記曰此頌言有無相待而生不應起二見也謂法身雖離諸相不入斷滅故不可著無當知法身非無而實有自性若於法身自性而復作有見者亦是妄想故云若無不應受若有不應想故魏譯云無既不可取有亦不應說此所謂悉離諸根量也或於我非我言說量留連沈溺於二邊自壞壞世間解脫一切過正觀察我通是名為正觀不毀大導師記曰此總顯離過結歸觀心也向因凡夫妄執假我外道妄計神我故以無我之言破之而二乘復計無我以為實法故此言法身真我以破之意謂向之我與非我皆言說量既墮二見已若於今之所顯法身真我為是而復以向之二我為非此亦墮言說量留連沈溺於有無二邊終非究竟不獨自壞抑且壞他何者以但有言說都無實義皆為戲論故若解脫如上一切諸過能正念觀察我所通達離心識處是名正觀方為不謗正法不毀導師若他觀者皆邪見也上明轉依菩提果以顯法身三德祕藏以結歸觀心竟下顯一心真如離一切相攝歸第一義諦初離名字相爾時大慧菩薩復白佛言世尊如世尊說脩多羅攝受不生不滅又世尊說不生不滅是如來異名云何世尊為無性故說不生不滅為是如來異名唐譯云世尊如佛經中分別攝取不生不滅言此即是如來異名世尊願為我說不生不滅此則無法云何說是如來異名如世尊說一切諸法不生不滅當知此則墮有無見佛告大慧我說一切法不生不滅有無品不現記曰此難明寂滅一心以顯如來法身離名字相也大慧因聞如來法身不生不滅遂致疑曰且如經中一向所說不生滅者但顯無性之理而已今則云不生不滅是如來異名然不生不滅則是無性無性則離名字相云何說此是如來異名耶且不生是墮無不滅是墮有故唐譯云世尊說一切諸法不生不滅當知則墮有無見故世尊答云我說一切法有無品不現何者以不生則不有不滅則不無不有不無故不屬有無故云有無品不現唐譯有無二見有問無答此經有答無問故二譯互相發明大慧白佛言世尊若一切法不生者則攝受法不可得一切法不生故若名字中有法者惟願為說記曰此大慧復以有無致疑難者以明果德究竟離名字相也意謂世尊既云說法有無品不現然不現則無可取故云攝受法不可得既不可得則就中一法不立矣以一切法不生故且一法不立又有誰是如來名字耶此則自語相違也若說不生法是如來名字者似乎此中又是有法者非超有無矣故云若名字中有法者若猶似也此義云何願為我說佛告大慧善哉善哉諦聽諦聽善思念之吾當為汝分別解說大慧白佛言唯然受教佛告大慧我說如來非無性亦非不生不滅攝一切法亦不待緣故不生不滅亦非無義大慧我說意生法身如來名號唐譯云我說無生即是如來意生法身別異之名彼不生者一切外道聲聞緣覺七住菩薩二譯皆云七地非其境界大慧彼不生即如來異名記曰此斥大慧謬計不得佛意而以法身正義答之也以大慧疑不生不滅為斷滅又疑不生不滅攝一切生滅之法意謂必待生滅緣盡方得不生不滅故此斥云亦非無性亦非攝一切法亦不待緣然雖一切皆非而亦非無義何者以我說一切法當體無生即是如來異名殆非此外別有也第無生意乃八地菩薩實證平等真如方能明見殊非外道二乘所能測知亦非七地菩薩之境界也永嘉云若實無生無不生以無生無不生故名意生法身既證平等真如則法法皆如以法法無生當體皆如故無生是如來異名到此境界所謂無一物不播如來之號無一法不闡遮那之形故下文以多名釋之趙州云老僧把一枝草為丈六金身用把丈六金身為一枝草用佛是煩惱煩惱是佛苟非深證無生三昧者又何以與此大慧譬如因陀羅釋迦不蘭陀羅梵語釋迦提婆因陀羅此云帝釋又云富蘭陀又云憍尸迦皆帝釋異名如是等諸物一一各有多名亦非多名而有多性亦非無自性記曰此喻釋如來雖有多名而無多體以顯唯一實也唐譯云譬如帝釋地及虗空乃至手足隨一一物各有多名非以多名而有多體亦非無體以法法皆真故名異而體同唯了無生者故不以名異而異其體在徇名者特生異見耳如是大慧我於此娑呵舊云娑婆亦云索訶此云堪忍世界有三阿僧祗此云無數百千名號愚夫悉聞各說我名而不解我如來異名唐譯云諸凡愚人雖聞雖說而不知是如來異名大慧或有眾生知我如來者有知一切智者有知佛者有知救世者有知自覺者有知導師者有知廣導者有知一切導者有知仙人者有知梵者有知毗紐此云大力者有知自在者有知勝者有知迦毗羅者城名以佛生彼城故有知真實邊者有知月者有知日者有知王者有知無生者有知無滅者有知空者有知如如者有知諦者有知實際者有知法性者有知涅槃者有知常者有知平等者有知不二者有知無相者有知解脫者有知道者有知意生者大慧如是等三阿僧祗百千名號不增不減此及餘世界皆悉知我如水中月不出不入記曰此出多名而體不異正顯離名字相也由體不異故如水中月不出不入所謂一月普現一切水一切水月一月攝以無去來故不出不入蓋法身普應眾生平等顯現而無去來之相但隨所見聞各別異耳華嚴名號云如來有四百億十千名法華壽量云我於餘國作佛更有異名姓氏不同名號各別良以法身無生故無不生無名故無不名以無不名故不可得而名焉不可得而名故名字離也此非愚者所知上離名字相竟下離言說相彼諸愚夫不能知我墮二邊故然悉恭敬供養於我而不善解知辭句義趣不分別名不解自通計著種種言說章句於不生不滅作無性想不知如來名號差別如因陀羅釋迦不蘭陀羅不解自通會歸終極於一切法隨說計著記曰此明如來法身離言說相也然名字起於言說以彼愚夫不達言說性空故妄計名字各異至於寂滅無生離名言處真實法身盲無所知由不知此故妄計有無墮二邊見是等然雖供養於我而不能善解名字句義趣中所含多名一體故云不分別名但取差別之相以不善解法身自通故但執言教昧於真寶謂不生不滅是無體性殊不知正是法身徧一切處而為如來差別名號如因陀羅等也以不解自通會歸終極至離言說處故於一切法唯計言說大慧彼諸癡人作如是言義如言說義說無異所以者何謂義無身故言說之外更無餘義唯止言說大慧彼惡燒智不知言說自性不知言說生滅義不生滅大慧一切言說墮於文字義則不墮離性非性故無受生亦無身唐譯云離有離無故無生無體故記曰此言計言說者不達實義也然彼愚夫妄謂義如言說義與言說不異如斯則但有言說而無實義矣故云義無體故以此人不了言說自性將謂言說之外更無餘義唯止於言說而已所以然者以彼愚癡惡智不知言說自性是生滅法而義不生滅耳所以言說生滅而義不生滅者以言說墮於文字義則不墮以超文字離有無相故無生無體故是故不墮大慧如來不說墮文字法文字有無不可得故除不墮文字大慧若有說言如來說墮文字法者此則妄說法離文字故是故大慧我等諸佛及諸菩薩不說一字不答一字所以者何法離文字故非不饒益義說言說者眾生妄想故記曰此明如來說法不墮文字相也所以不墮者以法離有無相故除不墮文字者則說與不說皆明鑒也此外若以如來有所說者則為謗佛故云則為妄說由法離文字故諸佛菩薩唯說離文字法故始終不說一字不答一字何者以法離文字故也問曰既不說一字豈不饒益眾生耶答曰非不饒益義說但對眾生所說者乃說破眾生妄想夢耳殆非實有法可說也故云說者眾生妄想故大慧若不說一切法者教法則壞教法壞者則無諸佛菩薩緣覺聲聞若無者誰說為誰記曰此釋難也難曰既法離文字則無法可說而如來何以又說一切法耶故此釋云以無法可說是名說一切法乃說其無可說耳所謂雖復不依言語道亦復不著無言說若絕然不說者教法則壞教法壞則無諸佛菩薩緣覺聲聞矣若總無者則壞法界相而又誰是說法者而復為誰說法耶所謂實際理地不立一塵建化門頭不捨一法是在即說而不有其說豈絕然不說而後方為離文字哉是故大慧菩薩摩訶薩莫著言說隨宜方便廣說經法以眾生希望煩惱不一故我及諸佛為彼種種異解眾生而說諸法令離心意意識故不為得自覺聖智處記曰此釋上不說說乃為迷者非為悟者說也謂諸佛如來本無法可說其所廣說一切法者皆為隨順眾生種種解欲破彼希望煩惱令轉心意意識故耳所謂佛說一切法為治一切心若無一切心何用一切法故云不為得自覺聖智處說是故菩薩莫著言說大慧於一切法無所有覺自心現量離二妄想諸菩薩摩訶薩依於義不依文字記曰此釋上不為悟者說之意也所以不為得自覺智說者以彼了一切法無所有知自心現量善離有無二妄想見以此諸菩薩但依於義不著言說故耳若善男子善女人依文字者自壞第一義亦不能覺他墮惡見相續而為眾說不善了知一切法一切地一切相亦不知章句記曰此言迷者自他俱損也唐譯云依文字者墮於惡見執著自宗而起言說不能善了一切法相文辭章句既自損壞亦壞於他不能令人心得解悟若善一切法一切地一切相通達章句具足性義彼則能以正無相樂而自娛樂平等大乘建立眾生記曰此言悟者自他俱益也唐譯云亦能令他安住大乘正無相樂者所謂自覺聖智善樂揀非二乘外道偏邪三昧也住正無相樂者即名攝受大乘從上諸祖皆深證此無相三昧故能以離文字法建立眾生大慧攝受大乘者則攝受諸佛菩薩緣覺聲聞攝受諸佛菩薩緣覺聲聞者則攝受一切眾生攝受一切眾生者則攝受正法攝受正法者則佛種不斷佛種不斷者則能了知得殊勝入處魏譯云一切勝妙生處唐譯云則得勝妙處知得殊勝入處菩薩摩訶薩常得化生建立大乘十自在力現眾色像通達眾生形類希望煩惱諸相如實說法如實者不異唐譯云真實法者無別無異如實者不來不去相一切虗偽息是名如實大慧善男子善女人不應攝受隨說計著真實者離文字故記曰此明善知如實法者則能具足一切世出世法也謂善了知如實無生法者則能具足一切世出世法建立正法續佛慧命能令佛種不斷便生佛家故云得勝妙生處自利功圓亦即能令眾生安住大乘而以十力普現色身隨眾生解欲應時應根說如實法而無一切去來之相斯皆善達如實離文字法者之利益也是故行人切莫計著隨言說相大慧如為愚夫以指指物愚夫觀指不得實義如是愚夫隨言說指攝受計著至竟不捨終不能得離言說指第一實義記曰此喻愚夫執言說之失也經云我所說法如標月指離指方能識月若執指為月則兩失之矣故云執言說指終竟不捨終不能得離言說指第一實義大慧譬如嬰兒應食熟食不應食生若食生者則令發狂不知次第方便熟故大慧如是不生不滅不方便修則為不善是故應當善修方便莫隨言說如視指端記曰此以喻釋喻以明忘言契證之義也然離言之道固非淺智可知苟不以方便指示則終歸迷悶而不入譬如嬰兒應與熟食而食之以生者則必發狂是與食者不善方便故也此不生滅法不屬方便猶如生食若不善以離言方便之指彼亦將狂悶而不入故黃蘗云今時纔出來者只欲多知多解廣求文義喚作修行不知多知多解翻成壅塞唯多與兒酥乳消與不消都總不知三乘學道人皆此樣盡名食不消食不消者所謂知解不消皆為毒藥盡向生滅邊收真如之中無此事故前云是攝受欲食非攝受法食也所以曹山貴正命食此善方便之言該於師資故下令親近大德多聞是故大慧於真實義當方便修真實義者微妙寂靜是涅槃因言說者妄想合妄想者集生死唐譯云言說者與妄想合流轉生死大慧真實義者從多聞者得大慧多聞者謂善於義非善言說善義者不隨一切外道經論身自不隨亦不令他隨是則名曰大德多聞是故欲求義者當親近多聞所謂善義與此相違計著言說應當遠離記曰此教修真實義之方便也非真流之行無以契真然真實義乃離心意識寂滅境界是從多聞忘言者得非執名字者所能入也所言多聞者謂善離言得義非善言說也善義者乃得二通處則自不隨外道邪見論議而亦不令他隨如此方名大德多聞是故欲求義者應當親近大德多聞遠離計著言說者此則名為修真實義之方便也上顯一心真如離言說相已竟下辯生滅因緣以顯一心真如離心緣相爾時大慧菩薩復承佛威神而白佛言世尊世尊顯示不生不滅無有奇特所以者何一切外道因亦不生不滅世尊亦說虗空非數緣滅及涅槃界不生不滅世尊外道說因生諸世間世尊亦說無明愛業妄想為緣生諸世間彼因此緣名差別耳外物因緣亦如是世尊與外道論無有差別微塵勝妙自在眾生主等如是九物不生不滅世尊亦說一切性不生不滅有無不可得外道亦說四大不壞自性不生不滅四大常是四大迺至周流諸趣不捨自性世尊所說亦復如是是故我言無有奇特惟願世尊為說差別所以奇特勝諸外道若無差別者一切外道皆亦是佛以不生不滅故而世尊說一世界中多佛出世者無有是處如向所說一世界中應有多佛無差別故記曰此疑佛說不生不滅與外道不異以難明一心真如離生滅因緣正顯離心緣相也此有四疑一謂外道計作者為因能生諸法諸法生滅而作者不生滅故疑此與佛所說三無為法無異二謂外道計我為因一切世間從我流出故云生諸世間世尊亦說無明愛業妄想為緣生諸世間彼因此緣名差別耳說外四大生法亦爾三謂外道許微塵勝妙自在天眾生主時方空大種和合等九法不生不滅世尊亦說一切性不生不滅有無不可得四謂外道計四大不壞自性不生不滅以四大常周流諸趣不捨自性故然世尊亦說四大性真周徧法界是則世尊所說與外道無別是故我言世尊說法無有奇特也惟願世尊為我說所以勝外道處若世尊說法不異外道則諸外道皆亦是佛以彼說法亦不生滅故然世尊向說一世界中無有多佛苟如上所說果與外道無別則是一世界中應有多佛出世矣佛告大慧我說不生不滅不同外道不生不滅所以者何彼諸外道有性自性得不生不變相唐譯云我之所說不生不滅不同外道不生不滅不生無常論何以故外道所說有實性相不生不變我不如是墮有無品大慧我者離有無品離生滅非性非無性如種種幻夢現故非無性云何無性謂色無自性相攝受現不現故攝不攝故以是故一切性無性非無性唐譯云我所說法非有非無離生離滅云何非無如幻夢色種種見故云何非有色相自性非是有故見不見故取不取故是故我說一切諸法非有非無但覺自心現量妄想不生安隱快樂世事永息愚癡凡夫妄想作事非諸聖賢記曰此言如來所說乃離有無生滅而說不生不滅不比外道墮於有無起生滅見也以外道妄計諸法各有自性不生不變然諸法無常而彼所計不生不滅者亦無常論耳以彼未離有無品故然我說法所以離生滅者以彼諸法本非有非無故云何非無謂一切法如幻夢色然雖本無不妨現見種種相故云何非有以彼色性本無自體元非有故如彼幻夢諸事但愚者所見所取而智者不見不取故是故我觀一切法若此故說非有非無唯了達自心現量者則於彼法不生分別分別不生則心地寂滅寂寂故永絕貪求貪求既絕故安穩快樂世事從此永息矣此非愚夫所與故云愚癡凡夫妄想作事非諸聖賢不實妄想如犍闥婆城及幻化人大慧如犍闥婆城及幻化人種種眾生商賈出入愚夫妄想謂真出入而實無有出者入者但彼妄想故如是大慧愚癡凡夫起不生不滅惑彼亦無有有為無為如幻人生其實無有若生若滅性無性無所有故一切法亦如是離於生滅愚癡凡夫墮不如實起生滅妄想非諸聖賢記曰此言境本無生而愚夫妄起生滅見也謂不但法本無生而亦心本寂滅心寂滅則彼妄想亦了無自性矣故云不實妄想如犍闥婆城及幻化人且彼乾城幻人雖有種種商賈出入其實無有出者入者迷者謂以為真智者不然是則愚癡凡夫所起不生滅惑即彼妄想亦本非有無如幻人生本無生也以妄無體故云其實無有若生若滅性無性無所有故故僧問古德云起滅不停時如何德云咄是誰起滅此古人徹見妄想無性故乃爾爾是則心若寂滅而一切法皆寂滅矣所謂一心不生萬法無咎但愚癡凡夫墮不如實見自起生滅妄想耳非聖賢也不如實者不爾如性自性妄想亦不異若異妄想者計著一切性自性不見寂靜故不見寂靜者終不離妄想記曰此言聖人見諸法不如實者不似凡愚墮生滅妄見也故云不爾何者以見諸法當體如如不起分別異見故故云如性自性妄想亦不異然諸法從本來常自寂滅相不容起見若起種種異見分別者則是計著一切實有性自性相矣所以計著者以不見諸法本來寂靜故苟不見諸法寂靜者則終不離妄想矣何者以離念境界唯證相應故上顯一心真如離一切相已竟下結究竟一心是故大慧無相見勝非相見相見者受生因故不勝大慧無相者妄想不生不起不滅我說涅槃記曰此總結一心真如離一切相以成究竟果德也經云若見諸相非相即見如來故云無相見勝非相見以外道於無生中妄見生滅故長淪生死故相見者乃受生之因故不勝若能見無相者則一切分別妄想當下不生不生則不滅不生不滅此則名為大涅槃矣是則了妄想無性即是涅槃非離此外別有涅槃相也大慧涅槃者如真實義見離先妄想心心數法逮得如來自覺聖智我說是涅槃記曰此結示一心真如自性涅槃乃離心意識自覺聖智境界也論曰心真如者即是一法界大總相法門體所謂心性不生不滅一切諸法唯依妄念而有差別若離心念則無一切境界之相是故一切法從本已來離名字相離言說相離心緣相畢竟平等無有變異不可破壞唯是一心故名真如以一切言說假名無實但隨妄念不可得故言真如者亦無有相謂言說之極因言遣言此真如體無有可遣以一切法悉皆真故亦無可立以一切法皆同如故當知一切法不可說不可念故名為真如問曰若如是義者諸眾生等云何隨順而能得入答曰若知一切法雖說無有能說可說雖念亦無能念可念是名隨順若離於念名為得入故云如真實義見離先妄想心心數法逮得如來自覺聖智我說是涅槃爾時世尊欲重宣此義而說偈言滅除彼生論唐譯云為除有生執建立不生義我說如是法愚夫不能知一切法不生無性無所有犍闥婆幻夢有性者無因不生無自性何因空當說以離於和合覺知性不現是故空不生我說無自性記曰此下至頌終總明真如一心離生滅因緣相也謂如來本無法說而其所以說無生無自性者以為破彼生見執有自性故以彼愚夫不知諸法不生本無自性故說犍城幻夢以喻之然彼所執有自性者墮無因故然如來何因說無生無自性耶以諸法空故故云何因空當說以彼外道妄執諸法各有自性和合而生今則離之是以諸法本空當體無生故說無自性耳此頌離生滅相謂一一和合性現而非有分析無和合非如外道見夢幻及垂髮野馬犍闥婆世間種種事無因而相現折伏有因論申暢無生義申暢無生者法流永不斷熾然無因論恐怖諸外道記曰此頌離因緣相也以外道妄計實有生因和合而生諸法世尊謂我但分析彼和合雖現而非有故說幻夢垂髮陽𦦨犍城以喻明世間諸法雖現而無因以折伏有因論申暢無生義耳然能申暢無生義者則使法流永不斷滅且我熾然說無因論以破彼有因令其外道聞者生恐怖故然佛說無因論乃無彼生因殆非外道無因比也識之爾時大慧以偈問曰云何何所因彼以何故生於何處和合而作無因論記曰此大慧趣舉佛問外道生因偈以反質疑將破無因論義也佛問外道云汝之生法云何而生為從有因生為從無因生答言從有因生佛又問云既從有因生有何所因耶答言從微塵四大勝性等為生因佛又問云彼微塵四大等復以何故生耶答言以無因生佛言若彼微塵等既是無因無因則無法無法則無處無處則無和合無和合則無生矣汝言無因乃於何處和合而作無因論耶大慧舉此質疑者以聞上佛說無因破彼有因故此疑云且無因乃外道所計佛嘗以此破之矣今何故又說無因破彼有因耶故此涉疑致問以外道所計生因亦無因故佛說緣生乃破彼無因又說無因以破彼生因意在直指無生以息彼生滅之見耳故下文明答之爾時世尊復以偈答觀察有為法非無因有因彼生滅論者所見從是滅記曰此答意顯離生滅因緣相也謂能觀察一切諸法不屬有因無因而即頓見無生而彼生滅之見自息矣龍勝曰有物從緣生無物從緣滅起唯諸緣起滅唯諸緣滅乃知色生時但是空生色滅時但是空滅以空不屬緣故不生耳爾時大慧說偈問曰云何為無生為是無性耶為顧視諸緣有法名無生名不應無義惟為分別說記曰此徵無生義也由上佛說離生滅法以顯無生大慧遂問云何為無生耶為諸法無性是無生耶為別有生性顧視諸緣名無生耶既有無生名必有無生義惟願為我說之爾時世尊復以偈答非無性無生亦非顧諸緣非有性而名名亦非無義一切諸外道聲聞及緣覺七住非境界魏譯作七地是名無生相遠離諸因緣亦離一切事唯有微心住想所想俱離其身隨轉變我說是無生記曰此頌無生義也以離諸因緣及以作者入唯心住得二轉依意生法身乃真無生義然此無生非無性亦非有性既有此名亦非無義但此無生義乃八地已上所證如實住處殆非外道二乘及七地菩薩之境界也以彼外道邪見二乘偏執七地菩薩未離心量尚在生滅數中未入微細真實住處心境未忘故此非彼所知也離此諸過是真無生無外性非性亦無心攝受斷除一切見我說是無生如是無自性空等應分別非空故說空無生故說空記曰此頌心境雙絕法身真空以顯無生實義也以境離有無心離執取斷一切見即是真空法身此非斷滅之空以心境無生故說空耳上頌無生義下總頌離生滅因緣相因緣數和合則有生有滅離諸因緣數無別有生滅捨離因緣數更無有異性若言一異者是外道妄想有無性不生非有亦非無除其數轉變是悉不可得但有諸俗數展轉為鈎鎖離彼因緣鎖生義不可得記曰此頌一心真如離因緣相也因緣者生滅之本也離此因緣別無生法故肇公云一切諸法緣會而生緣會而生則未生無有無有則無生故云離諸因緣數無別有生滅以十二因緣轉變生法故云諸因緣數捨此不但無生抑且平等平等了無一異之性矣此中若言一異者即外道見何者以有無二性皆悉不生總非有故除因緣外悉不可得是則緣生無性故空空故無生無生則法身平等離一切相此所以離因緣外更無生義可得生無性不起離諸外道過但說緣鈎鎖凡愚不能了記曰此正示緣生無性義也性者因緣也謂生本無生必待緣生以緣生無性故生本無也唐譯云生無故不生是則生即無生故離外道生法之過以緣生即無生故我但說因緣而密顯無生所以凡愚不能曉了妄謂離因緣外別有生性耳若離緣鈎鎖別有生性者是則無因論破壞鈎鎖義如燈顯眾像鈎鎖現若然是則離鈎鎖別更有諸性記曰此釋外道計因緣外別有生性義也佛謂若果離因緣外別有生性者則是墮無因論淪於斷滅矣故云破壞鈎鎖義鈎鎖者即因緣也以彼外道妄計別有生性要待因緣而生譬如眾像先有要待燈照而後見故因緣現生法即如燈之現眾像故佛斷之曰若此論者正是離因緣外別有生性故我說彼是無因論無性無有生如虗空自性若離於鈎鎖慧無所分別記曰此責外道不達緣生無性故妄生分別也以緣生無性故無有生無生則無性體相如虗空此乃離緣之道絕諸對待于此境界三世諸佛不敢覷著誰當於此分別乎故云慧無所分別今彼既於離因緣外而生分別者足知皆妄計也復有餘無生賢聖所得法彼生無生者是則無生忍記曰此揀無生義也謂彼外道所計生法固是邪見而我法中復有餘無生義乃二乘賢聖所得亦非真實以彼斷盡生法然後方得無生不了生本無生故非真實是則我說生即無生方是真實無生法忍乃八地所證又非二乘淺智所知也若使諸世間觀察鈎鎖者一切離鈎鎖從是得三昧記曰此揀正行也謂外道妄計離因緣法則增長邪見非真離也若使諸世間人一一能觀因緣無性了知離緣無生之理則從是即得無生三昧正定矣下示觀之之方癡愛諸業等是則內鈎鎖鑽燧泥團輪種子等名外若使有他性而從因緣生彼非鈎鎖義是則不成就若生無自性彼為誰鈎鎖展轉相生故當知因緣義記曰此示觀因緣之方法也癡愛諸業等乃十二因緣即無明緣行行緣識識緣名色名色緣六入六入緣觸觸緣受受緣愛愛緣取取緣有有緣生生緣老死憂悲苦惱三世輪轉牽纏不斷故為內鈎鎖鑽鐩得火泥團成瓶種子生芽此三者為外物因緣此等內外因緣諸法但觀空無自性即證無生何必離此之外更立他性耶若使此外別有他性從因緣生者即是無因此則不但壞因緣義抑且彼法不成以彼所計自性乃無因故若觀生法本無自性則因緣頓空又復誰為鈎鎖耶以有展轉相生故故說因緣之義耳意謂若有因緣必無自性若離因緣即是無生豈有離因緣外別有自性耶是則能觀緣生無性無性緣生則了因緣體空即入真無生義智者當作如是觀堅溼煖動法凡愚生妄想離數無異法是則說無性記曰此釋諸法無性之所以也謂四大等法當體全空本無自性但以緣會而生更無別法而外道不了橫計四大實有自性以為生因乃妄想分別非正見也是故我說緣生無性即是無生以破彼計離此數外了無異法但說無性耳如醫療眾病無有若干論以病差別故為設種種治我為彼眾生破壞諸煩惱唐譯云滅除煩惱病知其根優劣為彼說度門非煩惱根異而有種種法唯說一乘法是則為大乘記曰此結歸一乘以顯一心真如究竟義也謂如來說法唯說無生然無生本無有說而有多種言辭方便開示者以其病病故也故如醫療眾病病多而方亦異佛為破除眾生煩惱病故以其病根不同故說諸度法門此其法本不異異自機耳所謂唯有一乘法無二亦無三除佛方便說但以假名字引導於眾生入大乘為本故云唯說一乘法是則為大乘前顯理究竟處則曰我大乘非乘今明斷證已竟故亦以大乘結之上明一心真如離一切相總顯究竟涅槃真我德已竟下破外道七種無常以顯究竟涅槃真常德爾時大慧菩薩摩訶薩復白佛言世尊一切外道皆起無常妄想世尊亦說一切行無常是生滅法此義云何為邪為正為有幾種無常記曰此因外道所計無常將顯涅槃究竟真常德也前顯離生滅因緣以明法身真我此顯離無常見即證法身真常意謂佛昔日亦說無常不知與彼外道所說孰邪孰正然問外道所許無常有幾種者意在盡出彼計破之令其不墮耳佛告大慧一切外道有七種無常非我法也何等為七彼有言說作已而捨是名無常記曰此外道宗立有勝性作者能造一切四大諸法今此計云所造四大是常其能造者造已即捨此是無常故下文云離始造無常有說形處壞是名無常記曰此計四大能造所造俱是常畢竟不壞但分析長短等形色不可得謂形處壞是無常有說即色是無常記曰此計能造四大是常所造色是無常此與初計相返有說色轉變中間是名無常無間自之散壞如乳酪等轉變中間不可見無常毀壞一切性轉記曰此計能造與所造俱常但兩色中間有箇無常性能使所造色法相續變異自然壞滅如乳酪等兩色中間有無常法令其轉變而不可見此之無常能轉一切性此與初三兩計相返有說性無常記曰此計有箇無常自性不壞而能壞彼諸法如杖瓦石等能壞一切物此與上計相返有說性無性無常記曰此計能造所造俱無常也性是能造無性是所造謂能造之性既造了色則自體已壞而所造者又亦隨壞故俱無常此與上計俱相返有說一切法不生無常入一切法記曰此計有箇不生的性入在一切生法中而隨諸法壞滅即此不生的便是無常上列所計下牒其計而破之大慧性無性無常者謂四大及所造自相壞四大自性不可得不生記曰此牒破第六性無性無常計也謂彼外道所計四大能造諸法然必壞了自體方才造出如種生芽而所造者又非本四大矣故能所俱壞以為無常佛破之曰彼四大自性本不可得然能造既本無體無體故本自不生不生則無能所能所二相了不可得又指何法名無常耶彼不生無常者非常無常一切法有無不生分析乃至微塵不可見是不生義非生是名不生無常相若不覺此者墮一切外道生無常義記曰此牒破第七不生無常計也然彼外道妄計有箇不生的性入在一切生法之中隨諸法壞故名不生是無常佛言若言不生是無常者此則非常非無常矣何者若言不生則是真常今又云隨諸法壞則非是常故云非常非無常此出其過乃破之曰然一切有無等法本自不生豈又有箇不生性入彼諸法耶若果有不生性入彼諸法則應可見即今分析諸法乃至微塵許畢竟不可見此無生義既不可見則是諸法生本無生矣且無常者生法也然我說諸法生本無生而彼返以不生為生是無常故曰非生是名不生無常相此真顛倒也我諸弟子若不覺此生本無生義則墮外道生無常見以彼所計不生還成生法故云生無常義莊周云生生者不生正墮於此大慧性無常者是自心妄想非常無常性所以者何謂無常自性不壞大慧此是一切性無性無常事除無常無有能令一切法性無性者如杖瓦石破壞諸物記曰此牒破第五性無常計也佛謂彼外道所計有箇無常自性不壞而能壞諸法者此乃是彼自心分別妄計耳如此計者又不是常又不是無常何也彼所謂無常自性不壞而能壞一切法以成無常之事是則除此無常之外更無有能壞諸法者然無常能壞彼諸法如杖瓦石能壞諸物者如此則必定無常與諸法異方能壞之故下約一異破之現見各各不異是性無常事非作所作有差別此是無常此是事作所作無異者一切性常無因性大慧一切性無性有因非凡愚所知記曰此約一異以破性無常也謂若果然無常能壞諸法者必定能壞之性與所壞之法二體各異方能壞之今現見各各不異不能揀出性無常與所壞事能所二相有差別體故云非作所作有差別作即無常所作即所壞事也若能所異體則當可指陳此是無常此是所壞滅事既不可指則不異體也若能所不異而為一體者則一切法應常又墮無因矣何者以彼計無常性不壞不壞則是常今既與諸法為一體然無常既常而一切法皆常矣故云無異者一切性常且彼所計因無常故能令諸法壞滅今既一體則不見有因能令諸法壞滅者此又自墮無因彼宗亦不成故云無因性然諸法壞滅不是無因故唐譯云諸法壞滅實亦有因但非凡愚之所能了非因不相似事生若生者一切性悉皆無常是不相似事作所作無有別異而悉見有異記曰上已破無常能滅諸法此又破無常性能生諸法也佛言若彼計無常性能生一切法者但一切生法因果相似如種豆等未有種豆而得者故云非因不相似事生若不相似而能生者則是一因而生多果今以一無常性而生一切法則一切性皆同一無常矣故云若生者一切性悉皆無常如此則因果不別種類不分則一切異法應並相生此乃是不相似事而能生所生不可辨別混而為一矣故云作所作無有別異且即今現見諸法各各有異此則非是無常能生一切法也若性無常者墮作因性相若墮者一切性不究竟一切性作因相墮者自無常應無常無常無常故一切性不無常應是常記曰此破計無常為生因不得為常也謂若必以無常性是有法而為生因者則墮作因大凡作者皆無常故若能作之因既墮無常則所作諸法皆無常矣故云若墮者一切性不究竟若能生之因墮於所生之無常法中此則自無常亦應是無常而不得計能生者為常矣故云一切性若因相墮者自無常應無常若自無常既是無常則所作一切法不是無常應是常何者以捨己之常而入彼諸法則彼諸法得我之常性此乃自是無常而所生者皆應是常若彼是常則不可壞而計所生之法可壞者又不成矣故唐譯云若無常性是有法者應同所作自是無常自無常故所無常法皆應是常若無常入一切性者應墮三世彼過去色與壞俱未來不生色不生故現在色與壞相俱記曰此破無常性能入諸法中也然外道妄計無常入於諸法之中自性不壞而能壞彼諸法佛言若謂無常入一切性者則應墮三世既墮三世則隨壞滅而自性不得不壞矣何者若入過去過去色已壞若入未來未來色未生若入現在現在不住剎那變滅而無常亦與之俱壞矣且自體既壞豈能壞彼諸法耶色者四大積集差別四大及造色自性不壞離異不異故一切外道一切四大不壞一切三有四大及造色在所知有生滅離四大造色一切外道於何所思惟性無常四大不生自性相不壞故記曰此又轉破四大是常之計也因上執無常不壞性入一切色法佛破之云一切三世色法俱屬可壞而無常無不壞之理故此又妨轉計云以能入之無常不壞故所入之四大亦常住不壞故此破云色者乃四大所造積集差別之性耳能造所造本無二體豈有所造色法既壞而能造之四大不壞耶以能造所造不一不異故若不一則二體各別若不異則俱屬可壞況一切三有能造所造人人皆知是生滅法又豈但色壞而四大有不壞之理耶既能所俱壞此外更於何處覔無常不壞之性耶故唐譯云一切外道計四大種體性不壞色者即是大種差別造色離異不異故其自性亦不壞滅大慧三有之中能造所造莫不皆是生住滅相豈更別有無常之性能生於物而不滅耶以外道妄計無常性常能作生滅主宰此計幽潛故展轉破之如此方莊周亦云生生者不生又云彼為衰殺非衰殺彼為本末非本末苟不達真無生意鮮不墮此中者故前云若不覺此者則墮一切外道生無常義離始造無常者非四大復有異四大各各異相自相故非差別可得彼無差別斯等不更造二方便不作當知是無常記曰此牒破第一作已捨無常計也外道計非四大無常復有異四大性而能始造即捨名為無常蓋彼以所造四大是常以能造者為無常故然彼計不出互自共三法為能造故佛破之曰非四大互造以四大各各異相故亦非獨自造以無差別相可得故既無差別相可得此等亦非更共造以彼此乖離二方便不作故然二處既非則本無造者畢竟是無常矣故云當知是無常豈有無常而能造彼常法耶故唐譯云非大種互造大種以各別故非自相造以無異故非復共造以乖離故彼形處壞無常者謂四大及造色不壞至竟不壞大慧竟者分析乃至微塵觀察壞四大及造色形處異見長短不可得非四大四大不壞形處壞現墮在數論記曰此牒破第二形處壞無常計也外道計能造大種及所造色畢竟不壞即分析乃至微塵際但滅形狀長短等見不滅能造所造色體故以不壞色體為常形狀變壞處為無常故云形處異見長短不可得非四大佛破之曰四大不壞形處壞現此正墮在僧佉數論之中以僧佉計四大是常故色即無常者謂色即是無常彼則即也形處無常非四大若四大無常者非俗數言說世俗言說非性者則墮世論見一切性但有言說不見自相生記曰此牒破第三即色無常計也外道計色即是無常然所造色不出形狀長短等故佛言彼之所計即如前形處無常意同蓋非四大無常也若四大無常義屬正教所談故云非俗數言說可到然彼世論說造色無常者則墮世論二譯皆云盧迦耶見乃四韋陀之一謂斷見之儔也以彼妄見諸法實有自性然此但有言說都無實義以不見有自相生故轉變無常者謂色異性現非四大如金作莊嚴具轉變現非金性壞但莊嚴具處所壞如是餘性轉變等亦如是記曰此牒破第四色轉變中間無常也外道計能造所造俱常但兩色中間有箇無常性能使所造色法相續變異自然壞滅如乳酪等此言色之異性現謂之無常非四大無常也故如金作莊嚴具轉變現然非金性壞但莊嚴具處所壞耳此如是而餘諸法轉變亦如是斯與上二計言別意同此是牒計下文破計如是等種種外道無常見妄想火燒四大時自相不燒各各自相相壞者四大造色應斷記曰此出上計所以也唐譯云如是等種種外道虗妄分別見無常性彼作是說火不能燒諸大自相但各分散若能燒者能造所造則皆斷滅謂此等外道妄作無常見言火燒四大時但形狀壞而自體不壞如金莊嚴具形雖壞而金性不壞若四大自體壞者則能造所造皆斷滅矣此計有箇壞有箇不壞正所謂佛性一分常一分無常者也末法見性多墮於此大槩外道所計不出常與無常故下文以非常非無常通破之大慧我法起非常非無常所以者何謂外性不決定故魏譯云我不說外境界有故唯說三有微心唐譯云三界唯心故不說種種相有生有滅四大合會差別四大及造色故妄想二種事攝所攝知二種妄想離外性無性二種見唐譯云不說諸相故大種性處種種差別不生不滅故非能造所造故能取所取二種體性一切皆從分別起故如實而知二取性故覺自心現量妄想者思想作行生非不作行離心性無性妄想世間出世間出世間上上一切法非常非無常記曰此結顯涅槃所以離斷常義也謂彼外道所以墮於斷常者以妄見外境以為實有不了唯心所現故說種種相有生有滅妄謂四大能造所造故妄見有能取所取故墮有無二見妄起斷常我法總皆離此諸見了達唯是自心現故彼妄想者但從思想作業而生非不作業無生義也我此無生離心意識有無二見了達世出世間上上諸法唯是自心更無別法是故我法非斷非常不覺自心現量墮二邊惡見相續一切外道不覺自妄想此凡夫無有根本謂世間出世間出世間上上從說妄想生非凡愚所覺記曰此結顯外道過也以彼不了唯心故墮二邊惡見相續不覺皆從自心妄想而生此凡夫外道以無有根本智慧故彼亦將謂如來所說世間出世間出世間上上法亦如彼從言說妄想生彼不知如來說法離心意識言說境界故顛倒妄見分別如此然如來所說法非彼凡愚所知故爾時世尊欲重宣此義而說偈言遠離於所造及與形處異性與色無常外道愚妄想記曰此總頌外道所計七種無常皆妄想分別也此舉其四如文可知諸性無有壞大大自性住外道無常想沒在種種見記曰此頌轉變無常也謂一切諸法自性常住無動轉者外道不了妄計無常蓋沒在種種邪見耳彼諸外道等無若生若滅大大性自常何謂無常想一切唯心量二種心流轉攝受及所攝無有我我所記曰此頌不生無常及四大是常造色是無常計也謂外道妄計不生是無常入一切諸法既云不生不生則不滅矣如何又云無常耶既云四大是常而何又云所造是無常耶是故知一切諸法唯是一心現量則有無二見能所二取我及我所本來不有是皆自心妄分別耳唐譯云彼諸外道眾皆說不生滅諸大性自常誰是無常法梵天為樹根枝條普周徧如是我所說唯是彼心量記曰此頌外道所計不獨七種無常即一切常見如計梵天是常為眾生主能生諸物等皆屬邪見故我說彼亦是自心量耳上辯外道所計無常以顯涅槃真常此文但辯無常其顯真常之文錯簡在三昧章後下辯三乘三昧以顯涅槃真樂爾時大慧菩薩復白佛言世尊惟願為說一切菩薩聲聞緣覺滅正受次第相續若善於滅正受次第相續相者我及餘菩薩終不妄捨滅正受樂門不墮一切聲聞緣覺外道愚癡記曰上明外道邪計無常將顯究竟涅槃真常其文未竟此辯三乘所取三昧門樂以顯涅槃真樂且以防邪誤也故承此即問菩薩聲聞緣覺滅正受次第相續意若善能了此滅正受相則不妄捨如來果海滅正受樂門捨猶失也謂若知三乘皆非究竟則不妄取偏邪得少為足失於如來大寂滅海正受樂門也故下世尊歷敘菩薩八地非真夢河之喻意令策進勿誤墮耳佛告大慧諦聽諦聽善思念之當為汝說大慧白佛言世尊惟願為說佛告大慧六地菩薩摩訶薩及聲聞緣覺入滅正受記曰此言六地菩薩與聲聞緣覺同斷三界煩惱障種患心勞慮故滅心入正受也然猶有出入未能念念入耳以未忘染淨相故第七地菩薩摩訶薩念念正受離一切性自性相正受非聲聞緣覺諸聲聞緣覺墮有行覺攝所攝相滅正受是故七地非念正受記曰此言七地菩薩念念入正受不同二乘有欣厭也七地所以念念入者以不見有生死可厭不見有涅槃可求故云離一切性自性相正受此非二乘可及二乘所以不及七地者以厭有為而志樂無為不離能取所取境界是故七地非二乘有念正受也故魏譯云菩薩於七地中念念入滅盡定以諸菩薩悉能遠離一切諸法有無相故聲聞辟支佛不能念念入滅盡定以緣有為行入滅盡定墮在所取能取境界是故聲聞辟支佛不能入七地中念念滅盡定得一切法無差別相非分得種種相性覺一切法善不善性相正受是故七地無善念正受記曰此明二乘不及七地之所以也然二乘所以不及七地者魏譯云以覺諸法種種異相有法無法善不善法同相異相而入滅盡定是故聲聞緣覺不能入七地中念念滅盡定以無善巧方便智故此中無善念謂無彼二乘善不善等念也大慧八地菩薩及聲聞緣覺心意意識妄想相滅記曰此言八地行相也謂八地菩薩無功用道常在三昧無出入相而同聲聞緣覺涅槃滅妄想心識然此名同義別以二乘滅前六識勞慮永斷沈於寂滅故無一念度生之心八地聖人捨離藏識生滅心滅沈於寂滅而亦不起度生之願以寂滅雖同其實大異何者以二乘即取此為涅槃更不前進而八地則三昧覺所持又得如來神力加持故不取涅槃相以此為異耳下文自明初地乃至七地菩薩摩訶薩觀三界心意意識量離我我所自妄想修墮外性種種相愚夫二種自心攝所攝向無知不覺無始過惡虗偽習氣所熏記曰此言七地已前不善修習則墮外道邪見也謂從初地至七地所修觀行雖能觀察三界一切唯是心意意識本欲離我我所若無多聞慧依自妄想見不善修習則墮外道種種邪徑愚夫有無二種妄見於自心中起能所取執以為實所謂自心取自心非幻成幻法此乃一向無知不覺無始過惡虗偽習氣之所熏變耳菩薩至此而猶誤墮邪見固宜深防也楞嚴五十重陰魔皆依觀心研窮而發甚至幾於覺位而淪滅者況七地乎以此較彼正行陰將破未破時也大慧八地菩薩摩訶薩聲聞緣覺涅槃菩薩者三昧覺所持是故三昧門樂不般涅槃若不持者如來地不滿足棄捨一切有為眾生事故佛種則應斷諸佛世尊為示如來不可思議無量功德聲聞緣覺三昧門得樂所牽故作涅槃想記曰此言八地若不得如來神力加持則墮二乘也謂上云八地所得三昧與二乘涅槃其名雖同所證則異以得諸佛神力加持故於三昧門不入涅槃若不持者便不化度一切眾生不能滿足如來之地亦即斷絕如來種性是故諸佛為說如來不可思議諸大功德令其究竟不入涅槃聲聞緣覺著三昧樂是故於中生涅槃想大慧我分部七地善修心意意識相善修我我所攝受人法無我生滅自共相善四無礙決定力三昧門地次第相續入道品法不令菩薩摩訶薩不覺自共相不善七地墮外道邪徑故立地次第記曰此言七地乃斷證之關鍵故須用加不加則墮外道邪徑因此故說諸地相也謂從初地至七地歷真見道以來見巧方便善能觀察心意意識遠離我我所執得人法無我超生滅自共相善解四無礙辯方得決定三昧門至此純無相觀方能漸升八地乃至十地等覺入菩提分法究竟果海皆從此七地建立斯實斷證之大節此所謂險道者也若不得如來神力加持則多墮於外道邪徑佛言我恐此諸菩薩不善了知自共相不知諸地次第相續墮於外道諸惡見中故此為說諸地行相使知應去應度不致退墮此乃無漸次中施漸次蓋以不得已而建立非實有所說也大慧彼實無有若生若滅除自心現量所謂地次第相續及三界種種行愚夫所不覺愚夫所不覺者謂我及諸佛說地次第相續及說三界種種行記曰此言三界諸行本無生滅諸地次第本無建立唯此一心更無別法但以愚夫不了唯心故我及諸佛建立作如是說以為對治其實無有可說也愚夫無知謂我實有所說復次大慧聲聞緣覺第八菩薩地滅三昧門樂醉所醉不善自心現量自共相習氣所障墮人法無我法攝受見妄想涅槃想非寂滅智慧覺記曰此言聲聞緣覺於第八地中其名雖同所證異也以彼二乘味著入滅三昧為彼所醉不達自共相是自心所現以習氣障蔽故墮二無我法攝受見故起妄想涅槃之想非若八地真寂滅智慧覺也言二乘於八地中取為涅槃者蓋是昔修菩薩大行退本願者殆非定性趣寂之儔也以彼定性趣寂止得我空不得法空尚不能知初地之法況八地乎故魏譯於此章末置有此問而宋唐二譯皆無之大慧菩薩者見滅三昧門樂本願哀愍大悲成就知分別十無盡句不妄想涅槃想彼已涅槃妄想不生故唐譯云以入涅槃不生果故離攝所攝妄想覺了自心現量一切諸法妄想不生不墮心意意識外性自性相計著妄想非佛法因不生隨智慧生得如來自覺地如人夢中方便度水未度而覺覺已思惟為正為邪非正非邪餘無始見聞覺識因想種種習氣種種形處墮有無想心意意識夢現記曰此言八地入滅三昧而不取證者以不捨大願度生事故也此菩薩已入涅槃而不起涅槃想故云涅槃妄想不生以了達唯心無外境界故離能所取於一切法不生分別以深得無生法忍故不墮心意意識及外法性相執著之中以得真知見力故非佛法正因不生唯隨智慧而生如是故得如來自覺地也以久沈生滅勞慮今一旦頓得寂滅其樂無喻故此三昧極難得出菩薩功行至此無功用中鮮不沈醉多墮二乘寂滅之地故華嚴八地十方諸佛同聲加勸與起智慧門不令耽著此三昧樂墮二乘地是故授以方便引發令出故此菩薩於三昧夢中極力願出如夢度大河未度而覺乃自思惟為正為邪復更思惟如是之相非正非邪唯我無始見聞覺知虗妄熏習因故見種種色形相顛倒不離有無於心意意識妄想夢中現耳其實本非有也舊注云覺境無水船筏非正夢時見水船筏非邪以譬八地覺已本無生死故道品功德非正七地未覺故道品功德非邪所謂於未出離妄功用中故有修證如夢中渡河施船筏之具耳大慧如是菩薩摩訶薩於第八菩薩地見妄想生魏譯云見分別心從初地轉進至第七地見一切法如幻等方便度攝所攝心妄想行已作佛法方便未得者令得大慧此是菩薩涅槃方便不壞魏譯云非滅諸法名為涅槃唐譯云所得涅槃非壞滅也離心意意識得無生法忍大慧於第一義無次第相續說無所有妄想寂滅法記曰此結成八地涅槃行相也見妄想生者論云覺心初起心無初相以遠離微細念故得見心性心即常住名究竟覺此菩薩以如幻三昧不起滅定而現諸威儀勤修佛法廣作度生事業所謂度盡眾生而不見有一眾生可滅度者此所謂離心意識得無生法忍是菩薩大涅槃非若二乘滅壞諸法所取之涅槃也然雖作如是說蓋亦方便施設耳於第一義諦中本無是事故唐譯云第一義中無有次第亦無相續遠離一切境界分別此則名為寂滅之法由大慧問滅正受次第相續故結示云於第一義無次第相續說無所有妄想寂滅法魏譯此處大慧有問略云世尊今說二乘得八地寂滅門樂又說二乘止得人空不得法空如此則二乘尚不能證初地之法何況八地寂滅門樂佛言聲聞有三種今言入八地寂滅門樂者此是先修菩薩行者墮聲聞地還依本心修菩薩行同入八地寂滅門樂非增上慢寂滅聲聞以彼不能入菩薩行以未曾覺知三界唯心未能修菩薩諸行法故是故決定寂滅聲聞不能證彼菩薩所行寂滅門樂言三種者一內祕外現者二退菩薩行者三定性趣寂增上慢者前云二乘成佛此言決定不能者意在抑揚激勸故也爾時世尊欲重宣此義而說偈言心量無所有此住及佛地去來及現在三世諸佛說記曰此總頌第一義中本無諸地佛地次第之相乃三世諸佛究竟之談也住亦地也所以無所有者以唯心故故唐譯云諸住及佛地唯心無影像此是去來今諸佛之所說心量地第七無所有第八二地名為住佛地名最勝唐譯云此二地名住餘則我所得自覺智及淨此則是我地記曰此頌七八二地尚屬因地至於自覺聖智清淨涅槃則屬佛所證究竟果地也然七地雖是真修以心量未滅故八地心量雖滅而尚未究竟不名最勝唯自覺聖智方名最勝處耳自在最勝處清淨妙莊嚴照耀如盛火光明悉徧至熾燄不壞目周輪化三有唐譯云摩醯最勝處色究竟莊嚴譬如大火聚光焰熾然發化現於三有悅意而清涼化現在三有或有先時化於彼演說乘皆是如來地記曰此言建立諸乘諸地皆報化二佛所說非法佛說也謂得自覺聖智者則於色究竟天寶華宮殿成等正覺示現廣大尊嚴之身光明照耀化現三有此報身佛也論曰此菩薩功德成滿於色究竟處示一切世間最高大身以一念相應慧無明頓盡名一切種智自然而有不思議業能現十方利益眾生化現在三有者此唐譯云或有現變化或有先時化此應化佛也惟此報化佛演說諸乘諸地雖說三乘其實為一乘故云於彼說諸乘皆是如來地是故雖有諸地而實無次第之相也熾然不壞目者謂毒龍放光即損人目如來光明不損人目所謂悅意清涼也十地則為初初則為八地第九則為七七亦復為八第二為第三第四為第五第三為第六無所有何次記曰此頌第一義諦寂滅法中無次第相續說也意顯此經唯法佛所說寂滅法故無次第此所謂不涉途程不落階級乃佛祖向上一路也然其中往往以地位言之者意以地上真修三昧以印破外道二乘偏邪之見令彼不墮邪慢增上慢耳其實意不定在地位也智者知之上辯三乘三昧差別以顯涅槃真樂德防邪誤已竟下文正示涅槃真常德文應屬前七無常章後爾時大慧菩薩復白佛言世尊如來應供等正覺為常為無常記曰此因上世尊破七種無常已乃曰我法起非常非無常故大慧承便而問如來應供等正覺畢竟是常是無常耶意顯如來法身離斷離常故為究竟真常也此正是顯涅槃真常之文應在七無常章末錯簡在此乃傳譯之誤也佛告大慧如來應供等正覺非常非無常謂二俱有過若常者有作主過常者一切外道說作者無所作是故如來常非常非作常有過故記曰此明如來涅槃非常非無常所以為真常也以常與無常二皆有過故何者若言如來是常則墮有能作者過以一切外道說有微塵勝性等為能作者是常故如來無所作豈同彼常耶是故說如來之常非常者蓋非作者常以彼作者常有過故若如來無常者有作無常過陰所相相無性陰壞則應斷而如來不斷記曰此言如來非無常也若言如來是無常者則墮有所作過若言所作則同五陰然五陰乃相之所相者此相畢竟無有如來若同五陰則陰壞而如來亦應斷滅矣然如來法身常住不斷豈同所作之陰耶不同故非無常大慧一切所作皆無常如瓶衣等一切皆無常過一切智眾具方便應無義以所作故一切所作皆應是如來無差別因性故是故大慧如來非常非無常記曰此重明所作無常總結離過義也謂一切所作皆是無常如瓶衣等而如來若同所作者皆有無常之過若如來無常者則一切智所修正因福慧莊嚴六度萬行眾具方便悉空無利益以同所作無常故況如來功流萬世而常存道通百劫而彌固豈無常哉若如來果同所作則諸世間一切所作皆應是如來矣以無異因故是故如來非常非無常復次大慧如來非如虗空常如虗空常者自覺聖智眾具無義過記曰此言如來常非如虗空之常也以虗空頑然無知而如來真智靈鑒故若言同虗空之常者則自覺聖智性自具足恒沙功德悉空無益如此則墮斷滅無知之過故如來非如虗空之常此恐愚夫聞說法身真常遂起豁達空見故世尊懸破如此大慧譬如虗空非常非無常離常無常一異俱不俱常無常過故不可說是故如來非常記曰上云非如虗空者謂如來具聖智功德不比虗空頑然無知故此言如虗空者謂如虗空體性湛然無所變動不墮有無一異俱不俱等諸數量過故故不可說常非常也復次大慧若如來無生常者如兔馬等角以無生常故方便無義以無生常過故如來非常記曰此言如來非以不生為常也因前云不生是如來異名恐妄執畢竟不生是如來常故此破云若以不生是如來常者則如來同於兔馬等角以畢竟不生則如來墮絕無之過若如來絕無者則一切菩薩所修萬行方便無所證得悉空無益而如來果中亦絕無廣大益物之用矣以絕無故若以不生是如來常則墮此大過故如來非不生常復次大慧更有餘事知如來常所以者何謂無間所得智常故如來常大慧若如來出世若不出世法畢定住聲聞緣覺諸佛如來無間住不住虗空亦非愚夫之所覺知記曰此言如來實有真常之法而非愚夫之所知也謂如來之常法乃無間聖智所證真常之理乃諸佛如來同一法性法住法位如來出世若不出世畢定常住不變不易此法即在一切二乘外道所住無間性中非是空無然非凡愚之所能知大慧如來所得智是般若所熏非心意意識彼諸陰界入處所熏大慧一切三有皆是不實妄想所生如來不從不實虗妄想生大慧以二法故有常無常非不二不二者寂靜一切法無二生相故是故如來應供等正覺非常非無常大慧乃至言說分別生則有常無常過分別覺滅者則離愚夫常無常見不寂靜慧者永離常無常非常無常熏記曰此釋如來真常之所以也謂如來所以真常而眾生所以無常者以如來所得聖智乃從般若實智所熏不從心意識陰界入處妄想所熏故如來得名為常彼一切三有眾生所以無常者以彼皆是不實妄想所熏故名無常而如來不從彼妄想生且彼凡愚心行又豈能知如來之常法耶以見真妄兩異故涅槃生死為二故有常無常之說此非不二寂滅之法也若真妄兩忘寂滅不二則一切法皆悉平等無二無別無生無起以如來所得寂滅不二之法故不可說言常無常耳以寂滅不二法中言思路絕乃至起心動念但有言說分別心生則墮常無常過何況種種妄計耶唯有分別妄想歇滅者則頓離彼過外道愚夫常無常見故不寂靜離二見者則名大智慧人也以慧者永離不寂靜見故不被彼常無常妄見所熏乃以真常智慧而熏之也意謂非智慧者即心識少有流動生滅未忘而鮮不被其所熏習矣此如來深慈防之甚也誡之深也可不識哉爾時世尊欲重宣此義而說偈言眾具無義者生常無常過若無分別覺永離常無常記曰二譯偈初皆有一偈唐云遠離常無常而現常無常恒如是觀佛不生於惡見若常無常者所集皆無益為除分別覺不說常無常此言眾具者即外道所計常無常一異等諸惡見也謂此等諸見皆悉無益但妄計分別起常無常過若分別情亡諸見頓息則永離常無常過矣從其所立宗則有眾雜義等觀自心量言說不可得記曰此言若從外道所立自宗則有眾多雜亂知見不同若達唯心現量則言思路絕而言說亦不可得矣況復依彼邪說而求實義耶此言從所立宗有眾雜義足知因辯七種無常以顯如來涅槃真常義也文義自相屬觀者應知上接辯七種無常文以顯涅槃真常德已竟下示如來藏自性清淨以顯涅槃真淨德
