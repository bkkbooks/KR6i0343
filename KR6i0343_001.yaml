body:
  text: 宋天竺三藏沙門求那跋陀羅譯明建鄴海印沙門釋德清筆記記曰舊注楞伽山名此云不可往又云城名以山頂有夜叉王城故山居南海濱阿跋多羅此云無上寶貴重義以通喻此經是不可往無上寶經非也受公謂自覺聖智之境非邪智可造故云不可往隨色摩尼之珠非世寶可比故云無上謂不可往處有此無上寶也此亦未盡然華嚴論云世尊於南海摩羅耶山之頂楞伽城中説法其山高五百由旬下瞰大海無路可上其城乃衆寶所成光映日月無門可入得神通者堪能升往表心地法門無修無證方能升也此説固爾愚居五臺時曾遇一梵師于闐國人髮長丈餘不言其壽但云入此土三十餘年精於禪觀兼明教乘且善方言愚請同住阿蘭若三年每於談次以經中所有梵語已明者嘗請試之所説皆與古譯㳷合愚因問及楞伽經師乃驚曰遮裡亦有此經耶此是不可説不可得之法也我土國王寶之因問有多少卷余曰傳者四卷師笑曰來未盡耳此經有四十卷此才十分之一及扣經中旨趣言言皆發明離心意識境界不可具述因問楞伽山在何處師曰此山在天竺國之南海中又問何以楞伽為名師曰楞去聲呼伽乃寶名其狀八楞視之渾圓體極堅固不可鑽穿常放光明世間之寶無有過上者故阿跋多羅此云無上以山純此寶是山以寶名故曰楞伽阿跋多羅寶山山頂有城此寶天成無門可入而為夜叉鬼王所據佛在此山頂城中説此經故經以處名耳又問此山人能到否師云人不能到以其此山下細上大每於陰雲黑夜或波濤洶湧其山形益顯露分明光明愈盛若海湛空澄天無雲翳海空一色其山即不見然彼土僧有修禪者于海岸經行望之以入觀耳是則按華嚴論準此梵師言則山以寶名經以處名深有意焉緣起經云難入未曾有會中説隨他緣起陀羅尼智名為楞伽王識蓋約處表法又見深玄然教稱智海性海覺海心海至若寶明空海此經云藏識海且又以生死喻海涅槃喻海喻山五蘊亦喻山況夜叉云可畏鬼乃飛行而食生物者然吾佛特住此海中寶山夜叉王城而説此經顯示自覺聖智境界其經所詮者乃五法三自性八識二無我即處觀法其旨微哉何則經云藏識海常住境界風所動洪波鼓冥壑無有斷絶時斯則智海無性因覺妄而成凡湛淵心海變而為生死之業海寶明妙心變而為八識五蘊幻妄之身心故寶有八楞山高五百由旬而為煩惱生死夜叉所據耳然至昏雲黑夜或波濤洶湧之際而山形愈顯露者所謂妄想興而涅槃現夜叉鬼王請佛説法者所謂煩惱起而佛道成抑益顯此寶明妙性雖住生死大海五蘊山中不為煩惱所奪不為生死波流不為境界風動無明黑暗暗不能昏長夜冥冥靈光獨露耳且云海湛空澄山即不現者愈見智海圓澄萬象森羅炳然齊印身心世界當下銷融生死涅槃應時平等至此魔佛皆空二俱不可得矣噫信乎此為自覺聖智無上尊頂法門也且義翻此經名不可往唯神通者能至意顯此法門非心行處唯上上根人一入頓入不許捫摸湊泊不入亦不許思量攀緣但只於境界波濤煩惱黑暗中觀之而已不觀則不知生死海中有此物也此經為根熟者頓説業識種子為如來藏名頓教大乘古德云楞伽説五法三自性皆空八識二無我俱遣故達磨大師指此為心印馬大師云楞伽以佛語心為宗無門為法門是以宗門師匠教人直須離心意識參出凡聖路學而説者但只標名立法不知空遣奈何益使後之學者臆度祖師心印亦如是而已悲夫一切佛語心品第一之上記曰品以心名者以一心為宗也所謂寂滅者名為一心即性自性清淨第一義心一切諸佛皆證此心而為衆生開示者直指此心耳故云一切佛悟心舊注此經大部有十萬偈四十萬句三百二十萬言一百五十品其所來者惟此一品雖文廣卷多其實通皆頓示此一心法也此經在十二部中為未曾有部在五教中為頓教大乘又兼頓圓謂頓示圓滿一心五性三乘皆同證故若約天台五義釋之則以單喻為名以楞伽寶喻識性故寶山寶城佛魔同住喻五蘊身心是一切聖凡所依止故以如來藏為體謂如來藏是善不善因故自性清淨轉三十二相入一切衆生身中故性自性第一義心為宗一切聖凡所同證故摧邪顯正斷疑生信為用為裂外道二乘邪見疑網令生決定一乘正信故以熟酥為教相謂説五性三乘皆有成佛之分但未蒙授記可一變而至於道如彼熟酥可一變而至醍醐施功易故謂略示開權顯實之機以為法華前導故若以宗趣言之則以第一義心為宗自覺聖智為趣又以自覺聖智無相法門為宗忘言默證為趣如是我聞一時佛住南海濵楞伽山頂種種寶華以為莊嚴與大比丘僧及大菩薩衆俱從彼種種異佛剎來是諸菩薩摩訶薩無量三昧自在之力神通遊戲大慧菩薩摩訶薩而為上首一切諸佛手灌其頂自心現境界善解其義種種衆生種種心色無量度門隨類普現於五法自性識二種無我究竟通達記曰此敘説法由致也如是我聞等者謂如是之法我從佛聞一時乃機感應會之時非定指也佛乃説主山乃説處菩薩乃聽衆此結集者因佛顧命立言一切經首都皆置之無煩他説山頂種種寶華以為莊嚴者謂此無上頂法如來藏心乃一切諸佛之因地也佛與菩薩皆從異佛剎來者以示此中聖凡不立故大慧為上首者此法非心識可到唯許大智可入故自心下歎德也至於種種衆生種種心色無量度門五法自性八識無我等法皆是自心現境而獨大智慧人善解其義究竟通達二譯皆云婆伽婆住大海濵摩羅耶山頂楞伽城中其城乃婆羅那夜叉王所據因佛於海龍王宮説法七日已而從大海出舉目觀見山頂之城而作是言昔諸如來應正等覺于此説自所得聖智證法非諸外道臆度邪見及以二乘修行境界我今亦當為婆羅那王開示此法時夜叉王以佛神力聞佛言音即與眷屬請佛歸其城中云云二譯皆有夜叉王問法因緣此經略之觀者融會彼譯則頓見此經宗趣矣爾時大慧菩薩與摩帝菩薩俱遊一切諸佛剎土承佛神力從座而起偏袒右肩右膝著地合掌恭敬以偈讚佛記曰此別敘當機見佛之儀也大慧為當機者惟此無上法門非大智慧人不能擔荷而與摩帝同遊者摩帝此亦云慧所謂達者同遊涅槃路世間離生滅猶如虗空華智不得有無而興大悲心一切法如幻遠離於心識智不得有無而興大悲心遠離於斷常世間恆如夢智不得有無而興大悲心知人法無我煩惱及爾𦦨常清淨無相而興大悲心一切無涅槃無有涅槃佛無有佛涅槃遠離覺所覺若有若無有是二悉俱離牟尼寂靜觀是則遠離生是名為不取今世後世淨記曰此正發啓全經之宗趣也爾𦦨梵語此云所知又云智障一切無涅槃魏譯云有無二俱離蓋一切乃生死有法也涅槃乃無法也無者此二皆空故雜華云有諍説生死無諍説涅槃生死及涅槃二俱不可得故次釋云無有涅槃佛無有佛涅槃遠離覺所覺有無二俱離也是知此二乃分別妄見耳故二譯實叉云夜叉王請佛入楞伽城獻供已畢即以二法問佛謂言如來常説法尚應捨何況非法云何得捨此二種法何者是法何者非法世尊答言法與非法差別之相此是凡夫之所分別非聖智見乃至何者是法所謂二乘及諸外道虗妄分別説有實等為諸法因如是等法應捨應離不應於中分別取相見自心法性則無執著諸觀行人以畏鉢舍那如實觀察名捨諸法何者是非法所謂諸法無性無相永離分別如實見者若有若無如是境界彼皆不起是名捨非法流支云如實見者名為正見若他見者名為邪見若分別者名為二取皆是虗妄不得寂滅寂滅者名為一心一心者名如來藏如來藏者入自內身智慧境界得無生法忍三昧故此偈讚佛有無二俱離也甚矣有無二見為法身之刺也所言自覺聖智無他但知此離此而已更無實法可得實此經之宗極也行人知此可謂行無行證無證耳苟一念行證未忘則復墮此況以分別言語文字為得乎觀者若如是觀可謂識法實相矣是則向下大慧所問皆有無二法世尊皆令離此捨此而已故一切皆非苟離此捨此非自覺聖智而何故下偈流支云若如是觀佛寂靜離生滅實叉云是人今後世離著無所取是則全經之旨不出于夜叉王一問及此大慧偈讚而已上敘分已竟下正宗分二初直指一心真如以顯三界唯心有二初約數句問爾時大慧菩薩偈讚佛已自説姓名我名為大慧通達於大乘今以百八義仰咨尊中上世間解之士聞彼所説偈觀察一切衆告諸佛子言汝等諸佛子今皆恣所問我當為汝説自覺之境界爾時大慧菩薩摩訶薩承佛所聽頂禮佛足合掌恭敬以偈問曰記曰大慧首以百八義問佛者蓋依一心轉變五法三自性八識二無我迷悟因果之法而問也舊説百八句表對治百八煩惱非本指矣然一心者佛語心也所謂寂滅者名為一心本無十界色心依正之相但迷之而為生死故變一心而成三界悟之而為涅槃故轉三界而為一心然生死有法也涅槃無法也此二皆由愚夫分別妄見而此寂滅心中本無此事是則大慧所問者乃十界依正色心迷悟因果心行種種差別之相要之不出凡聖有無此特分別妄見對待之法耳殊不知此寂滅一心絶諸對待故偈云若有若無有是二悉皆離佛將直指最極心源故下一一牒答而斥之曰非也此正離心意識出凡聖路唯諸佛自覺聖智境界雖大智慧人亦不免墮於數句況其他乎愚謂此百八句總依三界二十五有有法上起四句見而立謂凡夫外道見三界實是有法為有句二乘見三界是無法為無句菩薩見三界即真即俗為亦有句亦無句而却指佛見三界非真非俗為非有非無句此乃正教所明而外道自宗立有無一異俱不俱常無常等四句各執一見此皆不出常情分別計度以邪正之見有八所見之境有百故流支云百八見於正位中總皆是謗若四句既離則百非自遣又何煩惱可捨又何佛道可取耶故僧問馬大師離四句絶百非請師直指某甲西來意師云我今日頭痛不能為汝説問取智藏去云何淨其念云何念增長云何見癡惑云何惑增長唐譯云云何起計度云何淨計度云何起迷惑云何淨迷惑記曰此總依一心生滅迷悟二途而問也然大慧請百八義開口即問此四句者蓋一心真源聖凡平等了無差別之相但約迷悟之分故有十界依正因果種種性相之異然今將窮十界之源故首出迷悟之見所謂迷一心而正智翻為妄想如如翻為名相此念惑增長也悟一心而妄想即成正智名相即是如如此淨念見癡惑也然皆迷悟邊事故經云順流轉者妄見生死厭流轉者妄見涅槃是則大慧依生滅門迷悟對待而問故先以淨念不淨念見惑不見惑發端而後所指者皆迷悟中差別之相佛單依一心真如而答故向下牒問之初乃即告云若生若不生涅槃及空相流轉無自性即此生不生涅槃空相二句乃總牒盡大慧之問流轉二字斥盡大慧之見所謂生死涅槃皆即狂勞顛倒華相故此總屬流轉而以無自性三字盡顯諸法實相破盡大慧之疑耳然世尊雖以此答猶是生滅對待惟寂滅心源總無此事故牒問已畢而一一直示之曰非也斯正所謂法尚應捨何況非法若有若無有是二悉皆離也學者了此可許入楞伽何故剎土化相及諸外道云何無受次何故名無受何故名佛子解脫至何所誰縛誰解脫記曰此總問十界依正名相因何而有也剎土化相通指二土謂實報莊嚴土凡聖同居土以約名相故不言寂光諸外道通指三界凡夫無受次謂次於無受通指三乘有學無受通指三乘無學佛子單指菩薩解脫謂涅槃縛乃生死謂生死誰縛之涅槃誰解之蓋涅槃指佛界也何等禪境界云何有三乘唯願為解説緣起何所生云何作所作云何俱異説云何為增長唐譯云云何諸有起云何無色定及與滅正受云何為想滅何因從定覺云何所作生進去及持身云何現分別云何生諸地記曰此十五句別問九界差別之相也前三句問三乘行相因何而有緣起問正法下二句問外道邪見因何而起云何為增長二句問三界因果因何而有滅正受二句問小乘因何樂住寂定不欣説法何因從定覺下四句問大乘菩薩因何樂説法度生云何生諸地一句問菩薩因何又立地位名目破三有者誰何處身云何往生何所至云何最勝子何因得神通及自在三昧云何三昧心最勝為我説記曰此八句特問三乘行相也謂三乘人為何出三界去既出三界又生何處既捨此身又受何身畢竟住於何處云何稱為菩薩是佛弟子何故又説有神通三昧之事不知三昧心是何相狀云何名為藏云何意及識云何生與滅云何見已還云何為種性非種及心量云何建立相及與非我義云何無衆生云何世俗説云何為斷見及常見不生云何佛外道其相不相違云何當來世種種諸異部記曰此十六句通問心性是一云何衆生所見種種不同也初四句謂如來藏心是一云何又名藏識又名意及意識云何又説生滅妄見又説不生滅心見已還魏譯云斷所見唐譯云退諸見皆不生滅義也次種性二句謂聖凡同稟此心如何又説三乘人是種性外道闡提是非種性而説彼心皆有限量耶次建立相三句謂心既無相因何而立我人衆生之相為何又説無我人衆生之相次世俗説五句謂三界凡夫外道為何起斷常二見蓋世俗説即凡夫外道斷常二見也又如何得二見不生如何得衆生與佛平等無二次當來世二句謂佛既有教如何佛滅度後弟子又起種種異見也云何空何因云何剎那壞云何胎藏生云何世不動何因如幻夢及犍闥婆城世間熱時𦦨及與水月光何因説覺支及與菩提分云何國土亂云何作有見記曰此十二句通問世界衆生都是有相之法因何而有生滅不生滅常與無常真妄之不同也初二句魏譯云云何名為空云何念不住此蓋問依報世界為何而有成住壞空特舉空壞以攝成住云何胎藏生一句問正報衆生為何而有生死遷流蓋舉生以攝死耳云何世不動一句義該上世界衆生見今而有遷變無常為何而説常住不動蓋世字指有情無情二世間何因如幻夢下四句唐譯云云何諸世間如幻亦如夢等意謂上諸衆生世界有為之法現今實有為何而説如幻等不實何因説覺支下二句謂如何覺上世間諸法不實當體常住者則為正智蓋覺支菩提總指正智也云何國土亂二句謂如何見上世間諸法是實有無常者名為有見蓋亂即生滅不停有見即妄想分別也此上通問名相妄想正智下問如如云何不生滅世如虗空華云何覺世間云何説離字離妄想者誰云何虗空譬記曰此六句問如如也唐譯云云何知世間云何離文字云何如空華不生亦不滅意謂如何悟彼世間生滅諸法當體如如離言説相離名字相如空中華不生不滅遠離妄想分別猶若虗空即是真如也此上通問五法自性生起相下問差別相如實有幾種幾波羅密心何因度諸地誰至無所受何等二無我云何爾𦦨淨諸智有幾種幾戒衆生性記曰此八句單問如如正智差別相也前四句謂真如實際是一云何又有修證頓漸之不同故云如實有幾種幾波羅蜜謂因行差別諸地謂地位階級度超越謂何因得頓超諸地也至無所受問究竟佛地何等下四句問正智差別二我即煩惱障爾焰即所知障實叉云云何所知淨蓋二無我淨所知斯以正智破二障耳正智既一如何又有隨根授法是則智有幾種衆生根性不一教戒有幾種前從初問起至此通依一心真源約迷悟對待而有名相妄想正智如如五法差別之不同以顯十界依正因果之相意顯不離一心故翻歸如如正智耳向後誰生諸寶性已下直至問終但問名相妄想緣起聖凡依正大小染淨諸法心念性欲音聲色相種種差別之不一也誰生諸寶性摩尼真珠等誰生諸語言衆生種種性明處及伎術誰之所顯示記曰明處伎術乃問五明也西域學術以此為準故有五明論一曰聲明謂釋詁訓字詮目流別二曰工巧明謂伎術機關陰陽歷數三曰醫方明謂禁呪間邪藥石針艾四曰因明謂考計正邪研核為偽五曰內明謂究暢五乘因果妙理前三外藝後二內教伽陀有幾種長頌及短句成為有幾種云何名為論魏譯云法復有幾種解義復有幾唐譯云道理幾不同解釋幾差別云何生飲食及生諸愛欲云何名為王轉輪及小王云何守護國諸天有幾種云何名為地星宿及日月解脫修行者是各有幾種弟子有幾種云何阿闍黎佛復有幾種復有幾種生魔及諸異學彼各有幾種自性及與心彼復各幾種云何施設量魏譯作施假名唐譯作唯假設唯願最勝説記曰上皆名相妄想也然言語飲食愛欲心性皆屬妄想其餘皆名相且何因而有皆問緣起也阿闍黎此云軌範師然佛有法身報身化身故問佛有幾種生云何空風雲魏譯云何因有風雨云何念聰明記曰此句承上心性是一云何而有念慧之別也聰明即別境中慧故魏譯云何因有黠慧唐譯云念智何因有此亦屬妄想耳云何為林樹云何為蔓草云何象馬鹿云何而捕取云何為卑陋何因而卑陋云何六節攝唐譯云六時攝舊注西域兩月為時年分六節外道有六節師云何一闡提一闡云信提云不具謂信不具之人男女及不男斯皆云何生云何修行退云何修行生二譯皆作修行進禪師以何法建立何等人魏譯云教何等人修令住何等法衆生生諸趣何相何像類云何為財富何因致財富云何為釋種何因有釋種云何甘蔗種無上尊願説記曰甘蔗種乃瞿曇釋種也舊注引本行經云劫初大茆草王得成王仙被獵師所射滴血於地生二甘蔗曰炙而開一出童男一出童女占相師立男名善生即灌頂甘蔗王女名善賢為第一妃瞿曇釋種即其裔也大慧問甘蔗種因何而有也云何長苦仙彼云何教授唐譯云仙人常苦行是誰之教授如來云何於一切時剎現種種名色類最勝子圍繞云何不食肉云何制斷肉食肉諸種類何因故食肉記曰從誰生諸寶性至此蓋問天地萬物之不同聖凡種類之各別心行性欲之不一此皆何因而有也但其語不次而意不出此若觀華嚴問明品則知此中歸趣矣云何日月形須彌及蓮華師子勝相剎側住覆世界如因陀羅網或悉諸珍寶箜篌細腰鼓狀種種諸華或離日月光如是等無量記曰此問佛剎安立形狀之不同也廣如華藏世界品故結云如是等無量因陀羅此云帝即帝網也謂帝釋殿有衆寶珠綱雖百千重不相障礙互相涉入交光相羅世界如之云何為化佛云何報生佛云何如如佛云何智慧佛記曰此問佛唯一真云何名義之不同也隨機普應為化佛酬其宿因為報佛體性無二名真如佛本覺顯照為智慧佛蓋真如智慧乃法身也名義雖四唯屬三身云何於欲界不成等正覺何故色究竟離欲得菩提記曰此問佛既現身與民同患何不就欲界成佛乃於有頂離欲之處而得菩提也善逝般涅槃誰當持正法天師住久如正法幾時住二譯皆以天師作世尊記曰此問法住久近及滅後誰人當可持正法也持正法即所傳正法眼藏悉檀及與見各復有幾種毗尼比丘分云何何因緣記曰此問法之差別也悉檀者此華梵雙舉悉遍也檀此云施謂佛以四法遍施衆生故云悉檀四法者謂世界為人對治第一義也廣如止觀所明見謂所被之機所見各有幾種也毗尼此云律比丘分乃比丘二百五十戒問如何是毗尼為何又設比丘分也彼諸最勝子緣覺及聲聞何因百變易云何百無受云何世俗通云何出世間云何為七地唯願為演説記曰此問三乘人法因何差別也唐譯云一切諸佛子獨覺及聲聞云何轉所依云何得世通云何得出世復以何因故心住七地中按此則知百變易二句謂初地菩薩何因能現百佛界身得百種三昧蓋無受即三昧也世俗通謂五地聖人因何而能通達世諦涉俗利生七地遠行名出世間僧伽有幾種云何為壞僧云何醫方論是復何因緣記曰此問僧之差別及應機之法不一也壞僧謂不具戒者醫方論非世俗醫方蓋言佛為三界醫王其所説法應機施設如應病與藥故謂之醫方論大經有舊醫新醫法華有醫師喻唐譯云廣説醫方論是知蓋言佛法耳從云何為化佛止此通問三寶因何而有差別也何故大牟尼唱説如是言迦葉拘留孫拘那含是我記曰此問因上言佛有四等名義不同因何又説迦葉等多佛是我此又不別也何故説斷常及與我無我何不一切時演説真實義而復為衆生分別説心量記曰此因上法之差別故復問邪正權實之不同也斷常我乃外道邪宗無我乃佛之正法心量乃妄想分別心數之法意謂何故説斷常及我為邪宗何故説無我為正法然無我既是真實何不始終説其真實之法而又為衆生説妄想心數不實之法耶何因男女林訶梨阿摩勒記曰此問林木果實之不一也男女林亦云尸陀林其果如男女之狀熟則顏色美豔未幾即落地狀如死尸臭穢不堪佛弟子多依此林修不淨觀大慧問此林因何而有也訶梨阿摩勒二果名也皆可為藥訶梨舊云訶梨勒新云訶梨怛雞此云天上持來阿摩勒其實如胡挑意謂一等皆樹果因何彼如男女之狀耳雞羅及鐵圍金剛等諸山無量寶莊嚴仙闥婆充滿記曰此問八部之衆因何不住人間天上而住鐵圍七金山中也唐譯云仙人乾闥婆一切悉充滿此皆何因緣願佛為我説此上大慧所問除及字但取云何何因何故何等誰字之類為義則有一百三十餘句其中意義不出十界四門然世尊所答以依真如一心則一法不立故一一云非若依生滅門唯識建立則全經之旨皆別答此問耳然雖經來未盡而此四卷之文所詮五法三自性八識二無我四門名義開合之旨已足觀者臨文會意自當證之此下乃世尊牒答先牒後答且初無上世間解聞彼所説偈大乘諸度門諸佛心第一善哉善哉問大慧善諦聽我今當次第如汝所問説記曰此結集者敘置及佛讚許之辭也前一偈唐譯云爾時世尊聞其所請大乘微妙諸佛之心最上法門然大慧所問乃十界依正差別之相正是三乘凡夫外道妄見分別境界實大慧因之而起疑者蓋不知此等諸法因何而有也故興此問而結集者即便指為微妙佛心最上法門何也金剛般若云一切賢聖皆以無為法而有差別況衆生世界乎所謂一切分別皆分別自心若分別不生當體即名諸佛自覺聖智矣故此所問聖凡依正邪正因果自性常住即是微妙佛心非智眼明見何以與此故敘置之生及與不生涅槃空剎那趣至無自性記曰此世尊總領大慧問義也謂所問多種不出生與不生涅槃空相耳剎那生滅流轉也趣至猶究竟也唐譯云若生若不生涅槃及空相流轉無自性謂此世出世間皆生滅流轉妄見之法一一究竟本無自性也此總牒領其意而默答已竟義已見前注何後一一皆總述大慧問語耳然前問語或略或闕而世尊皆補而出之蓋亦互相發明但其語隨便故參差不類其意自周佛諸波羅蜜佛子與聲聞緣覺諸外道及與無色行如是種種事記曰此綜領大慧所問之事也謂所問之事雖多總不出十界人法因果耳佛佛子聲聞緣覺四聖也無色該天道外道該人及三途以外道邪行乃三途之因故此皆人也波羅蜜四聖之法也無色行意該外道六凡之法也因果依正無不備具故云如是種種事意謂大慧所問者槩不出此下乃一一重述其辭須彌巨海山洲渚剎土地星宿及日月外道天修羅此領上問諸天有幾種云何名為地星宿及日月牒意該三界六凡也解脫自在通力禪三摩提滅及如意足覺支及道品諸禪定無量此領上云何説覺支及與菩提分蓋廣牒三十七品助道四聖法也諸陰身往來領上衆生生諸趣正受滅盡定領上及與滅正受二句三昧起心説領上何因從定覺四句心意及與識無我法有五自性想所想及與現二見乘及諸種性此領上云何名為藏已下至非我義八句總歸四門金銀摩尼等領上誰生諸寶性等一闡提大種領上云何一闡提然大種無問蓋世尊意指闡提外道所計大種為生因者非特言四大也荒亂及一佛智爾𦦨得向荒亂領上云何國土亂一佛領上迦葉等是我智爾焰領上爾焰淨二句得向領上解脫修行衆生有無有領上及與我無我象馬諸禽獸云何而捕取領上云何象馬鹿云何而捕取譬因成悉檀及與作所作領上悉檀及與見唐譯云云何因譬喻相應成悉檀謂四悉檀皆因譬所成者故併意牒之然能作所作皆屬妄見叢林迷惑通心量不現有上句領云何世俗通謂衆生心想邪見稠密如叢林也下句領云何出世間唐譯云衆林與迷惑如是真實理唯心無境界魏譯云相迷惑如實但心無境界此蓋牒出其義也諸地不相至領上何因度諸地百變百無受醫方工巧論伎術諸明處如文可知此諸山須彌地已下至毛孔眉毛幾乃大慧問不到處而世尊指而出之諸山須彌地巨海日月量下中上衆生身各幾微塵一一剎幾塵弓弓數有幾肘步拘樓舍半由延由延兔毫窗塵蟣羊毛麥塵記曰七極微塵成一窗塵七窗塵成一兔毛頭塵七兔毛頭塵成一羊毛頭塵七羊毛頭塵成一牛毛頭塵七牛毛頭塵成一蟣七蟣成一虱七虱成一芥七芥成一大麥七大麥成一指節七指節成半尺兩半尺成一尺二尺成一肘四肘成一弓五弓成一丈二十丈名一息八十息名一俱盧舍八俱盧舍成一由旬由延即由旬也此按舊注引釋梵之語鉢他幾麥阿羅麥幾獨籠那佉梨勒又及舉利乃至頻婆羅是各有幾數記曰鉢他一升也阿羅一斗也獨籠一斛也那伽梨十斛也勒又一萬也舉利一億也頻婆羅一兆也謂幾麥之塵成一升又幾麥之塵成一斗餘類此為有幾阿䨲名舍梨沙婆幾舍利沙婆名為一賴提幾賴提摩沙幾摩沙陀那復幾陀那羅為迦梨沙那幾迦梨沙那為成一波羅此等積聚相幾波羅彌樓記曰阿䨲亦塵也舍利沙婆芥子也賴提草子也摩沙豆也陀那銖也迦利沙那兩也波羅斤也彌樓須彌山也謂以幾斤之塵能成此彌樓之山唐譯云幾斤成須彌此按舊注是等所應請何須問餘事聲聞辟支佛佛及最勝子身各有幾數何故不問此火𦦨幾阿䨲風阿䨲復幾根根幾阿䨲毛孔眉毛幾唐譯云火風各幾塵一一根有幾眉及諸毛孔復各幾塵成記曰從諸山須彌地已下至此共有三十八句計三十二事皆大慧問不到處故世尊特為表而出之然且責之云何故不問此者何也如華嚴諸品皆佛力加被菩薩所説至若阿僧祗品則佛親説以其甚微細事非一切種智不能悉知悉見殊非菩薩所知不知故問不及苟不及此則心外有剩法矣故特表而出之以顯自覺聖智徹法無遺信乎佛之知見閻浮提雨皆知滴數現前松直𣗥曲鵠白烏玄皆了元因也然須彌山略指依報總相其弓步微塵別相也三乘聖人身有大小蓋身乃正報總相其數量毛孔微塵別相也意責大慧但知諸法總相不知別相此則但知共相不達自相其迷於自心現量多矣故以甚微細智以發之下文復領大慧之問護財自在王轉輪聖帝王云何王守護云何為解脫廣説及句説如汝之所問衆生種種欲種種諸飲食云何男女林金剛堅固山云何如幻夢野鹿渴愛譬云何山天仙犍闥婆莊嚴唐譯云云何諸妙山仙闥婆莊嚴解脫至何所誰縛誰解脫云何禪境界變化及外道云何無因作云何有因作有因無因作及非有無因舊注此四因領上云何俱異説云何現已滅領上云何見已還云何淨諸覺云何諸覺轉及轉諸所作領上云何淨其念云何念增長云何斷諸想云何三昧起破三有者誰何處為何身云何無衆生而説有吾我云何世俗説領上云何建立相四句唯願廣分別二譯皆無此一句所問相云何及所問非我此猶屬建立相四句義云何為胎藏及種種異身領上種種名色相云何斷常見云何心得定領上云何三昧心言説及諸智戒種性佛子領上誰生語言二句及諸智有幾種幾戒衆生性二句云何成及論領上成為有幾種云何名為論云何師弟子種種諸衆生斯等復云何云何為飲食上一句領弟子有幾種云何阿闍黎二句下三句綜領男女及不男及衆生生諸趣四句意聰明魔施設此一句綜領魔及諸異學已下六句意及云何念聰明一句云何樹葛藤領上云何為樹林云何為蔓草二句最勝子所問云何種種剎下自有領剎土形狀之句此應是領何故剎土化一句之意仙人長苦行此領云何長苦仙二句云何為族姓此領云何為釋種四句從何師受學領禪師以何法二句云何為醜陋云何人修行此一句領云何修行退二句欲界何不覺阿迦膩吒成此領云何於欲界不成等正覺四句阿迦膩吒此云色究竟天云何俗神通領上云何世俗通云何為比丘領上毗尼比丘分二句云何為化佛云何為報佛云何如如佛平等智慧佛云何為衆僧此一句領上僧伽有幾種二句佛子如是問箜篌腰鼓華剎土離光明領上云何日月形已下十句心地者有七領上云何為七地所問皆如實此及餘衆多唐譯云此及於餘義佛子所應問一一相相應遠離諸見過記曰此五句乃讚大慧所問稱理無過也然大慧問意次第有主而世尊牒領者大槩綜括其辭不復次序且亦有牒不盡者故結之云此及餘衆多意謂凡係佛子所問者一一皆與實理相應遠離諸見過也然雖如是但法離言説今於無説示説故下結云悉檀離言説我今當顯示次第建立句佛子善諦聽此上百八句如諸佛所説記曰此六句乃結牒問義許説誡聽啓後答意也謂大慧所問雖稱理無過但法本離言今當於無説處示現言説故為次第建立耳且此上百八句義若如諸佛所説則一一皆非故此二句乃結上起下而義貫下文讀之然百八句魏譯云百八見初大慧云今以百八義仰咨尊中上及考其問有一百九十餘句若但取云何何因何故何等誰字之類為義則有一百三十餘句及世增補出大慧問不及者又三十二句至此猶云此上百八句如諸佛所説是果定局百八句耶而説者又按其下世尊自分其句但一百四又少四句而必以此為定見豈非刻舟求劒耶是但以一句字為礙耳殊不觀大慧云百八義流支云百八見也若以義見二字觀之則可謂具通方之眼矣苟於句數難合或當以愚見依三界法作有無等四句為準但約佛教所明不出四句而外道所計亦不出四句此則邪正共有八句以能分別之見有八所見之境有百故云百八見也故下經云如來説法離如是四句謂一異有無等又云為淨二種障故譬如商主次第建立百八句無所有故世尊答云一切皆非為善分別諸乘及諸地相故下依生滅門建立而有言説故一一別答耳然所説者亦不過破此四計而已上乃綜牒其問辭下先約心真如門總答不生句生句唐譯云生句非生句常句無常句相句無相句魏譯云生見不生見常見無常見相見無相見記曰此總約心真如門而答也大慧問義雖多總不出生與無生常與無常相與無相之法耳故世尊已牒所問而復綜其大義而破之曰此上百八句若如諸佛所説不生義者即此生法便是以生本不生故所言真常義者即此無常便是以諸法當體真常故所言相者諸法本自無相故此順二譯以生句為首義解若依此經以不生句為首解者意謂諸佛所説真實無生不容起見故下文云一切法不生不應立宗意謂汝才作不生見蚤墮生法才作常見蚤墮無常矣何者以真如界中不容擬議以舉心即錯動念即乖以相本無相故云不生句生句等自此已往凡所分別皆與真如實相理不相應故一一斥之曰非也永嘉云一切數句非數句與吾靈覺何交涉不如三界見於三界非實非虗非如非異斯正諸佛所證自覺聖智境界故非妄想分別可到也故宗門云三句明一句一句明三句三一不相關分明向上路了此可許觀楞伽住異句非住異句剎那句非剎那句自性句離自性句空句不空句魏譯云離自性見非離自性見空見不空見唐譯云自性句非自性句記曰此併上三句蓋佛自遣之辭也以前牒文首云生及與不生涅槃空剎那趣至無自性世尊意謂前因大慧執有世出世間生住異滅以問故我聊以此句義破彼執情耳非實法也以真如理中本無言説故故此答云此亦皆非謂不但無生而住異滅皆不可得剎那生滅也然上常句即指涅槃魏譯云離自性見非離自性見前云趣至無自性然趣至猶言究竟蓋言世出世法究竟皆無自性此言離自性句亦了不可得故都云非此佛自遣之辭向下皆遣大慧所執之辭也斷句不斷句邊句非邊句中句非中句常句非常句記曰此通斥世出世間邪正之法也前常無常句乃涅槃真常及生死無常此常句乃外道斷常二見謂確定死常非常句乃斥之也中乃出世一乘中道法邊謂空有二邊乃出世三乘法斷常乃世間外道邪見法也真如理中聖凡不立迷悟皆空故都云非緣句非緣句因句非因句煩惱句非煩惱句愛句非愛句方便句非方便句巧句非巧句唐譯云善巧句非善巧句淨句非淨句成句非成句譬句非譬句弟子句非弟子句師句非師句種性句非種性句三乘句非三乘句所有句非所有句魏譯云寂靜見非寂靜見唐譯云無影像句非無影像句願句非願句三輪句非三輪句相句非相句唐譯云標相句非標相句有品句非有品句唐譯云有句非有句無句非無句俱句非俱句緣自聖智現法樂句非現法樂句唐譯云自證聖智句非自證聖智句現法樂句非現法樂句剎土句非剎土句阿䨲句非阿䨲句唐釋云塵句非塵句水句非水句弓句非弓句實句非實句唐譯云大種句非大種句數句非數句唐譯云算數句非算數句數句非數句記曰二譯皆無此句舊注以此數字讀作上聲非也蓋上數句乃牒阿劣以下世尊所補三十二句皆算數也次數句乃謂真如理中本無此等數量正所謂一切數句非數句也明句非明句唐譯云神通句非神通句虗空句非虗空句雲句非雲句工巧伎術明處句非工巧伎術明處句風句非風句地句非地句心句非心句施設句非施設句自性句非自性句唐譯云體性句非體性句陰句非陰句衆生句非衆生句慧句非慧句涅槃句非涅槃句爾𦦨句非爾𦦨句唐譯云所知句非所知句外道句非外道句荒亂句非荒亂句幻句非幻句夢句非夢句𦦨句非𦦨句二譯皆云陽焰像句非像句輪句非輪句唐譯云火輪句犍闥婆句非犍闥婆句天句非天句飲食句非飲食句淫欲句非淫欲句見句非見句波羅蜜句非波羅蜜句戒句非戒句日月星宿句非日月星宿句諦句非諦句果句非果句滅起句非滅起句唐譯云滅句非滅句起句非起句治句非治句唐譯云醫方句相句非相句記曰所答凡有三相句舊注謂前乃名相之相次則標相之相此則占相之相以醫方冠於上文故非也然占相總在五明而此醫方句蓋答前別有醫方之問乃喻佛應機之法非世俗醫方也前解具明是則此非占相之相明矣然前大慧問義有三種相句故此次第而答之耳以初問何故剎土化相及外道等乃通問十界依正聖凡名相之事因何而有故此初答云相句無相句意謂彼諸凡聖依正之相本自無相故也次問云何建立相謂心既無相云何建立我人衆生壽命之相故此答云標相句非標相句以標即建立義言彼建立亦本無建立之相也後又問衆生生諸趣何相何像類然相乃衆生形狀而像乃支體像貌故此答意云衆生本無衆生之相又何支分之有故云相句非相句而下即云支分也支句非支句唐譯云支分句巧明處句非巧明處句唐譯無此句禪句非禪句迷句非迷句現句非現句護句非護句族句非族句唐譯云種族句仙句非仙句王句非王句攝受句非攝受句寶句非寶句記句非記句一闡提句非一闡提句女男不男句非女男不男句味句非味句事句非事句身句非身句覺句非覺句動句非動句根句非根句有為句非有為句無為句非無為句因果句非因果句色究竟句非色究竟句節句非節句唐譯云時節句叢樹葛藤句非叢樹葛藤句雜句非雜句唐譯云種種句説句非説句唐譯此下有決定句非決定句毗尼句非毗尼句比丘句非比丘句處句非處句二譯皆云住持句非住持句字句非字句唐譯云文字句記曰此上約一心真如門以答一百八句已竟然所以皆云非者謂真如性中本無此諸句數故起信論云當知真如自性非有相非無相非非有相非非無相非有無俱相非一相非異相非非一相非非異相非一異俱相從本以來一切染法及一切衆生妄心分別皆不相應故即是真心常恆不變淨法滿足亦無有相可取以離念境界唯證相應故故此答云一切皆非然前文已一一具牒其辭而此又一一復疊其句而斥其非者蓋西域文勢如此凡有所問必備牒其辭而答之言雖似復義實直捷皆指歸第一義諦離言説處也蓋上一句即疊所問而下非字一句乃破斥耳以馬鳴宗此楞伽等百部大乘經造起信論而論中立義分一心二門故今亦宗其論後多引之大慧是百八句先佛所説汝及諸菩薩摩訶薩應當修學記曰此結勸修學也前云此上百八句若如諸佛所説則一切皆非故此結云此百八句乃過去先佛所説汝及諸菩薩應當如是修學也科初直指一心真如以顯三界唯心已竟次曲示一心生滅以顯萬法唯識通分八科初明真妄因依廣示八識以顯生滅因緣相此中分二初略明唯識以別邪正之因二廣明八識以示識智之相今初中又三初明真唯識量以辨邪宗此中又三初以法顯真唯識量次以喻成懸破二見三正揀辨邪宗且初爾時大慧菩薩摩訶薩復白佛言世尊諸識有幾種生住滅佛告大慧諸識有二種生住滅非思量所知記曰此下至經終通約心生滅門以顯萬法唯識且初以法顯真唯識量也問曰大慧承佛答百八句一切皆非已乃復陡問世尊諸識有幾種生住滅者何也按馬鳴大士宗此經造起信論依一心法立二種門謂一者心真如門二者心生滅門依第二門有覺不覺義依後義起三細六粗等總攝世出世法直指一心為迷悟之源故此經説五法三自性皆空八識二無我俱遣然五法者謂名相妄想正智如如也三自性者謂妄想緣起成也以依一心而有迷悟之別故有此八由迷一心而轉正智如如作名相妄想是則諸法乃妄想緣起也悟一心而轉名相妄想為正智如如所謂成也此品名佛語心者即所謂寂滅一心名為真如論云心真如者即是一法界大總相法門體所謂心性不生不滅一切諸法唯依妄念而有差別若離心念則無一切境界之相是知前來大慧所問者乃依名相妄想境界邊事故有世出世間種種諸法成百八見而世尊直指一心真源離言説相離名字相離心緣相故牒而斥之曰一切皆非是則從前經文正約一心真如門也若約真如門則離言説相以三界唯心故但智證現量則不容有説所可説者皆生滅門中依妄想緣起邊事故凡落言詮即屬比量故從此已下皆約生滅門以顯示緣起差別諸法皆唯識所現故云萬法唯識然識如幻夢但是一心心寂而知真妄皆離即名自覺聖智以此成立真唯識量故大慧已領一心離言之旨次即便問諸識有幾種生住滅也良由不生不滅與生滅和合成第八阿賴耶識故生滅門中首問諸識有幾種生住滅而答云有二種生住滅以生即無生住本無住滅而不滅故云非思量所知諸識有二種生謂流注生及相生有二種住謂流注住及相住有二種滅謂流注滅及相滅記曰此通指八識皆有粗細二種四相也解者謂流注生住滅單屬第八賴耶相生住滅則屬前七今諦觀經意諸識之言蓋謂八箇識中皆有粗細四相也良以八識皆有思量了別之用隨見隨即分別而此行相粗顯故云相生住滅究其源底皆是第八識精應緣之業用三相隱微一類相續故云流注雖有八識分位其實總皆一類微細流注種子現行交相熏發甚深微細不可思議故經云陀那微細識習氣成瀑流故云諸識有二種生住滅密嚴云八種流注心雖無若干體或隨緣頓起或時而漸生如波濤依水蓋波濤喻相水喻流注不相離故故下文云非一非異大慧諸識有三種相謂轉相業相真相記曰此釋八識之體相以明依生滅門有覺不覺義也真相即本覺真心轉業二相即無明不覺問曰論列三細謂業轉現此經三相以轉為首以業次之而繼之以真且云諸識皆有三種相者何也答曰此言八箇識中皆具三相不同論中三細單屬第八識也何者論云一者無明業相以依不覺故心動説名為業此乃單指無明二者能見相以依動故能見即名轉相三者境界相以依能見故境界妄現謂能現一切境界如鏡現像名為現相此論意也然此經不同論意而以轉為首者此轉不是三細之轉乃是釋前諸識各有二種生住滅義謂依此生滅剎那剎那念念流轉而此轉相即前流注生滅已具論中三細而此業字乃業力造業之業即前相生住滅而六粗相皆具此中而人不知念念生滅起惑造業者皆真心也故先舉轉業而繼之以真相要在即妄明真正論中所明依生滅門有覺不覺義耳下文云種種諸識浪騰躍而轉生譬如海波浪是則無差別諸識心如是異亦不可得又云藏識如巨海業相猶波浪唐譯云轉識同波浪故知轉業乃釋二種生滅義也若約三性釋者轉相乃依他起如波浪依海水起業相乃遍計執如但見波浪洶湧不知是水真相則圓成實唯一海水也然此真相即本覺真如正是隨緣不變者問曰馬鳴依楞伽等經造起信論而三細尤論中生起之綱要何乃遽云不同耶答曰此蓋通言八識之相以經云諸識有三種相故若三細六粗向下不思議熏變等自有明文大慧略説有三種識廣説有八相何等為三謂真識現識及分別事識大慧譬如明鏡持諸色像現識處現亦復如是記曰此釋前諸識之名也前云諸識不知識有幾種故此釋云略説有三廣説有八然魏譯云略説有二一了別識二分別事識唐譯云略則惟二謂現識及分別事識俱缺真識二字然此中真識即是不生不滅如來藏清淨真心也亦即是真如然真如亦云識者以有照境之用故而此現識即第八識也故論云以依阿賴耶識説有無明不覺而起能見能現能取境界者亦名智識即此中分別事識乃前七也若約鏡像喻則八識一體無二無別故論云現識者所謂能現一切境界猶如明鏡現衆色像現識亦爾隨其五塵對至即現無有前後以一切時任運而起常在前故由是而觀則此經三種乃真妄對立要顯識即是真如故故下文云如來藏名識藏然魏唐二種者以了別與現識乃真妄合説耳所以合説者以不生不滅與生滅和合成阿黎耶識故故經云佛説如來藏即是阿賴耶宗鏡云此經直指八識即真不比他經別立九識故云真妄合説大慧現識及分別事識此二壞不壞相展轉因記曰此釋八識生起之相以顯本無二體也展轉因謂前七轉識與第八識互相為因由前七現行熏種子而第八種子又熏起現行故識論云諸法於藏識識於法亦爾更互為因性亦常為果性蓋可壞者妄識不可壞者真識也魏譯云彼二種識無差別遞共為因唐譯云此二識無異相互為因大慧不思議熏及不思議變是現識因記曰此特明第八生起之因以明前二種生中流注生顯三細相也然不思議熏變是現識因者乃無明熏真如為八識之因所謂流注生也論云以依真如法故有於無明為諸染因此當業相也以有無明染法因故即熏習真如以熏習故則有妄心以有妄心即熏習無明此當轉相也不了真如法故不覺起念現妄境界此當現相也斯則因無明熏習力故令真如變為現識此正無明不覺生三細也言不思議熏變者謂真如本不可熏而熏故名不思議熏真如之體本自不變而今隨無明緣成一成法故云不思議變魏譯云了別識不可思議熏變因唐譯云現識以不思議熏變為因但三相隱微故以不思議熏變釋流注生耳大慧取種種塵及無始妄想熏是分別事識因記曰此明前七轉識生起之因以明相生顯六粗相也論云以有妄境界染法緣故即熏習妄心令其念著造種種業受於一切身心等苦此正六粗相也然取種種塵及無始妄想熏者妄想習氣種子也乃第八識所藏種子因此熏起前七根境現行又取以為實我實法故云取種種塵及無始妄想熏此則第八與前七為因所謂相生然妄想熏又相中流注生也故論云無明熏習義有二種一者根本熏習以能成就業識義故二者所起見愛熏習以能成就分別事識義故前不思議熏乃根本熏此則見愛熏也大慧若覆彼真識種種不實諸虗妄滅則一切根識滅是名相滅記曰此釋前二種滅中相滅也覆返也即返流全一頓契真如則一切塵垢當下銷亡而根塵識心應時銷落是名相滅唐譯云阿賴耶識虗妄分別種種習氣滅即一切根識滅是名相滅然生則從細至粗故先流注生今滅則從粗至細故先相滅大慧相續滅者相續所因滅則相續滅所從滅及所緣滅則相續滅大慧所以者何是其所依故依者謂無始妄想熏緣者謂自心見等識境妄想記曰此釋前二種滅中流注滅也相續即流注義謂八識湛淵本無生滅但因前七識風鼓習成種故有之耳然此生滅既因前七轉識而生今所因滅則此流注相續自滅故曰相續所因滅則相續滅此釋流注生滅中流注滅也所從滅及所緣滅則相續滅者此釋相生滅中流注滅也謂第七轉識本無生滅但從根本無始無明習氣內熏外有六塵境界風吹鼓動心海內外交扇故起七識波浪今內門所從無明既滅則外門境界風停而心體湛淵波浪自息則七識當下無生矣今所從所緣既滅而相續即滅者以一切動相皆依無明而起故故釋之曰是其所依故依者無始妄想熏然無始妄想乃根本無明即今目為七識結生相續因此熏彼八識不得成智常在纏縛故緣者謂自心見等識境妄想者謂根身器界本是八識所變相分還為八識見分所緣之境此正識論所明因緣依也今云相續所因滅則生滅情亡所緣滅則根塵自泯如此則八識無明宛是平等如如不生滅之正智矣故論云唯癡滅故心相隨滅前生則更互生今滅亦更互滅耳此上以法顯真唯識量竟下以喻成懸破二見大慧譬如泥團微塵非異非不異金莊嚴具亦復如是大慧若泥團微塵異者非彼所成而實彼成是故不異若不異者則泥團微塵應無分別記曰此以喻成前真唯識量將以懸破外道一異斷常二見之執也譬如泥團微塵者正示不生不滅與生滅和合成第八阿賴耶識以顯真妄非一非異以示聖凡之相亦如此故重以金莊嚴具成之由彼外道別立異因將破彼見故以此喻示之如是大慧轉識藏識真相若異者藏識非因記曰此正釋不異以破外道妄執別有一法為生因也意謂前七與八若異者則八識不應與前七作生起因今既與彼為因則知不異矣以前七真相原是八識精明之體八識真相原是真如故魏唐二譯止有轉識藏識無真相二字然彼但約八識不異而此譯加真相二字要明真妄不異將顯妄即是真故此義自足真相即八識自體乃本覺真如今云藏識為因者謂如來藏不但為生死因亦為涅槃因後文云如來之藏是善不善因能遍興造一切趣生若不異者轉識滅藏識亦應滅而自真相實不滅是故大慧非自真相識滅但業相滅若自真相識滅者藏識則滅大慧藏識滅者不異外道斷見論議記曰此釋不一以破外道斷滅見也謂若八識是一則前七滅時而第八藏識亦應滅藏識若滅誰證無生是則八識但滅戲論虗妄習氣名為滅耳其實八識自體本覺真如實不滅也故云非自真相識滅論云所言滅者唯心相滅非心體滅又云唯癡滅故心相隨滅非心智滅此業相即前三相中業相通指無明惑業名業相耳意謂所可滅者但是虗妄習氣惑業耳而真相豈可滅耶故經又云自真相若滅者藏識則滅藏識若滅者不異外道斷見論議唐譯云識真相不滅但業相滅若真相滅者藏識應滅若藏識滅者即不異外道斷滅論上懸破二見竟下正揀辨邪宗大慧彼諸外道作如是論謂攝受境界滅識流注亦滅若諸流注滅者無始流注應斷記曰此出外道斷滅論所以揀辨邪宗也唐譯云彼外道作如是説取境界相續識滅則無始相續識滅然取境界相續識即前六識并七識粗相也流注即八識自體及七識細相也彼外道但見前六七粗相滅便謂八識俱滅此所以為斷佛種性者故佛破之曰若識流注滅者則無始流注應斷此正返顯前文但業相滅真相不滅也此不滅者寶鏡謂之真常流注然外道説八識一齊滅者以不知第八阿賴耶識為生因將謂別有一法為生生之因故故佛向下出其計云大慧外道説流注生因非眼識色明集會而生更有異因大慧彼因者説言若勝妙若士夫若自在若時若微塵記曰此出外道妄計生因也唐譯云彼諸外道説相續識從作者生不説眼識依色光明等緣和合而生唯説作者為生因故作者是何彼所計勝性丈夫自在時及微塵為能作者此正外道不知唯識是生起諸法之因乃離識外別立勝性等為生起因所謂異因也然西域外道所計雖有多種總之不出斷常二見按識論所破有七而此中世尊所指唯五耳論中七者一數論師計二十五冥諦謂從神我為冥初主諦從冥生覺從覺生我心從我心生五塵從五塵生五大從五大生十一根共二十五法而以神我為勝性而此中勝妙即彼神我也二勝論師計六句為生生之因謂實德業大有和合同異妄指此六皆有實性而一切法皆從此六句生又從實句中執有九法謂地水火風空時方和合又計極微以成器界故計極微常住不滅而此中時與微塵即彼勝論所計也三有外道計大自在天體實遍常能生諸法此中自在即彼所計也四有七種外道計大梵時方本際自然虗空我等七法常住實有具諸功能生一切法而此中丈夫即彼大梵謂大梵天能生一切而此中時亦即是實句九法中時也五六有二聲論師計聲是常能為定量表詮諸法一待緣生二待緣顯謂聲是常定能表詮一切諸法也七有順世外道計四大是實是常能生有情謂極微實常能生粗色而此中微塵亦計極微者準此七種而世尊所指五種唯缺二聲論師向後因緣二自性補之然諸外道品類雖多所執有法不過四種謂定一如數論等定異如勝論等亦一亦異如無慚外道等四非一非異如邪命外道等此皆不達唯識真妄非一非異真實道理妄執定一定異而作如是矯亂議論橫起斷常二見也然此中單出定一定異二種邪見而佛預以泥團微塵非一非異按破之且此二種皆是斷見何者若謂定一則七識滅時而八識亦隨滅則墮斷見若謂定異則相續識滅別有異因既立異因則是無因亦是斷見然世尊所指若勝性等五在此為斷見在論都是執常見者何也蓋彼所執之常即是此中之斷何者以外道不知唯識真常道理乃謂八識俱是斷滅而又別執異法將作真常斯則在彼既執異法為常則本有真常識性返作斷滅此所以彼執為常即墮此斷正是以無常為常以常為無常真顛倒見也斯義深玄知之者希復次大慧有七種性自性所謂集性自性性自性相性自性大種性自性因性自性緣性自性成性自性記曰此出外道妄計宗論也魏譯云外道有七種自性觀此有外道二字則是由前云外道説諸法不從識生更有異因而妄説勝妙等五是實是常能生諸法由是觀之則前五乃指所執之法而此七種自性乃出彼所立之教有七也然此七種都是妄計離識別有自性者約識論義解集性自性者集謂集聚此指數論師所立二十五法論云然大等法三事合成又云大等諸法多事合成如軍林等以彼所執五大十一根從初覺心五塵三事集聚生起故云集性自性也性自性者亦即立勝性為自性者是也相性自性者相即質礙之色此指勝論師所立六句以實德業大有和合同異及四大極微諸質礙法為生起因也大種性自性者此指順世所立四大是常能生諸法即前云微塵能生粗色是也因性自性緣性自性者此二即二聲論師所立一待緣生即以聲為生法之因此乃單以聲為因故云因性自性也二待緣顯即以生聲之緣為因故云緣性自性也成性自性者此指計六句中和合句也彼執諸法和合而成故云成性自性此七種自性總不出四句謂自生他生共生無因生也然因性自性即自生大種性自性緣生自性即他生集性自性相性自性成性自性即共生性自性即無因生總之不出斷常二見皆妄想邪執非如我之第一義也故下文云我有七種第一義上辨邪宗已竟下示七種聖義以別邪見分二初示正義復次大慧有七種第一義所謂心境界慧境界智境界見境界超二見境界超子地境界如來自到境界大慧此是過去未來現在諸如來應供等正覺性自性第一義心以性自性第一義心成就如來世間出世間出世間上上法聖慧眼入自共相建立如所建立不與外道論惡見共記曰此出如來正教量以第一義為宗不同外道惡見論也魏譯云我有七種第一義等謂我此七種境界乃是過去未來現在諸如來應供等正覺性自性第一義心以此性自性第一義心成就如來世間出世間最上法乃是聖慧眼入自共相之所建立如如稱也謂我所建立乃稱性建立不與外道惡見共也入證也自相謂一心真如共相乃八識因緣謂我已證入唯心唯識以此建立世出世間最上法門不比外道妄立異因為生法本故云不與外道惡見共次斥其非大慧云何外道論惡見共所謂自境界妄想見不覺識自心所現分齊不通記曰此牒釋上外道惡見之所以也佛謂我之七種第一義境界乃是聖慧眼所觀真知見力彼外道惡見乃隨自己妄想境界所見由不覺知是自心妄想所現之分齊故作如是七種邪執斷常以為定一定異而不通也大慧愚癡凡夫性無性自性第一義作二見論記曰此總結成外道惡見於第一義中作二見論也魏譯云諸愚癡凡夫無有實體以為第一義説二見論謂由不達諸法無性而妄立自性隨愚癡顛倒妄見故於第一義中作二見論耳此前從諸外道作如是論以來止此通出外道一異斷常二見非真以立真唯識量已向後痛斥外道二見因果俱非真實由不達唯心所現故妄執是有是無而成斷滅戲論然後備示唯心觀門將欲行人依不生滅心了達唯心如幻境界而觀必獲常住二轉依果也上示七種聖義以別邪見已竟下正揀邪因以示正因三初揀邪因復次大慧妄想三有苦滅無知愛業緣滅自心所現幻境隨見今當説記曰此承上外道不達唯心如幻境界妄作二見故於三有苦不能得滅今將示行人唯心如幻法門以為正修行路故先以此揭示也唐譯云若了境如幻自心所現則滅妄想三有苦及無知愛業緣三有苦即三界苦果此諸苦果皆依妄想而有故云妄想三有苦也無知即根本無明乃發業者愛即貪欲乃潤生無明此二乃三界二十五有之業因所謂惑也業緣即從無知愛二種妄惑所結生死之業繫縛不得出離故云業緣然此業因苦果所以不得消滅者皆由不達一切境界唯心所現特隨妄見流轉故耳且彼外道雖有出苦之心又不知出苦之要及其所修特依斷常二見而修斯正以苦欲捨苦依止此諸見深著虗妄法為此因地不真果招迂曲故枉費辛勤都無實證佛意謂諸行人若了境如幻唯心所現則三界因果當下消滅矣故從此已下至妄稱一切智説總斥外道二見不真從若復諸餘沙門已下至自悉檀善應當學通示唯心觀門大慧若有沙門婆羅門欲令無種有種因果現及事時住緣陰界入生住或言生已滅記曰此出外道依有無二見妄立異因也唐譯云妄計非有及有於因果外顯現諸物依時而住或計蘊界處依緣生住有已即滅此正指外道依斷常二見於唯識真因量外妄立異因謂有因有生無因無生以此有無為生因顯現世間一切事業為生果故云欲令無種有種因果現不知一切世界是妄想所持乃又妄計依時而住或又計蘊界處依四大時方等緣而住或又妄計一切蘊界諸法有已即滅不復更生此皆妄見斷滅皆非真因故下斥之然外道有內外二種內即依佛法起妄計者即沙門外即婆羅門也大慧彼若相續若事若生若有若涅槃若道若業若果若諦破壞斷滅論所以者何以此現前不可得及見始非分故大慧譬如破瓶不作瓶事亦如焦種不作芽事記曰此總斥外道因地不真故果成破壞也彼即指上內外二種外道謂彼外道由依有無二見不達唯心故所立因果皆成斷滅相續謂生死相續以彼不知結生相續乃妄指冥初及四大等為生因正如此方以陰陽二氣五行生人者是也若事若生若有唐譯云若作用若生滅若諸有作用即凡所作為若生滅即生死若諸有即指上言三界諸法以彼生有異因死歸斷滅諸有為法畢竟無常若涅槃彼指五現為涅槃若道以拔髮熏鼻臥棘塗灰牛狗戒等為出苦也若業謂業因彼以妄計圓常等為業因若果彼妄以斷滅等為真果若諦彼妄指冥初為主諦似此之類皆不了唯識都成破壞斷滅論也所以為斷滅者何也以此現前皆非真實故及見始非分故唐譯云不見根本故以唯心唯識真實根本道理彼絶分故故作如是種種戲論終無利益譬如破瓶不能作瓶事又如焦芽敗種不能作芽事破瓶喻無果焦芽喻無因外道事業亦若此如是大慧若陰界入性已滅今滅當滅自心妄想見無因故彼無次第生記曰此合上二喻以證彼外道無因無果之説也謂彼外道説此蘊界處法不從前世所作業行而生更有異因是則前世已成斷滅又説現世受苦若盡則再不受後報是則現在又成斷滅若現在既滅則向後未來永成斷滅矣似此皆是隨自妄想所見妄作異因總是無因若無因則無果故彼無次第相續生也大慧若復説無種有種識三緣合生者龜應生毛沙應出油汝宗則壞違決定義有種無種説有如是過所作事業悉空無義記曰此釋外道轉計也佛意恐彼外道聞佛唯識之説而便轉計謂我説蘊界處從有種無種與識三緣和合而生豈是無因然外道雖説識畢竟妄計有無二見及神我為主故佛牒而喻曉之曰若復説有無與識三緣合生者如此則龜應生毛沙應出油亦無是理龜本無毛是無因也沙非油本是無果也若如此説汝宗則壞宛是無因無果都成斷滅違我大乘決定真實道理乃斥之曰有無二見有如是斷滅之過既無其本則所作事業悉空無義唐譯云悉空無益然所作事業指外道苦行教法等事空猶枉也斥彼依止邪見修行枉受辛苦終無利益大慧彼諸外道説有三緣合生者所作方便因果自相過去未來現在有種無種相從本已來成事相承覺想地轉自見過習氣作如是説記曰此釋上所作事業悉空無益之意也方便魏譯云阿含唐譯云教理乃外道教法也謂彼外道妄計三緣以無因為生因者凡所作事業若教法若因果自相若三世蘊界處生相此等事業俱成斷滅戲論悉空無益且此邪見邪教邪因邪果遞代相承盲盲相引其來久矣故云從本已來成事相承成作也承傳襲也謂彼所作事業以此傳襲為教非真知見乃是依自覺妄想地轉覺妄見也抑由自己邪見過患熏習作如是説此其所作事業悉空無益也然西域外道本源首出迦毗羅此云黃頭計因中有果次漚樓僧佉此云休睺計因中無果三勒沙婆此云苦行計因中亦有果亦無果從此外道相傳至佛出世時有六大師故云從本已來成事相承如是大慧愚癡凡夫惡見所噬邪曲迷醉無智妄稱一切智説記曰此結邪師邪教不徒無益而返成害也然彼邪師俱是愚癡凡夫無正知見乃為邪見所害邪曲迷醉昏昧此中不能自覺西域外道一師各得三種法一一切智法二得神通法三得韋陀法一切智法者各於所計生一種見解心明利將此見通一切法故名一切智外道其實無智而自妄稱一切智説故從本已來成事相承所謂一盲引衆盲相牽入火坑當所痛誡故下文云正修行者當勿親近外道惡見議論前總標章云妄想三有苦滅自心所現幻境隨見今當説從此以前歷破外道無因邪見俱是妄想三有苦因乃無知愛業緣也佛意誡諸行人知彼邪因不墮邪見了達諸法唯心所現如幻境界方得現證自覺聖智故向下廣示修習如幻法門之方法使行人依之造修滅三有苦因得二轉依果從若復下至章末自悉檀善應當修學止約三百五十餘言總顯了達唯心如幻觀門隨文難釋以唐譯逐節對之其義自曉上八節正揀邪因已竟下一章特示正因大慧若復諸餘沙門婆羅門記曰此揀前內外二種外道別指二種正修行者故置言若復諸餘見離自性浮雲火輪乾闥婆城無生幻𦦨水月及夢內外心現妄想無始虗偽不離自心記曰此正教觀心之方法也唐譯云觀一切法皆離自性如空中雲如旋火輪如乾闥婆城如幻如𦦨如水中月如夢所見不離自心由無始虗妄見故取以為外然此中多無生二字是則觀一切法無自性如浮雲等觀一切法無生如幻等觀一切法唯心所現如夢事也內外心者內心指第八識中含藏無始時來虗偽習氣種子熏起六識變似外境實非外境故云內外心現妄想無始虗偽因緣所變如夢中事實不離自心故又以及字揀別上喻欲行人直觀一切境界如夢唯心所現耳妄想因緣滅盡離妄想説所説唐譯云作是觀已斷分別緣亦離妄心所取名義觀所觀受用建立身之藏識記曰此直示觀境也妄想説意言分別心也所説分別境也受用建立乃外器界即六塵境身即根身謂此根身器界乃依八識所變相分而人不達唯心所現如夢中事而返執取為我我所受用之境今直觀八識自性清淨本無所有世界身心唯識所現作是觀時則一切妄想因緣蕩然滅盡名字性空則根塵識心當下銷落故都云離此所謂離心意識參離妄想境界求也然觀即能觀藏識即所觀故云觀所觀建立身之藏識依主釋也論云菩薩創發心時即觀本識自性緣起因果之體若欲入唯識觀且識性無體又何所觀然但緣意言分別為境耳以一切境界但以名言為體故若離意言分別前無所有故下文直示本體云於識境界攝受能取之心及攝受者所取之境不相應記曰此直指心體但有能所即不相應也二取相謂我及我所以二相角立故不相應謂於識境界了達能所皆不相應處便見自心故古德云忘能所滅影像此禪之一德也以才作意便不相應故無所有境界離生住滅境空心寂自心起隨入分別唐譯云無能所取及生住滅如是思惟恆住不捨魏譯云如是思惟觀察自心以為生故記曰然心境既空而又起隨入分別且云恆住云生者正所謂應無所住而生其心也上示觀心成就下示觀成得果大慧彼菩薩不久當得生死涅槃平等大悲巧方便無開發方便大慧彼於一切衆生界皆悉如幻不勤因緣遠離內外境界心外無所見次第隨入無相處次第隨入從地至地三昧境界記曰此至得如來身止通示觀成得二轉依果相也二果者謂轉染令淨生死即涅槃轉迷令悟煩惱即菩提謂正修行菩薩若唯心觀成就不久當得染淨平等則以大悲方便無功用行度諸衆生觀衆生如幻度無度相從緣無起故云不勤因緣心境一如故云遠離內外境界唯一真心除此心外無片事可得智與真如平等平等俱離能取所取相故故云心外無所見此觀純淨則得無分別智創登初地漸次增明則從二地三地乃至八地故云次第入無相處漸升諸地住三昧境界也解三界如幻分別觀察當得如幻三昧度自心現無所有得住般若波羅蜜記曰此從八地至十地出真入假也謂於八地無功用行斷俱生我執已證我空理故云自心現無所有然猶墮於我空迷於法空不能空空故不能度故華嚴設三加七勸而引拔之此則以如幻觀觀察三界如幻不實以如幻大悲度如幻衆生故云得如幻三昧故九地方能説法度生十地方能分身十方承事諸佛故云度無所有得住無礙般若波羅蜜以斷俱生法執也若不能度無所有宗門謂之法身墮所謂百尺竿頭坐的人雖然得入未為真百尺竿頭重進步大千世界現全身故云度自心現無所有得住般若波羅蜜捨離彼生所作方便金剛喻三摩提隨入如來身隨入如如化神通自在慈悲方便具足莊嚴等入一切佛剎外道入處記曰此等覺菩薩以金剛喻定頓斷最初生相無明頓入妙覺也彼生即生相無明故論云菩薩地盡滿足方便一念相應覺心初起心無初相以遠離微細念故得見心性心即常住名究竟覺故云隨入如來身隨即也論云以有如是大方便智除滅無明見本法身即與真如等遍一切處故云隨入如來身隨入如如化自然而有不思議業種種之用故云神通自在慈悲方便具足莊嚴所以觀音大士如幻聞熏聞修金剛三昧一念成就忽然超越世出世間即得上與十方諸佛同一慈力下與六道衆生共一悲仰故云等入一切佛剎外道入處離心意意識是菩薩漸次轉身得如來身記曰此結束觀行也謂正修行菩薩作唯心識觀乃離心意意識境界即此便是菩薩漸次轉生死身得證如來本法身二轉依果之方便也故曰如幻三摩提彈指超無學十方婆伽梵一路涅槃門然此頓證法門直觀唯識頓悟自心而此又云漸次者所謂理須頓悟乘悟併消事須漸除因次第盡溈山云若人一念頓悟自心尚有無始積生現業流識漸次淨除故謂漸修所云流識者乃流注生滅正二障俱生習氣種子耳故此離心意識乃頓悟自心漸次得如來身者正淨除現業流識也前云離妄想説所説及生滅等即離心意識境界從地至地至捨離彼生等乃是漸修非離此之外別有修也故宗門教人只須離心意識參離妄想境界求謂是故耳大慧是故欲得如來隨入身者當遠離陰界入此牒離妄想境界心因緣所作方便生住滅妄想虗偽此牒離心意識唯心直進觀察無始虗偽過此指無始根本無明妄想習氣因因指八識中二障種子三有思惟無所有觀三界本空佛地無生到自覺聖趣直觀無生可到自覺聖智自心自在到無開發行記曰此總結前文直指唯心方便也離二取執則心自在無開發方便唐譯云無功用行即無師智自然智也經云奇哉一切衆生具有如來智慧德相但以妄想執著而不證得若離妄想執著則無師智自然智當下現前故都云到如隨衆色摩尼隨入衆生微細之心而以化身隨心量度此摩尼喻牒上隨入如來身等諸地漸次相續建立此教之以度生儀軌是故大慧自悉檀善應當修學記曰此牒述觀益切勸修持也謂正修行菩薩欲速得如來法身證自覺聖智趣應當直觀一心本來清淨本自無生除一心外無片事可得如是觀時漸漸純熟則一念頓證不從外得則自利利他功備於此故先教唯心觀門此又總牒而叮嚀告誡切勸修持謂我此法施最善應當修學也經以佛語心為宗者正所謂如來藏自性清淨心也乃一切衆生本具足者但今迷之而隨染緣則煩惱生死三有之相從此而生若悟之而隨淨緣則菩提涅槃二轉依果依之而立是則煩惱菩提生死涅槃皆依迷悟染淨轉變之相耳故皆即狂勞顛倒華相而如來藏中本無此事故曰求於去來迷悟生死了不可得然吾人能達本無日用現前境界了不可得者可謂即到自覺聖智矣此佛祖從上所傳心印其密造自得工夫備載此章至其肯綮又在離心意識妄想境界一語而已故世尊反覆叮嚀告誡如此學者知此可謂不辜本有不負佛恩矣上特示正因竟上略明唯識以別邪正之因已竟下廣明八識以示識智之相
