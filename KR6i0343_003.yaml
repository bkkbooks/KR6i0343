body:
  text: 宋天竺三藏沙門求那跋陀羅譯明建鄴海印沙門釋德清筆記一切佛語心品第二之上前顯理中初明寂滅一心已竟次示如來藏性爾時大慧菩薩摩訶薩白佛言世尊世尊修多羅說如來藏自性清淨轉二譯皆作具三十二相入於一切衆生身中如大價寶垢衣所纏如來之藏常住不變亦復如是而陰界入垢衣所纏貪欲恚癡不實妄想塵勞所污一切諸佛之所演說云何世尊同外道說我言有如來藏耶世尊外道亦說有常作離者於求那周遍不滅世尊彼說有我記曰此將示如來藏性真常無我以破外道妄計神我故興此問也初云寂滅者名為一心一心者名如來藏然此藏體從本以來不與一切染法相應故云自性清淨諸佛證此號為菩提涅槃成三十二妙相衆生迷此以為生死煩惱作八萬四千塵勞是則衆生日用現證全是如來果德故云轉三十二相入一切衆生身中但為五陰垢蔽貪癡妄想所污故如大價寶而為垢衣所纏其實自性常住不變此是一切諸佛大乘了義究竟極談所謂常住一心法身真我者大慧因而疑之曰世尊向斥外道妄計神我謂是邪見今云有如來藏常住真我豈不同彼外道所說我耶然世尊說如來藏體常周遍離於自性不生不滅而外道亦說有常作者離於求那周遍不滅斯則彼所說我與佛無別且世尊前云空無生無二離自性相普入一切修多羅今云有如來藏義是聖教相違自語相違也然彼所計我其義有三一者體常名為作者二者雖在五陰而離於求那別有自性三者遍歷諸趣實非生滅其語雖似其義全非實是邪見故云學道之人不識真只為從前認識神無量劫來生死本癡兒認作本來人此經以破邪為用謂此邪見一破即名正智即可頓證一心故大慧於顯理究竟處置此一問佛告大慧我說如來藏不同外道所說之我大慧有時說空無相無願如實際法性法身涅槃離自性不生不滅本來寂靜自性涅槃如是等句說如來藏已如來應供等正覺為斷愚夫畏無我句故說離妄想無所有境界如來藏門大慧未來現在菩薩摩訶薩不應作我見計著記曰此言法本離言應機故有說以顯藏性無我也謂如來說法不同外道執一之論但順衆生所執之情隨宜而擊破之故為著有相希求者說三解脫為執假法者說如實際為執差別者說平等法性為執妄身者說法身為樂生死者說涅槃為認生滅為心性者說離自性不生不滅為厭囂喧者說本來寂靜為厭生死者說自性涅槃如是等句皆如來藏之異名故云如是等句說如來藏已為執四大假我及認神我者說無我其有愚夫聞說無我遂生恐怖故如來乃說離妄想無所有境界名如來藏自性清淨此亦隨順方便本無實法是故汝等當依於義莫著言說不應作我見計著向云三乘為權一乘為實今言法身涅槃如來藏名猶是方便建立所謂我大乘非乘以顯寂滅心源言思路絶真妄兩忘方為自覺聖智究竟處譬如陶家於一泥聚以人工水木輪繩方便作種種器如來亦復如是於法無我離一切妄想相以種種智慧善巧方便或說如來藏或說無我以是因緣故說如來藏不同外道所說之我是名說如來藏開引計我諸外道故說如來藏令離不實我見妄想入三解脫門境界希望疾得阿耨多羅三藐三菩提記曰此以喻顯法因機異也淨名云說法不有亦不無以因緣故諸法生故如陶家作器泥本是一隨緣故器異以況法本不異異自機耳故唐譯云如來亦爾於遠離一切分別相無我法中以種種智慧方便善巧或說如來藏或說為無我種種名字各有差別然種種智慧善巧方便者法華云諸佛智慧甚深無量其智慧門難解難入謂如來具有權實二智種種智慧乃一切種智根本實智也善巧方便後得權智也然如來以實智證理故法無不徹權智說法故機無不宜其所說法引導衆生皆悉到於一切智地故云如來為開引計我諸外道故說如來藏令離不實我見妄想入三解脫疾得無上菩提也豈同外道所說我耶三解脫者謂如來藏自性清淨故云空離一切相故云無相衆生性自具足不假外求故云無願舊引華嚴三解脫謂菩薩觀緣起而知自性空得空解脫觀十二有支自性滅得無相解脫入空無願求唯為教化衆生故得無願解脫然彼以觀言正意在行此以體言正意在理名同義別學者應知是故如來應供等正覺作如是說如來之藏若不如是則同外道是故大慧為離外道見故當依無我如來之藏記曰此結成正義誡令離過也謂如來說法乃以實相印印定諸法故隨其所說皆與實相不相違背外道無此法印故曰不如是則同外道噫如來無此法印則同外道痛令識法者懼如來藏乃佛性在纏之名謂衆生識藏乃如來也故云如來之藏依主釋爾時世尊欲重宣此義而說偈言人相續陰緣與微塵勝自在作心量妄想記曰此通頌無我也人相續陰緣乃凡夫所計五陰緣生假我微塵勝性大自在等乃外道所計神我此皆心量妄想分別其實本皆無我前從初卷分別自性章以來至此通約三門以辨邪正因果中初破邪顯正以示常住真理竟此下依理勘訂以辨邪正二行分四初總示正行之方分四初能觀之智有四爾時大慧菩薩摩訶薩觀未來衆生復請世尊惟願為說修行無間如諸菩薩摩訶薩修行者大方便記曰此正請行也前一往開示顯理業已究竟故大慧至此請行問曰前說唯心識觀聖智三相二無我觀等皆其行也何特指此為行耶答曰此經直指一心為頓教大乘謂生死即涅槃煩惱即菩提故約五法三自性八識二無我說如來藏隨染淨緣成世出世法以隨業愛無知染緣而起則如如正智即成名相妄想為實我實法故有生死若觀緣生無性即名相妄想為如如正智我法皆空即是涅槃唯此一心轉變更無別法前雖節節說觀乃世尊直指當機要令目前頓見諸法緣生無性頓悟無生乃借觀明心正在顯理今從生滅會歸一心真源顯理已極故大慧因前五無間種性故觀未來衆生亦有頓根可成熟者故此特請修行無間亦如前為諸菩薩所說修行大方便門令其頓悟前約觀顯理此因機設行故正在行也以依無間之理修無間之行因無間之行證無間之理唯此一心當下頓證故人法因果通云無間實此經之宗趣也佛告大慧菩薩摩訶薩成就四法得修行者大方便云何為四謂善分別自心現觀外性非性離生住滅見得自覺聖智善樂是名菩薩摩訶薩成就四法得修行者大方便記曰此正示行相能觀之智有四也未來之機非上根大智不能頓入唯心法門故云菩薩摩訶薩成就四法得修行者大方便故二十七祖囑達磨曰震旦衆生多有大乘根器汝當於彼度人無量是故鼻祖西來不立文字直指人心見性成佛故自曹溪而下傳燈所載皆成就四法得修行大方便者但有絲毫不透即為有間不足稱大方便矣云何菩薩摩訶薩善分別自心現謂如是觀三界唯心分齊離我我所無動搖離去來無始虗僞習氣所熏三界種種色行繫縛身財建立妄想隨入現是名菩薩摩訶薩善分別自心現記曰此釋四法中初句義也謂觀三界諸法唯是一心離我我所本無動作去來之相但以無始虗僞執著習氣所熏故三界種種色行繫縛身財住處隨妄想分別之所顯現唐譯云色行名言繫縛謂三界但以名言為體若了妄想無性則三界頓空此當空觀義也云何菩薩摩訶薩善觀外性非性謂焰夢等一切性無始虗僞妄想習因觀一切性自性菩薩摩訶薩作如是善觀外性非性唐譯云如是觀察一切法時即是專求自證聖智是名菩薩摩訶薩善觀外性非性記曰此釋次句義也由觀三界一切諸法既唯心所現則雖有而不實當體虗假如焰夢毛輪等本自非有但因妄想習氣故有由妄想無性則一切法皆無性矣無性故假此當假觀義也云何菩薩摩訶薩善離生住滅見謂如幻夢一切性自他俱性不生隨入自心分齊故見外性非性見識不生及緣不積聚見妄想緣生於三界內外一切法不可得見離自性生見悉滅知如幻等諸法自性得無生法忍得無生法忍已離生住滅見是名菩薩摩訶薩善分別離生住滅見記曰此釋第三句義也以心境對待故生滅之見不忘良以心本無生因境有今觀一切境界如幻夢不實則諸法當體不生以唯心現故不生既唯心現則外境頓空他不生也外境既空則內識不起故云見識不生自不生也既無當心之境亦無了境之心當體無生又何因緣而能生耶故云緣不積聚不共生也由三界諸法皆從緣起故云見妄想緣生故非無因生也今觀因緣體空則三界內外一切諸法皆不可得以了諸法無實體故生見悉滅則證如幻境界得無生法忍離生滅見生滅既滅寂滅現前此當中道義也中觀曰因緣所生法我說即是空亦名為假名亦名中道義此但直觀諸法唯自心現緣生無性頓證無生約義而言以例三觀非若他經所明歷別次第比也上三句屬因下句屬果以意生身因上三觀而證得故云何菩薩摩訶薩得自覺聖智善樂謂得無生法忍住第八菩薩地得離心意意識五法自性二無我相得意生身記曰此釋第四句圓成一心自覺聖智義也謂八地以前未離心意識猶屬對治生滅境界及得無生法忍住八地已上五法三自性八識二無我一切俱離所謂生滅滅已寂滅為樂故云得自覺聖智善樂以無生無不生故得意生身身土自他無障無礙世尊意生身者何因緣佛告大慧意生身者譬如意去迅疾無礙故名意生譬如意去石壁無礙於彼異方無量由延因先所見憶念不忘自心流注不絶於身無障礙生大慧如是意生身得一時俱菩薩摩訶薩意生身如幻三昧力自在神通妙相莊嚴聖種類身一時俱生猶如意生無有障礙隨所憶念本願境界為成就衆生得自覺聖智善樂記曰此釋行成得果之相也唐譯云譬如心意於無量百千由旬之外憶先所見種種諸物念念相續疾詣於彼非是其身及山河石壁所能為礙意生身者亦復如是如幻三昧力通自在諸相莊嚴憶本成就衆生願故猶如意去生於一切諸聖衆中前二無我中見法無我住灌頂位超佛子地當得如來自在法身及唯心觀成并聖智三相等節節皆明此義如是菩薩摩訶薩得無生法忍住第八菩薩地轉捨心意意識五法自性二無我相身及得意生身得自覺聖智善樂是名菩薩摩訶薩成就四法得修行者大方便當如是學記曰此結勸修也華嚴九地聖人現十界身說法度生莊嚴佛土承事諸佛作大佛事所謂得意生身也此言八地得者以彼約行布斷證謂由八地斷俱生我執已證平等真如著三昧樂能捨三昧樂發度生願故能現十界身說法度生如意自在名意生身故九地方得此約頓機但能一念頓證無生離心意意識境界從凡夫位即入佛境界對位正當八地耳非言漸斷漸證依次而至也故下文云初地即為八無所有何次所謂得諸法正性者不從一地至於一地此但約通相言之耳所謂頓悟一心頓登佛地雖云諸地乃借位以示悟有淺深非是實有階級次第也古德云聖諦亦不為何階級之有次示所破之惑有二初明緣生無性破依他起爾時大慧菩薩摩訶薩復請世尊惟願為說一切諸法緣因之相以覺緣因相故我及諸菩薩離一切性有無妄見無妄想見漸次俱生記曰此躡跡問以明迷悟因依廣釋上修行者大方便也然修行之要唯了依他遍計本無圓成實有而已故此先明緣生無性以破依他起性由外道不達諸法依如來藏若生若滅乃妄計一切衆生世界從我流出謂之頓生妄計冥初生覺從覺生我心等二十五冥諦謂之漸生由此有無二見皆依他起者故世尊從前一往說諸法從因緣生以緣生無性故說無生破彼妄計大慧雖領其旨將謂實有因緣之相但不知因緣之相何如意謂若明達因緣之相則不於諸法起有無二見及執頓生漸生也故興此問向下答意先示因緣之相後示因緣亦無問曰前顯理行因果已周真妄之辨已徹何以復於因緣起疑耶答曰良有以也此經頓教大乘以一心為宗斷疑破執摧邪顯正為用以直觀一心頓斷根本煩惱頓證無生立登佛地故然根本煩惱有六謂貪嗔癡慢疑邪見然貪嗔癡本是如來三德祕藏為一切衆生本有佛性有情皆具但慢疑邪見二乘外道居多以疑謗正法橫生邪見未得謂得未證謂證故與正法相抗違背正覺是以最為堅執梗化者世尊四十年來多方彈斥至此根機已熟故頓拔疑根力摧邪見令其正信一發即可頓證無生所謂疑悔永已盡安住實智中是故此經專一斷疑破邪以顯自覺聖智所以已蒙究竟開示而復躡跡重重伸疑致難者直令行人纖疑盡淨方能的信自心更不向外馳求耳故從上諸祖乃的信自心到不疑之地者非此外別有方便也此後終篇大旨槩不出此佛告大慧一切法二種緣相謂外及內外緣者謂泥團柱輪繩水木人工諸方便緣有瓶生如泥瓶縷㲲草席種芽酥酪等方便緣生亦復如是是名外緣前後轉生記曰此示外緣相也親能生起為因疏能助起為緣一切諸法未有不從緣生者且如泥團為因柱輪繩水木人工為緣而成於瓶為果至若縷草種酥為因㲲席芽酪為果以類諸法皆然緣生之法必先因後果展轉而生故云前後轉生內外者內即根身外即器界云何內緣謂無明愛業等法得緣名從彼生陰界入法得緣所起名彼無差別而愚夫妄想是名內緣法記曰此示內緣相也謂從無明愛業等十二因緣立緣之名從緣而生陰界入法得緣所起之名雖有三世因果了無差別但是愚夫妄想分別見耳此即示緣生無性義也大慧彼因者有六種謂當有因相續因相因作因顯示因待因當有因者作因已內外法生記曰此示因相也因即是緣以心境互為緣起故但約生起義為因助起義為緣耳唐譯云謂內外法作因生果以一念起處即作生死因必有當來果故為當有因作即生起此當因緣義也若了生本無生則無涯生死頓斷相續因者作攀緣已內外法生陰種子等記曰此當所緣緣義也唐譯云謂內外法作所緣生果蘊種子等謂若根若境通為所緣而起憎愛取著能致後有生死不斷故云相續因相因者作無間相相續生記曰此當等無間緣義也唐譯云作無間相生相續果以妄想不斷因果相續故名無間作因者作增上事如轉輪王記曰此當增上緣義也唐譯云謂作增上事而生於果謂單境不能生果必假心為增上以心是境之增上緣故如轉輪王於受用境變現自在顯示因者妄想事生已相現作所作如燈照色等記曰此當分別緣義也魏譯云了因唐譯云顯了因謂分別生能顯境相如燈照物所謂境緣無好醜好醜起於心若一心不生則萬法俱寂故一切法但以分別為因楞嚴八還中分別緣即此義也以上四因心境合會作業成就到此則分別顯了因果歷然故云了因也待因者滅時作相續斷不妄想性生記曰此無想斷滅因也謂無想外道心慮灰凝於妄想滅處遂作相續已斷而生無妄想見以此為因感無想報以待滅為因故云待因論中無此以此經正在摧邪故特出此因然此六因真妄皆具聖凡齊稟以法界所宗不離緣起故良由不達緣起妄執諸法實有自性故成偏邪但名妄想若了緣生無性則法本無生真妄皆空聖凡齊泯即是自覺聖智且此因緣諸法盡屬生滅意顯本不生義不屬因緣故下云漸頓俱非以示真無生義大慧彼自妄想相愚夫不漸次生不俱生記曰此明本不生也唐譯云此是愚夫自所分別非漸次生亦非頓生所以者何若復俱生者作所作無分別不得因相故若漸次生者不得相我故漸次生不生如不生子無父名記曰此徵釋無生義也謂諸法不一時頓生亦非漸生若頓生者則不分能所先後無因果相若漸生者未得果相何言因生如未有子何以名父故魏譯云若一切法一時生者因果不可差別以不見因果身相故若次第生者未得身相不得言次第生如未有子云何名父未得身相者單言未得果相不得言因也大慧漸次生相續方便不然但妄想耳因攀緣次第增上緣等生所生故大慧漸次生不生妄想自性計著相故記曰此明法本離緣但妄計因緣相也謂諸法當體寂滅本自無生若言因因緣而生諸法者皆妄想分別耳故魏譯云愚癡凡夫自心觀察次第相續不相應故作如是言因緣次第緣緣緣增上緣等能生諸法大慧如是次第諸法不生虗妄分別取法體相唐譯云諸計度人言以因緣所緣緣無間緣增上緣等所生能生互相繫屬次第生者理不得成皆是妄情執著相故言因攀緣等者謂親能生起者曰因緣心取外色等塵曰攀緣即所緣緣內外法更互轉生相續無間曰次第緣即等無間緣心是境之增上緣識論廣明但名同義別以此明緣生諸法彼論識具緣相耳漸次俱不生自心現受用故自相共相外性非性大慧漸次俱不生除自心現不覺妄想故相生是故因緣作事方便相當離漸次俱見記曰此結示法本無生不可作因緣見也何以諸法頓漸不生以一切法唯心現故既唯心現則心外無法無可生者以自共相皆無自性故既無自性則誰為生者故皆不生但除妄識分別為有生耳其實無生唐譯云漸次與頓皆悉不生但自心現身資等故外自共相皆無性故唯除識起自分別見大慧是故應離因緣所作和合相中頓漸生見爾時世尊欲重宣此義而說偈言一切都無生亦無因緣滅於彼生滅中而起因緣想非遮滅復生相續因緣起唯為斷凡愚癡惑妄想緣有無緣起法是悉無有生習氣所迷轉從是三有現記曰此頌法無生滅本自離緣也初一偈謂一切法本無生滅但諸凡愚於無生中妄見生滅而起因緣之想次一偈半妨難難曰向因凡愚妄執諸法滅而復生故世尊說因緣相以遮遣之今者何言因緣亦無耶故偈答曰非是遮彼滅而復生者而說因緣但假以因緣名字以破彼凡愚妄想耳亦非實有因緣之相為彼生法也況一切有無緣起之法盡是無生豈有因緣之相耶末半偈又通難難曰既無因緣今此三界從何而起答曰但從衆生習氣迷轉乃自妄見三界之相耳故云習氣所迷轉從是三有現真實無生緣亦復無有滅觀一切有為猶如虗空華攝受及所攝捨離惑亂見非已生當生亦復無因緣一切無所有斯皆是言說記曰此頌正顯實義也謂一切生滅因緣有為諸法盡屬虗妄之見真實本來無有生滅但見一切有為之法如空中華遠離能取所取一切妄見則頓見諸法本無已生當生而彼一切因緣和合之相皆是言說非實法也始因凡愚妄執異因能生諸法起有無斷常二見故世尊先示因緣生法破彼無因令觀諸法緣生無性了悟無生今無生之理既彰真實之義已顯故此特示本無生滅不假因緣以但有言說都無實義故斯則直指一心真源以顯究竟第一義諦離名字相離心緣相離言說相也觀者應知上明緣生無性破依他起竟下明妄想無性破遍計執爾時大慧菩薩摩訶薩復白佛言世尊惟願為說言說妄想相心經世尊我及餘菩薩摩訶薩若善知言說妄想相心經二譯皆心法門則能通達言說所說二種義疾得阿耨多羅三藐三菩提以言說所說二種趣淨一切衆生記曰此亦躡跡伸疑致問以明妄想無性以破遍計執也由初卷末云當依於義莫著言說意謂言說是妄想相且所說能顯第一義既能顯第一義何以名妄想耶故此請問言說妄想相及所說第一義若能通達此二種義則遠離遍計亦可以此法門淨治衆生也佛告大慧諦聽諦聽善思念之當為汝說大慧白佛言善哉世尊唯然受教佛告大慧有四種言說妄想相謂相言說夢言說過妄想計著言說無始妄想言說相言說者從自妄想色相計著生夢言說者先所經境界隨憶念生從覺已境界無性生唐譯云謂夢先所經境界覺已憶念依不實境生過妄想計著言說者先怨所作業隨憶念生唐譯云謂憶念怨讐先所作業生過即過惡無始妄想言說者無始虗僞計著過自種習氣生唐譯云以無始戲論妄執習氣生是名四種言說妄想相記曰此示言說妄想相也謂妄見男女身分顏貌好醜及一切資生器物美惡等相妄起分別而有言說名相言說夢先所經境界覺已憶念妄計分別吉凶美惡等名夢言說憶想自他冤親愛憎等先所作業妄生分別而有言說名過妄想計著言說無始時來八識含藏自類戲論種子習氣猛然鼓發故生分別名無始妄想言說一切言說不出此四以妄想為言說因故離此四外則無言說無言說處即第一義諦非言說能顯第一義諦也爾時大慧菩薩摩訶薩復以此義勸請世尊惟願更說言說妄想所現境界世尊何處何故云何何因衆生妄想言說生魏譯云惟願為我重說四種虗妄執著言語之相衆生言語何處出云何出何因出唐譯云願更為說言語分別所行之相佛告大慧頭胸喉鼻唇舌齗齒和合出音聲唐譯云依頭胸喉鼻唇齶齒舌和合而起記曰此示言語因緣相也謂衆生言語所出以前四妄想為因此頭胸等八種為緣故有言說老氏所謂天地之間其猶槖籥乎虗而不屈動而愈出此所謂妄想緣氣識風鼓扇無故而出者故無謂耳以此觀言語相則音聲體空本不有也衆生語言如此至若佛之言說如天鼓音故其說法有六十四種梵音特非妄想比也大慧白佛言世尊言說妄想為異為不異佛告大慧言說妄想非異非不異所以者何謂彼因生相故大慧若言說妄想異者妄想不應是因若不異者語不顯義而有顯示是故非異非不異記曰此示言語妄想二皆性空義也謂妄想言說若各有自性則為定異若不待因生無所顯示則為定一今言語既因妄想而生非定異也言語但是音聲相以音聲質直無文如風鼓竅無所顯示由妄想力屈曲雜出有所顯示能所歷然非定一也以非一非異二皆性空故都無實義大慧復白佛言世尊為言說即是第一義為所說者是第一義佛告大慧非言說是第一義亦非所說是第一義所以者何謂第一義聖樂言說所入是第一義非言說是第一義記曰此示第一義諦離言說相也大慧意謂凡夫由妄想言說既能顯示世俗諦而聖人亦以言說顯示第一義諦今妄想言說既非一非異一知聖言量與第一義是異不異故問云為言說即是第一義是不異也為所說是第一義非不異也佛答謂異與不異二者皆非唐譯云何以故以第一義是聖樂處因言而入非即是言聖樂處者乃諸佛自受用境界離心意識非言說可到而言說第一義者如標月指耳如指但能標月不能到月因指觀月月非指也故云言說所入是第一義非言說是第一義第一義者聖智自覺所得非言說妄想覺境界是故言說妄想不顯示第一義記曰此明言說不但非第一義而亦不能顯第一義伸明第一義諦離言說相也以第一義乃聖智自覺所得境界非言說妄想覺境界而言說妄想豈能顯示以但有言說都無實義故教外別傳之旨舉心即錯動念即乖言語道斷心行處滅能所兩忘心境雙絶唯證相應豈妄想言說分別可到言說者生滅動搖展轉因緣起若展轉因緣起者彼不顯示第一義大慧自他相無性故言說相不顯示第一義唐譯云第一義者無自他相言語有相不能顯示復次大慧隨入自心現量故種種相外性非性言說妄想不顯示第一義唐譯云第一義者但唯自心種種外相悉皆無有言語分別不能顯示是故大慧當離言說諸妄想相記曰此重明言說不能顯示第一義諦之所以也然言說畢竟不能顯示第一義者有三義故以第一義者不生不滅湛然常寂不動不搖不屬因緣和合所起豈彼生滅動搖因緣所起言語之相而能顯示耶第一義者超然絶待無自他相豈彼自他對待言語之相而能顯示耶第一義者但唯自心現量境界永離一切種種外相豈彼妄想心外取法分別語言而能顯示耶由此三義所以言說畢竟不能顯示第一義諦是故結勸若觀第一義當離言說諸妄想相方許可入所謂離心意識參離妄想境界求方有少分相應耳是故前云當依於義莫著言說故世尊一日升座文殊白槌云諦觀法王法法王法如是爾時世尊欲重宣此義而說偈言諸性無自性亦復無言說甚深空空義愚夫不能了一切性自性言說法如影自覺聖智子實際我所說記曰此頌直顯離言方為實際以洗行人名言習氣方能實證也然此偈稍略唐譯云諸法無自性亦復無言說不見空空義愚夫故流轉一切法無性離言說分別諸有如夢化非生死涅槃如王及長者為令諸子喜先賜相似物後賜真實者我今亦復然先說相似法後乃為其演自證實際法觀此王及長者之喻足徵楞伽已往四十年中所說諸法皆相似語未顯真實既經淘汰多方根機已熟方說自證真實離言之道正法華所謂先以三車引導諸子然後等賜大白牛車寶物莊嚴令其馳騁遊戲快樂此聖人說法之儀式也問曰諸判教者但云法華開權顯實而未聞言此經預為開顯何以會通答曰諸佛以一大事因緣故出現於世所謂欲令衆生開示悟入佛知見故佛知見者即所謂唯心現量自覺聖智乃一切衆生本具如來藏心真實佛性義也唯此一事更無餘事諸佛聖人因此緣此出現世間故所說法從始洎終直為開顯此一事耳向以衆生德薄垢重不敢頓示恐彼驚疑不信返致謗法之愆故大慈隱忍但以駢拇枝指及至衆志貞純方堪說實故此經頓示如來藏心自覺聖智若有悟此心者一念頓登佛地不勞多劫修行此所謂頓教法門也為欲革彼三乘漸弊故云頓教大乘然為法華前象故預為開顯聖人說法始終一貫前後相須故有祕密不定之教且所說法雖有多種大約不出理行因果四法而已各有權實此四各歸其極入於一實則聖人之能事畢矣然四十年中所說之法不離心境對待能所真妄生死涅槃故其聞者將為實法未捨名言習氣終在門外止宿草菴至於此經則徹底掀翻打破窠窟一切俱離頓示一心自覺聖智此則顯理已極然而所開顯者乃開除三乘之權理以顯一乘之實理也以此實理正智將為真因所謂以不生滅心為本修因者是已至於法華則藉此真智為因以資妙行故一華一香舉首低頭合掌稱名皆成佛道是以真行契真果然所開顯者乃開除三乘之權行以顯一乘之實行也以此實行冀登實果故三乘人一一授記歷事多佛方成佛道若非借此真因從使再經塵劫將恐終滯化城耳二經宗趣雖異理實冥符至於楞嚴則理行因果一一皆真乃是通會前權都歸一實三乘統收五性齊入融會一代人法理行因果總入如來妙莊嚴海此尤見如來說法始終一貫也觀者若不明此通途說法儀式縱悟自心亦不能開示童蒙所謂宗通說不通如日被雲籠亦不詣究竟實際以未達如來本懷故也因便及此觀者勿厭其繁上明妄想無性破遍計執已竟下明心境俱亡以顯圓成爾時大慧菩薩摩訶薩復白佛言世尊惟願為說離一異俱不俱有無非有非無常無常一切外道所不行自覺聖智所行離妄想自相共相入於第一真實之義記曰此亦躡跡致問將明心境俱亡以顯圓成實性也由初卷佛斥外道不達諸法無性妄於第一義作有無斷常二見執定一定異俱不俱等四句論乃是愚癡妄想所行境界非自覺聖智境界故依他偏計斯興圓成不顯今大慧聞說第一義諦離言說相離心緣相是則言語道斷心行處滅四句既離百非俱遣此非外道境界乃自覺聖智所行境界也但不知離四句外聖智境界究竟何如意若了此則二性頓祛圓成實顯即可入於第一真實之義故特興此問以明成自性也諸地相續漸次上上增進清淨之相隨入如來地相無開發本願唐譯云以無功用本願力故譬如衆色摩尼境界無邊相行魏譯云如如意寶無量境界修行之相自然行故自心現趣部分之相一切諸法唐譯云一切諸法皆是自心所現差別我及餘菩薩摩訶薩離如是等妄想自性自共相見疾得阿耨多羅三藐三菩提令一切衆生一切安樂具足充滿記曰此敘因法獲益所以致問之意也謂若得了達離四句義入法真實則可漸增諸地以致入如來地以無功用行成就衆生如摩尼寶隨心變現普應一切悟唯心境不獨離外道見抑離二乘於陰界入作自相共相妄想見也斯則少施功用疾得菩提自利利他法利充滿有此大益所以請問佛告大慧善哉善哉汝能問我如是之義多所安樂多所饒益哀愍一切諸天世人佛告大慧諦聽諦聽善思念之吾當為汝分別解說大慧白佛言善哉世尊唯然受教佛告大慧不知心量愚癡凡夫取內外性依於一異俱不俱有無非有非無常無常自性習因計著妄想記曰大慧請問離四句外別求聖智所行境界將謂實有四句可離實有聖智可得佛所答意謂本無四句可離亦無聖智可得何者以第一義妄真雙絶故且四句者蓋由愚癡凡夫不達唯心所現如夢境界妄取內外一切諸法實有自性故妄生分別一異等見此乃戲論習氣為因妄生計著耳非是實有四句也良以心境如空無所依然所分別境界既無而能分別妄心何有苟一心不生則萬法自寂豈實有四句可離但盡凡情別無聖解若生聖解即墮凡情故亦無聖智可得故唐譯結云當於聖智所證法中離生住滅一異等一切分別到此境界言思路絶方為極則故僧問馬大師離四句絶百非請師直指某甲西來意師云今日頭痛不能為汝說文殊問維摩居士不二法門士默然故世尊向下所答但以十二譬喻借以發明前七喻喻境界本無愚者妄生分別顯妄想非有以明本無四句可離後五喻喻佛說法應機施設本為破著如以楔出楔元無實法與人故偈云言教唯假名彼亦無有相以明亦無聖智可得然此章所喻雖若顯而易見其實深而難明觀者須善體會務契佛心所謂承言須會宗勿自立規矩智者深觀之譬如羣鹿為渴所逼見春時𦦨而作水想迷亂馳趣不知非水如是愚夫無始虗僞妄想所熏習三毒燒心樂色境界見生住滅取內外性墮於一異俱不俱有無非有非無常無常想妄見攝受記曰此喻通顯境本無生因心分別而執取也夫陽𦦨本非是水以羣鹿渴逼而作水想妄生奔逐而不知本非水也以況一切境界本自無生亦無可欲以愚夫無始貪愛種子習氣內熏三毒外發現行渴愛所逼於一切色境妄起貪求樂欲是於無生中妄見生滅執取根身器界內外諸法妄起一異常無常等四句妄見而不知本自無生此乃妄想攝受非正見也如犍闥婆城凡愚無智而起城想無始習氣計著相現唐譯云無智之人無始時來執著城種妄熏習故而作城想彼非有城非無城如是外道無始虗僞習氣計著依於一異俱不俱有無非有非無常無常見不能了知自心現量記曰此喻轉釋上意也謂彼愚夫所以於非可欲中妄生貪著而作四句分別者以不知一切境界唯心所現故所謂自心取自心非幻成幻法譬如有人夢見男女象馬車步城邑園林山河浴池種種莊嚴自身入中覺已憶念大慧於意云何如是士夫於前所夢憶念不捨為黠慧不大慧白佛言不也世尊佛告大慧如是凡夫惡見所噬外道智慧不知如夢自心現性依於一異俱不俱有無非有非無常無常見記曰此喻總釋上意也謂外道不知自心所現如夢境界妄生執取貪著追求於此橫起分別一異等見所以為愚癡惡見非黠慧也譬如畫像不高不下而彼凡愚作高下想如是未來外道惡見習氣充滿依於一異俱不俱有無非有非無常無常見自壞壞他餘唐譯作於離有無無生之論亦說言無魏譯云而彼外道自壞壞他說如是言諸法不生不滅有無寂靜彼人名為不正見者唐譯云於離有無無生之論亦說為無謗因果見拔善根本壞清淨因勝求者二譯俱作欲求勝法當遠離去作如是說彼墮自他俱見有無妄想已墮建立誹謗以是惡見當墮地獄記曰此喻外道邪慢固執惡見返謗正法撥無因果切誡行人當痛絶之也心如工畫師畫出諸形像一切諸法唯心所現當體寂滅無生無有高下而彼外道自恃生滅惡見矜己為高返於佛法離有無無生之論謗言為無此謗因果拔善根本壞清淨因應知此人墮自他有無妄想落斷常二見以是惡見當墮地獄故誡行人欲求勝法者當速遠離之譬如翳目見有垂髮謂衆人言汝等觀此而是垂髮畢竟非性非無性見不見故魏譯云譬如翳目見虗空中有於毛輪為他說言如是如是青黃赤白汝何不觀大慧而彼毛輪本自無體何以故有見不見故如是外道妄見希望依於一異俱不俱有無非有非無常無常見誹謗正法自陷陷他記曰此喻釋上自壞壞他義也謂彼外道自恃邪見轉教他人同己正如翳目自見空中毛輪返責他人不同己見也然空中毛輪唯病目者見好眼不見以況一異有無四句但邪見所執正見則離且彼外道猶然堅執自是非他誹謗正法展轉教人所謂從本以來成事相承熏習成化自陷陷他為法大害所以切誡行人當速遠離意謂不但不親其人抑且不可作實有四句見故以垂髮比之譬如火輪非輪愚夫輪想非有智者如是外道惡見希望依於一異俱不俱有無非有非無常無常想一切性生記曰此喻釋本無四句義也旋火非輪但愚夫妄作輪想以況法無四句但外道邪執妄起四計耳故云一切性生永嘉云一切數句非數句與吾靈覺何交涉譬如水泡似摩尼珠愚小無智作摩尼想計著追逐而彼水泡非摩尼非非摩尼取不取故如是外道惡見妄想習氣所熏於無所有說有生緣有者言滅記曰此喻外道妄執四句因果非真也水泡但似摩尼實非摩尼而愚小無智者遂取為真智人明見則不取也以況外道四句但似一似常實非真常之道由彼無智執妄為真若了唯心現量者則不取也故云取不取故然彼但為妄習所熏乃於無生中妄見有生故云於無所有說有生於緣生諸法復執斷滅壞於因緣故云緣有者說為滅由是妄作四句橫論且因非真因果非真果妄執不真為真故若小兒認水泡作摩尼想也然彼四句但妄想耳若了妄想無性則四句體空無可離者故前七喻通明無四句可離復次大慧有三種量五分論各建立已得聖智自覺離二自性事而作有性妄想計著記曰此下明亦無聖智可得也唐譯云立三種量已於聖智內證離二自性法起有性分別魏譯云而作是言實有聖者內證之法離二自性虗妄分別故世尊意責大慧謂我已為汝等立三種量五分論楷定是非令捨邪執矣何以至此又於自證聖智離二自性法中復起實有聖智可得之見耶若聖智實有自性可得亦是妄見故論云現前立少物謂是唯識性以有所得故非實住唯識謂若絲毫見處不忘猶是生死岸頭事必若無智無得方為究竟耳三量者謂現量比量聖言量也現量者現即顯現謂分明證境不帶名言無籌度心親得法體離妄分別而非錯謬故名現量比量者比即比類謂以因由譬喻比類量度而得知故比量有三支聖言量者謂以如來聖教為準繩故五分論者即宗因喻三支并合結為五分具載因明論言已有三量五分建立者即指前初卷一往所說總不出三量五分也如所云自心現自覺聖智等皆現量也所云如幻水月光影空華及微塵泥團瓶等以喻發明皆比量也所云一切諸佛如來皆先權後實及法佛報佛化佛說法云云等者皆聖言量此皆三量建立也所云我以如來藏第一義心為宗外道以神我勝性等為宗皆宗也我以第一義自覺聖智等為因彼以無始虗妄習氣種子為因及作無作生無生常無常等皆因也如虗空佛骨及蕉芽破瓶等皆喻也此三支就中自有合結之文皆五分論故云建立已以佛說法不出三量五分為楷式故大慧心意意識身心轉變自心現攝所攝諸妄想斷如來地自覺聖智修行者不於彼作性非性想唐譯云諸修行者轉心意識離能所取住如來地自證聖法於有及無不起於想若復修行者如是境界性非性攝取相生者彼即取長養及取我人唐譯云諸修行者若於境界起有無執則著我人衆生壽者大慧若說彼性自性自共相一切皆是化佛所說非法佛說又諸言說悉由愚夫希望見生不為別建立趣自性法得聖智自覺三昧樂住者分別顯示記曰此責大慧不應於自證聖智法中起有無見以明本無聖智可得也謂諸修行人既轉心意識離能所取安住如來自證境界豈可復於彼自覺聖智中作有無想耶若於此中起有無執者則為著我人衆生壽者見矣所謂存我覺我俱名障礙正如圓覺所明微細四相由存證悟未忘能所故若說彼性自性下妨轉難也謂轉難言真如自性涅槃證得佛種緣起等皆是佛說何以今言無智可得世尊答言若說彼自證聖智法中實有自性以待緣生者此乃化佛所說非法佛說然化佛作如是說者亦非本懷蓋為衆生愚癡希望有所證得取以為果方肯趣進若說無我無智無得則生恐怖故不得已而隨順機宜方便施設本非實法故云悉由愚夫希望見生不是為發心趣進自性法修如實行得自覺聖智三昧樂住上上根人分別顯示也意謂今此頓教大乘特為上上根人頓示離心意識自覺聖智境界乃法佛所說真實之法豈得執彼權說希望證得耶問曰真如法性何所亦言自相共相答曰諸法自體唯智證知言說不及當體如如是謂自相若法體性言說所及假智所緣不得自相是為共相今此頓教大乘宗中頓為顯示第一義心離言說相唯有自相體都無共相體自相唯現量得故云為趣自性法得聖智自覺三昧樂住者分別顯示問曰化佛所說自相共相何也答曰化佛說真如自性凝然不變謂之自相隨染淨緣成一切世出世法謂之共相今大慧將謂實有聖智可得者正執緣因佛性待緣而顯有所證得故也譬如水中有樹影現彼非影非非影非樹形非非樹形如是外道見習所熏妄想計著依於一異俱不俱有無非有非無常無常想而不能知自心現量記曰此下五喻以顯本無聖智可得也此喻佛現身如水中影水喻衆生心樹喻佛法身菩提身願身良以法身非身乘願力現故衆生心水淨菩提影現中言其所現原是衆生本有法身自心現量以感應道交不可思議但是一心故影樹俱非外道不達唯心所現故妄執一異等見譬如明鏡隨緣顯現一切色像而無妄想彼非像非非像而見像非像妄想愚夫而作像想如是外道惡見自心像現妄想計著依於一異俱不俱有無非有非無常無常見記曰此喻佛無心應物隨緣成事應機差別如鏡現像魏譯云有緣得見無緣不見故譬如風水和合出聲彼非性非非性如是外道惡見妄想依於一異俱不俱有無非有非無常無常見記曰此喻佛說法乃緣擊而發如風水和合而後有聲故一切聲教本無實法愚者妄以為實故唐譯云譬如谷響譬如大地無草木處熱𦦨川流洪浪雲湧唐譯云日光照觸焰水波動彼非性非非性貪無貪故如是愚夫無始虗僞習氣所熏妄想計著依生住滅一異俱不俱有無非有非無常無常緣自住事門亦復如彼熱𦦨波浪記曰此喻從無住本立一切法故如大地無草木處熱焰川流洪浪雲湧然法性無生於無生法妄見生滅故唐譯云於聖智自證法性門中見生住滅一異有無俱不俱等譬如有人呪術機發以非衆生數唐譯云機關木人無衆生體毗舍闍鬼方便合成動搖云為毗舍闍此云啖精氣唐言顛鬼凡愚妄想計著往來如是外道惡見希望依於一異俱不俱有無非有非無常無常見戲論計著不實建立記曰此喻佛身非身但以無作妙力成就衆生本無去來出沒之相凡愚不了妄以為實大慧是故欲得自覺聖智事當離生住滅一異俱不俱有無非有非無常無常等惡見妄想記曰此結觀行人當離如上一異等四句惡見妄想自然得入自覺聖智也良以衆生如佛如一如無二如若觀三界五蘊虗幻不實當體如如即是自覺聖智若於自證聖智法性門中起佛見法見分別一異等即墮外道邪見以於寂滅一心所現境界起四句見但妄想耳非實法也故本無四句可離苟一念不生情忘執謝本自如如所謂但盡凡情別無聖解故亦無聖智可得到此凡情聖解一齊蕩盡方為自覺聖智究竟事但有絲毫見處不忘即墮外道惡見然外道有三種不同一佛法外外道二附佛法外道三學佛法成外道一外外道者本源有三種一迦毗羅此云黃頭計因中有果二漚樓僧佉此云休睺計因中無果三勒沙婆此云苦行計因中亦有果亦無果又入大乘論云迦毗羅有計一過謂作與作者一相與相者一如是等名為計一漚樓僧佉計異迦樓鳩馱計亦一亦異若提子計非一非異一切外道異計皆不離此四從此派出枝流至佛出時有六大師一富蘭那迦葉計不生不滅此常見也二末伽梨拘賒梨子計衆生苦樂無有因緣自然而爾此斷見也三那闍夜毗羅胝子計衆生時熟得道縷丸數極四阿耆多翅舍欽婆羅計罪報之苦以投巖拔髮代之五迦羅鳩䭾迦旃延計亦有亦無六尼犍陀若提子計業所作定不可改總之不出有無斷常二見此佛法外外道也二附佛法外道者起自犢子方廣道人自以聰明讀佛經書別生一見附佛法起故得此名犢子讀舍利弗毗曇自制別義言我在四句外不可說藏中云何四句外道計即色是我離色是我色中有我我中有色四陰亦如是合二十身見大論破二十身見成須陀洹即此義也今犢子計我異於六師又非佛法諸論皆推不受便是附佛法邪人法也三學佛法成外道者謂執佛教門而生煩惱不得入理大論云若不得般若方便入阿毗曇即墮有中入空即墮無中入毗勒墮亦有亦無中中論云執非有非無名愚癡論倒執正法還成邪人故學摩訶衍四門不得般若意即墮四謗為邪火所燒還成邪人法故小乘執假實二邊大乘執空有二邊小乘執心外有法是著有大乘撥菩提涅槃悉無是著空故為學佛法成外道見也總皆不達唯心現量境界故妄起斯計今經摧邪顯正一切併破故前段七喻破外外道并附佛法外道四計以顯自覺聖智本無四句可離後五喻以破學佛法成外道以證寂滅一心故無聖智可得若諸見消亡一心自顯觀者應知勿厭其煩爾時世尊欲重宣此義而說偈言幻夢水樹影垂髮熱時𦦨如是觀三有究竟得解脫譬如鹿渴想動轉迷亂心鹿想謂為水而實無水事如是識種子動靜見境界愚夫妄想生如為翳所翳於無始生死計著攝受性如逆楔出楔捨離貪攝受如幻呪機發浮雲夢電光觀是得解脫永斷三相續於彼無有作猶如𦦨虗空唐譯云如空中陽焰如是知諸法則為無所知記曰此通用諸喻先頌本無四句可離也魏唐二譯皆先舉五蘊後舉三界不實如影如幻等蓋謂衆生於一五蘊身心不能了達如影如幻妄計為實故於三界生死不能解脫然五蘊諸法本自無生今於無生中妄見生滅故譬如渴鹿於無水處妄作水想如是衆生皆由業識種子習氣熏發故凡夫妄見生死外道二乘妄見涅槃故云動靜見境界斯皆愚夫妄想所生猶如翳目妄見空華故於無始生死妄計執取將謂實有自性故起一異有無斷常等四句惡見世尊愍彼羣迷說離四句法破彼貪著之心如逆楔出楔故令捨離貪攝受非是實有四句可離也然彼諸法本無有作亦非實事故如幻呪機發浮雲夢電陽𦦨而已所謂生死涅槃猶如昨夢若能作如是觀則諸法當體寂滅了無生死涅槃之相故云如是知諸法則為無所知由無所知則諸見自亡四句頓遣即名自覺聖智言教唯假名彼亦無有相於彼起妄想陰行如垂髮如畫垂髮幻夢犍闥婆城火輪熱時𦦨無而現衆生常無常一異俱不俱亦然無始過相續愚夫癡妄想明鏡水淨眼摩尼妙寶珠於中現衆色而實無故有一切性顯現如畫熱時𦦨種種衆色現如夢無所有記曰此頌亦無聖智可得也唐譯云諸蘊如毛輪於中妄分別唯假名施設求相不可得謂五蘊諸法本無所有虗假不實如幻夢等事由凡愚不達唯心妄起分別故興四計若了彼諸法唯心所現如明鏡止水淨眼摩尼雖現衆色而本自無生當體圓明即是自覺聖智此外更無聖智可得上通破二見以顯圓成已竟下結顯離過絶非復次大慧如來說法離如是四句謂一異俱不俱有無非有非無常無常離於有無建立誹謗分別結集真諦緣起道滅解脫如來說法以是為首魏譯云如來說法依實際因緣寂滅解脫故非性非自在非無因非微塵非時非自性相續而為說法記曰此結答問意以顯離過絶非也以大慧請問離一異有無等四句一切外道所不行自覺聖智所行佛答但於五蘊諸法了達唯心不起分別則當下如如本無四句可離亦無聖智可得故此結云如來說法所以離如是四句者以依實際因緣寂滅解脫而說不比外道妄指性自在等邪因而說法所以永離諸過也復次大慧為淨煩惱爾𦦨障故譬如商主次第建立百八句無所有善分別諸乘及諸地相記曰此妨難也難曰如來說法既離四句則無法可說何又次第建立百八句及分別諸乘地相耶故此釋云為淨衆生煩惱所知二種障故譬如商主為引導衆人至寶所故設諸方便如來說法亦若此非是實有所說也故經云了法不在言善入無言際而能示言說如響遍世間亦非絶然不說也寶鏡云雖非有言不是無語前云百八句依三界二十五有邪正四句建立義見於此上辨行中初總示正行之方已竟次略示邪正因果相分四初略示二因先示外道二乘邪因禪復次大慧有四種禪云何為四謂愚夫所行禪觀察義禪攀緣如禪如來禪云何愚夫所行禪謂聲聞緣覺外道修行者觀人無我性自相共相骨璅無常苦不淨相計著為首如是相不異觀唐譯云如是觀察堅著不捨前後轉進相不除滅唐譯云漸次增進至無想滅定是名愚夫所行禪記曰此略明邪正二因初示外道二乘邪因也然如來說法所以不同外道者以因行不同故故此特言四種禪以揀別邪正二因欲令行人知所擇也禪者入理之方便所謂因行是已二乘外道不達自心現量真無我理雖觀我空以取著未忘愈增我見故相不除滅以因地不真故果招迂曲所以涅槃亦非真實是名愚夫所行禪云何觀察義禪謂人無我自相共相外道自他俱無性已唐譯云謂知自共相人無我已亦離外道自他俱作觀法無我彼地相義漸次增進唐譯云於法無我諸地相義隨順觀察是名觀察義禪記曰此名菩薩修行方便以示正因也從三賢已去直至七地行相皆在此列所謂分別二障極喜無法執俱生地地除故云觀法無我彼地相義漸次增進云何攀緣如禪魏譯云觀真如禪唐譯云緣真如禪謂妄想二無我妄想如實處不生妄想是名攀緣如禪記曰此明八地已上至解脫道行相也唐譯云若分別無我有二是虗妄念若如實知彼念不起謂若分別實有二無我理即是妄想故云妄想二無我妄想若稱實而觀人法本無今何無二平等如如分別不起故魏譯云不住分別心中得寂靜境界是名觀真如禪此上乃三乘行相也云何如來禪謂入如來地得自覺聖智相三種樂住成辦衆生不思議事是名如來禪記曰此最上一乘行相也所言如來禪者非如來所行禪乃以如來果地覺為本因心所謂以不生滅心為本修因故云入如來地得自覺聖智即前云修行者大方便也上二種禪雖云正行猶屬漸修此則頓悟一心頓登佛地三德祕藏一念頓得即能成就衆生不思議事故名如來清淨禪此正達磨所傳禪宗三世諸佛歷代祖師心印此經示趣意在於此豈外道二乘邪禪及妄想攀緣作證者所可比耶故欲令行人必以此為真因方得如來無上大涅槃果以因真果正此其所以如來說法不與外道惡見共也爾時世尊欲重宣此義而說偈言愚夫所行禪觀察相義禪攀緣如實禪如來清淨禪記曰此通頌四種禪相下揀別邪正譬如日月形鉢頭摩深險如虗空火盡修行者觀察如是種種相外道道通禪亦復墮聲聞及緣覺境界記曰此頌外道二乘邪禪行相誡令行人不可誤墮謂外道所計神我故入定時觀見如日月之形明淨朗耀或見如紅蓮華在於海中以此為真二乘妄計五蘊實有自共相故作無常苦空等觀灰自泯智同於虗空如薪盡火滅以為涅槃故誡云修行者觀察縱見如是種種境相決不可誤墮其中也捨離彼一切則是無所有一切剎諸佛以不思議手一時摩其頂隨順入如相記曰此頌顯正行也意令行人不但捨彼外道二乘邪禪不可親習若依佛教門了達唯心現量即觀察緣如二種漸行亦不必親習故云捨離彼一切則是無所有以依無所有觀則能順入真如是名如來清淨無相禪行人依此方名正行則能頓契佛心故即感十方諸佛以不思議手一時摩頂上略明邪正因行不同下略明邪正果相不同爾時大慧菩薩摩訶薩復白佛言世尊般涅槃者說何等法謂為涅槃記曰上明因行不同此明果相亦異也大慧聞因行不同遂問世尊既以如來清淨禪為因行不知以何等法為果相故此請問涅槃以顯果德不同佛告大慧一切自性習氣藏意意識見習轉變名為涅槃諸佛及我涅槃自性空事境界記曰此明轉生死為涅槃以顯如來真果也唐譯云一切識自性習氣及藏識意識見習轉我及諸佛說名涅槃即是諸法性空境界謂一切識自性習氣及心意識見習無明皆生死因意若了彼性空即生死當體轉為涅槃即是諸法性空境界不若外道二乘妄有證得執為涅槃以彼因地不真故所取涅槃亦非究竟以不離生死因故復次大慧涅槃者聖智自覺境界離斷常妄想性非性云何非常謂自相共相妄想斷故非常云何非斷謂一切聖去來現在得自覺故非斷大慧涅槃不壞不死若涅槃死者復應受生相續若壞者應墮有為相是故涅槃離壞離死是故修行者之所歸依記曰此示涅槃相也以涅槃乃自覺聖智境界非是外道二乘妄想境界離斷常有無分別故以離凡夫假我及外道神我故非常以離外道豁達及二乘斷滅故非斷以不壞故不滅不死故不生不滅故為衆聖之靈府不生故為羣生之安宅故云一切聖去來現在得自覺修行者之所歸依也此中凡夫妄認五蘊假我為自相外道妄立神我主諦為共相復次大慧涅槃非捨非得非斷非常非一義非種種義是名涅槃記曰此結示涅槃正義也良以三乘妄見取捨外道妄執斷常一異總屬妄見分別如來自性清淨大涅槃相離此諸過一切皆非故六祖云無上大涅槃圓明常寂照凡愚謂之死外道執為斷諸求二乘人目以為無作盡屬情所計六十二見本妄立虗假名何為真實義惟有過量人通達無取捨以知五蘊法及以蘊中我外現衆色像一一音聲相平等如幻夢不起凡聖見不作涅槃解二邊三際斷常應諸根用而不起用想分別一切法不起分別想劫火燒海底風鼓山相擊真常寂滅樂涅槃相如是觀六祖說涅槃相如掌中視菴摩勒果此所謂轉心意意識見習為涅槃入諸法性空境界者也復次大慧聲聞緣覺涅槃者覺自相共相不習近境界唐譯云捨離憒閙不顛倒見妄想不生彼等於彼作涅槃覺記曰此言二乘涅槃假果也二乘雖超外道邪見而亦未為究竟所謂但盡生死謂為解脫故魏譯云聲聞辟支佛非究竟處生涅槃想上示二果竟下略示當轉二性復次大慧二種自性相云何為二謂言說自性相計著事自性相計著言說自性相計著者從無始言說虗僞習氣計著生事自性相計著者從不覺自心現分齊生記曰此釋上一切自性習氣相略示當轉二性以明果德不同之所以也然如來涅槃所以不同外道二乘者以如來轉一切自性習氣為涅槃外道二乘執有自性為涅槃所以不同故此特示二種自性相欲令知所轉也言說自性者法華云諸法寂滅相不可以言宣三界本無實法唯以名言為體但有言說都無實義故以凡夫外道不知名言性空妄計言說音聲有實自體依之分別造種種業從來舊矣故云從無始言說虗僞習氣生若了音聲如響則言說性空風樹竅號太虗寂滅分別不起則法性湛然唯一圓明了罔塵習此所謂轉言說自性而為涅槃外道不知出此妄起諸見故彼所計涅槃皆從計著言說自性無始虗僞習氣所生非真實也事自性者經云三界上下法唯是一心作以諸法唯心所現如鏡中像本非實有但是一心更無別法二乘不了唯心心外取法妄計諸法實有自體以不達諸法本來寂滅相故妄見有生死可厭涅槃可證故彼所證涅槃皆計著事自性相從不覺自心現分齊所生非真滅也由因非真因故果非究竟此如來說涅槃所以不同外道也下略示感應二徵復次大慧如來以二種神力建立唐譯云神力加持菩薩摩訶薩頂禮諸佛聽受問義云何二種神力建立謂三昧正受為現一切身面言說神力及手灌頂神力記曰此略示感應二徵也言行人內具真因外感勝緣由藉二種神力加持所以不墮外道聲聞辟支佛地意令行人生決定信趣究竟果耳觀夫正法住世諸大菩薩皆久植善根親承佛足且凡所行證皆仗如來神力加持況末法乎悲夫去聖時遙魔強法弱吾輩善根淺薄苟不仰憑諸佛願力加持欲出生死破魔冤蓋亦難矣加持有二一諸佛大願力二行者大信力法華云若有修行此經法者我爾時為現清淨光明身等此佛願力也楞嚴云若有末世欲坐道場先持比丘清淨禁戒誦此心佛所說神呪建立道場求於十方現住國土無上如來放大悲光來灌其頂我自現身至其人前摩頂安慰令其開悟此行人信力也此經雖單說願力意令增決定信力耳又加持有二一冥二顯此二顯加也言三昧正受為現身面言說等者蓋是行人入三昧中方得二種神力加持殆非散心可得故前云捨離彼一切則是無所有一切剎諸佛以不思議手一時摩其頂隨順入如相大慧菩薩摩訶薩初菩薩地住佛神力所謂入菩薩大乘照明三昧入是三昧已十方世界一切諸佛以神通力為現一切身面言說唐譯云十方諸佛普現其前如金剛藏菩薩摩訶薩及餘如是相功德成就菩薩摩訶薩大慧是名初菩薩地菩薩摩訶薩得菩薩三昧正受神力於百千劫積習善根之所成就記曰此現身面言說神力也而云登地方加三賢不受加者以未入真如無相三昧故然一登初地即便加者蓋以多劫積習善根之所成就非特爾也故從上諸祖雖一念頓悟自心不從人得蓋以多劫積習般若善根久為諸佛護念以內熏功足故外感加持豈淺薄者所可得耶次第諸地對治所治相通達究竟至法雲地住大蓮華微妙宮殿坐大蓮華寶師子座同類菩薩摩訶薩眷屬圍繞衆寶瓔珞莊嚴其身如黃金薝蔔日月光明諸最勝子從十方來就大蓮華宮殿座上而灌其頂譬如自在轉輪聖王及天帝釋太子灌頂是名菩薩手灌頂神力記曰此灌頂神力加持也法身流轉五道號曰衆生以二障所纏故法身隱而不顯是則但有執持之力而不能感加持之力今行人入大乘照明三昧以三昧力頓斷粗重三障證平等真如得法性身與十方佛氣分交接故即感諸佛現身說法神力加持由內外交熏淨治微細二障究竟無餘一念頓證二轉依果以法性圓明與十方佛同體無二故感灌頂神力加持也大慧是名菩薩摩訶薩二種神力若菩薩摩訶薩住二種神力面見諸佛如來若不如是則不能見記曰此結二種加持以明三種佛性義也佛性有三種者謂正因緣因了因也衆生各各雖具正因佛性若不遇真善知識方便善巧助發亦不能得了了明見譬如王求箜篌之聲斷弦裂水求之畢竟不得以無善巧方便緣故彼外道二乘亦同稟正因但由惡見熏習妄執二種自性以為涅槃雖欲求之轉增邪執畢竟不能明見佛性故云若不如是則不能見意明外道二乘若果是真果必得如此感應加被之力今果既不真故不能見法華云若得作佛時具相三十二天人夜叉衆龍神等恭敬是時乃可謂永盡滅無餘今既不然足知非真滅也復次大慧菩薩摩訶薩凡所分別三昧神足諸法之行是等一切悉住如來二種神力唐譯云諸菩薩摩訶薩入於三昧現通說法如是一切皆由諸佛二種神力大慧若菩薩摩訶薩離佛神力能辨說者一切凡夫亦應能說所以者何謂不住神力故記曰此言菩薩能明見佛性故凡所動靜云為皆住如來二種神力也一切凡夫同稟佛性而不能說法者以日用而不知故由不知特不住神力耳非不加也以如來不捨一衆生故老龐云野老負薪歸村婦連宵織看他家事忙且道憑誰力問渠渠不知特地生疑惑傷嗟今古人幾箇知恩德故華嚴四十二種法門皆菩薩承佛神力而說至若異生皆能說法各得一種法門由住如來二種神力故也大慧山石樹木及諸樂器城郭宮殿以如來入城威神力故皆自然出音樂之聲何況有心者聾盲喑啞無量衆苦皆得解脫如來有如是等無量神力利安衆生記曰此返顯如來非不加被衆生但衆生不了自心故不得如來真實受用耳殆非如來棄衆生也故云有無量神力利安衆生由是觀之無情被加尚出音聲況彼外道二乘有情者耶故云捨善根一闡提復以如來神力故或時善根生此非畢竟不加也譬如日光於生盲人無不利益大慧菩薩復白佛言世尊以何因緣如來應供等正覺菩薩摩訶薩住三昧正受時及勝進地灌頂時加其神力佛告大慧為離魔業煩惱故及不墮聲聞地禪故為得如來自覺地故及增進所得法故是故如來應供等正覺咸以神力建立諸菩薩摩訶薩若不以神力建立者則墮外道惡見妄想及諸聲聞衆魔希望不得阿耨多羅三藐三菩提以是故諸佛如來咸以神力攝受諸菩薩摩訶薩記曰此承上問也大慧意謂如來既有無量神力利安衆生何獨言加地上菩薩而不言其餘衆生耶故世尊答云以登地菩薩初入真見道有相觀多若不加持則墮魔業故華嚴云菩薩有十種魔忘失菩提心而修諸善根是為魔業是則初地不加則墮魔業七地菩薩未離心量若不被加則墮外道邪徑八地菩薩純無相觀味著三昧不起度生之心故十方諸佛三加七勸拔出寂定云起善男子勿得樂住三昧汝之三昧二乘亦得故此不加則墮二乘禪不能到如來自覺地故十地已上金剛喻定尚有最極細微二障故勝進不加不能頓斷極微二障不能頓得無上菩提是故諸佛如來咸以神力攝受諸菩薩以餘地前非真修故不攝也嗟彼外道二乘既不能以不生滅心為本修因又不得蒙十方如來神力加持如何能得究竟真常之果此其所以甘墮沈淪樂為鄙事宜矣是則圓覺三期楞嚴壇場非徒設也行人宜深識之爾時世尊欲重宣此義而說偈言神力人中尊大願悉清淨三摩提灌頂初地及十地已上略示邪正因果相已竟此下第三廣釋邪正因果差別相分二初廣釋前三種禪以顯三乘差別因果相又二初辨因別有三初廣釋愚夫禪中外道邪禪爾時大慧菩薩摩訶薩復白佛言世尊佛說緣起即是說因緣不自說道魏譯云如世尊說十二因緣從因生果不說自心妄想分別見力而生唐譯云佛說緣起是由作起非自體起世尊外道亦說因緣謂勝魏譯云自性唐譯云勝性自在時微塵生如是諸性生然世尊所謂因緣生諸性言說有間悉檀無間悉檀記曰此大慧疑佛說法亦同外道以發愚夫禪中外道邪禪也此難佛說因緣亦同外道墮有者由前云如來說法離於有無依真諦緣起為首非外道以勝性自在無因微塵時等為首故此難云佛說緣起是由作者非自體起亦同外道所說依勝性自在時我微塵生於諸法是墮有也故唐譯云今佛世尊但以異名說作緣起然世尊所說因緣生法與外道所說勝性等為有別義為無別義故云有間悉檀無間悉檀檀此云施華梵兼稱云遍施言佛之法施也此難佛說因緣未離於有下難無因未離於無世尊外道亦說有無有生世尊亦說無有生生已滅記曰此難佛說無因亦同外道墮無也外道計有者從有因生計無者從無因生故云有無有生謂若有若無二皆有生也此中大慧正取無因然世尊亦說無有生生已滅此正同外道無有生是無因也無因則同外道計無如世尊所說無明緣行乃至老死此是世尊無因說非有因說世尊建立作如是說此有故彼有非建立漸生觀外道說勝非如來也記曰此證成佛說無因返不如外道所說為勝也謂佛說無明為因生行識等果此不說自心生而說無明生是無因也此有故彼有者謂此無明一有則彼行至老死一時皆有故云非建立漸生外道說從神我主諦為冥初從冥初生覺從覺生我心從我心生五塵從五塵生五大從五大生十一根共二十五法而以神我為勝性故以勝性為生因如此建立漸次而生斯則如來說此有故彼有一時頓生無有次第且又果生因滅是返不如外道說勝也所以者何世尊外道說因不從緣生而有所生世尊說觀因有事觀事有因唐譯云世尊所說果待於因因復待因如是因緣雜亂如是展轉無窮記曰此釋成如來說法不如外道之所以也謂外道說勝性等為因不從他緣生而能生他是因常為因不為果如此因果分明然世尊說十二因緣以無明為因生行為果又以行為因生識為果至老死為因又生無明為果如是一法又作因又作果故云觀事有因觀因有事是因果雜亂三世輪轉無有一定所以不如外道說勝是故如來說法未有不同外道者也此大慧以因緣設難將辨緣起無性顯真如離言說相以破外道言說自性相計著先辨緣起無性佛告大慧我非無因說及因緣雜亂說此有故彼有者攝所攝非性覺自心現量唐譯云大慧我了諸法唯心所現說此有故彼有非是無因及因緣過失大慧若攝所攝計著不覺自心現量外境界性非性彼有如是過非我說緣起唐譯云若不了諸法唯心所現計有能取及以所取執著外境若有若無彼有是過非我所說我常說言因緣和合而生諸法非無因生記曰此世尊釋成不同外道所說以明緣起無性也意謂我了諸法唯心所現本無實法以無明不覺自心現量妄見境界以為實有故我說此有故彼有非是無因及因緣過失何者以彼外道不了諸法唯心所現計有能取所取執著外境故妄計有無斷常一異等彼有如是過非我所說緣起之法故我說因緣為破彼妄見非墮有也且我既說因緣和合而生諸法豈無因耶是故不同外道所說故云非無因生上辨緣起無性已竟次顯真如離言說相大慧復白佛言世尊非言說有性有一切性耶世尊若無性者言說不生是故言說有性有一切性記曰此計諸法實有自性而言言說將顯真如離言以破言說自性相計著也由上佛說諸法無性故說緣生故此難云豈非言說有性而諸法亦實有性耶意謂既有言說必有諸法若無諸法言說何起此計諸法言說皆有實體故向下佛以二義破之一謂諸法雖無不妨言說如兔角龜毛等次謂雖無言說亦能顯說如瞻視等且初佛告大慧無性而作言說謂兔角龜毛等世間現言說大慧非性非非性但言說耳如汝所說言說有性有一切性者汝論則壞記曰此言諸法雖無不妨言說也唐譯云雖無諸法亦有言說豈不現見龜毛兔角石女兒等世人於中皆起言說彼非有非非有而但有言說耳大慧如汝所說有言說故有諸法者諸法若無則無言說今兔角等雖無而不妨有說以此觀之汝義不成故云汝論則壞大慧非一切剎土有言說言說者是作耳唐譯云言說者假安立耳或有佛剎瞻視顯法或有作相或有揚眉或有動睛或笑或缺或謦咳或念剎土或動搖唐譯云或有佛土瞪視顯法或現異相或復揚眉或動目睛或示微笑頻呻謦咳憶念動搖以如是等而顯於法大慧如瞻視及香積世界唐譯云如不瞬世界妙香世界普賢如來國土但以瞻視令諸菩薩得無生法忍及諸勝三昧是故非言說有性有一切性唐譯云非由言說而有諸法大慧見此世界蚊蚋蟲蟻是等衆生無有言說而各辦事記曰此明雖無言說亦能顯法也然言說者但我娑婆所尚所謂此方真教體清淨在音聞其餘他土則不盡然故云非一切剎土有言說至若其餘佛土不用言說或以瞻視顯法或揚眉動目謦咳頻呻憶念動搖皆為佛事又如香積世界以衆香為佛事且如此方蚊蚋蟲蟻俱無言說而各辦事是豈待言說而顯諸法耶斯則不但諸法無性抑且言語性空所謂諸法寂滅相不可以言宣從上佛祖所傳不言之道義見於此故臨濟德山棒喝交馳仰山圓相石鞏張弓道吾舞笏皆深證此離言三昧者也所謂山河大地共轉根本法輪鱗甲羽毛普現色身三昧是故衆生日用六根門頭無非入理之處豈盡待言說哉爾時世尊欲重宣此義而說偈言如虗空兔角及以槃大子二譯俱作石女兒無而有言說如是性妄想因緣和合法凡愚起妄想唐譯云因緣和合中愚夫妄謂生不能如實知輪回三有宅記曰諸法本無以緣會而生既緣會而生則生本無也即說彼緣生亦假名耳是則法性無生言詞相寂能所雙亡湛然常住豈可妄計言說有性有一切性耶故云如是性妄想凡所分別皆妄想耳故云因緣和合法凡愚起妄想由不能如實了知法性無生故妄見流轉輪回三有上章明真如離言說相以破言說自性相計著竟下章明離心緣相以破事自性相計著
