body:
  text: 觀楞伽記略科題辭科以分經從古製也昔道安法師以三分科經時人譏其離析經義及親光論至果以三分斷其全經時乃嘆其雅合蓋經經各有綱宗科乃提挈綱要而振起之使觀者得其要領庶離言得義而悟入之令捨筌蹄殆非支分節解逞臆斷也後之義學昧於離言之旨各恃己見駢枝其説以取謗法之愆使學者莫之適從正所謂以多岐亡羊耳茲楞伽以離言説第一義為宗不涉唇吻又豈可妄想分別能入而其所以科節之蓋以經文簡古血脈幽潛不得其門而入故特提其綱領使知問答來源融會一貫了然心目冀可忘言得義不以文言為障礙耳非臆斷也即此已為剩法後之覺者切不得以此為欠而更增益其説自取謗法之罪不淺矣萬歷戊戌孟夏佛成道日沙門德清題于五羊之青門壘壁間觀楞伽阿跋多羅寶經記略科海印沙門釋德清排訂通科分二經一卷初凡經皆有三分此經來未盡故闕流通分一序分二正宗分二初直指一心真如以顯三界唯心二初約數句問百八問次非數句答二初牒無上全章次答不生句全章次曲示一心生滅以顯萬法唯識八初明真妄因依廣示八識以顯生滅因緣相二初略明唯識以別邪正之因三初明真唯識量以辨邪宗三初顯真唯識諸識下九段次喻破二見譬如下三段三揀辨邪宗破諸外道下三段次示七種聖義以別邪見二初示正義有七種一段次明斥非云何外道二節三揀邪因以示正因二初揀邪因妄想三有苦下八段次示正因若復諸餘下一章次廣明八識以示識智之相二初明八識相問心意意識等全章次明三智相聖智三相全章二明返妄歸真約五法自性無我以辨邪正因果相三明五法自性八識無我究竟差別相四明法身常住以示生死涅槃平等相五示藏心自性以明真妄生滅平等相六廣明六度以示自性妙行無修相七廣決衆疑以顯法身離過八特示性戒以彰生佛平等已上因緣科已竟二明返妄歸真約五法自性無我以辨邪正因果相分二此科至四卷中止初辨邪正頓示一乘理行因果相二初辨明因地心二初破邪顯正以示常住真理二初約三門破邪因以顯正因五初明五法六初破名相妄想知大衆心念下問答有無全章二顯正智如如淨除自心現流下一章顯正智法依佛章顯如如三破二種邪因二初即二乘邪因以示正因二種聲聞一章次以聖智破外道邪因常不思議一章四舉果驗因二乘外道一章五勘果知因五無間全章六示因果一如一闡提全章二明三自性一章三明二無我一章四破有無二見建立誹謗一章五結示正因善知心意下偈終次約一心破妄計以顯真理二初明寂滅一心空無生無二離自性一章次示如來藏性經二卷初疑如來藏同外道我一章次依理勘訂以辨邪正二行次辨明果地覺次依前理行頓示斷惑證真因果相上顯理已竟下顯行次依理勘訂以辨邪正二行四初總示正行之方四初能觀之智四方使一章二所破之惑明緣生無性破依他起明妄想無性破遍計執三顯圓成之理無四句可離無聖智可得四顯離過絶非如來説法離如是四句等二段二略示邪正因果相四初略示邪正二因二初示二種邪因禪次示三種正因禪二略明邪正二果二初如來涅槃真果爾時次二乘涅槃果假復次三略示當轉二性言説自性事自性四略示感應二徵現身面言説加持手灌頂神力加持三廣釋邪正因果差別相二初廣釋前三種禪以顯三乘差別因果相二初廣辨因別三初釋愚夫所行禪二初外道邪禪二初緣起無性以破言説自性相緣起一章次辨妄想無性以破事自性相七初明妄境真常以破斷見常聲者何事説至非聖言説半章二明法一見異以破常見惑亂起二種種性至種性義半章三明心境如如以破一異見即彼惑亂不妄想一節已上三科共一章四明緣生如幻以破有無見問惑亂為有無起兩全章至是故説如幻止五明本自無生以破因生見問一切性無生一章六明言説無性以破名言習氣當説名句形身一章七顯名言雙絶以誡忘言默證未來世智者止論一章至偈文離自性次二乘偏禪次觀察義禪三釋攀緣如禪三初觀四大如次觀五陰如三結示正觀次廣辨果別先示邪果後示正果次廣釋如來禪融會妄想如如以顯一乘平等因果相三初明即妄即真以顯因平等十二妄想一章次明即心即境以顯果平等妄想無性半章以顯即心一乘半章以顯即境三即權即實以顯法平等不説一乘一章四舉果驗因以示一乘真因相二經三卷初初舉意生身真果相意生身一章次示五無間行真因相五無間一章已上自初卷第二返妄歸真科中初頓示理行以辨因地心竟次辨果地覺分三初明三身以顯法身常德三初總示佛之知覺一章次顯報化二身四等一章三顯常住法身不説一字一章次破二見以顯涅槃離過有無相一章三示二通以明果海離言宗説二通一章已上辨別邪正頓示一乘理行因果相竟從前初卷五法章至此二通畢次下依前理行頓示斷證因果相分二此科從初卷來初翻顯因行二初自利功圓四初明妄想不實以破我執斷煩惱障問不實妄想全章二明言説性空以破法執斷所知障四初明言説為法執之本當説語義全章二示智識為縛脫之源智識相全章三即轉變相以明動本不動九種轉變全章四斷相續心以明生本無生問一切法相續義全章三遣境智以明無智無得二初遣所觀境分二初遣事境彼彼妄想全章次遣理境一切法不生全章次遣能觀智攀緣事不得一章已上明斷證因相竟下明斷證果相四明忘言頓證以顯果海離緣愚癡凡夫一節次利他行滿二初雙結二行二通全章次特示利他止論一章次正顯果德二初轉依涅槃果二初揀二十一種邪宗問涅槃前半章次示最上一乘正果如我所説涅槃一節次轉依菩提果五經四卷初初顯法身真我德二初顯三德祕藏明法身般若解脫共一章次顯一心真如二初明離一切相離名字相離言説相離心緣相共一章次結究竟一心無相見勝下至偈終二顯法身真常德二初破七種無常七無常一章次正顯真常文錯簡在三昧章後三顯法身真樂德三昧全章四顯法身真淨德如來藏半章五釋疑勸修若無識藏名下三段前從初卷分別自性章起止此大科第二通約三門辨邪正理行因果相竟三明五法自性八識無我究竟差別相二初總明迷悟因依問五法等一章次別顯四門攝入五初明五法差別相二初總明差別之法愚夫章至是名如如次顯住如如之人住如如者二段二明三門入五法二初明三自性入五法全章次明八識無我入五法復次一章三明四門攝一切法五法一節四明總歸如如示以正觀五法半章五結勸修學是名一節此上第三科四門差別相已竟四明法身常住以示生死涅槃平等相二初明法身常住恆沙前半章次明平等如如生死本際半章五示藏心自性以明真妄生滅平等相剎那全章偈錯簡在六度章後六廣明六度以示自性妙行無修相六度全章七廣決衆疑以顯法身離過六疑全章八特示性戒以彰生佛平等不食肉全章觀楞伽記略科畢
