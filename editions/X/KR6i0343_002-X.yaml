body:
  text: 宋天竺三藏沙門求那䟦陀羅譯明建鄴海印沙門釋德清筆記一切佛語心品第一之下次廣明八識以示識智之相分二初明八識相爾時大慧菩薩復白佛言世尊所說心意意識五法自性相唐譯云惟願為我說五法自性相眾妙法門一切諸佛菩薩所行自心見等所緣境界不和合顯示一切說魏譯云諸佛菩薩修行之處遠離自心邪見境和合故能破一切言語譬喻體相故唐譯云此是一切諸佛菩薩入自心境離所行相成真實相一切佛語心唐譯云稱真實義諸佛教心為楞伽國摩羅耶山海中住處諸大菩薩說如來所歎海浪藏識境界法身魏譯云說觀察阿黎耶識大海波境界說法身如來所說法故唐譯云唯願為此山中諸菩薩眾隨順過去諸佛說藏識海浪法身境界記曰此問明一心轉變以釋廣說識有八種相也問云大慧前問諸識有幾種生住滅世尊備答且直示以唯心識觀其轉凡成聖之功已畢大慧至此復以心意識五法三自性為請者何也答曰此經直指寂滅一心然此一心本無迷悟不屬聖凡故曰五法三自性皆空八識二無我俱遣以隨迷悟之分故有真妄之別至若轉變之相亦不出此四法而已故大慧先以百八句為問世尊答云一切皆非者蓋約真如門中不容窮詰故也大慧隨問諸識有幾種生住滅者是在生滅門中容有言說耳前世尊雖示唯心識觀略明修證之門未達一心轉變之妙且不知諸識因何而生故此請說五法自性眾妙法門意顯即生滅而頓證真如故唐譯云唯願為說藏識海浪法身境界也然心意意識即前略說有三種識今廣說有八種相也五法者謂名相妄想正智如如三自性者謂妄想緣起成二無我即人法二無我今云轉變之妙者良由一心真如離名離相真智獨照本自圓成人法雙忘聖凡俱絕蓋迷一心而為八識故真如隨緣變為名相之境正智有待翻為妄想之心心境角立緣起相生人法雙彰聖凡懸隔悟一心而為藏性轉八識而成四智名相即是如如緣起無性本自圓成人法俱空聖凡齊泯以即生滅而證真常故云藏識海浪即法身境界是所以成真實相一切佛語心此乃自覺聖智所緣境界以離心自性相是法身境界故魏譯云說法身如來所說法故然而轉變之殊只在生與無生若達生本無生則本有法身自現故向下世尊徑若以識生之由全經之旨槩不出此至若節節展轉折難以破外道之見者以彼不達自心現量故妄生橫計故云未達境唯心起種種分別達境唯心已分別即不生苟會無性緣生緣生無性則無生之旨洞然心目一切言說皆剩語矣智者請深觀之爾時世尊告大慧菩薩言四因緣故眼識轉何等為四謂自心現攝受不覺無始虗偽過色習氣計著識性自性欲見種種色相大慧是名四種因緣水流處藏識轉識浪生記曰此言七識生起之由正顯緣生無性義也四因緣者唐譯云所謂不覺自心現而執取故無始時來取著於色虗妄習氣故識本性如是故樂見種種諸色相故此四因緣也良以心本無生因境有由此四種因緣故本不生而生也境有牽心之業用以不達唯心所現妄生取著故不覺心生以過去無始時來各有自類種子今心境相接則習氣內熏妄生分別故本不生而生以心有了境之功能境緣一至法爾心生以愛阿賴耶樂阿賴耶而為主宰居然樂見諸塵境界故自然心生此通言七識各因自境生起之相蓋舉一例餘故單言眼色為緣生於眼識其實無明為因境界為緣八識更互相依故結云水流處藏識轉識浪生故下文云如眼識等問曰唯識云眼識九緣生耳識唯從八鼻舌身三七後三五三四何以此言前七轉識都具四緣耶答曰彼但言八識具緣多寡此言七識生起之狀故云水流處藏識轉識浪生大慧如眼識一切諸根微塵毛孔俱生隨次境界生亦復如是譬如明鏡現眾色相猶如猛風吹大海水記曰此言諸識生起頓漸以示先後不同也唐譯云如眼識餘亦如是於一切諸根微塵毛孔眼等轉識或頓生譬如明鏡現眾色相或漸生猶如猛風吹大海水諸根毛孔根也微塵塵也根塵和合識生其中而言頓漸者蓋五現量識與同時意識等一一根周徧法界名曰圓成故眼根初見色時最初未起分別但如鏡中無別分析則色之一塵徧現諸根一塵既爾根根皆然故曰頓生如鏡現相及至第二念轉入意識而起分別則五根隔越諸塵隨根不同先後亦異故云漸生如風吸海水行人若了頓生則達自心現量無生之旨如觀掌果外境界風飄蕩心海識浪不斷因所作相異不異合業生相深入計著不能了知色等自性故五識身轉大慧即彼五識身俱因差別分段相知當知是意識因記曰此言八識更互為因生起之相也謂心海澄淵由外境界風飄蕩不停故七識波浪相續不斷此總明八識本自不生由境牽心故諸識相生以顯八識無明因境界而起也因所作相異不異者謂心境一如以成本不生義此句心境合明俱有異不異相心異不異者因即八識自證分所作相即見分以前七轉識總屬見分今八識各了自境故異惟一精真故不異境異不異者因即無明業相所作相即所變相分以六塵四大總屬相分今各對諸根故異本唯一體故不異心境合明異不異者因即如來藏心所作相即妄心妄境心境角立故異唯心所現本一真心故不異也合業生相等者唐譯云業與生相謂彼外境本唯心現以無明不覺不達唯心故深生計著執之取之以為實我實法此則七識因無明而有也由此堅執我愛不能了知色等如幻不實而妄生貪愛故眼得之而為色耳得之而為聲等故云不能了知色等自性故五識身轉此則五識因七識而有也且五識緣境之時最初一念得境自性不帶名言無籌度心故屬現量而同時意識與五識俱或因分別五塵分段差別境界有第六意識生故云即彼五識身俱因差別分段相知當知是意識因此則六識因五識而生此所謂諸識展轉相因而生也蓋前七轉識總屬八識見分了別之用然前五對五塵時其實六識同時而起但最初一念未起分別即名前五亦名明了意識但第二念剎那分別好惡差別等相即名第六分別意識此五八六七親疏之辯也彼身轉彼不作是念我展轉相因自心現妄想計著轉而彼各各壞相俱轉分別境界分段差別謂彼轉記曰此通言八識緣生無性密示生本無生義以成上異不異也意謂諸識本自不生元無異相但約各了自境為生故異耳唐譯云然彼諸識不作是念我等同時展轉為因而於自心所現境界分別執著俱時而起無差別故各了自境以無性緣生故不作念而展轉相因以緣生無性故各了自境而本無差別若知了境無差則無生之理自契大經云譬如河中水湍流競奔逝諸法不相知各各亦如是各了自境者六塵是前六境第八見分是七識境根身種子器界是八識境如修行者入禪三昧微細習氣轉而不覺知而作是念識滅然後入禪正受實不識滅而入正受以習氣種子不滅故不滅以境界轉攝受不具故滅記曰此下二段言八識微細生滅非劣三昧所能知也二乘入禪自謂滅識然所滅者但六識不取境界而為滅識其藏識習氣種子實未滅也唐譯云諸修行者入於三昧以習力微起而不覺知但作是念我滅諸識入於三昧實不識滅而入三昧以彼不滅習氣種故但不取諸境名為識滅大慧如是微細藏識究竟邊際除諸如來及住地菩薩諸聲聞緣覺外道修行所得三昧智慧之力一切不能測量決了記曰二乘外道修行以不知八識為生死根本故錯亂修習二乘得少為足外道橫生邪見蓋以生滅心為本修因因地不真故果招迂曲今欲返妄歸真轉識成智必須頓悟自心現量如實了知虗妄境界明見自心微細流注方能超生死證真常也故下文明之餘地相智慧巧便分別決斷句義最勝無邊善根成熟離自心現妄想虗偽記曰此下正指修行如實行者方能入此法門也唐譯云唯有修行如實行者以智慧力了諸地相善達句義無邊佛所廣集善根不妄分別自心所見能知之耳故經云能信此法者不於一佛二佛三四五佛而種善根已於無量千萬佛所種諸善根故云無邊善根成熟者方能入此法門殆非淺根劣解所可信也宴坐山林下中上修能見自心妄想流注無量剎土諸佛灌頂得自在力神通三昧諸善知識佛子眷屬彼心意意識自心所現自性境界虗妄之想生死有海業愛無知如是等因悉已超度記曰此明如實修行之速效也真修之士宴坐山林習唯心觀門能見自心微細流注一念頓證無生則得百千三昧神通得十方諸佛同時灌頂佛子眷屬自然圍繞彼於心意識妄想境界業愛無明當下頓脫故云如是等因悉已超度此所謂最勝知識也是故大慧諸修行者應當親近最勝知識記曰佛法有因有緣內以本具真如熏發為因外以師友知識助發為緣從上佛祖未有不由知識而能得成菩提者故世尊結勸修行如實行者應當親近最勝知識爾時世尊欲重宣此義而說偈言譬如巨海浪斯由猛風起洪波鼓冥壑無有斷絕時藏識海常住境界風所動種種諸識浪騰躍而轉生記曰此總頌外境界風飄蕩心海識浪不斷青赤種種色珂乳及石蜜淡味眾華果日月與光明非異非不異海水起波浪七識亦如是心俱和合生記曰此頌因所作相異不異以明漸生也青赤色塵珂貝聲塵乳香塵石蜜淡味味塵華果舊註為法塵引宗鏡云現在之華未來之果種種法塵隨為彼識所緣境界此所謂外境界風飄蕩心海七識波浪相續不斷也日月光明喻心境異不異相以不達境唯心妄生分別故為所動譬如海水變種種波浪轉七識亦如是心俱和合生謂彼藏識處種種諸識轉記曰此頌水流處藏識轉識浪生以明頓生也謂彼七識全是八識所變波浪本無實體但是一心更無前後故下文言不異相謂以彼意識思惟諸相義不壞相有八無相亦無相記曰此頌無差別故各了自境也以各了自境故云謂以彼意識思惟諸相義以本無差別故云不壞相有八無相亦無相唐譯云心意及意識為識相故說八識無別相無能相所相不壞有八者長行云各各壞相俱轉此言不壞相有八由前生滅章中云現識及分別事識此二壞不壞相展轉因蓋可壞者前七轉識生滅心也不壞者八識自體不生滅心也以不壞而壞故無性緣生本不生而生以壞而不壞故緣生無性雖生而不生長行偈頌互相發明以顯真無生意宗鏡云如是八識從無始來三際不動四相不遷真實常住自性清淨不壞之相具足圓滿無所缺少而如是等一切功德同法界故亦是無相以皆無相故故云不壞相有八無相亦無相譬如海波浪是則無差別諸識心如是異亦不可得記曰此以喻顯無差別義也心名採集業意名廣採集諸識識所識現等境說五記曰此頌八識得名之所以也第八名心以受熏持種為生死主故云採集業第七名意以偏執我法恒審思量四惑相應前六造業依此為根故云廣採集前六通名識但對現在五塵故說五識以分別過去五塵名意識故云諸識識所識對現境說五爾時大慧菩薩以偈問曰青赤諸色相眾生發諸識如浪種種法云何惟願說記曰大慧聞前世尊說不壞相有八無相亦無相心境皆空今聞心名採集等遂疑世尊自語相違故以心境皆有為難意謂既云青赤色等六塵境界風起七識波浪是境實有也又云心名採集業意名廣採集諸識識所識現等境說五此則心實有也然心境既是實有而又差別不同何以世尊言無相亦無相異亦不可得耶爾時世尊以偈答曰青赤諸雜色波浪悉無有採集業說心開悟諸凡夫記曰此總答問義也海本澄停因風起浪是則境本無也心本湛淵緣擊發識是心本空也心境本空而云境從心起採集名心等者但為開悟凡夫隨他語耳故唐譯云青赤諸色像浪中不可得言心起眾相開悟諸凡夫彼業悉無有自心所攝離所攝無所攝與彼波浪同記曰此釋心境皆空也彼業悉無有則心本不生自心所攝離所攝境也離則境本不有斯則能所雙寂心境皆空如彼海波瀑性不動故唐譯云而彼本不起自心所取離能取及所取與彼波浪同受用建立身是眾生現識於彼現諸業譬如水波浪記曰此釋心境不異也受用建立身唐譯云身資財安住謂六塵境乃眾生資生受用之具取此而得住世者然此皆是唯心所現故云是眾生現識由眾生不達境唯心現而取之執之以為實我實法依之造業招生死苦故云於彼現諸業良由自心取自心非幻成幻法故心境似有若不取無非幻非幻尚不生幻法云何立斯則心境本空如水波浪雖有而不有也以有而不有故說無相無差別異亦不可得爾時大慧菩薩復說偈言大海波浪性鼓躍可分別藏與業如是何故不覺知記曰此約喻難法也意謂業相如波浪何以波浪可見而業相不可見耶爾時世尊以偈答曰凡夫無智慧藏識如巨海業相猶波浪依彼譬類通記曰由藏識微細難知凡夫無智故取海波為譬令彼開曉耳非謂業識有相可見也爾時大慧菩薩復說偈言日出光等照下中上眾生如來照世間為愚說真實已分部諸法何故不說實記曰此因法難喻也世尊向對劣解眾生唯說六識三毒建立染淨根本而未言及八識故大慧疑謂如來照世如日升天高低普應宜平等說法何故向來分部諸法而不說此真實豈不墮不平等過耶伽陀曰阿陀那識甚深細習氣種子成瀑流我於凡愚不開演恐彼分別執為我故下答云非我不說真實但彼心不真實耳爾時世尊以偈答曰若說真實者彼心無真實譬如海波浪鏡中像及夢一切俱時現心境界亦然境界不具故次第業轉生識者識所識意者意謂然五則以顯現無有定次第譬如工畫師及與畫弟子布彩圖眾形我說亦如是彩色本無文非筆亦非素為悅眾生故綺錯繪眾像記曰此明如來應機說法故教有祕密不定之設也說法不投機終是閒言語若為心不實者說實法則返致疑而不信醍醐翻成毒藥矣故下偈云所說非所應於彼為非說以不堪說非祕吝而不說也然所說法元無先假後實之分即說六識未嘗不兼帶八識而言但言不頓彰故有先後之別何者良以心境同時頓現如海波鏡像夢事非次第生本無八識之異但由境界不具有次第業生因而故說分別法塵者為六識執自內我者為七識對現五塵者為五識耳故曰識者識所識意者意謂然五則以顯現其實本無定次第也以隨機施設如畫師畫像弟子填彩彩後像先要亦不出形外我所說法亦如是而已然法本無說故如彩本無文文字俱離故非筆非素但應機利物言象乃興故如悅眾生綺繪成像言說別施行真實離名字分別應初業修行示真實真實自悟處眾想所覺離此為佛子說愚者廣分別種種皆如幻雖現無真實如是種種說隨事別施設所說非所應於彼為非說記曰法本離言言生理喪故魏云言說離真實真實離文字無說而示說者乃分別權應初機若如實修行者乃可為說真實耳真實乃自證境界一切能所分別俱離非上根利智不能入故為佛子說若夫愚者非廣分別則不能知即其所說若權若實種種法門皆悉如幻本無實法與人故云雖現無真實如是種種說隨根別施設皆權示也所以說法必用權者以所說非所應則於彼為非說是以不得已而施權非佛本懷故三七思惟意在於此彼彼諸病人良醫隨處方如來為眾生隨心應量說妄想非境界聲聞亦非分哀愍者所說自覺之境界記曰眾生有種種欲種種憶想分別惟有如來如實見之故一一應量說法令出苦得樂此是如來自覺境界非凡夫外道二乘所可知也故云妄想非境界聲聞亦非分復次大慧若菩薩摩訶薩欲知自心現量攝受及攝受者妄想境界當離羣聚習俗睡眠初中後夜常自覺悟修行方便當離惡見經論言說及諸聲聞緣覺乘相當通達自心現妄想之相記曰此教令如法修行也大經云如人數他寶自無半錢分於法不修行多聞亦如是故聞法貴乎思修世尊意謂已說能取所取一切妄想境界皆是自心所現若欲了知唯心境界應當遠離浮沈諸惡覺觀如實修行方便觀察久久自當通達了悟也此勸修下示修之之方上明八識相已竟次明三智相復次大慧菩薩摩訶薩建立智慧相住已於上聖智三相當勤修學記曰前明識相有八此明智相有三且教令修如實行之方便也了達自心現量非外道二乘妄想無明境界如上所說故云建立智慧相既住此已若欲實證於上聖智三相當勤修學此三相乃自覺聖智境界故云上聖智揀非外道二乘劣三昧也何等為聖智三相當勤修學所謂無所有相一切諸佛自願處相自覺聖智究竟之相修行得此已能捨跛驢心智慧相得最勝子第八之地則於彼上三相修生記曰此標三相名也舊註謂七地觀三界生死不定心名跛驢慧以不能行故由未得無功用道故以此況之下釋相大慧無所有相者謂聲聞緣覺及外道相彼修習生魏譯云謂觀聲聞緣覺外道相唐譯云謂慣習一切二乘外道相故而得生起大慧自願處相者謂諸先佛自願處修生大慧自覺聖智究竟相者一切法相無所計著得如幻三昧身諸佛地處進趣行生記曰此釋三相之相即當三觀義也佛觀三界非實非虗非如非異以觀諸法非實故云無所有相且云習二乘外道而生者肇公云三乘等觀性空而得道也但心有大小為差耳以外道二乘不達性空故妄生斷滅之見菩薩既了唯自心現本無所有其所覺雖同所證則異且令知非究竟而不取證抑為轉彼惡見故故云觀二乘外道相此當空觀義也自願處相謂諸先佛自願處修生者以觀諸法非虗則法法真常世相常住既世相常住則無一法而非真常無一類非自願處故諸佛為令正法久住佛種不斷故不捨度生事業經云我本立誓願欲令一切眾如我等無異故魏譯云諸佛本自作願住持諸法此當假觀義也自覺聖智究竟相一切法相無所計著得如幻三昧等者謂觀三界非如非異不取法非法相得如幻三昧趣佛地智此當中道觀義也上云常自覺悟修心方便故告之聖智三相如此欲令用此而修捨此即為邪智矣大慧是名聖智三相若成就此聖智三相者能到自覺聖智究竟境界是故大慧聖智三相當勤修學記曰自覺聖智境界非此三種方便不能入故勉令修學上初明真妄因依廣示八識以顯生滅因緣相已竟下明返妄歸真約五法自性無我以辨邪正因果相分二初辯別邪正頓示一乘理行因果相又二初辯明因地心又二初破邪顯正以示常住真理又二初約三門破邪因以顯正因分五初明五法又分六初破名相妄想此辯因地心文直至三卷五無間行章止爾時大慧菩薩摩訶薩知大菩薩眾心之所念名聖智事分別自性經承一切佛威神之力而白佛言世尊惟願為說聖智事分別自性經百八句分別所依唐譯云惟願為說百八句差別所依聖智事自性法門記曰前百八句總問五法自性等法門以約真如門故云一切皆非今請一一分別故云依百八句差別相也如來應供等正覺依此分別說菩薩摩訶薩入自相共相妄想自性以分別說妄想自性故則能善知周徧觀察人法無我淨除妄想照明諸地唐譯云一切如來應正等覺為諸菩薩摩訶薩墮自共相者說此妄計性差別義門知此已則能淨治二無我觀照明諸地超越一切聲聞緣覺及諸外道諸禪定樂觀察如來不可思議所行境界畢定捨離五法自性諸佛如來法身智慧善自莊嚴唐譯云以一切佛法身智慧而自莊嚴起幻境界唐譯云入如幻境昇一切佛剎兜率天宮乃至色究竟天宮逮得如來常住法身唐譯云住一切剎兜率陀宮色究竟天成如來身記曰此問來意由前大慧通問心意意識五法三自性眾妙法門而世尊止答八識生起之相其餘尚未蒙一一開示但不知如何是名相妄想如何是正智如如此乃聖智分別自性法門大慧知眾心念故特重請惟願為說百八句差別所依聖智事自性法門也諸菩薩眾以不知此聖智自性法門故墮自共相妄計差別若知此已則能如法修行淨治二無我觀了達唯心照明諸地則能超越外道二乘得證如來不思議境界畢竟捨離五法自性得究竟自覺聖智成無上佛果也故世尊向下逐一開示先明五法次明三自性然後明二無我自相共相者謂一切諸法皆有自相共相真如自性自相也隨緣成事共相也五蘊諸法各有自體自相也和合成人共相也以外道二乘不達諸法唯心所現故妄計執著謂實有如是自相共相故云墮自共相者由是故執諸法自生他生共生無因生此皆依妄想自性非自覺聖智事世尊雖破有無二見意顯一切法不生明見諸法不生者方名自覺聖智也佛告大慧有一種外道作無所有妄想計著覺知因盡兔無角想如兔無角一切法亦復如是大慧復有餘外道見種求那極微陀羅驃形處橫法各各差別見已計著無兔角橫法作牛有角想記曰此敘外道因執兔牛無角有角於諸法起斷常二見以破五法中名相由妄想而起也良以諸法唯心所現本自如如不容起見然彼外道不了唯心橫生妄計因見諸法隨因而盡遂想兔無角起於無見因見大種求那塵等諸物以有形量分位差別由執彼兔無角於此遂生牛有角想起於有見然諸法本如不屬有無而有無名相皆由妄想分別而起也種即四大種求那極微陀羅驃皆塵也無故而起曰橫上敘計下破之大慧彼墮二見不解心量自心境界妄想增長唐譯云彼墮二見不了唯心但於自心增長分別身受用建立妄想根量唐譯云身及資生器世間等一切皆唯分別所現大慧一切法性亦復如是離有無不應作想唐譯云應知兔角離於有無諸法悉然勿生分別大慧若復離有無而作兔無角想是名邪想彼因待觀故兔無角不應作想記曰此互破無見也唐譯云云何兔角離於有無互因待故意謂諸法本無不應更作無想如兔角本無而復作無想者是名邪見妄想也且兔無角見因牛有角起故云互因待故以不達牛角亦不可得故下文云乃至微塵分別自性悉不可得記曰此互破有見也唐譯云分析牛角乃至微塵求其體相終不可得謂彼執兔無角者以為牛角實有故執兔角實無殊不知牛角亦無若分析牛角乃至極微鄰虗終歸於空是則自性悉不可得諸法亦爾大慧聖境界離不應作牛有角想唐譯云聖智所行遠離彼見是故於此不應分別記曰此言聖智明見諸法本無故應遠離二見也意謂但於諸法不作有無二見者方可親近隨順自覺聖智也然有無即名相二見即妄想爾時大慧菩薩摩訶薩白佛言世尊得無妄想者見不生想已隨比思量觀察不生妄想言無耶記曰此設轉計將顯心境皆離也大慧聞說執兔角無者因牛角有若分析牛角至不可得而牛角亦無故不應作想因而轉計意謂所以不生妄想者豈不因觀察牛角不有而知兔角本無以此不生妄想言無耶故唐譯云豈不以妄見起相比度觀待妄計無耶此則雖知牛角不有而畢竟執兔角是無未離無見棄有著無此外道之通病也前破因有計無此破因無計無所謂寧起有見如須彌山不起無見如芥子許故須逐破直欲心境皆離方遣有無二見也佛告大慧非觀察不生妄想言無所以者何妄想者因彼生故依彼角生妄想以依生角妄想是故言依因故離異不異故非觀察不生妄想言無角記曰此直示無生義也謂心境絕待本自無生不容起念故云非觀察不生妄想言無何也所言妄想者因彼境界而生故以心境對待分別乃生所謂若法因待成是法還成待前云因牛角有而執兔角無固是妄想故云依彼角生妄想今若執兔角無亦似牛角本無者亦是妄想以依角而生分別故云以依角生妄想以妄想畢竟因角有無而生未離角故展轉皆妄故云離異不異且兔角天然本無不必分別豈因觀牛角是無而後方知兔角無耶故云非觀察不生妄想言無角大慧若復妄想異角者則不因角生若不異者則因彼故記曰此釋上離異不異以顯妄想無性以明心本無也若言心境定異是妄想別有自性則不因角而生今既因角生此不異也若言心境定一是舉心則無境又何所分別舉境則無心誰為分別此不一也不一不異足見妄想無性矣乃至微塵分析推求悉不可得不異角故彼亦非性二俱無性者何法何故而言無耶記曰上言心無自性此言境無自性以明境本無也故以亦字揀之兔角本無無固已無自性矣然而牛角雖有若分析極微推而求之亦不可得亦與兔角無異斯則有亦無自性也故云彼亦非性且彼有無二皆無性則境本無也心境俱無又有何法當情何故執異有而言無耶故唐譯云異於有角言無角者如是分別決定非理二俱非有誰待於誰大慧若無故無角唐譯云若相待不成觀有故言兔無角者不應作想記曰此言絕待以顯真心也唐譯云待於有故言兔角無不應分別謂有無俱離則無可分別故云若無故無角無角則無對待對待既無而云因觀牛角有而言兔角無者皆邪見也不應作此分別大慧不正因故而說有無二俱不成記曰外道不達諸法本自無生而妄計有無為生因非真因也因地不真故果招迂曲故云不正因故而說有無二俱不成上遣有無二見意在翻妄想而成正智下顯空色一如意在翻名相即是如如又前破無見後破有也大慧復有餘外道見計著色空事形處橫法不能善知虗空分齊言色離虗空起分齊見妄想記曰此敘計也唐譯云復有外道見色形狀虗空分齊而生執著言色異虗空起於分別大慧虗空是色隨入色種大慧色是虗空持所持處所建立性色空事分別當知記曰此明空色一如也魏譯云以依色分別虗空依虗空分別色故唐譯云色空分齊分別應如是知經云譬如虗空徧至一切色非色處是虗空隨入色種中也此空即是色非色外空以色即是空能持所持建立性故此色性自空非色滅空也大慧四大種生時自相各別亦不住虗空非彼無虗空記曰此明色性即空以破外道執四大種以為生因也是乃計著形處橫法因兔角無而生牛角有見者言含縱奪以彼外道執四大種各有自相能生諸法與空無干故云四大種生時自相各別故縱云亦不住虗空復奪云非彼無虗空以彼不知色性即空故妄計為生因今色性既空是色本無也四大造色本無而執為生因是無因也以無因為生因豈非妄計乎西域外道多種然所計不出斷常有無二見良以不達自心現量故不了真因雖執有見總歸無因世尊多方逐破唯顯正因以破彼無因耳如是大慧觀牛有角故兔無角大慧又牛角者析為微塵又分別微塵剎那不住唐譯云又析彼微塵剎那不現彼何所觀故而言無耶若言觀餘物者彼法亦然記曰此總會上有無二無以例觀諸法而生正智契如如也且彼計無者因牛角有故執兔角無今若將牛角分析乃至微塵亦了不可得然所因牛角亦無而又何所比觀而言兔角之無耶然諸法本無因妄見有苟一念不生二見斯絕真智獨照心境如如作如是觀者方名正觀若他觀者乃邪觀也故云觀餘物者彼法亦然故下結勸云當離異見妄想思惟自心現妄想也爾時世尊告大慧菩薩摩訶薩言當離兔角牛角虗空形色異見妄想汝等諸菩薩摩訶薩當思惟自心現妄想隨入為一切剎土最勝子以自心現方便而教授之唐譯云為諸佛子說觀察自心修行之法爾時世尊欲重宣此義而說偈言色等及心無色等長養心記曰此明六塵妄境及分別妄心本來不有但不了境唯心妄生分別故云色等長養心身受用安立識藏現眾生記曰身受用者謂資生住處一切諸境乃藏識所現影像故云藏識現眾生以不了故妄生取著心意及與識自性法有五無我二種淨廣說者所說記曰此明如來說法權實雙彰之意也然心意識五法自性二無我等種種法門是為不了唯心者不得已而建立之以破彼妄計耳其實五法三自性皆空八識二無我俱遣但示一心更無別法此乃如來說法之式故云廣說者所說長短有無等展轉互相生以無故成有以有故成無微塵分別事唐譯云微塵分析事不起色妄想心量安立處惡見所不樂覺想非境界唐譯云外道非行處聲聞亦復然救世之所說自覺之境界記曰一切世間有為之法不出長短相形有無相生皆展轉對待分別而有至若分析微塵性空於色等境了達唯心不起分別如此微妙法門則惡見者所不樂聞殊非外道二乘境界乃如來所說自覺之境界也上約有無色空一異等法以破五法中名相妄想竟下顯正智如如且先顯正智爾智大慧菩薩為淨除自心現流故復請如來白佛言世尊云何淨除一切眾生自心現流為頓為漸耶記曰此就淨眾生心習現流以明五法中正智義也良以一切眾生日用心習現流原是如來法身智慧以不覺故順無明流隨心意識轉故自覺聖智隱而不現如來說法因其本有而開導之但令自悟本有故云淨除非有實法增益眾生也故大經云奇哉奇哉一切眾生具有如來智慧德相但以妄想顛倒執著而不證得若離妄想顛倒執著則一切智無師智即得現前此所謂淨除現流以明正智也唐註謂能淨者自覺聖智所淨者自心現流意以聖智屬佛現流單約眾生恐非本旨佛告大慧漸淨非頓如菴羅果漸熟非頓如來淨除一切眾生自心現流亦復如是漸淨非頓譬如陶家造作諸器漸成非頓如來淨除一切眾生自心現流亦復如是漸淨非頓譬如大地漸生萬物非頓生也如來淨除一切眾生自心現流亦復如是漸淨非頓譬如人學音樂書畫種種技術漸成非頓如來淨除一切眾生自心現流亦復如是漸成非頓記曰上明四漸下明四頓譬如明鏡頓現一切無相色像唐譯云譬如明鏡頓現眾相而無分別如來淨除一切眾生自心現流亦復如是頓現無相無有所有清淨境界如日月輪頓照顯示一切色像如來為離自心現習氣過患眾生亦復如是頓為顯示不思議智最勝境界譬如藏識頓分別知自心現及身安立受用境界彼諸依佛亦復如是頓熟眾生所處境界以修行者安處於彼色究竟天唐譯云譬如阿黎耶識分別現境自身資生器世間等一時而知非是前後大慧報佛如來亦復如是一時成熟諸眾生界置究竟天淨妙宮殿修行清淨之處譬如法佛所作依佛唐譯云譬如法佛頓現報佛光明照耀自覺聖趣亦復如是彼於法相有性無性惡見妄想照令除滅記曰此約化法頓漸以明理須頓悟事須漸除之意也舊以頓漸皆約佛然諦觀喻中漸取成熟義頓取顯現照用義是頓單約佛漸單約機耳蓋如來圓滿自覺聖智安住海印三昧照明法界平等顯現譬如明鏡現像纖悉不遺鑑機說法如日月升天雲雨普潤但山有高下故蒙光有先後根有大小故成熟有遲速所謂法本不異異自機耳故如來說法如師子調兒雖顧盻頻呻皆盡全力此所以化法有祕密不定義也然此皆約佛以明頓漸者以依三身說法頓漸有四義謂頓頓頓漸漸頓漸漸良以眾生各各自心本是自覺聖智但以無明熏習變為現業流識今轉識成智因無明有厚薄故法有頓漸不同若有眾生一念頓悟本有法身智慧照明自心本無身心世界之相永離攀緣一切根量相滅一念頓證自覺聖智所謂法佛說頓法頓淨眾生自心現流此頓頓也若有眾生因師教熏習之力雖能了悟自心以無明習氣力不能頓離心意意識妄想境界但觀一切諸法緣生無性一切身心世界如幻不實唯自心現漸斷無明證自覺聖智先解次行後證此乃報佛說頓漸法淨眾生現流此頓漸漸頓也若諸眾生雖遇外緣不能頓悟自心但依如來權教大乘所說施戒忍進禪定智慧漸次觀察漸離心境得正知見此化佛說漸漸法漸淨眾生自心現流此漸漸也由是觀之在佛雖漸亦頓以平等顯現故故頓單約佛在機亦頓亦漸以因多生久積善根成熟今始一念頓悟雖頓亦因漸故漸單約機故下隨舉三佛說法之式釋成頓漸義然化佛雖說漸法以三身一體故雖漸亦頓故經云更以異方便助顯第一義也上顯正智竟下顯如如大慧法依佛說一切法入自相共相自心現習氣因相續妄想自性計著因種種不實如幻種種計著不可得記曰此明報佛說緣生無性法成上頓漸漸頓義以顯如如也從法垂報故云法依佛真如不守自性隨緣成一切法故云入自相共相無明為因生三細故云自心現習氣因境界為緣長六麤故云相續妄想自性計著因謂一心真如隨緣成一切法以一切法緣生無性故種種不實如幻妄想本無從緣而生生亦無性故不可得故華嚴以法界緣起為宗故此云報佛說緣生法也下以喻顯復次大慧計著緣起自性生妄想自性相大慧如工幻師依草木瓦石作種種幻起一切眾生若干形色起種種妄想彼諸妄想亦無真實記曰此以喻釋成緣生無性義也由妄想自性依緣起自性而起故云計著緣起自性生妄想自性相幻師喻心草木瓦石喻無明緣若干色像喻一切法見者種種分別喻眾生不了唯心起種種妄計總皆如幻不實斯則不獨妄境原無而妄心亦本不有此其緣生故如幻也如是大慧依緣起自性起妄想自性種種妄想心種種相行事妄想相計著習氣妄想是為妄想自性相生大慧是名依佛說法記曰此以法合喻也唐譯云此亦如是由取著境界習氣力故於緣起性中有妄計性種種相現是名妄計性生大慧是名法性所流佛說法相大慧法佛者離心自性相自覺聖所緣境界建立施作記曰此明法佛說法成上頓頓義也凡離心意識顯自覺聖智境界皆法佛所說法相此經純頓義見於此故前五法章首大慧請惟願為說法身如來所說法也大慧化佛者說施戒忍精進禪定及心智慧離陰界入解脫識相分別觀察建立超外道見無色見記曰此明化佛說法相成上漸漸義也外道妄見無色為究竟故云見無色見大慧又法佛者離攀緣攀緣離一切所作根量相滅非諸凡夫聲聞緣覺外道計著我相所著境界自覺聖究竟差別相建立是故大慧自覺聖究竟差別相當勤修學自心現見應當除滅記曰此結歸法佛直指頓頓以示此經宗極也上歷言三佛說法相而復以法佛結勸者意謂有攀緣心故妄見境界分別計著即名妄想離此攀緣即是自覺聖智也且前三相中云自覺聖智究竟相此云究竟差別相者意顯佛三身一體而所說法乃即實之權即頓之漸即究竟之差別直欲行人專依頓頓而修耳上顯正智如如竟下破二種邪因先就二乘邪因以示正因復次大慧有二種聲聞乘通分別相謂得自覺聖差別相及性妄想自性計著相記曰此由前法佛說法乃自覺聖智非凡夫二乘外道境界故隨明聲聞外道相以示所以非聖智之意也然二乘依佛教而修以不達即實之權故但得聖智差別不得聖智究竟中差別所以久滯化城未登寶所外道妄立神我自背真常故深著邪見欲令行人離此權邪方得自覺聖智究竟差別建立相也云何得自覺聖差別相聲聞謂無常苦空無我境界真諦離欲寂滅息陰界入自共相外不壞相如實知心得寂止心寂止已禪定解脫三昧道果正受解脫不離習氣不思議變易死得自覺聖樂住聲聞是名得自覺聖差別相聲聞記曰此揀二乘邪因也聲聞有二種一利根謂依四諦而修觀空而悟入者一鈍根謂依權教八背捨觀而修析色而取偏空者此明利根聲聞也故唐譯云云何自證聖智殊勝相謂明見苦空無常無我諸諦境界離欲寂滅故於蘊界處若自若共外不壞相如實了知故心住一境住一境已復禪定解脫三昧道果而得出離住自證聖智境界樂未離習氣及不思議變易死是名聲聞住自證聖智境界相然明見無常無我境界此所謂等觀性空而得道也但貪三昧樂不起度生之心故云住自證聖智境界樂以未離無明習氣種子故不能度變易生死然生死有二種識論云一分段生死謂諸有漏善不善業由煩惱障緣勢力所感三界麤異熟果身命長短隨因緣力有定劑限故名分段二不思議變易生死由所知障緣助勢力所感殊勝細異熟果由悲願力改轉身命無定劑限故云變易無漏定願正所資感妙用難測名不思議大慧得自覺聖差別樂住菩薩摩訶薩非滅門樂正受樂顧憫眾生及本願不作證大慧是名聲聞得自覺聖差別相樂菩薩摩訶薩於彼得自覺聖差別相樂不應修學記曰此通妨難以顯聲聞菩薩所觀雖同所證則異以明心有大小為差也問曰菩薩亦得此自覺聖智境界何以不同聲聞故唐譯云菩薩雖亦得此聖智境界以憐憫眾生故本願所持不證寂滅門及三昧樂由觀空而不取證此所以異於聲聞也故勉之曰菩薩摩訶薩於此自證聖智樂中不應修學大慧云何性妄想自性計著相聲聞所謂大種青黃赤白堅濕煖動非作生自相共相先勝善說見已於彼起自性妄想記曰此明鈍根聲聞也謂此聲聞不知觀空但依聖教所說權乘八背捨等觀門而修觀四大等諸法實有自相共相雖不同外道計作者生然亦執彼諸法以為實有自性亦不離妄想故唐譯云云何分別執著自性相所謂知堅濕煖動青黃赤白如是等法非作者生然依教理見自共相分別執著魏譯云分別有物執虗妄相謂於彼法虗妄執著以為實有菩薩摩訶薩於彼應知應捨隨入法無我相滅人無我相見漸次諸地相續建立記曰此結勸離過也聲聞已得人無我未得法無我以人無我即是法執故滅人無我相見即是入法無我相也是名諸聲聞性妄想自性計著相記曰此結名也謂離彼二種聲聞見即名正智故勸令應捨上即二乘邪因以示正因竟下以聖智正因破外道邪因爾時大慧菩薩摩訶薩白佛言世尊世尊所說常不思議自覺聖趣境界及第一義境界世尊非諸外道所說常不思議因緣耶記曰前明離二乘見此明離外道見也以外道計神我為生因非真因也以無常為常非真常也總皆邪見離此即名正智故發此問意謂佛說自覺聖智及第一義為真常不思議而外道亦說常不思議世尊所說豈不同彼外道所說耶佛向下以因相不同故不比外道所說答之佛告大慧非諸外道因緣得常不思議記曰如來所說常不思議以第一義為因以自覺聖智為相所謂實相真因非彼外道妄計神我為因乃以無常為常故不同彼論所以者何諸外道常不思議不因自相成記曰此徵釋不同所以也謂彼常不思議乃妄立神我不因自覺聖智相第一義智而成故云不因自相成若常不思議不因自相成者何因顯現常不思議記曰此正顯彼非真常也謂常不思議必仗真因若非真因何能顯現常不思議義耶復次大慧不思議若因自相成者彼則應常由作者因相故常不思議不成記曰此縱奪妨轉計也恐彼聞佛說真常因自相成乃轉計曰我說常不思議亦因自相成何以不同佛說故縱之曰彼外道不思議若果然因自相成者則彼亦應是真常矣但由所計作者為因耳然作者非真因因既不真豈獲常果故常不思議不成下顯正因大慧我第一義常不思議第一義因相成離性非性得自覺相故有相第一義智因故有因離性非性故譬如無作虗空涅槃滅盡故常如是大慧不同外道常不思議論記曰此明佛說因相俱真以顯真常不思議也佛言我說常不思議乃依第一義諦因相成立離有無二見以得自覺聖智相故有實相得第一義智因故是真因一切有無戲論俱離當體寂滅譬如三無為法永離諸過故是真常此其所以不同外道常不思議邪見論也如是大慧此常不思議諸如來自覺聖智所得如是故常不思議自覺聖智所得應當修學記曰此結指真常故勸令修學復次大慧外道常不思議無常性異相因故非自作因相力故常記曰此明外道不同佛說常不思議之所以也所以不同者以彼所立於有為法外別立作者以為生因故為異因佛以自覺聖智為因故為真因此所以不同故唐譯云外道常不思議以無常異相因故常非自相因力故常謂彼以異因故非真常我以自覺聖智為因相力非自相作者因相力故是真常也復次大慧諸外道常不思議於所作性非性無常見已思量計常大慧我亦以如是因緣所作者性非性無常見已自覺聖境界說彼常無因記曰此就彼所立以顯真能破也然諸外道因見諸法有已還無妄計別有作者是常而如來亦見諸法有已還無說是無常故唐譯云外道常不思議以見所作法有已還無無常已比知是常我亦見所作法有已還無無常已不因此說常若以三支比量合之常不思議是有法定常宗因云所作性故喻如瓶等所作瓶等是無常法因喻不轉故不成常宗無常是有法定非是常宗因云所作性故喻如瓶等瓶等所作是無常法故即彼所立翻成所破然彼以妄計比知我以自覺聖智現量故我所說非彼所論大慧若復諸外道因相成常不思議因自相性非性同於兔角此常不思議但言說妄想諸外道輩有如是過所以者何謂但言說妄想同於兔角自因相非分記曰此言外道所計作者是以無因為因竟成斷滅同於兔角故其所立以無常為常但有言說都無實義故唐譯云外道以如是因相成常不思議此因相非有同於兔角故常不思議唯是分別但有言說何故彼因同於兔角無自因相故以非第一義自覺聖智為因相故云自因相非分大慧我常不思議因自覺得相故離所作性非性故常非外性非性無常思量計常大慧若復外性非性無常思量計常不思識常而彼不知常不思議自因之相去得自覺聖智境界相遠彼不應說記曰此明如來以自覺聖智為因結成不同外道之論也然外道於一切法起有無二見故於無常妄計為常以彼不知自因之相故去自覺聖智境界相遠如來說法離此諸過故不可與彼同日語也上明二乘偏執外道邪見皆非正智意顯捨此即證自覺聖智矣下二章約不滅不生以明正智即如如上破二種邪因已竟下舉果驗因二初破二乘滅見復次大慧諸聲聞畏生死妄想苦而求涅槃不知生死涅槃差別一切性妄想非性魏譯云不知世間涅槃無差別故唐譯云不知生死涅槃差別之相一切皆是妄分別有無所有故未來諸根境界休息作涅槃想非自覺聖智趣藏識轉唐譯云妄計未來諸根境滅以為涅槃不知證自智境界轉所依藏識為大涅槃是故凡愚說有三乘說心量趣無所有是故大慧彼不知過去未來現在諸如來自心現境界計著外心現境界生死輪常轉唐譯云彼愚癡人說有三乘不說唯心無有境界大慧彼人不知去來現在諸佛所說自心境界取心外境常於生死輪轉不絕記曰此言諸法本自寂滅不容更滅以示真常不思議因以明即妄想以證正智即正智以顯如如以破二乘滅見也然生死境界本來不有但唯心所現藏識轉變而依妄想分別而有若了妄想無性即轉識成智若以正智圓照則萬法皆如當體寂滅豈容更滅二乘愚癡不能了此妄取不受後有以為滅度詎非大謬所謂但盡生死謂為解脫其實未得一切解脫所以常在生死輪轉不息以不達唯心現量妄起種種分別故上言不滅下言不生次破外道生見復次大慧一切法不生是過去未來現在諸如來所說所以者何謂自心現性非性離有非有生故大慧一切性不生一切法如兔馬等角是愚癡凡夫不覺妄想自性妄想故大慧一切法不生自覺聖智趣境界者一切性自性相不生非彼愚夫妄想二境界記曰此言諸法本自不生以示真常不思議因以顯即如如明正智以破外道生見也良以諸法無生是三世如來所傳心印惟證相應以唯心所現緣生無性離有無二見如兔馬角非生而後無蓋生本無也由凡愚不達故妄執為有然此無生理趣乃自證聖智所行之處非愚夫分別二見境界自性身財建立趣自性相大慧藏識攝所攝相轉愚夫墮生住滅二見希望一切性生有非有妄想生非聖賢也大慧於彼應當修學記曰此結上二章以明生滅皆妄見也故唐譯云身及資生器世間等一切皆是藏識影像所取能取二種相現彼諸愚夫墮生住滅二妄見中故於中妄起有無分別斯則根身器界本自無生唯八識影現七識妄起執取分別以為實我實法此乃愚夫於無生中妄見有生非聖賢也意令即生滅以證真常故於彼法應當修學苟達生滅即常則妄想即成正智名相本自如如即彼二乘外道可起如來種性矣故下文明五無間種性五勘果知因謂勘驗現行之果足知過去習氣之因也復次大慧有五無間種性云何為五謂聲聞乘無間種性緣覺乘無間種性如來乘無間種性不定種性各別種性唐譯云無種性記曰此言五性不同以明眾生本具法性是一但由外緣故異以成自覺聖智究竟差別相也然心佛與眾生是三無差別初無纖毫間隔本無三乘五性之別良以外緣熏習不一故有五性不同斯則機本不異異在於師故前勉修如實行者應當親近最勝知識故此下文云當轉彼惡見則二乘外道當得如來法身闡提亦作得度因緣也引權入實義見於此言種性者相似曰種體同曰性又種者因義類義謂眾生佛性本來是一蓋由昔聞教法熏習成種各有自類種子故曰種性此種性義識論所明有其二類一者本有謂舊熏也二者始起謂新熏也本有者謂無始時來異熟識中法爾而有長劫所熏染淨種子此即名為本性住種如佛於大通智勝時說法華經而諸聞者直至今生還蒙佛化方得成熟此淨法熏習而為本性住種者也如阿難與摩登伽歷劫恩愛直至今生尚為障道因緣此染法熏習而成本性住種者也以長劫不斷故名本性住種二始起者謂無始來數數現行熏習成種以至今生於染淨法見聞熏習又為未來染淨種子此則名為習所成種由此二種為因若一遇外緣師教熏發故即成熟此五性之別所由來矣是故親師擇友不可不慎也由是觀之此五種性其三乘種性良由聞前三佛所說之法而成熟者以執化佛所說權法則成聲聞種性以執報佛所說緣生之法則成緣覺種性以悟法佛所說離攀緣法則成如來種性若聞此三法而半信半疑者則成不定種性若聞此三佛之法不起信心返生異見而毀謗者則成無種性矣故下經云捨一切善根謂謗菩薩藏蓋三佛一體法法全真皆為顯示自覺聖智趣而聞者不達隨其所取執以成種此又法本不異異自機耳故曰種性此蓋自覺聖智究竟之差別相也云何知聲聞乘無間種性若聞說得陰界入自共相斷知時舉身毛孔熈怡欣悅及樂修相智不修緣起發悟之相是名聲聞乘無間種性記曰此言聲聞乘無間種性也而云若聞說等者足徵由師教熏發所謂習性成種者也斷知時舊註謂知苦斷集證滅修道時也及樂修相智者相即偏空相智即我空智乃聲聞所樂修者至若緣起發悟無生實相之理非彼所樂故云不修因舊有小乘狹劣習氣今一聞所說熏發現行故舉身毛孔熈怡欣悅耳聲聞無間見第八地起煩惱斷習煩惱不斷不度不思議變易死度分段死天師子吼我生已盡梵行已立不受後有如實知修習人無我乃至得般涅槃覺記曰此明聲聞斷證俱未究竟自生滿足滅度想也然聲聞依四諦修但斷三界見思煩惱尚餘塵沙無明細惑未盡猶沈變易生死但得人空未得法空而便自生究竟之想乃於天人魔外之中便師子吼作是唱言我生已盡梵行已立所作已辦不受後有遂生得涅槃覺此所謂得少為足者也見第八地者華嚴八地菩薩證我空真如樂住三昧不起滅定諸佛因而勸之曰起善男子勿得樂住三昧汝之三昧二乘亦得故此云見第八地現行為起煩惱種子習氣為習煩惱以二乘但斷煩惱障未斷所知障故大慧各別無間者我人眾生壽命長養士夫彼諸眾生作如是覺求般涅槃記曰此明外道種性也唐譯云復有眾生求證涅槃言能覺知我人眾生養者取者此是涅槃此外道妄見一切眾生從我流出我能長養一切眾生遂立神我以為涅槃聞者因而師之遂成邪種或於佛教中聞有涅槃之說遂執謬解而起邪見者復有異外道說悉由作者見一切性已言此是般涅槃唐譯云復有說言見一切法因作者有記曰此計實德業及四大時方勝自在等以為生因故稱作者妄計此等以為涅槃作如是覺法無我見非分彼無解脫記曰此結外道邪見非解脫也言法無我見非分者謂諸外道向於佛所說無我之法不生信樂或生毀謗未得受熏成種故曰非分或於佛所說涅槃之法即起希望有所證得之想或依教修行有所開悟而執所悟為我即墮邪見如圓覺所明四相未忘皆是於法無我見非分者也然此外外道為煩惱縛內外道為法縛故云彼無解脫大慧此諸聲聞乘無間外道種性不出出覺為轉彼惡見故應當修學記曰此總結聲聞外道二種性也然聲聞妄取涅槃外道妄計神我俱於未出離中生出離想此皆因邪師邪教誤為熏習為令轉彼惡見故勸令修學前上聖智三相中無所有相謂慣習二乘外道相義見于此意謂令彼捨離偏邪惡見即名正智可入如來種性矣故此人雖偏邪而性實無間也大慧緣覺乘無間種性者若聞說各別緣無間舉身毛竪悲泣流淚不相近緣所有不著唐譯云離闠閙緣無所染著種種自身種種神通若離若合種種變化聞說是時其心隨入唐譯云有時聞說現種種身或聚或散神通變化其心信受若知彼緣覺乘無間種性已隨順為說緣覺之乘是名緣覺乘無間種性相記曰此明緣覺乘無間種性也各別因緣即十二因緣三世因果故云各別以緣生無性即是無生故云無間此有二類出有佛世依教而修觀緣悟道謂之緣覺出無佛世觀化知無謂之獨覺今明外熏成種故但言緣覺大慧彼如來乘無間種性有四種謂自性法無間種性離自性法無間種性得自覺聖無間種性外剎殊勝無間種性記曰此明如來乘無間種性也然此四種唐譯云有三種所謂自性無自性法內身自證聖智法外諸佛剎廣大法此約三德祕藏以明法報同體也蓋自性即法身離自性即解脫聖智即般若良以法身無著即解脫解脫不迷即般若般若離相即法身此三德祕藏總號法身外剎殊勝即報身法報冥一故不思議大慧若聞此四事一一說時及說自心現身財建立不思議境界時心不驚怖者是名如來乘無間種性相記曰此結成如來乘種性也前為頓根眾生頓為顯示不思議智最勝境界故此一類眾生有聞說佛法身智慧及自受用不思議境界而不驚怖者當知是最上利根乃如來乘無間種性此所謂善根成熟者也般若云若有眾生聞說般若波羅蜜不驚不怖不畏者當知是人不於一佛二佛三四五佛而種善根已於無量千萬佛所種諸善根惟此無上般若自非積劫聞熏成種鮮有不驚怖者此所以能信此法者是人甚希者也大慧不定種性者謂說彼三種時隨說而入隨彼而成記曰此明不定種性也此不定人隨說信入順學而成可大可小故云不定此有二種一舊熏多聞於三乘中未成熟者一新熏初機根性猛利但隨師教於三乘中俱可入者三種者即三乘法除外道無性故不在此列大慧此是初治地者謂種性建立為超入無所有地故作是建立記曰此結束所以建立三乘之意也然一切眾生法性是一所謂凡夫賢聖人平等無高下本無差別之相但以聞熏成種以致根性不同然雖依教修行而未到如來地者俱屬聖智差別之相非究竟也今將顯示頓教法門欲令三乘同歸一佛乘五性同歸一佛性故作是建立非是實有限劑也故下云樂寂聲聞當得如來最勝之身無性闡提或時善根生便證涅槃故不同他教定性之說故魏譯云說三乘者為發起修行地故諸性差別非究竟地為欲建立畢竟能取寂靜之地故舊以此段屬不定性恐非本旨彼自覺藏者自煩惱習淨見法無我得三昧樂住聲聞當得如來最勝之身記曰此結三乘同歸一性以示引權入實之意以明如來自覺聖智究竟差別建立相也故魏譯云彼三種人離煩惱障熏習得清淨故見法無我得三昧樂行故聲聞緣覺畢竟證得如來法身故唐譯云彼住三昧樂聲聞若能證知自所依識見法無我淨煩惱習畢竟當得如來之身前云二乘但得自覺聖智差別相未得究竟差別相今云得如來身足徵差別皆究竟也所以皆究竟者以佛性無二故爾時世尊欲重宣此義而說偈言須陀槃那果往來及不還逮得阿羅漢是等心惑亂記曰此通言四果皆非究竟也須陀槃那亦云須陀洹此云入流謂初入聖流初果也往來二果不還三果阿羅漢四果也以是等聖人皆憎生死愛涅槃憎愛未忘故云惑亂三乘與一乘非乘我所說愚夫少智慧諸聖遠離寂第一義法門遠離於二教住於無所有何建立三乘記曰此言究竟無差別智以示此經之宗極也然如來雖說三乘但以假名引導由愚夫少智故設三乘之權為二乘趣寂故說一乘之實俱非本懷此第一義頓教法門三一俱非權實不立豈實有三乘之說耶然他處言聲聞緣覺菩薩為三乘如來為一乘此併如來為三乘對三乘說一乘三一俱非方是此經之宗極諸禪無量等無色三摩提受想悉寂滅亦無有心量記曰此通頌自心現量凡聖皆離一法不立以明自覺聖智究竟相也諸禪即二乘諸禪解脫無量即大乘四無量心等即十力無畏十八不共乃至三十七品助道等無色三摩提即三界九次第定舉上以該下受想寂滅即二乘滅盡定通而言之即前所問百八句義今云亦無有心量者以自心現量聖凡不立一切皆非以顯生滅中究竟覺義也章首請說聖智事分別自性經依百八句說義萃於此意謂明此方名自覺聖智事上勘果知因已竟下示因果一如大慧彼一闡提非一闡提世間解脫誰轉記曰舊謂此章約生死涅槃無二以明如如蓋智如一體本無二致所謂無如外智能證於如亦無智外如為智所入若正智現前則諸法自如若了生死本寂即是正智智如冥一方名自覺聖智究竟事今約闡提以明者以前歷斥二乘外道偏邪去自覺聖智相遠且切誡行人應當遠離不許親習苟二乘外道絕分則真如有不徧之過若闡提實是無性則佛性有不徧之失此則自墮不平等過而自覺聖智亦非究竟矣蓋約教道言之為摧邪顯正不得不嚴揀偏邪以明正智若依法性言之則平等平等無二無別本自如如無情尚共一體豈有情而絕分是故前言二乘若悟本識亦得如來法身今言闡提或發善根亦得涅槃斯則無一眾生而不般涅槃方名自覺聖智究竟相也如如正智備殫於此然無性闡提非菩薩闡提無以發善根菩薩闡提非無性闡提無以資願力此則闡提不斷性善如來不斷性惡故云非一闡提世間解脫誰轉魏譯云無性乘謂一闡提此即前五性中無種性今會五性同歸故特言之以顯佛性平等以明眾生如也大慧一闡提有二種一者捨一切善根及於無始眾生發願云何捨一切善根謂謗菩薩藏及作惡言此非隨順脩多羅毗尼解脫之說捨一切善根故不般涅槃記曰此言無種性也一闡提此云斷善根又云焚燒一切善根蓋真如隨緣成事舉體全變無有剩法今全體真如變作全體惡性惡性即如更無涅槃可入故云不般涅槃二者菩薩本自願方便故非不般涅槃一切眾生而般涅槃大慧彼般涅槃是名不般涅槃法相此亦到一闡提趣記曰此言菩薩闡提也菩薩願盡眾生界謂眾生界盡我願乃盡若一眾生不盡我願不盡故云非不般涅槃一切眾生而般涅槃然所以願盡眾生界者以眾生本如早已涅槃不容更滅故無涅槃可入故云彼般涅槃是名不般涅槃法相此與闡提名同故云亦到一闡提趣唐譯以是名句作結語大慧白佛言世尊此中云何畢竟不般涅槃記曰大慧意謂無性斷善不入可爾菩薩度生本為求證涅槃何以畢竟不入故致疑云此二種闡提中何者畢竟不入涅槃下佛答云闡提尚有入時菩薩畢竟不入以知一切法本涅槃故佛告大慧菩薩一闡提者知一切法本來般涅槃已畢竟不般涅槃而非捨一切善根一闡提也大慧捨一切善根一闡提者復以如來神力故或時善根生所以者何謂如來不捨一切眾生故以是故菩薩一闡提不般涅槃記曰此正顯佛性平等如如也一切眾生皆有佛性以闡提不斷善性如來以平等大悲而攝持之故有時而發善根由昔謗法因緣為種今日緣熟故如來以神力加持或時善根生也如廣額屠兒放下屠刀便作佛事提婆達多生生謗佛今蒙授記如華嚴所明由昔謗華嚴經墮地獄中而為地獄天子毗盧出世先以足輪光照三重頓圓十地此皆謗法闡提蒙佛神力之驗也所云善根者正由昔聞熏之種子耳菩薩闡提不入涅槃者以法界如眾生如故眾生界不可盡煩惱不可盡而行願不可盡此普賢大士所以常居幻化而不入涅槃也上從請分別自性章起止此明五法已竟下明五法中三自性復次大慧菩薩摩訶薩當善三自性記曰上言五法依自性而立不知自性有幾故特示有三意令了達緣起無生故云當善云何三自性謂妄想自性緣起自性成自性記曰此徵列三自性相也然五法自性不出此三以妄想依名相起是名緣起若了緣起如幻則妄想無性即是正智名相體空本自如如總歸圓成故五法之自性不出此三下正示其相大慧妄想自性從相生記曰此標指妄想自性依他緣起也相即名相以不達名相體空依他而起種種徧計是名妄想大慧白佛言世尊云何妄想自性從相生佛告大慧緣起自性事相相行顯現事相相記曰此徵釋也謂名相皆從緣起故云緣起自性事相相以不了緣起無生故心行於中妄生計著故云行顯現事相相此言妄想從名相生唐譯云謂彼於緣起事相種類顯現生計著故計著有二種妄想自性如來應供等正覺之所建立謂名相計著相及事相計著相名相計著相者謂內外法計著事相計著相者謂即彼如是內外自共相計著是名二種妄想自性相若依若緣生是名緣起記曰此言依彼事相而生計著起二種妄想以明緣起自性也名相謂內外法者內即根身外即器界然此內外一切諸法唯心所現本無名相但是一心而人不了因依徧計妄執各各有名有相故名妄想事相即彼內外自共相者然內外不出人法二種謂內身五蘊謂之人外器四大謂之法妄計五蘊各有自體故云自和合成人故云共妄計四大各有自體故云自和合變化而生萬物故云共故云即彼內外自共相計著妄想也良以心本無生因境緣有故云若依若緣生是名緣起云何成自性謂離名相事相妄想聖智所得及自覺聖智趣所行境界是名成自性如來藏心記曰此明圓成自性也良以身心世界元一如來藏清淨真心離名離相本自如如但依妄想攀緣而行則名相斯興橫生執取若依自覺聖智而行洞達自心現量則法法圓成唯是如來藏心也爾時世尊欲重宣此義而說偈言名相覺想自性二相正智如如是則成相唐云名相分別二自性相正智如如是圓成實二相即妄想緣起也大慧是名觀察五法自性相經自覺聖智趣所行境界汝等諸菩薩摩訶薩應當修學記曰此總結前問也前問中先請分別五法自性法門次請因知五法自性已則觀察人法二無我淨除妄想照明諸地乃至逮得如來法身此上答五法三自性酬先請竟下明觀察二無我乃至究竟佛地以酬次請上明三自性竟下二無我復次大慧菩薩摩訶薩善觀二種無我相記曰此答次請也然五法不出二種無我以見有人有法即是名相妄想若了二無我即是正智如如故前分別五法自性已次即教令當善觀察二無我相云何二種無我相謂人無我及法無我記曰此示二無我相也良由不達根身器界唯心所現故妄計分別執為實我實法所謂妄想斯興名相乃形若了緣生無性則二皆無我苟二無我則五法自性皆離八識俱遣所以頓證自覺聖智逮得如來常住法身也云何人無我謂離我我所陰界入聚無知業受生眼色等攝受計著生識一切諸根自心現器身藏自妄想相施設顯示記曰此教以人無我觀也唐譯云何者是人無我相謂蘊界處離我我所無知愛業之所生起眼等識生取於色等而生計著又自心見身器世界皆是藏心之所顯現剎那相續變壞不停然人者即現在五蘊集聚妄身妄執以為我相者也以身為我亦以六塵所受用境為我所今觀此等本來不有皆從無明愛業之所生起眼等六根取六塵境而生計著以為受用妄生貪求一切根身器界皆是藏識所現影像當體全空但依妄想分別顯示似有況剎那相續變壞不停於中觀察畢竟無常誰為我者故總云離此正觀無我下約喻以明四念處觀如河流如種子如燈如風如雲剎那展轉壞躁動如猿猴記曰此明四念處觀中初觀心無常也謂觀此心妄想生滅如河流逝速不停如種子能生來果如燈念念生滅如風飄颺不住如雲倐忽變滅舉皆無常故云剎那展轉壞躁動不住如猿猴故經云心想如猿猴如此觀察於中畢竟誰為我者樂不淨處如飛蠅記曰此觀身不淨也諦觀此身其中但有三十六物九孔常流穢污不淨而妄貪著以不淨為淨故如飛蠅無厭足如風火記曰此觀受是苦也唐譯云如猛火觀種種受用眾苦所集無一可樂甚可患厭但以妄想貪求無厭無足故如猛火無始虗偽習氣因如汲水輪生死趣有輪記曰此觀法無我也唐譯云無始虗偽習氣為因諸有趣中流轉不息如汲水輪謂觀三界諸生死法但因無明業力所使隨他牽引流轉不息恒無主宰如汲井輪任他牽轉而不由我種種身色如幻術神呪機發像起記曰前別相念觀此總相念觀也唐譯云種種身威儀進止譬如死屍呪力故行亦如木人因機運動謂觀此身虗假不實如行屍則大可厭患如木人則幻化非真於中諦觀推求畢竟誰為我者行屍喻身機關喻心楞嚴云雖見諸根動要以一機抽善彼相知是名人無我智記曰此結人無我觀也唐譯云能於此善知其相是名人無我智審如是觀則當下無我云何法無我智謂覺陰界入妄想相自性如陰界入離我我所陰界入積聚唐譯云唯共積聚因業愛繩縛展轉相緣生無動搖唐譯云愛業繩縛互為緣起無能作者諸法亦爾離自共相不實妄想相妄想力是凡夫生非聖賢也心意識五法自性離故大慧菩薩摩訶薩當善分別一切法無我記曰此明法無我觀也謂觀蘊處界等一切諸法本自如如離我我所唯共積聚但因愛業繩縛互為緣起無性故無能作者以此例觀諸法亦爾離自共相乃虗妄分別種種相現是愚夫妄想力非聖賢也如是觀察一切諸法離心意識五法自性悉皆無我是名法無我智然自共相者乃凡夫外道妄計諸法自生他生共生無因生也今自共相離則四計俱遣無生之理自見以明見諸法本自無生方名法無我智故誡菩薩當作如是觀善法無我菩薩摩訶薩不久當得初地菩薩無所有觀地相觀察開覺歡喜次第漸進超九地相得法雲地記曰此下至得如來自在法身通明觀成得果之相也我法有二謂分別俱生然分別二執斷盡即入初地俱生我執從初地至七地斷盡方入八地俱生法執從初地任運而斷至等覺後心方盡即入妙覺故云分別二障極喜無法執俱生地地除故唐譯云得此已知無境界了諸地相即入初地心生歡喜次第漸進乃至善慧及以法雲所作已辦而云從初地乃至善慧法雲者蓋八地以前正斷而生我執其法執但任運而已至八地證我空真如樂著三昧不願度生與二乘取涅槃等正是俱生微細法執未忘及至九地捨三昧樂發願度生居法師位說法如雲方是正斷法執故云超九地得法雲地也於彼建立無量寶莊嚴大寶蓮華王像大寶宮殿幻自性境界修習生於彼而坐同一像類諸最勝子眷屬圍繞唐云住是地已有大寶蓮華王眾寶莊嚴於其華上有寶宮殿狀如蓮華菩薩往修幻性法門之所成就而坐其上同行佛子前後圍繞從一切佛剎來佛手灌頂如轉輪聖王太子灌頂唐譯云一切佛剎所有如來皆舒其手如轉輪王子灌頂之法而灌其頂超佛子地到自覺聖智法趣當去聲即也得如來自在法身見法無我故是名法無我相汝等諸菩薩摩訶薩應當修學記曰此結酬前請也前大慧請聖智事分別自性經以分別說妄想自性故則能觀察二無我淨除妄想照明諸地乃至逮得如來常住法身世尊次第一一酬畢故結勸云應當修學上通明五法自性顯正智如如竟下破有無二見以顯離過絕非爾時大慧菩薩摩訶薩復白佛言世尊建立誹謗相惟願說之令我及諸菩薩摩訶薩離建立誹謗二邊惡見疾得阿耨多羅三藐三菩提覺已離常建立斷誹謗見不謗正法記曰前明正智如如已將顯真如離過絕非故興此問論曰當知真如非有相非無相非非有無乃至離一切相以離念境界唯證相應故外道二乘以不知離念境界但以妄想分別諸法作有無斷常二見自昧正智故於如不如世尊一往痛斥其非切誡菩薩應當遠離有無惡見大慧已領其旨但不知二見之相故此特問建立誹謗相也外道二見共有四句謂有無雙亦雙非而此四句於真如體悉成四謗謂有是增益謗無是損減謗亦有亦無相違謗非有非無戲論謗四句不出有無故魏譯云有無謗相若知其相當可遠離則於正法不生誹謗也此中建立是有誹謗是無若四句既離則百非俱遣故前真如門百八義一切皆非爾時世尊受大慧菩薩請已而說偈言建立及誹謗無有彼心量魏譯云心中無斷常謂自心現量本無斷常二見也身受用建立及心不能知愚癡無智慧建立及誹謗記曰此頌總明二見本無也謂根身器界皆是真心所現影像本無所有而愚夫不了妄起分別作有無二見以一切分別但分別自心當知離心了不可得故唐譯云所起唯是心離心不可得爾時世尊於此偈義復重顯示告大慧言有四種非有有建立云何為四謂非有相建立非有見建立非有因建立非有性建立是名四種建立又誹謗者謂於彼所立無所得觀察非分而起誹謗是名建立誹謗相記曰此正明建立誹謗二種相也非有相見等四者然陰界入根身器界一切諸法唯是第八阿賴耶識所現相分故云相分別彼法而生妄見執為實我法者是前七識乃八識見分故云見以第八識根本無明為生起之因所謂無明為因生三細故云因一切諸法但是緣生有為無為皆無自性以本無自性妄計為有性故云性以相見因性四者本無所有故皆云非有以外道二乘不達唯心故於四者非有之中而橫計為有故云建立於所立法求不可得即謗言諸法一切皆無故云有無二種惡見建立誹謗其相如此上通明二見下別釋建立復次大慧云何非有相建立相謂陰界入非有自共相而起計著此如是此不異是名非有相建立相此非有相建立妄想無始虗偽過種種習氣計著生記曰此明非有相建立相也謂陰界入本無有相而外道二乘妄計實有自相共相此法如是如是畢竟不異堅執不捨是名非有相建立相也此非有相建立非是正知見力乃從無始虗偽妄想習氣而生計著耳大慧非有見建立相者若彼如是陰界入我人眾生壽命長養士夫見建立是名非有見建立相記曰此明非有見建立相也謂五蘊非我而妄見實有我人眾生壽命作者受者無而為有此妄見也長養士夫魏譯云作者受者大慧非有因建立相者謂初識無因生後不實如幻本不生眼色明界念前生生已實已還壞是名非有因建立相記曰此明非有因建立相也教中謂無明為因生諸轉識此言無明體空以顯妄元無因以示心本無生意唐譯云初識前無因不生其初識本無後然而諸識生者但托因緣而生既借緣生則本無性故不實如幻剎那不住生已還滅斯則生本無生故非有因也外道不達乎此遂妄立勝性以為生因謂定有異因二乘不了如幻皆本非有因而建立因相所以為邪見耳眼色明界念魏譯云因眼色明空念故識生識論云眼識九緣生耳識唯從八鼻舌身三七後三五三四楞嚴云眼色為緣生於眼識又云因空因明因心因眼故眼識生眼識既爾諸識亦然因緣性空生處即滅實已還無故非有也大慧非有性建立相者謂虗空滅般涅槃非作計著性建立此離性非性一切法如兔馬等角如垂髮現離有非有是名非有性建立相記曰此明非有性建立相也百法論六種無為此揀偏邪故舉其三謂此三無為法本自無作無自性離於有無如兔馬角本來不有不可作有無見而外道妄見斷空以無想勝性等為涅槃性二乘取偏空滅諦為涅槃性而作取證以不達涅槃本無自性故云非有性建立自性相也以佛意在摧邪故破涅槃自性耳建立及誹謗愚夫妄想不善觀察自心現量非聖賢也是故離建立誹謗惡見應當修學記曰此結答勉修也以彼二乘外道不善觀察自心現量故作建立誹謗二種惡見修如實行者應當遠離前從生滅章至此總明因行竟下明行成得果以結示真因復次大慧菩薩摩訶薩善知心意意識五法自性二無我相趣究竟為安眾生故作種種類像如妄想自性處依於緣起記曰此明自覺聖智趣究竟相也以善觀心意意識五法三自性二無我法則趣究竟佛果以無智無得故不住涅槃為安眾生故以同體大悲無緣慈力現種種身隨緣化導如妄想自性依於緣起也然妄想緣起生本無生法身隨緣故化本不化自覺聖智究竟極至於此乃修如實行者之所歸宿蓋仗真因之所成就殊非下劣三昧可及故此結示譬如眾色如意寶珠普現一切諸佛剎土一切如來大眾集會悉於其中聽受佛法所謂一切法如幻如夢光影水月於一切法離生滅斷常及離聲聞緣覺之法得百千三昧乃至百千億那由他三昧得三昧已遊諸佛剎供養諸佛生諸天宮宣揚三寶示現佛身聲聞菩薩大眾圍繞以自心現量度脫眾生分別演說外性無性唐譯云說外境界皆唯是心悉令遠離有無等見記曰此明如來藏隨淨緣起以顯不思議變業用力也楞嚴觀音證圓通性而云生滅既滅寂滅現前忽然超越世出世間得二殊勝上與十方諸佛同一慈力下與六道眾生共一悲仰故三十二應十四無畏七難二求四不思議等一念頓得此性自具足法爾如然非假外也故此能到自覺聖智究竟趣則應緣成事自然如摩尼珠圓照普應而能現一切佛剎入一切眾會聽一切正法得一切三昧遊諸佛剎供養諸佛而能自現佛身眾會圍繞為自心所現如幻眾生說唯心現量如幻法門普令聞者各了自心頓證聖智悉離有無二見也蓋以不滅不生合如來藏而如來藏圓照一切故能一毫端頭現寶王剎一微塵裡轉大法輪從上諸祖了悟自心者如天普蓋似地普擎乃云十方三世一切諸佛歷代祖師一齊向拂子頭轉大法輪蓋稟明于心不假外耳故諸力中心力最大爾時世尊欲重宣此義而說偈言心量世間佛子觀察種類之身離所作行得力神通自在成就記曰頌上不思議業用皆由唯心觀行而成就也唐譯云佛子能觀察世間唯是心示現種種身所作無障礙神通力自在一切皆成就遠從生滅章至此通明真如隨染淨緣成一切法近從問五法三自性章起止此約三門破邪因以顯正因竟次約一心破妄計以顯真理分二初明寂滅一心次會歸如來藏性且初爾時大慧菩薩摩訶薩復請佛言惟願世尊為我等說一切法空無生無二離自性相我等及餘諸菩薩眾覺悟是空無生無二離自性相已離有無妄想疾得阿耨多羅三藐三菩提記曰此明真如離緣以顯第一義空泯一切法會歸寂滅一心也然前從生滅門入真如門以即妄明真故說真如隨無明緣成阿賴耶識變起根身器界一切諸法分別執取以為實我實法故成前七轉識此則名相斯興由妄想緣起也以了彼諸法唯心所現當體無生故圓成自顯此則正智斯現名相皆如故得二轉依果是故心意意識五法三自性二無我法從此而立然雖轉生死即涅槃轉煩惱即菩提猶屬迷悟邊事未極一心真源以如來藏性真常中求於去來迷悟生死了不可得生死涅槃皆即狂勞顛倒華相故此云正明第一義空要顯五法三自性皆空八識二無我俱遣故大慧至此乃問一切法空無生無二離自性相斯則真妄兩忘聖凡情盡方名自覺聖智究竟實相圓成如來藏寂滅一心也佛祖所傳正法眼藏涅槃妙心義顯於此故武帝問初祖大師如何是聖諦第一義諦師云廓然無聖故千七百則蓋發明此旨爾時世尊告大慧菩薩摩訶薩言諦聽諦聽善思念之今當為汝廣分別說大慧白佛言善哉世尊唯然受教佛告大慧空空者即是妄想自性處大慧妄想自性計著者說空無生無二離自性相記曰此直指第一義空相也然第一義空離言說相離名字相離心緣相不可說示故云真空而此真空全體變成妄想故妄想全體即是真空故云空空者即是妄想自性處除此妄想外別更無空如云空非有外水外無流斯則妄想本是無生無二離自性相不容有說故下文云妄想自性無言說故所以說空無生等者但為不達妄想體空計著以為實有者故作如是說耳大慧彼略說七種空謂相空性自性空行空無行空一切法離言說空第一義聖智大空彼彼空記曰此釋空義也然空本是一但從所觀有七耳此七種空依正智而觀故言前六依邪見而觀故成第七然相性行三空乃三界諸法取為我法二執所謂空生死法也無行空乃空前三法所謂空涅槃法也離言說空乃顯前四總是妄想皆離言說也第一義空乃自覺聖智總離前五故云大空彼彼空則為邪見故下不取云何相空謂一切性自共相空觀展轉積聚故分別無性自共相不生自他俱性無性故相不住是故說一切性相空是名相空記曰此明實相真空也以觀諸法緣生無性生而無生妄想本空但愚夫妄計有自共相今觀皆從因緣展轉積聚微細觀察本自無性所謂諸法不自生亦不從他生不共不無因是故說無生故云自他俱性無性故不生不生故不住斯則諸法無性故空故云說一切性相空是名相空云何性自性空謂自己性自性不生是名一切法性自性空是故說性自性空記曰此言諸法本自無生故自性本空以明法空也前約諸法妄相以明生本無生此明諸法當體全是真如然真如自性本自不生故云自己性自性不生斯則不待觀緣而法法全空故名一切法性自性空此二法空也云何行空謂陰離我我所因所成所作業方便生是名行空記曰此明五蘊緣生無性故空以明行空也唐譯云云何行空所謂諸蘊由業及因和合而起離我我所是名行空此我空也大慧即此如是行空展轉緣起自性無性是名無行空記曰此言五蘊自性無生本來寂滅故空以明涅槃空也唐譯云云何無行空所謂諸蘊本來涅槃無有諸行是名無行空此涅槃空也云何一切法離言說空謂妄想自性無言說故一切法離言說是名一切法離言說空記曰此明生死涅槃二俱空也一切法即世出世法而此諸法本無所有唯依妄想分別但有言說都無實義今能分別之心既無則所分別諸法何有以一切法妄想所持由妄想離言說故一切法離言說也此明俱空謂生死涅槃二俱空也云何一切法第一義聖智大空謂得自覺聖智一切見過習氣空是名一切法第一義聖智大空記曰此言俱空不生以明第一義空也謂一切生死涅槃有無等法皆依一切見過習氣而有然第一義自覺聖智絕諸對待總皆離之故云大空以法界量滅故云大空耳云何彼彼空謂於彼無彼空是名彼彼空記曰此言邪見空也然世尊亦並列於此者意令善知彼法離惡見故以外道不達前六種空但計諸法實有自相共相謂妄見有自處無共共處無自則妄計於彼無此則謂之空於此無彼亦謂之空是謂彼彼空以依此空妄起有無斷常二見故舉而釋之令知其相意令修如實行者不可誤墮此中也故下結云是空最麤汝當遠離大慧譬如鹿子母舍無象馬牛羊等非無比丘眾而說彼空非舍舍性空亦非比丘比丘性空非餘處無象馬記曰此喻釋彼彼空相也舊注鹿子人名也其母即毗舍佉優婆夷深重三寶造立精舍安止比丘於中不畜象馬等以無象馬故言空而堂與比丘及餘處象馬俱未嘗空也故唐譯云我說彼堂空非無比丘眾大慧非謂堂無堂自性比丘無比丘自性非謂餘處無象馬牛羊是名一切法自相彼於彼無彼是名彼彼空記曰此法合也唐譯云一切諸法自共相彼彼求不可得是故說名彼彼空以外道不達諸法性空但妄計推度如此是名七種空彼彼空者是空最麤汝當遠離記曰此結答空義也然此七種空唯彼彼空是外道妄計非第一義聖智大空故勉離之大慧不自生非不生除住三昧是名無生記曰此明自性無生義也諸法當體本自不生謂即生而不生非一向不生也永嘉云若實無生無不生故云不自生非不生然八地以三昧力證無生理乃修而後得者此則諸法自性本自無生除住三昧是真無生離自性即是無生唐譯云無自性者以無生故離自性剎那相續流注及異性現一切性離自性是故一切性離自性記曰此重釋無生所以也然諸法所以不生者以離自性故云何離自性謂諸法生生不住剎那之頃流及他性故云離自性下偈云一切法不生我說剎那義物生則有滅不為愚者說以剎那流轉故無自性無自性故無生契無生者方見剎那了剎那不住者方契無生云何無二謂一切法如陰熱如長短如白黑記曰此喻明諸法以顯究竟本無二也陰熱魏譯云日光影唐譯云如光影如長短如白黑皆相待立獨則不成由是觀之三喻皆依日而言也是則陰熱猶言陰晴謂如日光雲蔽則陰晴朗朗熱夏長冬短晝白夜黑此皆相待而立其實日體本無晦明長短黑白也觀生死涅槃無二為若此大慧一切法無二非於涅槃彼生死非於生死彼涅槃異相因有性故是名無二如涅槃生死一切法亦如是記曰此合無二法也生死涅槃本來平等故唐譯云非於生死外有涅槃非於涅槃外有生死生死涅槃無相違相斯則生死涅槃本無異相然而凡愚二乘妄見生死涅槃二相異者以不達二皆無性故故云異相因有性故一切法不二例若此是故空無生無二離自性相應當修學爾時世尊欲重宣此義而說偈言我常說空法遠離於斷常生死如幻夢而彼業不壞記曰此總頌空無生無二也以長行言一切平等皆不可得恐愚夫起撥無見故此云而彼業不壞淨名云無作無造無受者善惡之業亦不亡宗鏡云以性空故不壞業道因果歷然此所謂不自生非不生也虗空及涅槃滅二亦如是愚夫作妄想諸聖離有無記曰此言諸法空無生無二離心緣相離言說相也如彼三無為法豈容措心圖度由愚夫妄想是有是無聖人以自覺聖智照之一真凝寂萬法皆如故一切皆離斯則一往所說五法三自性八識二無我等猶是生滅迷悟邊事必至空無生無二離自性相方為究竟宗極故下文結指離言爾時世尊復告大慧菩薩摩訶薩言大慧空無生無二離自性相普入諸佛一切脩多羅凡所有經悉說此義諸脩多羅悉隨眾生希望心故為分別說顯示其義而非真實在於言說如鹿渴想誑惑羣鹿鹿於彼相計著水性而彼無水如是一切脩多羅所說諸法為令愚夫發歡喜故非實聖智在於言說是故當依於義莫著言說記曰此結示離言會權歸實也然一切諸佛出世說法本無實法與人但破眾生妄想夢耳以眾生迷本住法入妄想夢見三界法遂為實有佛曉之曰空妄見諸法生佛曉之曰不生妄見生死涅槃二相佛曉之曰無二欲令眾生自悟本法非別有增益也故一切脩多羅所說唯空無生無二如此而已然此一字法門而必欲多方枝指者但以眾生迷根深固希望多途故曲為開示乃不得已而應機施設聖心非實在於言說即其所說皆本離言而眾生不達又執言象以為實法不知法不在言如渴鹿逐𦦨而生水想不知𦦨非水也是故一切佛法如止啼黃葉但令無知眾生發歡喜心耳豈實法耶故大經云了法不在言善入無言際而能示言說如響徧世間故宗鏡云以聖教為明鏡照見自心以自心為智燈燭經幽旨但莫執義上之文隨語生解直須探筌下之指契會本心故此誡云是故觀者當依於義莫著言說達摩西來單傳直指不立文字蓋以空無生無二離自性故然如來出世本為此事四十年來多方淘汰不敢正言但傍通耳至此方許二乘外道皆得如來法身一向皆權今方說實故此經為法華前茅良有以也一往所談顯理究竟於此向後從二卷初起至四卷初法身章皆展轉發明此章之義故彼章復以牛馬性結之臨文自當證知
