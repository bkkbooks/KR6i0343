body:
  text: 宋天竺三藏沙門求那跋陀羅譯明建鄴海印沙門釋德清筆記一切佛語心品第三之下科前破二執通斷二障已竟下雙遣智境以明無智無得分二先遣所觀境次遣能觀智初中又二先遣事境次遣理境且初大慧復白佛言如世尊所說以彼彼妄想妄想彼彼性非有彼自性但妄想自性耳記曰此躡牒佛言將以興難也由佛前云諸法本無自性但妄計有自性耳故此牒之彼彼種種也唐譯云如世尊說由種種心分別諸法非諸法有自性但妄計耳此牒佛說下就義立難云世尊若但妄想自性非性自性相待者非為世尊如是說煩惱清淨無性過耶一切法妄想自性非性故記曰此難染淨俱無成斷滅過將顯境空智有意且先遣事境也大慧因聞佛說諸法皆無自性但妄想耳意謂若諸法但只是妄想分別而無實體相對待者斯則絶無諸法之性矣若果然諸法絶無自性豈不是世尊說衆生染習煩惱與如來清淨涅槃總皆無性耶若染淨俱無則墮斷滅過矣夫何故以世尊說一切法但是妄想分別無實體故斯疑境空而心亦斷也非為猶言豈不是也下佛答以妄境雖空聖智實有佛告大慧如是如是如汝所說大慧非如愚夫性自性妄想真實此妄想自性非有性自性相然大慧如聖智有性自性聖知聖見聖慧眼如是性自性知記曰此言遍計本無圓成實有不墮斷滅過也如是如是者縱許之辭也意謂若果如大慧所說則是斷滅過矣佛謂我說諸法無性者以彼諸法本來寂滅非如凡愚分別而有真實事也故唐譯云一切凡愚分別諸法而諸法性非如是有此但妄執無有性相故云此妄想自性無有性自性相然謂此諸法但是妄想分別有自性耳其實無有性自性相如其所分別者故云然也所言諸法無性者但無遍計之妄想豈絶無真性哉且如自覺聖智實有性自性事此乃聖知聖見聖慧眼明知明見有性自性者非絶無也誰謂斷滅此則依他遍計執無圓成實有但相有性無情有理無耳故論云由彼彼遍計遍計種種物此遍計所執自性無所有依他起自性分別緣所生圓成實於彼常遠離前性大慧白佛言若使如聖以聖知聖見聖慧眼非天眼非肉眼性自性如是知非如愚夫妄想世尊云何愚夫離是妄想不覺聖性事故記曰此承上言有聖智事牒難世尊亦墮有過此難自語相違也大慧意謂若離妄想外果有聖智事許聖知聖見慧眼明知明見但非天眼肉眼可知可見而且非愚夫妄想境界者是則愚夫有能離妄想者亦可許知見矣云何愚夫離是妄想不覺聖性事耶此大慧意許二乘是愚夫中能離妄想者如何世尊往往呵其不見佛性意難自語相違也此下展轉而興五難以成墮有之過世尊彼亦非顛倒非不顛倒所以者何謂不覺聖事性自性故不見離有無相故記曰此難凡聖不分也非顛倒聖人也非不顛倒凡愚也大慧意謂若聖智實有而非知覺境界者而凡愚不知亦可謂聖人矣故云彼亦非顛倒爭奈凡愚現前不覺不能明見此又非不顛倒也何者且云有聖智事又非所知之境今凡夫既不知於所知不可謂之凡有而不能知又不可謂之聖斯墮凡聖不分之過矣世尊聖亦不如是見如事妄想不以自相境界為境界故世尊彼亦性自性相妄想自性如是現不說因無因故謂墮性相見故記曰此難聖若有見亦墮凡情也意謂凡愚執著以自境界為境界聖人智照不同凡夫故云聖亦不如是見如事妄想所以不同者以不以自境界為境界故今若聖人實有聖智為自境界者則不免執著所謂若存聖解即墮凡情亦同凡夫妄見矣所以聖亦同凡者以彼聖智境界執有自體許可明知明見故也且既可知見則亦同凡夫妄想境界矣故云彼亦性自性相妄想自性如是現彼指聖智境界何者以佛法中不論有因無因但有可知見者即墮有法今聖智既有可見豈不同於凡夫妄見耶故曰謂墮性相見故上立難下出過異境界非如彼等如是無窮過世尊不覺性自性相故記曰此釋上難義以成過也謂凡夫境界種種差別不比聖智境界平等一如故曰異境界非如彼等意謂縱許聖智境界一同凡夫斯則墮多因唯感一果過如此因異果一則因果不分壞三界相而招無窮過失矣何者以壞諸法相因果混淆故云不覺性自性相故不覺謂不知猶不辨也世尊亦非妄想自性因性自性相彼云何妄想非妄想如實知妄想記曰此躡前妄想無性聖智有知之言以立難也上三難通難無所知之境此一難難無能知之心大慧因世尊前云妄想無性又云如實而知妄想無性者是名聖智意謂妄想所以無性者以不覺性自性相故也若不覺性自性相則是妄想自性亦不因諸法性自性相而有也故云亦非妄想自性因性自性相然妄想既不因諸法而有是無所知之境矣既無所知之境則無能知之心既無能知之心則聖智亦無知矣豈彼無知之聖智而能分別於無可分別之妄境而言聖智如實而知妄想耶故云彼云何妄想非妄想如實知妄想彼指聖智也意難若有可知之境則妄想不是無性若無可知之境則聖智不是有知且有知即非真知矣非真則妄妄則不如實知如何世尊說有聖智事如實而知妄想耶斯則心境互有進退皆非又墮自語相違所謂招無窮過也世尊妄想異二譯皆云妄想相異自性相異世尊不相似因妄想自性相彼云何各各不妄想而愚夫不如實知然為衆生離妄想故說如妄想相不如實有記曰此轉承上聖智如實知妄想意以約真妄一異難也意謂聖智唯一真不二妄想乃心境多種故云妄想相異自性相異所以妄想種種差別者因諸法有種種差別以心因境有故且因種種境有種種心各各妄想分別各各諸法故云不相似因妄想自性相既妄想心境各各不同而彼聖智唯一但能照一境耳云何於各各心境不妄想而言如實知耶若聖智明知明見各各心境而為如實知者則愚夫分別各各心境亦應是如實知矣云何又說愚夫不如實知耶若聖智果如實而知妄想者則是聖智實有而妄想心境亦實有也世尊何故又為令衆生離妄想故說諸法妄想相不如實有耶上難聖智若有知則聖墮凡情此難妄想若如實知則凡同聖解惟此不但真妄不分抑且又墮多過何者若聖智實有則墮有見若妄想不實有又墮自語相違過以聖智如實知妄想故上立難下正顯過世尊何故遮衆生有無有見事自性計著聖智所行境界計著墮有見記曰此因上二難結世尊亦墮有見過也謂世尊必說聖智事是實有者則墮執有之過矣然世尊何故但遮衆生於有無見事自性不許計著而自於聖智所行境界返生計著而墮有見耶說空法非性而說聖智自性事記曰此總結五難以成世尊亦墮有無二見也謂世尊說諸法妄想空無自性是墮無也說聖智自性事是墮有也是則世尊亦墮有無二見何故但遮衆生耶然上五難皆常情所疑所謂如言取義者大慧愍此故預為設難將冀世尊決擇以祛長夜之疑耳殆非大慧顓愚而起種種謬計也凡諸難意皆例此觀者應知佛告大慧非我說空法非性亦不墮有見說聖智自性事然為令衆生離恐怖句故衆生無始以來計著性自性相聖智事自性計著相見說空法大慧我不說性自性相記曰此并下文總答五難意也然大慧設難雖展轉有五而正意唯難世尊亦墮有無見耳故此世尊答云我說空法不墮無見說聖智事亦不墮有見然我所以說聖智自性事者蓋為衆生聞說諸法無性遂起斷滅恐怖故我說聖智事是實有然為令衆生離斷滅恐怖耳非我墮有見也然我所以說空法者為衆生無始以來妄計諸法執有性自性相故而於聖智離相境界亦執為相見妄生取著故我說空法令其捨離有無二見非我墮無見也然我所說不但說生死法無自性而聖智事亦無自性相故云我不說性自性相此所謂若有若無有是二悉皆離也故下文云大慧但我住自得如實空法離惑亂相見離自心現性非性見得三解脫如實印所印於性自性得緣自覺觀察住離有無事見相記曰此總結答意以顯語不生心也謂我不說諸法定有定無但說我所住自得如實證法令彼聞已離惑亂妄想相見不生恐怖得見真如無相境界知其所見心外無法故云離自心現性非性悟得三解脫門獲如實印印定諸法然以自覺聖智觀察見法自性遠離有無一切諸著故云於性自性得緣自覺觀察住離有無事見相我所說法為令衆生如是而已非我墮有無見也故淨名曰說法不有亦不無以因緣故諸法生蓋如來說法應機破執原無定法此三世如來說法儀式也上遣所觀事境已竟下遣所觀理境復次大慧一切法不生者菩薩摩訶薩不應立是宗記曰此明一切諸法本自無生意誡聽者不應起見以顯境絶也然世尊特旨如此猛然而告之者其來意甚遠蓋以一切外道二乘皆墮生滅見網不能得出故我世尊於楞伽會上單顯無生破彼生見故初卷顯理究竟特云空無生無二離自性相教之以當依於義莫著言說以結示之矣及大慧不能離言說相復以言說第一義等種種疑難至以常聲為請佛答以無生如幻而又疑佛自語相違復特示之以名句形身本無自體以顯如來不說之說恐彼不達無說之義復明告以四種記論因直指之曰一切法不生不容起見以顯離言說相此世尊極盡為人披肝露膽處也而大慧畢竟生滅不亡重重起見業已重重破斥乃至此上又以相續解脫為請世尊答曰一切相續不生本無相續不相續相到此不但生滅見枯抑令聖凡情盡可謂百尺竿頭更進一步矣而大慧猶然纏綿甚至疑佛亦墮有無二見世尊答謂我雖說空有不墮有無以意不在言故然我說法以如實印印定諸法以顯語不生心至此無生之旨燦然如胝白黑矣而世尊懸鑑聞者又將隨語生解必執無生以為實有立定有箇無生的主意而起臆見如此則又墮外道邪見矣故此急處一提猛然斥而誡之曰我說一切法不生者我諸弟子不應立是宗以此法中才有絲毫意見便落生死窠窟即為佛法中外道矣故六祖謂永嘉曰汝甚得無生意嘉云無生豈有意耶祖云無意誰當分別嘉云分別亦非意祖云如是如是所以者何謂宗一切性非性故及彼因生相故記曰此徵釋外道所立不生宗有二種過也謂外道所計不出斷常二見故所立不生宗有二謂妄計諸法絶然斷滅以為不生故云一切性非性故此斷見也又計別有異因能生諸法謂是作者如此方莊周所言生生者不生以由不生者能生萬法正若彼方所言作者不生而為生因故謂彼若言不生者既為生因此因即是生相矣故云及彼因生相故此常見也此出彼宗體下顯過說一切法不生宗彼宗則壞彼宗一切法不生彼宗壞者以宗有待而生故記曰此出彼外道所立宗有能別不極成過也佛謂彼外道所立不生宗彼則自壞不生義何者以彼宗有待而生故謂彼二種不生義皆有待而然也斷見不生有待者以待諸法滅盡方顯不生義故常見不生有待者以待生法方顯不生故既皆有待豈真不生耶故中論云若法因待成是法還成待名雖不生還成生法是故彼宗自壞不生義亦名自教相違又彼宗不生入一切法故不壞相不生故立一切法不生宗者彼說則壞記曰此出彼宗過之所以而以正法揀之也然彼宗所以壞者以彼宗所立不生墮有無斷常等一切法故且一切法皆是生滅無常而彼依有無而立宗其實未出生法是彼言雖不生而義實生也故墮自教相違過是違自宗也故云彼宗不生入一切法故若以正法揀之然我法以不壞相為不生以生即無生故彼以壞相為不生然既壞相是無常也豈真無生耶然彼壞相者以斷滅為不生是壞生相也以不生能生是壞不生相也今以我不壞相法揀之故彼所立一切法不生宗者彼說則壞以彼妄計不出有無生法故也故下文出其所以大慧有無不生宗彼宗入一切性有無相不可得記曰此言彼宗壞之所以也謂我說彼宗則壞者以彼計有無皆不生故依之立宗然一切生滅之法不出有無是則彼所立宗即入一切法中矣且諸法本無若有若無皆不可得有無既不可得彼却依何處而立宗耶是故我說彼宗則壞故唐譯云彼宗有無法皆不生此宗即入一切法中有無相亦不生故亦不生者謂有無亦本不有也大慧若使彼宗不生一切性不生而立宗如是彼宗壞以有無性相不生故不應立宗五分論多過故展轉因異相故及為作故不應立宗分記曰此以正教因相揀彼邪宗以成彼過結不許立宗義也若使猶設使也佛謂設使彼宗依一切性而立宗如此則彼宗自壞以一切法有無性相本自不生故以一切諸法本自無生何又用彼立宗耶故彼不應依之立宗然彼所立宗若以正教因明五分勘之則彼犯多過以展轉因相與宗不合多異相故不但因不合宗而宗自體亦不成就何者以彼計作者為不生故是故我說教諸弟子於無生義不應更立宗分也五分論多過者五分即一宗二因三喻四合五結多過者謂宗有九過因有十四過同喻有五過異喻有五過共有三十三過其外道所立三支若以正法揀辨但有一過未遣即屬邪宗以因喻秪為成立宗體故故因不轉喻不齊皆不成宗故展轉因異相及為所作故則成多過故不應立宗五分義具載因明入正理論以義廣恐繁不能備出知此則能定佛法綱宗摧伏邪見觀者應探討彼論庶得其旨謂一切法不生如是一切法空如是一切法無自性不應立宗記曰此總結前義也向云空無生無二離自性相今謂不生既不應立宗則若空若無性都不應立宗也以但有言說都無實義凡所分別皆不如實知見故大慧然菩薩摩訶薩說一切法如幻夢現不現相故及見覺過故異說一切法如幻夢性除為愚夫離恐怖句故大慧愚夫墮有無見莫令彼恐怖遠離摩訶衍記曰此如來教諸菩薩說法之式也問曰菩薩於不生法既不應立宗當說何等法耶答曰然菩薩當說一切法如幻夢現不現故然幻夢雖現其實不現意顯諸法雖生其實無生也諸法本自不生而現有生者非法生也乃衆生見覺之過妄見有生耳故當說一切法如幻夢性不可說諸法實有不生也然而亦有說不生者乃為令愚夫離恐怖句故不得已而以不生句斷彼生見耳以一切法不生不容有說起心動念即墮生死故然為愚夫說不生者因愚夫一向堅執有無實法一旦說如幻夢便生恐怖則遠離大乘斷佛種性苟不以不生句隨機而開導之則於佛法絶分而菩薩亦失慈悲故云愚夫墮有無見莫令彼恐怖遠離摩訶衍摩訶此云大衍此云乘菩薩如此說法則得二通相矣爾時世尊欲重宣此義而說偈言無自性無說無事無相續彼愚夫妄想如死尸惡覺唐譯云惡覺如死尸一切法不生非彼外道宗至竟無所生性緣所成就一切法不生慧者不作想彼宗因生故覺者悉除滅記曰此通頌五難章空無生無自性本離言說相離心緣相以明外道不應立宗也無事即空以諸法本空故無相續但愚夫妄想於不實計實如此惡覺如死尸無知徒增穢污耳是則空無自性不可思議而不生義豈容外道妄計而可宗之耶以彼所立不生至於畢竟斷滅無所生法以不達緣生無性無性緣生故云至竟無所生性緣所成就下句性字義貫上句讀又所成就所字作不字看故唐譯云以彼所有生非緣所成故然一切法不生義唯在有智者忘心默契而已不應作想況彼宗因生相而立豈真不生耶故覺者悉除滅以彼不生亦生相故譬如翳目視妄見垂髮相計著性亦然愚夫邪妄想施設於三有無有事自性施設事自性思惟起妄想相事設言教意亂極震掉佛子能超出遠離諸妄想記曰此頌諸法本無但妄想有以誡佛弟子不應起見也空中本無毛輪而因翳目有之以喻真中本無三界諸法而因妄想計之愚夫但執假名動亂心識具正知見者當遠離也故唐譯云三有唯假名無有實法體由此假施設分別妄計度假名諸事相動亂於心識佛子悉超過遊行無分別非水水想受斯從渴愛生愚夫如是惑聖見則不然聖人見清淨三脫三昧生遠離於生滅遊行無所有修行無所有亦無性非性性非性平等從是生聖果記曰此頌明三界之相不異聖凡之見乃殊也然三界本無實法而愚夫妄見為實有者如陽𦦨非水而作水想是從渴愛所生也愚夫如此聖智豈然之哉以聖見清淨故所見三界空洞無物即此便證解脫三昧遠離生滅矣唐譯云常行無相境修行無相境亦復無有無有無悉平等是故生聖果由凡夫所見差別故有業果相續聖人所見三界不異故生聖果耳故經云不如三界見於三界云何性非性云何為平等謂彼心不知內外極漂動若能壞彼者心則平等見記曰此頌徵釋上義以明聖凡平等也謂三界是一云何凡愚見有無云何聖人見平等以彼愚夫不了三界本空妄計心境以為實有故內外極漂動若能了此則當念平等矣平等寂滅之異稱所謂未達境唯心起種種分別達境唯心已分別即不生上遣所觀境已竟下遣能觀智爾時大慧菩薩復白佛言世尊如世尊說如攀緣事智慧不得是施設量建立施設所攝受非性攝受亦非性以無攝受故智則不生唯施設名耳唐譯云如佛所說若知境界但是假名都不可得則無所取無所取故亦無能取能取所取二俱無故不起分別說名為智記曰上辨妄想無性已此大慧理佛一往所談聖智境界以辨聖智無知也魏譯云如世尊說智慧觀察不能見前境界諸法乃至如實覺知無法可取亦無能取是故智亦不能分別而取故云智則不生然攀緣事乃前境界諸法所謂相也前云不得相是智而智所以不得相者以一切境界但是妄想施設建立本無所取能取性故既無可取之境縱有真智又何從分別而取之耶故云以無可取故智則不生殊不知妄想境界如暗智慧如明明來則暗自去非是有暗與明作對也是故所言聖智無知者由無所知之境則了境之智亦亡以無能所取相故云不得相耳所謂唯如如智獨存殆非絶然無知也如此大慧似乎不會聖智不得相義將謂有境相對如何不得必欲知境方名為智故此起疑乃牒舉前義將以致難也此牒義下致疑云何世尊為不覺性自相共相異不異故智不得耶為自相共相種種性自性相隱蔽故智不得耶為山巖石壁地水火風障故智不得耶為極遠極近故智不得耶為老小盲冥諸根不具故智不得耶記曰此致疑也不覺等者謂全然不知彼境界也自相等隱蔽猶言隱沒不現謂全無可知之境作對也山巖等障謂知不透徹也極遠目力難到極近細而難知也諸根不具謂盲冥無知老小謂不能一一盡知也大慧疑智不得相莫不以此五者為不得耶下致難世尊若不覺自共相異不異智不得者不應說智應說無智以有事不得故記曰此一難也謂若全不知彼境為不得者此則不名智應名無智以有境界而不知故若復種種自共相性自性相隱蔽故智不得者彼亦無智非是智世尊有爾𦦨故智生非無性會爾𦦨故名為智記曰此二難也謂若全無可知境界作對為不得者此亦非智何者以有所知之境故智生非無能知之性會彼所知之境而便以為智耶故唐譯云此亦非智以知於境說名為智非不知故爾𦦨所知也若山巖石壁地水火風極遠極近老小盲冥諸根不具智不得者此亦非智應是無智以有事不可得故記曰此合三四難也謂在世界則山巖石壁四大等事或極遠而目力不到或極近而牆壁遮障四大擁逼此則知不透徹在衆生則老小盲冥無所識知或諸根不具不能盡知若以此等為不得者此亦非智應是無智以有事不可得故唐譯云彼亦非智以有境界智不具足而不知故此大慧意蓋以不得前境為無智必欲見境方為智也故下破之佛告大慧不如是無智應是智非非智我不如是隱覆說攀緣事智慧不得是施設量建立記曰此斥答所疑為非量也佛意謂豈不得前境便為無智耶應知此無智實是智非無智也然我所說智不得相者不是說實有前境迭相隱覆故言智慧不得也若計有前境迭相隱覆故智慧不得者是妄想施設建立非智慧也上斥非下正答覺自心現量有無有外性非性知而事不得不得故智於爾焰不生順三解脫智亦不得非妄想者無始性非性虗僞習智作如是知是知彼不知故於外事相攝受計著處所相性無性妄想不斷自心現量建立說我我所記曰此正答實義也佛言我所說智不得者以我覺了一切外法若有若無皆無自性唯是自心現量皆悉空寂以無境界與智為對我知如此事故言智不得也故云覺自心現量有無外性非性知而事不得而猶如此也然既無當心之境境如矣亦無了境之心心如矣心境皆如俱不可得以心境俱不可得故智於爾𦦨不生爾𦦨所知之境也境不可得則境不生心不可得則智不生心境無生則順三解脫矣三解脫謂空無相無願順入也然三解脫非智不入既入已則智體亦忘故云智亦不得此所謂聖智無知也然智無知處殆非妄想愚夫以無始虗僞戲論熏習之智能作如是知也此亡知之知非彼所知故云是知彼不知由不知無知之知故於外境界形相有無妄想分別相續不斷故魏譯云為離如是虗妄心故說一切法唯自心見執著我我所故故云自心現量建立說我我所相攝受計著不覺自心現量於智爾𦦨而起妄想妄想故外性非性觀察不得依於斷見記曰此責大慧不如實知而起無智斷滅之見也由不達我我所諸法自心現量故於智於境起於妄想以妄想故觀察若有若無不得實義遂於智境依斷滅見而起分別是皆不善二通不達實義故妄興邪智也故下文以二通結責之爾時世尊欲重宣此義而說偈言有諸攀緣事智慧不觀察此無智非智是妄想者說記曰此總頌斥疑也謂若實有攀緣境界而言智慧不觀察即妄分別以無智為非智者此皆是妄想愚夫所說非明智也於不異相性智慧不觀察障礙及遠近是名為邪智記曰此合頌三問總斥為邪智不正見也老小諸根冥而智慧不生而實有爾𦦨是亦說邪智記曰此頌第四問合前三問中皆以有所知境界方名為智之義總斥之曰此亦為邪智然若實有爾𦦨是亦邪說足知所知障空也此上二執已破二障已淨智行已圓下明忘言頓證以顯果海離緣復次大慧愚癡凡夫無始虗僞惡習妄想之所回轉回轉時自宗通及說通不善了知著自心現外性相故著方便說於自宗四句清淨通相不善分別記曰此總結示果海離緣故責大慧於第一義諦自覺聖智妄起分別隨語生解橫生邪執謬解佛意良由不善二通相故也自覺聖智離心緣相離言說相然雖非有言不是無語故佛所說聖智無知等者正欲聞者離言觀義忘知契心耳何其聞者猶然隨言妄生邪解斯皆無始虗僞妄想惡習之所回轉而於自宗說通不善了知但執外境以為實有故著方便言說而不能善入清淨實相離知境界也論云現前立少物謂是唯識性以有所得故非實住唯識以境智未忘故也世尊至此偶以二通結責者意謂前者我已教諸三乘修行之士當善二通相不可隨言取義矣意責大慧何其不體佛意爾乃又執言說假名而興種種邪執耶故教以忘言契證也來意如此故以二通結責之已上二障已淨二執已破二死已亡而結責以忘言契證以示自利功圓此下示利他行且先雙結二利行大慧白佛言誠如尊教惟願世尊為我分別說通及宗通我及餘菩薩摩訶薩善於二通來世凡夫聲聞緣覺不得其短記曰此大慧因佛斥責不善二通而於聖智妄起分別故此責躬請教二通也問曰二通前已發明今復重請者何也答曰前因外道二乘妄起斷常二見蓋由不了唯心現量境界大慧特請宗通相示彼知之令開正見而世尊因曰彼等不獨不善宗通相而亦不善說通相故隨語生解特說二通之相令彼外道二乘以便修行不墮邪見意在破外道二乘二見令知離言之行故也此因大慧躡妄想無性之言以起五難躡聖智不得之言以起四疑是皆不了唯心不達方便言說而復隨言取義將謂實有境智可得故佛責以不善二通作如是見故此大慧特請二通將以依教奉行說法利生以斷二乘之疑意在遣心境空境智是以妙行契妙境也前有相字乃示彼令知以便自利今此二通意在必行且便利他觀者應知庶得語義不生異見耳前乃忘言之行此乃離言實證也佛告大慧善哉善哉諦聽諦聽善思念之當為汝說大慧白佛言唯然受教佛告大慧三世如來有二種法通謂說通及自宗通說通者謂隨衆生心之所應為說種種衆具契經是名說通記曰此說通意在利他也梵語修多羅此云契經謂契理契機也契理則妙符中道契機則巧被三根以一經言含多義故云衆具契經謂理無不該機無不攝也自宗通者謂修行者離自心現種種妄想謂不墮一異俱不俱品超度一切心意意識自覺聖境界唐譯云於自覺聖境界離因成見相二譯皆云離諸因緣相應見相一切外道聲聞緣覺墮二邊者所不能知我說是名自宗通法記曰此自宗通意在自利也以自通乃離心意識境界故非外道二乘所可知也離因緣相應見者謂心境皆離故大慧是名自宗通及說通相汝及餘菩薩摩訶薩應當修學爾時世尊欲重宣此義而說偈言我謂二種通宗通及言說說者授童蒙宗為修行者記曰菩薩有二利之功故說通應機說法故云授童蒙謂凡夫顓愚如童蒙也宗通自修行謂修如實行故上自他二行已竟下專請利他行爾時大慧菩薩白佛言世尊如世尊一時說言世間諸論種種辨說慎勿習近二譯以世間諸論作盧伽耶陀此翻左世亦云惡論即外道論也若習近者攝受貪欲不攝受法魏譯云彼人但攝受欲食不攝法食世尊何故作如是說記曰此特問利他行也蓋承世尊一往痛責弟子不許近習外道論議大慧因聞說通利他之談意謂不善彼宗其說不通無以利彼故理世尊前言以致疑曰世尊既云說通利童蒙何故向來不許近習外道議論者何耶因此發問世尊答謂外道議論依邪見立若近習者壞正知見意在入自宗通者當離名言習氣為第一也然三界本無實法但以名言習氣為體至若名言中而外道議論最為壞正知見破壞佛法者是故修行如實行人當所痛絶故大慧依說通而問向下世尊依自宗通而答也佛告大慧世間言論種種句味因緣譬喻採集莊嚴誘引誑惑愚癡凡夫不入真實自通不覺一切法妄想顛倒墮於二邊凡愚癡惑而自破壞諸趣相續不得解脫唐譯云廬伽耶陀所有詞論但飾文句誑惑凡愚隨順世間虗妄言說不如於義不稱於理不能證入真實境界不能覺了一切諸法恆墮二邊自失正道亦令他失輪回諸趣永不出離不能覺知自心現量不離外性自性妄想計著是故世間言論種種辨說不脫生老病死憂悲苦惱誑惑迷亂記曰此甚言世論之過深誡修如實行者不可近習也所以不可近習者以不入真實自通不覺自心現量但依生滅妄想不脫生老病死以但有言說都無實義故然世尊於此經專誡名言習氣者蓋娑婆世界以音聲為佛事由此界衆生耳根最利以聲入心通直達法性最為甚深故楞嚴揀選圓通以耳根為第一此經令修如實行者以戒名言為第一以此方入道無過耳根為最勝而障道亦無過名言為最勝故所謂根塵同源縛脫無二也然凡夫雖依名言結業而間有利根宿具般若聞熏者能觀言語性空音聲不實如風號谷響即入無生者有之若夫外道邪論一入聞熏即染污法性壞正知見破涅槃城永劫沈淪斷滅佛種縱遇佛出而為見火所燒邪智益熾徒與正法相抗雖如來以無量善巧四辨大悲潛神與居亦不能化而入也觀夫世尊出世說法已四十年而六師之徒如麻似粟即其捨邪歸正者如三迦葉波及鶖子等約止千二百五十人耳就中巨擘尚內祕之儔當正法盛時尚爾況末法乎此吾佛世尊懸鑒後五百年此輩當大破壞結集是以此經專以破邪為用大為今日設也觀夫聖人憂患之心當何如耶悲夫此經自入中國幾二千年而吾輩老師宿學讀之苦不能句甚為眥讐況遺言得意以契佛祖心印執之以定綱宗行賞罰克荷如來家業乎由不善此法門宜乎流習世論甘受佛呵而為惡弟子也惟此未嘗不涕下大慧釋提桓因廣解衆論自造聲論彼世論者有一弟子持龍形像唐譯云現作龍形詣釋天宮建立論宗要壞帝釋千輻之輪隨我不如斷一一頭以謝所屈作是要已即以釋法二譯皆云論法摧伏帝釋釋墮負處即壞其車還來人間如是大慧世間言論因譬莊嚴乃至畜生魏譯云乃至現畜生身亦能以種種句味惑彼諸天及阿修羅著生滅見而況於人是故大慧世間言論應當遠離以能招致苦生因故慎勿習近大慧世論者唯說身覺境界而已記曰此言慎勿近習世論之所以也謂世論弟子以畜生形尚能摧伏諸天修羅況復於人而我末法弟子無道力者倘一近習豈不為彼破壞耶若為破壞則能招致諸苦生因故我誡之慎勿近習以彼世論無自宗通唯說身覺境界而已是故我說但攝受貪欲不攝受法要誓約也大慧彼世論者乃有百千二釋皆有字句但於後時後五百年當破壞結集惡覺因見盛故惡弟子受記曰此世尊懸讖末法魔強法弱之時也然彼世論於我法後五百年所以而能破壞結集者以時俗澆薄其時人多惡覺因見熾盛故而我法中有惡見弟子亦受彼法是故令彼壞正法也由是觀之然壞法者蓋自壞耳豈彼力耶因見者因謂邪因無因見謂十使煩惱中五利使以不善解正法故云惡覺如是大慧世論破壞結集種種句味因譬莊嚴說外道事著自因緣無有自通記曰此言破壞結集之所以也然彼世論所以而能破壞正法者以彼種種句味因譬莊嚴皆說外道事執著自性因緣無非邪見無有自性宗通故苟知而近習者即飲他毒藥不知而近習者所謂誤服毒藥是也大慧彼諸外道無自通論於餘世論廣說無量百千事門無有自通亦不自知愚癡世論記曰此結成彼法成事相承不自知其非也以彼本法無自通故所傳弟子廣說百千事門亦皆無自通以無自通故而彼癡人亦終不自知為愚癡世俗之論此誤服毒藥者也爾時大慧白佛言世尊若外道世論種種句味因譬莊嚴無有自通自事計著者記曰此大慧牒上佛語將以發難也世尊亦說世論為種種異方諸來會衆天人阿修羅廣說無量種種句味亦非自通耶亦入一切外道智慧言說數耶記曰此大慧因聞佛斥外道世論無有自通遂躡以難佛為人天修羅廣說世間種種諸法亦非自智所證之法皆世論也豈世尊亦無自通耶豈不墮一切外道邪智妄想數中耶大慧依世論而問世尊依自通而答佛告大慧我不說世論亦無來去唯說不來不去大慧來者趣聚會生去者散壞不來不去者是不生不滅我所說義不墮世論妄想數中所以者何謂不計著外性非性自心現處二邊妄想所不能轉相境非性覺自心現則自心現妄想不生妄想不生者空無相無作入三脫門名為解脫記曰此世尊依自通答其所說法非世論也世論者去來生滅之法也來者緣會而生故云趣聚會生去者緣散而滅故云散壞以有去來生滅故云世論然我所說者無來無去不生不滅之法豈墮彼世論妄想數中耶所以不墮者以我不著外境有無了達唯心現量故有無妄想所不能轉者以了境無性故故云相境不生此境不生也覺自心現則自心妄想不生此心不生也境不生故無來去心不生故不生滅心境無生即是空無相無作入三脫門名為解脫矣意謂我所說者乃解脫法非生死法所以不墮大慧我念一時於一處住有世論婆羅門來詣我所不請空間便問我言瞿曇一切所作耶我時報言婆羅門一切所作是初世論彼復問言一切非所作耶我復報言一切非所作是第二世論記曰此世尊將欲廣明世論故舉昔事且教菩薩說通止論之法式也舊說婆羅門具云婆羅賀磨拏此云淨裔亦云淨行自稱其祖自梵天口生因從梵姓諸經中梵志即此類也是唯五天竺有餘國無之其種別有經書世承為業或在家或出家皆恃術倨傲多尚諍論空間無我也以彼所計梵天作者以為神我故云不請空間而問作者生一切法以彼所見不出世論開口便落妄想故一問世尊答云一世論二問答云二世論乃至多問答云多世論故後責云乃至少有心識流動分別外境皆是世論也彼復問言一切常耶一切無常耶一切生耶一切不生耶我時報言是六世論大慧彼復問我言一切一耶一切異耶一切俱耶一切不俱耶一切因種種受生現耶唐譯云一切皆由種種因緣而受生耶我時報言是十一世論大慧彼復問言一切無記耶一切記耶有我耶無我耶有此世耶無此世耶有他世耶無他世耶有解脫耶無解脫耶一切剎那耶一切不剎那耶虗空耶非數滅耶涅槃耶瞿曇作耶非作耶記曰此虗空下問三無為是作是不作也唐譯云虗空涅槃及非擇滅是所作耶非所作耶以外道妄計三無為皆是有作故後世尊答已而復特諭大慧云涅槃虗空滅非有三種但數有三耳意謂三法尚不可得何況又計作與不作耶有中陰耶無中陰耶大慧我時報言婆羅門如是說者悉是世論非我所說是汝世論我唯說無始虗僞妄想習氣種種諸惡三有之因不能覺知自心現量而生妄想攀緣外性如外道法我諸根義三合知生我不如是唐譯云如外道說我及根境三和合知生我不如是知識也婆羅門我不說因不說無因唯說妄想攝所攝性施設緣起非汝及餘墮受我相續者所能覺知唐譯云我不說因不說無因唯依妄心以能所取而說緣起非汝及餘取著我者之所能測大慧涅槃虗空滅非有三種但數有三耳記曰此世尊備敘昔對外道所說之法如此也謂外道執其所見一一問佛佛總斥之曰此皆是汝之世論非我所說也然我說者唯說一切衆生因於無始戲論諸惡習氣而生三界之相不了唯是自心所現而生妄想攀緣外法而妄取著實無可得我所說者如是而已至若外道所說神我與根境三法和合而生識者此是汝外道見我不如是且汝外道說有異因能生諸法又說諸法自然從無因生此是汝法我法不然我唯說妄想能取所取而說緣起我此說者非汝外道著我妄想者之所能知佛謂外道如彼彼而問我但如此而答此即所謂止論亦即說通相也然外道諸問皆是彼計至若妄計三無為作不作者乃涉我法恐有所濫故世尊特告大慧曰彼所問三無為者非有三種但數有三耳非實有也故唐譯云虗空涅槃及非擇滅但有三數本無體性何況而說非與非作復次大慧爾時世論婆羅門復問我言癡愛業因故有三有耶為無因耶我時報言此二者亦是世論耳彼復問言一切性皆入自共相耶我復報言此亦世論婆羅門乃至意流妄計外塵唐譯云乃至少有心識流動分別外境皆是世論記曰此外道因聞佛說虗僞惡習為三有因故躡問彼三有者果因癡愛業因而有耶是無因耶蓋彼意執定無因也世尊答謂不但有所妄計分別言說為世論乃至少有心識流動分別外境皆墮外道邪見悉是世論何者以舉心動念即乖法體妄見心外有法即入外道見故溈山坐次仰山入來師曰寂子速道莫入陰界仰曰慧寂信亦不立師曰子信了不立不信不立仰曰秪是慧寂更信阿誰師曰若恁麼即是定性聲聞仰曰慧寂佛亦不立此古人心識不少流動之樣子也不如是安稱超佛越祖之見復次大慧爾時世論婆羅門復問我言頗有非世論者不我是一切外道之宗說種種句味因緣譬喻莊嚴我復報言婆羅門有非汝有者非為非宗非說非不說種種句味非不因譬莊嚴記曰此外道被斥皆墮世論遂問頗有非世論者不且云我為一切外道之宗所有詞論皆從我出何獨不當佛意觀其自負如此正是堅著我見尚諍論者而世尊答云有非世論但非汝有汝所有者不出作為所立自宗但依言說以立種種句味因譬莊嚴耳我法非作為非宗非說而亦不墮空見故云非不說種種句味非不因譬莊嚴婆羅門言何等為非世論非非宗非非說記曰此外道意謂佛既斥我為非宗非說而不知何等為非世論可有非非宗非非說者蓋所願聞也非非者是也我時報言婆羅門有非世論汝諸外道所不能知以於外性不實妄想虗僞計著故記曰此世尊斥答外道謂有非世論但非汝外道之所能知也汝等所以不知者以彼計著不實妄想分別外境故我若有說汝便隨語生解計著邪見矣謂妄想不生覺了有無自心現量妄想不生不受外塵妄想永息是名非世論此是我法非汝有也記曰此示以正因非世論者如此但此是我法非汝有也汝之所有者去來生死之法耳故下云婆羅門略說彼識若來若去若死若生若樂若苦若溺若見若觸若著種種相若和合相續若愛若因計著唐譯云若因而生計著婆羅門如是比者是汝等世論非是我有記曰此示世論邪因相也謂外道世論多種不能盡述今略說彼識所分別者不出來去死生苦樂沒溺邪見觸著種種諸相於中妄計和合相續若愛著不捨若妄立為因而生計著如此而已比者類也謂如此之類皆是汝之世論而我法中無此說也大慧世論婆羅門作如是問我如是答彼即默然不辭而退魏譯云默然而去而不問我建立真法唐譯云不問於我自宗實法默然而去思自通處作是念言沙門釋子出於通外說無生無相無因覺自妄想現相妄想不生記曰此敘外道固執難化顛倒之狀也以彼與佛立論負墮亦不更請佛教傲然不辭而退此其我慢倨恃之態何如耶且復心不受善亦不知非以思自所通處返以佛說為非乃心念之曰沙門所見出於我通之外其所說者乃無生無相無因心境不生斷滅之法耳故魏譯云沙門釋子外於我法是可憐愍說一切法無因無緣無有生相唯說自心分別見法若能覺知自心見相則分別不生前云彼無智者返以我言為不正論謂是故也大慧此即是汝向所問我何故說習近世論種種辨說攝受貪欲不攝受法記曰此世尊趣舉大慧請詞以結答問意也謂汝向問我近習種種世論攝受貪欲不攝受法者如上我說婆羅門者皆是攝受貪欲不攝受法然一切世論皆此類也大慧白佛言世尊攝受貪欲及法有何句義魏譯云何者名貪句義何者名法句義佛告大慧善哉善哉汝乃能為未來衆生思惟咨問如是句義諦聽諦聽善思念之當為汝說大慧白佛言唯然受教佛告大慧所謂貪者若取若捨若觸若味唐譯云所言財者可觸可受可取可味繫著外塵墮二邊見復生苦陰生老病死憂悲苦惱如是諸患皆從愛起斯由習近世論及世論者我及諸佛說名為貪是名攝受貪欲不攝受法記曰如來頻斥世論但攝受欲食不攝受法食者以彼恃術誑惑愚夫唯貪利養為邪命食深誡說法者當以清淨也愚讀智證知曹山貴正命食立三墮故黃蘗云今時才出來者只欲多知多解廣求文義喚作修行不知多知多解翻成壅塞唯多與兒酥乳消與不消都總不知三乘學道人皆此樣盡名食不消食不消者所謂知解不消皆為毒藥盡向生滅邊收真如之中無此事故噫三乘學道人知見不消盡皆邪命況彼外道世論非酥乳比苟一染指豈非飲他毒藥乎故維摩詰曰為壞和合相故應取食為不受故應受彼食以空聚想入於聚落所見色與盲等所聞聲與響等所臭香與風等所食味不分別受諸觸如智證知諸法如幻相無自性無他性本自不然今亦不滅乃可取食此所謂於食等者於法亦等如此則攝受欲食即攝受法食此曹山不斷聲色墮所以為正命食也苟少有可觸受可取味者即為邪命是名攝受貪欲不攝受法矣大慧云何攝受法謂善覺知自心現量見人無我及法無我相妄想不生善知上上地離心意意識一切諸佛智慧灌頂具足攝受十無盡句於一切法無開發自在首卷云無開發行自心自在是名為法所謂不墮一切見一切虗僞一切妄想一切性一切二邊記曰此明攝受法者當如此也然能善覺知自心現量見二無我離心意識則自然不墮一切諸見戲論分別斷常二邊以不墮一切見而能消一切見如此則六師所墮汝亦隨墮乃可取食此曹山隨墮所以為正命食也大慧多有外道癡人墮於二邊若常若斷非黠慧者受無因論則起常見外因壞因緣非性則起斷見大慧我不見生住滅故說名為法記曰此結證世出世法所以異也彼墮生滅二見故名為貪欲我不見生住滅故名為法耳舊注云無黠慧者受此無因論計四大不從因生則起常見或計造色外因壞滅不復更生因緣之性亦無則起斷見以彼論雖多總不出二見皆生滅耳由我不見生住滅故淨名曰謗諸佛毀於法不入衆數終不得滅度汝若如是乃可取食此曹山尊貴墮所以為正命食也大慧是名貪欲及法汝及餘菩薩摩訶薩應當修學爾時世尊欲重宣此義而說偈言一切世間論外道虗妄說妄見作所作彼則無自宗唯我一自宗離於作所作為諸弟子說遠離諸世論記曰此頌揀辨邪正也以彼外道計梵天為能作一切諸法為所作故於正法真實自宗不能成立我以一心為自宗離於能作所作以此為諸弟子說令其遠離彼諸世論也心量不可見不觀察二心攝所攝非性斷常二俱離乃至心流轉是則為世論妄想不轉者是人見自心記曰此頌自宗真現量破彼妄計也然真心現量本自無相不可以妄見見而外道不善觀察妄執有無能所斷常二見俱不能離故為世論不獨如此乃至但一舉心動念心識才有流轉即為世論何況妄執諍論者乎若能於妄想境界不被動轉者我說是人則為真能明見自心現量者矣來者謂事生去者事不現明了知去來妄想不復生記曰此頌教觀察入自心現量之方便也外道所以流轉者以妄見有去來之相故殊不知來者暫現如電速滅去則不現本無所有若人觀察諸法明見去來生滅之相了知本來寂滅者是人則妄想不復生矣有常及無常所作無所作此世他世等斯皆世論通前明斷證因相已竟下明斷證果相分二初轉依涅槃果次轉依菩提果初中又二初揀二十一種邪宗次示最上一乘正果今初揀邪宗爾時大慧菩薩復白佛言世尊所言涅槃者說何等法名為涅槃而諸外道各起妄想記曰從前問不實妄想以來齊此總明能證之行已圓故大慧請問所證之果也然二轉依果謂轉煩惱成菩提轉生死成涅槃此先問涅槃相然此經正在破邪顯正故理行因果皆依邪正而辨故每每發問皆互舉二途故此正問大涅槃果乃曰世尊所言涅槃者說何等法名為涅槃而外道乃於涅槃法作妄想分別耶意顯不起分別離心識處即大涅槃故先揀邪宗後示正果佛告大慧諦聽諦聽善思念之當為汝說如諸外道妄想涅槃非彼妄想隨順涅槃唐譯云如諸外道分別涅槃皆不隨順涅槃之相大慧白佛言唯然受教佛告大慧或有外道陰界入滅境界離欲見法無常心心法品不生不念去來現在境界諸受陰盡如燈火滅如種子壞妄想不生斯等於此作涅槃想大慧非以見壞名為涅槃記曰此無想外道也云斯等者言其不一也以見五陰界入俱滅離欲界繫見諸法無常以心心數不起為定持心一境不見三世之相此無想也諸受陰盡如燈火滅如種子壞妄想不生此正楞嚴所言以永滅依為所歸依成空亡果生斷滅種者以妄見有涅槃之相故佛破云此等非以見壞為涅槃大慧或以從方至方名為解脫境界想滅猶如風止記曰此指常見外道立無因為涅槃也前云受無因論則墮常見舊注從方至方謂無有異趣方類也此楞嚴所云知人生人悟鳥生鳥言其因果從八萬劫無復改移謂今盡此形從類至類亦復如是也然此外道所以妄見斷滅者以境界想滅其實未盡想元故云如風暫止又有外道計方為常住實有具諸功能生一切法故以方為涅槃故云從方至方二釋皆無因也或復以覺所覺見壞名為解脫或見常無常作解脫想記曰此生滅想心已滅妄謂理中自然成不生滅故云覺所覺之見壞以此為涅槃者也又以所覺不壞者為常以能覺見壞為無常此正如楞嚴所明四顛倒見一分常一分無常故云見常無常作解脫想若按唐譯云或謂不見能覺所覺或謂不起分別常無常見此則冥然不辨皆屬斷見如云分別都無拘賖黎等昧為冥諦者是也或見種種相想招致苦生因思惟是已不善覺知自心現量怖畏於相而見無相深生愛樂作涅槃想記曰此指計七斷滅為涅槃者也欲界人天諸相為生苦因故外道或計身滅或欲盡滅或苦盡滅或極樂滅或極捨滅故云怖畏於相而見無相深生愛樂妄作真涅槃想或鈍根羅漢厭苦斷集棄有著無貪著偏空以為涅槃亦在此列以不善覺知自心現量故怖畏於相而見無相深生愛樂也此上五種皆斷見或有覺知內外諸法自相共相去來現在有性不壞作涅槃想記曰此計五蘊根塵皆是實有自性三世相續不壞以為涅槃者也此正楞嚴所計五陰中死後有相四種不死乃常見也或謂我人衆生壽命一切法壞作涅槃想記曰此計死後無相以為涅槃乃斷見也或以外道惡燒智慧見自性及士夫彼二有間士夫所出名為自性如冥初比求那轉變求那是作者作涅槃想記曰此計微塵作者為涅槃者也士夫謂神我也二有者謂冥初生覺為一有從覺生我心為一有彼二有間士夫所出名為自性如冥初比者謂從我心生五塵故云二有間所出此正計微塵勝性能生諸法故云名為自性如冥初比求那者塵也謂此微塵能依諸緣轉變作一切物故云求那轉變求那是作者然此作者亦云自性亦云士夫神我故唐譯云計有自性及以士夫求那轉變作一切物計此作者以為涅槃也此非真正智慧故云惡燒智慧蓋言邪見所燒不能入清涼門耳或謂福非福盡記曰此計豁達空為涅槃者也非福言罪也謂罪福皆無正指撥無因果者或謂諸煩惱盡或謂智慧記曰此計八萬劫盡自然得道以此為涅槃者也唐譯云或計不由智慧諸煩惱盡此正計縷丸數極時熟得道故云不由智慧斷練而諸煩惱自盡或見自在是真實作生死者作涅槃想記曰此計大自在天體實遍常能生諸法以此為涅槃者也以見彼體實遍實常故云是真實作生死者或謂展轉相生唐譯云衆生展轉相生生死更無餘因如是即是計著因而彼愚癡不能覺知以不知故作涅槃想記曰此計指大梵天以為生死因作涅槃者也楞嚴云盡虗空界十二類內所有衆生皆我身中一類流出生勝解者是人則墮能非能執摩醯首羅現無邊身成其伴侶摩醯首羅乃色究竟天即大梵天也以大梵為衆生主故云衆生展轉相生謂外道愚癡不知無明愛業而為生因而妄指大梵為生死因故云以不知故作涅槃想舊注謂計劫初生一男一女彼二和合展轉相生謂一切物滅歸於彼而為涅槃然指男女生處物滅歸彼而為涅槃何其陋哉殊非本旨或有外道言得真諦道作涅槃想記曰此計冥諦以為真諦作涅槃想者也或見功德功德所起和合一異俱不俱作涅槃想記曰此計六句為生生之因以為涅槃者也六句者謂一實二德三業四大有五和合六同異妄指此六皆有實性而一切法皆從此生此中功德即實德業功德所起即大有大有者乃地水火風四塵也又計極微以成器界故云和合故唐譯云或計求那與求那者而共和合一性異性俱及不俱執為涅槃唐譯約計極微能成世界故舉求那為首此顯計六句故云功德等或見自性所起孔文彩種種雜寶及利刺等性見已作涅槃想記曰此計自然為涅槃者也斯即楞嚴所云計本無因謂烏從來黑鵠從來白人天本竪畜生本橫白非洗成黑非染造乃至松直棘曲鳥獸文彩諸雜珍寶一切物象皆本無因自然而爾故以自然作涅槃想大慧或有覺二十五真實或王守護國受六德論作涅槃想記曰此計能解二十五冥諦能受六分論守護衆生即得涅槃者也前乃計冥諦六句是涅槃此言能知二十五冥諦能受六分論即可以得涅槃故與前所計不同然六分論即前六句但前計即此是涅槃此計能解能受者為涅槃耳故唐譯云或謂能解二十五諦即得涅槃或有說言能受六分守護衆生斯得涅槃或見時是作者時節世間如是覺者作涅槃想記曰此計時即涅槃者也然外道六句中依實句復有九法謂四大空時方和合復有七種外道一計大梵二計時三計方四計本際五計自然六計虗空七計我以此七法為常住實有具諸功能生一切法此中時即七中之一也其大梵與方自然我等四法前已出之連時共出其五而本際虗空所以不明出者然罪福盡即豁達空也二者所出微塵與冥初比冥初即本際也前計已含故不特出西域外道六師之外又有計七種者故古德云六家七宗者此也或謂性或謂非性或謂知性非性記曰此三乃計四句中有無亦有亦無三句為涅槃者也唐譯云或執有物為涅槃或計無物以為涅槃或有計著有物無物為涅槃者或見有覺與涅槃差別作涅槃想記曰此計更有異因以勝性為涅槃者也初卷云外道說流注生因非眼識色明集會而生更有異因彼因者說言勝妙若士夫若自在若時若微塵士夫等前已發明此正計勝妙為涅槃故云見有覺與涅槃差別有覺即指勝性然與涅槃差別者謂四勝性能致涅槃故不同涅槃故於勝性作涅槃想此特謬計耳若按唐譯云或計諸物與涅槃無別作涅槃想斯諸物之言蓋總指勝妙自在士夫時微塵等此諸作者就是涅槃有如是比種種妄想外道所說不成所成智者所棄記曰此結上妄計之過也比類也上所出二十一種外道涅槃相謂如是等類外道種種妄想所說涅槃皆不成真實所成涅槃故為智者所棄大慧如是一切悉墮二邊作涅槃想如是等外道涅槃妄想彼中都無若生無滅記曰此釋上不成之所以也然彼所以不成真實涅槃者以墮二邊故所以墮二邊者以彼不離妄想生滅相故其實即彼涅槃妄想中本無生滅之相但彼愚夫妄想自生滅耳故云彼中都無若生若滅大慧彼一一外道涅槃彼等自論智慧觀察都無所立如彼妄想心意來去漂馳流動一切無有得涅槃者記曰此結示彼法空無利益也謂彼外道涅槃皆依自宗而生妄想違背正理若以智慧觀察無所成就故云都無所立若如彼妄想而求唯令心意掉散往來漂馳流動徒費辛勤空無利益故云一切無有得涅槃者此所以不應親近修習也上揀邪宗下示正果大慧如我所說涅槃者謂善覺知自心現量不著外性離於四句見如實處不墮自心現妄想二邊攝所攝不可得一切度量不見所成愚於真實不應攝受棄捨彼已得自覺聖法知二無我離二煩惱淨除二障永離二死上上地如來地唐譯云轉修諸地入於佛地如影幻等諸深三昧離心意意識說名涅槃大慧汝及餘菩薩摩訶薩應當修學當疾遠離一切外道諸涅槃見記曰此示如來所說無上大涅槃真常之果也意謂我所說大涅槃者如唐譯云唯能了達自心現量不取外境遠離四句住如實見不墮二邊離能所取不入諸量不著真實住於聖智所現證法如是即能悟二無我離二煩惱淨二種障轉修諸地入於佛地得如幻等諸大三昧離心意意識是名涅槃我所說者如是而已非若外道愚夫種種妄想計度是故諸修如實行者當速遠離一切外道妄想諸涅槃見不應親習也前辨一乘因果行相章末顯果德中當機遂問佛之知覺世尊答以覺人法無我了知二障離二種死斷二煩惱是名佛之知覺今明斷證章故從破二見斷二障顯二無我乃至境智俱忘心法雙遣以極忘言契證然後乃顯自行功圓教以利他利他行滿故特辨果德邪正以至無上大涅槃果方為修如實行究竟之相故此示果德已竟復明知二無我等以結斷證功圓修行極則此通途之旨也觀者了此通途血脈方見聖人說法之本意庶不流於臆見耳智者應知爾時世尊欲重宣此義而說偈言外道涅槃見各各起妄想斯從心想生無解脫方便愚於縛縛者遠離善方便外道解脫想解脫終不生衆智各異趣外道所見通彼悉無解脫愚癡妄想故記曰此頌上多種外道涅槃之見但從各各自心妄想所生其實都無解脫方便也由無善方便故愚於縛縛者不能至無縛處以定執涅槃可取故為之所縛而以妄見取之故為能縛者若以縛縛為解脫想則終不生於解脫耳以其衆智異趣所見不一而彼不悟返自以為通豈非愚之甚邪彼悉全無解脫之理但是愚癡妄想之所分別一切癡外道妄見作所作有無有品論彼悉無解脫凡愚樂妄想不聞真實慧言語三苦本真實滅苦因記曰此類外道妄計諸過皆由不聞真實智慧但依名言妄想而立也殊不知言語乃三苦之本真實乃滅苦之因不依真實而依言語正謂以苦捨苦所以悉無解脫也三苦者謂苦苦壞苦行苦譬如鏡中像雖現而非有於妄想心鏡愚夫見有二不識心及緣則起二妄想了心及境界妄想則不生記曰此頌喻顯如實行也謂三界五蘊根塵諸法本來不有如鏡中像雖有而實非有但於愚夫妄想心鏡則見有名相事相故心境角立以不知心境本來寂滅故妄起二見若了唯心現量能所雙忘則當下妄想不生即為正智如如矣心者即種種遠離相所相事現而無現如彼愚妄想三有唯妄想外義悉無有妄想種種現凡愚不能了記曰此頌釋上唯心義也謂一切諸法既唯心現則種種即心心即種種但是一心了無能所即現前諸法雖現而無現亦如愚夫之妄想乃是自心顛倒也是故三界唯心但妄想見實無外境與心為緣第愚夫不能了此妄生分別耳經經說妄想終不出於名若離於言說亦無有所說記曰此頌結示諸法但以名言為體也然一切經中所說妄想皆不出於名言若達名言體空即妄想諸法皆不可得矣大科明二轉依果上明轉生死為涅槃已竟下卷首明轉煩惱為菩提
