body:
  text: 宋天竺三藏沙門求那跋陀羅譯明建鄴海印沙門釋德清筆記一切佛語心品第二之下此下辨妄想無性以明真如離心緣相以破外道事自性相計著有七初破斷見爾時大慧菩薩摩訶薩復白佛言世尊常聲者何事說記曰此亦躡跡興疑問將明妄境真常以破斷見也由前云法離有無斷常等又云涅槃非斷非常前疑有無此疑常無常也意謂世尊說法既離斷常又云涅槃非常是無常也且兔角雖無而依兔說然而佛說真常又依何處而說耶然要依說處者正是事自性相計著也佛告大慧為惑亂唐譯云依妄法說以彼惑亂諸聖亦現而非顛倒大慧如春時𦦨火輪垂髮犍闥婆城幻夢鏡像世間顛倒非明智也然非不現記曰此即妄法以示真常以破事自性相計著也大慧疑謂生滅無常依妄法說不知真常依何處說世尊答云所言真常即依彼妄法而說惑亂者妄法也恐轉計云聖人不見妄法何以依之而說真常耶故又妨云以彼惑亂諸聖亦現而非顛倒意謂彼諸妄法本自無生凡愚不達故生顛倒見妄生執著聖人亦現但不起顛倒想耳故如陽𦦨火輪幻夢鏡像無智之人妄以為實智者不然然非不現噫幻化之境不異聖凡之見乃殊所謂不如三界見於三界故不於諸法起一異見者名正見也大慧彼惑亂者有種種現非惑亂作無常所以者何謂離性非性故大慧云何離性非性惑亂謂一切愚夫種種境界故唐譯云妄法現時無量差別然非無常何以故離有無故云何離有無一切愚夫種種解故如彼恆河餓鬼見不見故無惑亂性於餘現故非無性如是惑亂諸聖離顛倒不顛倒是故惑亂常謂相相不壞故大慧非惑亂種種相妄想相壞是故惑亂常記曰此釋諸法畢竟真常之義也大慧聞說即彼惑亂當體真常因而疑云現見諸法種種差別皆是無常如何即是真常故此釋云妄法現時雖有種種差別然非無常何以故以離有無故云何離有無然法非有無但以愚夫妄作有無見耳且如恆河水本非是火而餓鬼見之為火餘人不見以譬諸法本自無生而愚人妄見生滅聖人不見故云見不見故以聖人不見諸法所謂不見一法即如來故云無惑亂性於餘衆生妄見為有故非無性是則諸佛聖人不異衆人但於諸法不起顛倒見耳故云諸聖離顛倒不顛倒是故我說惑亂真常者謂相相不壞故此所謂是法住法位世間相常住諸法寂滅當體如如故云相相不壞然非諸法有差別相但以愚夫妄想分別有別異耳故云非惑亂種種相妄想相壞是欲我說惑亂真常也大慧云何惑亂真實若復因緣諸聖於此惑亂不起顛倒覺非不顛倒覺唐譯云云何而得妄法真實謂諸聖者於妄法不起顛倒非顛倒覺大慧除諸聖於此惑亂有少分想非聖智事相大慧凡有者愚夫妄說非聖言說記曰此教如實觀也一切諸法本自如如但於諸法不起顛倒不顛倒見以一念不生即名聖者若於諸法有少分想起心動念即乖法體便非聖智境界故唐譯云有少想者當知即是愚夫戲論非聖言也此下破常見彼惑亂者倒不倒妄想起二種種性謂聖種性及愚夫種性記曰此言法本是一由機見各異以破常見也顛倒見凡情也不顛倒見聖解也由凡情故起外道種性由聖解故起三乘種性故唐譯云若分別妄法是倒非倒彼則成就二種種性此所謂法本不異異自機耳前言五性乃明乘異性一故云無間今言二種種性乃明法一見異故云起然皆依惑亂妄想而起者以心佛與衆生是三無差別故聖種性者三種分別謂聲聞乘緣覺乘佛乘云何愚夫妄想起聲聞乘種性謂自妄相計著起聲聞乘種性是名妄想起聲聞乘種性大慧即彼惑亂妄想起緣覺乘種性謂即彼惑亂自共相不親計著起緣覺乘種性記曰此愚夫依彼妄法起二乘聖種性也謂妄見三界五蘊諸法實有自相共相而生計著起厭離想即名聲聞種性即彼五蘊了達緣生不樂計著離於憒閙即名緣覺種性云何智者即彼惑亂起佛乘種性謂覺自心現量外性非性不妄想相起佛乘種性是名即彼惑亂起佛乘種性記曰此智者即彼妄法起佛乘種性也唐譯云何謂智者分別妄法而得成就佛乘種性所謂了達一切唯是自心分別所見無有外法謂但能觀心外無法是名智者即是佛乘種性也唐譯作觀彼惑亂不起分別即成就佛乘種性此經謂即諸法上不起分別便墮佛種性義智者請深觀此語又種種事性凡夫惑想起愚夫種性記曰此釋第二愚夫種性也唐譯云有諸愚夫分別妄法種種事物決定如是決定不異此則成就生死乘性法華云諸法常無性佛種從緣起然而佛種從緣起況二乘外道生死種性乎是則妄境本真隨見分別以妄見諸法實有自相共相不了緣生妄生厭離者即名聲聞雖了緣生不達無性者即名緣覺若了諸法無性緣生緣生無性者即名為佛所謂一法元無異三人乃見差永嘉明一念中五蘊當與此對觀行人深明此旨自然聖凡情盡得入無生彼非有事非無事是名種性義記曰此釋種性義也種者因也以諸法非有故因之而起三乘聖性以非無故因之而起生死凡情論云當知真如非有相非無相非非有相非非無相苟四句皆離百非頓遣則聖凡情盡當體如如不容擬議矣故向下結示真如離相以破一異見大慧即彼惑亂不妄想諸聖心意意識過習氣自性法轉變性是名為如是故說如離心我說此句顯示離想即說離一切想記曰此結示諸法本如離心緣相以破一異見也論云一切諸法唯依妄念而有差別若離心念則無一切境界之相是故一切法從本已來離言說相離名字相離心緣相畢竟平等無有變異不可破壞唯是一心故名真如但以衆生妄想分別隨心意意識習氣轉故變真如為名相今但一念不生情忘執謝即彼心識轉為正智照彼諸法當體如如故唐譯云即彼妄法諸聖智者心意意識諸惡習氣自性法轉依故即說此妄名為真如非是此外別有真如也故論云言真如者亦無有相以一切法皆同如故當知一切法不可說不可念故名真如故云是故說如離於心識所以我說此句者為顯示離分別法欲令行人悉離一切分別故故論云若離於念名為得入又云離念境界唯證相應故故云離一切想下破有無見大慧白佛言世尊惑亂為有為無佛告大慧如幻無計著相若惑亂有計著相者計著性不可滅緣起應如外道說因緣生法記曰此明諸法緣生如幻以破有無見也由上佛說妄法即真大慧意謂諸法即真真如離相不可謂有且現見諸法不可謂無故此疑問為有為無世尊答云如幻無計著相謂緣生諸法如幻不實不可執著有無相也若執著諸法是有是無者則有無一定而不可轉如此則佛說緣起亦應同外道說因緣生法從作者生矣意斥大慧不可作有無見也大慧白佛言世尊若惑亂如幻者復當與餘惑作因佛告大慧非幻惑因不起過故大慧幻不起過無有妄想大慧幻者從他明處生非自妄想過習氣處生是故不起過大慧此是愚夫心惑計著非聖賢也記曰前云離妄想乃心不附境此言幻不起過以明境不牽心也大慧聞說諸法緣生如幻遂致疑曰若惑亂如幻者此幻應當復與餘惑作因意謂向以不了諸法如幻妄計為實故依之起惑造業是妄法與餘惑作因矣今雖了境如幻而幻境尚存豈不又與餘惑作因耶意欲絶境方不生心耳世尊答云既是幻事豈能與餘惑作因何者以幻人不起過故所以不起過者以幻人無情識故故云無有妄想所以幻化人無情識者以依人功呪力而生不是從愛根種子習氣而生豈有世人見偶人而生情愛者耶是故幻不起過經云如世巧幻師幻作諸男女雖見諸根動要以一機抽息機歸寂然諸幻成無性是故智者觀自他五蘊身心為若此若不作如是觀而於幻事分別好惡起心動念生計著者乃癡愚夫非聖賢也老龐云但自無心於萬物何妨萬物常圍繞鐵牛不怕師子吼恰似木人見華鳥華鳥逢人亦不驚木人本體自無情心境如如只遮是何慮菩提道不成爾時世尊欲重宣此義而說偈言聖不見惑亂中間亦無實中間若真實惑亂即真實捨離一切惑若有相生者是亦為惑亂不淨猶如翳記曰此頌有無二俱離也聖不見惑亂者以中間無真實故經云譬如交中性空有二俱非若惑亂中間果有真實則法法確有自性一定而不可轉故云惑亂即真實不但妄法非真即捨離妄惑而妄見有真實之性者即此真實亦是惑亂何也以生死涅槃皆即狂勞顛倒華相故不淨猶如翳復次大慧非幻無有相似見一切法如幻記曰此世尊的示真知見力以結成上義也以如來明見三界之相無有錯謬觀一切法緣生不實除幻無可為喻者故特告曰非幻無有相似大慧白佛言世尊為種種幻相計著言一切法如幻為異相計著唐譯云為依執著種種幻相言一切法猶如幻耶為異依此執著顛倒相耶若種種幻相計著言一切性如幻者世尊有性不如幻者所以者何謂色種種相非因世尊無有因色種種相現如幻世尊是故無種種幻相計著相似性如幻記曰此難明如幻義也大慧聞說一切法如幻遂致疑曰所言如幻者是依計著幻相多種不一言一切法如幻耶是不依幻相但依執著顛倒心相言如幻耶故云為異相計著意謂若依執著顛倒心相言如幻者則可若言計著種種幻相言一切如幻者則不可何也且諸法亦有不如幻者蓋幻事無故而起是無因也且現見種種色法不是無因若言彼如幻則是無因矣故云種種色相非因若都無因而令色相種種顯現如幻者則同外道無因生矣唐譯云是故世尊不可說言依於執著種種幻相言一切法與幻相似佛告大慧非種種幻相計著相似一切法如幻大慧然不實一切法速滅如電是則如幻唐譯云不依執著種種幻相言一切法如幻以一切法不實速滅如電故說如幻大慧譬如電光剎那頃現現已即滅非愚夫現魏譯云即見即滅凡夫不見唐譯云世間凡愚悉皆現見如是一切性自妄想自共相觀察無性非現色相計著記曰此示生即無生故如幻也佛謂我說一切法如幻者不是依執著種種幻相之多言一切法如幻也蓋言諸法速起速滅不實如電故說如幻耳譬如電光即現即滅以正當現時即是滅非是滅後而言滅也若知電光現時即滅則知諸法生本無生故下偈云物生即有滅不為愚者說此非凡愚所知故云非愚夫現是故我說一切諸法本自不生但依凡夫自心分別自共相見亦如電光速起速滅非實有也衆生不達諸法本無而妄於種種色相執以為實故云無性非現色相計著是故我說諸法如幻以示生本無生之義耳殆非依執著種種諸法幻相言如幻也爾時世尊欲重宣此義而說偈言非幻無有譬說法性如幻不實速如電是故說如幻記曰此頌成幻義也言幻者以不實故如幻以速滅如電故如幻然幻事不實人易知之若幻事速滅如電則難知也言速滅者非是已生而滅之速蓋言本不生也永嘉見六祖云生死事大無常迅速祖云何不體取無生了無速乎嘉云體即無生了本無速祖云汝甚得無生意下破生見大慧復白佛言如世尊所說一切性無生及如幻將無世尊前後所說自相違耶說無生性如幻記曰此疑佛自語相違也大慧因聞佛先說一切法無生又說如幻然一切法既本無生而又言如幻如幻則生也方說無生而又言生豈不前後自語相違耶佛告大慧非我說無生性如幻前後相違過所以者何謂生無生覺自心現量有非有外性非性無生現唐譯云無有相違何以故我了於生即是無生唯是自心之所見故若有若無一切外法見其無性本不生故大慧非我前後說相違過然壞外道因生故我說一切性無生大慧外道癡聚欲令有無有生非自妄想種種計著緣唐譯云外道癡聚共興惡見言從有無生一切法非自執著分別為緣大慧我非有無有生是故我以無生說而說記曰此明生本不生以破因生見也佛言我非前後相違過何者我了一切法生本無生以覺諸法唯是自心之所現故若有若無見其無性緣生以生本不生故說如幻耳非我有前後相違過也然我說無生亦非徒說以為破外道妄立因生故我說一切法性本自無生外道因生者以彼外道癡聚共興惡見妄謂有從有因生無從無因生故云欲令有無有生不達諸法從自妄想種種執著分別緣生是故我說諸法非有無有生以緣生如幻故說無生非是一向絶然不生也大慧說性者為攝受生死故壞無見斷見故為我弟子攝受種種業受生處故以聲性說攝受生死記曰此妨難也恐愚者聞說諸法非有無生便致疑難云然世尊說見愛煩惱善惡諸法三界因果輪回等事是說諸法實有性也何以言無故此釋之唐譯云說諸法者為令弟子知依諸業攝受生死遮其無有斷滅見故謂見愛習氣諸煩惱為生死因三界受生處為生死果故云種種業受生處淨名云無作無造無受者善惡之業亦不亡所以不令衆生墮斷滅見撥無因果故耳然而雖說但以名句文身為體亦非實法故云以聲性說大慧說幻性自性相為離性自性相故墮愚夫惡見相希望不知自心現量壞因所作生緣自性相計著說幻夢自性相一切法不令愚夫惡見希望計著自及他一切法如實處見作不正論大慧如實處見一切法者謂超自心現量記曰此明如來說法但隨他意語也法本無生不容有說然而佛說如幻說無生者但為破執著之情如逆楔出楔故耳以愚夫不達諸法唯自心現妄計種種實有自性故我說如幻以破彼執又以外道不達五蘊諸法緣生無性妄計作者以為生因我為壞彼因所作生執著之情故我說五蘊諸法緣生如幻不實如夢不令妄計自他身心自相捨邪執耳又以衆生於如實處妄見生滅作不正論故我說無生若果有能如實見一切法超自心現量者則我於無生二字亦不說矣殆非我說如幻無生有相違過爾時世尊欲重宣此義而說偈言無生作非性有性攝生死觀察如幻等於相不妄想記曰言諸法無生者無作耳無作故無性然而說有業性者為遮斷見攝受生死故若能觀察諸法如幻則於一切法相不起分別不分別則心境寂滅寂滅則不生是則如幻無生本無二也上破生見下破名言習氣復次大慧當說名句形身相善觀名句形身菩薩摩訶薩隨入義句形身唐譯云我當說名句文身相諸菩薩摩訶薩善觀此相了達其義疾得阿耨多羅三藐三菩提如是覺己覺一切衆生記曰此明言說無性以破名言習氣也由前歷云當依於義莫著言說又云言說者是作耳又云以聲性說第恐聞者不達言說性空不能離言得義故此特示名句文身令善觀察隨入義句也蓋言說者以名句文身為體既以三法合成足知本無自性如來但假此以詮表法耳非實法也故令觀察當可離之言說性離則義自得矣大慧名身者謂若依事立名是名名身記曰依事立名名即是身故名名身如依瓶盆立瓶盆名謂一名二名多名能詮自性名異義一故名名身身者多法積聚義句身者謂句有義身自性決定究竟是名句身記曰謂句能顯決定究竟且如瓶盆但有其名未能顯義以不知是何等瓶盆若言銅鐵錫木等瓶盆或言水油鹽米等瓶盆等句義各異如此則顯義決定究竟不謬謂一句二句多句能詮差別因名成句故名句身形身者謂顯示名句是名形身記曰形即文身乃字也依此文字能成名句謂一字二字多字為二所依故名文身說文云依類像形為字形聲相稱為文又形身者謂長短高下記曰字有四聲八韻清濁輕重抑揚高下故魏譯云謂聲長短音韻高下又句身者謂徑跡如象馬人獸等所行徑跡得句身名記曰句身者徑跡耳謂尋跡以得象馬喻因言句而得義得義則忘言猶得象馬以遺跡大慧名及形者謂以名說無色四蘊故說名自相現故說形記曰名字者謂無色四蘊依名而說名字相者謂能了別名字相故言四蘊各有自相也此舉四蘊依名字說但有名字本無實法不比色蘊尚有假質要顯名字性空故也言自相者但只是四蘊各自不同亦非實有相狀可見若了四蘊但有名字則所說諸法例此可知故密嚴云世間種種法一切唯有名故我所說無生如幻乃至菩提涅槃自覺聖智等皆是隨破衆生妄執之情本無實法聞者應當因言得義莫著言說是名名句形身說名句形身相分齊應當修學爾時世尊欲重宣此義而說偈言名身與句身及形身差別凡夫愚計著如象溺深泥記曰如來無法可說但因凡愚於第一義妄見一異有無常無常等一切邪執不得已而假以言說破彼執情意在顯示第一義諦如實境界如標月指耳豈期愚夫復執言說生種種見如象溺深泥何由得出離耶故楞嚴云汝等若以緣心聽法此法亦緣此則因聲而有分別非得法性然佛以音聲說無生法聲即無生若以生滅心隨聲分別則彼無生亦生滅矣若了聲性無生則知說本無說故向下明不說即說說即不說二種深義以洗名言習氣故特示如來說法有四種記論而以止論為第一義也上破名言習氣下誡忘言默證復次大慧未來世智者以離一異俱不俱見相我所通義問無智者彼即答言此非正問謂色等常無常為異不異如是涅槃諸行相所相求那所求那唐譯云依所依造所造見所見塵及微塵魏譯云泥團微塵修與修者唐譯云智與智者如是比展轉相如是等問唐譯云如是等不可記事次第而問世尊說此而言佛說無記唐譯云當止記答止論非彼癡人之所能知謂聞慧不具故如來應供等正覺令彼離恐怖句故說言無記不為記說又止外道見論故故不為說記曰此明止論以示不說說將顯名言雙絶誡令忘言默證也佛意謂我尋常說離一異等四句見者為要通達第一義諦無言說處遣彼愚夫名言習氣過故於未來世我弟子中有智慧者若以此義問彼愚夫無智之人彼反以為不正之問何者以彼愚夫但執名言不悟實義故儻彼愚夫復以常無常一異云云等四句妄見之說展轉次第來問我弟子云世尊亦說此法否而我弟子但可應云佛說此等皆無記論當止記答決不可又以離四句說應答彼也何者以離四句義名為止論非彼癡人之所能知以彼聞慧不具不達實義故然彼愚夫一向專執名言若聞離言說相便生恐怖佛欲令彼離恐怖處故但言彼是無記更不為記說也然我此不說者意欲令彼外道愚人永得出離作者邪見論故而不為說此乃不說之說非徒不說也故外道問佛不問有言不問無言世尊默然良久外道即拜云世尊大慈大悲開我迷雲此所謂欲令永離外道邪見故不說也甚矣一切衆生無始戲論名言習氣處處貪著如韓盧逐塊故如來掩室於摩竭維摩杜口於毗耶正為洗此邪見戲論名言習氣耳大慧外道作如是說謂命即是身如是等無記論大慧彼諸外道愚癡於因作唐譯云計有作者無記論非我所說魏譯云外道迷於因果義故是故無記非我法中名無記也大慧我所說者離攝所攝妄想不生記曰此出外道無記論及佛止論意也由上佛說外道為無記論不知何為無記故此釋云以外道妄計即陰是我離陰是我故說身命為一異等故為無記以彼外道迷於因果義故是名無記非我法中名無記也我教中說離能取所取不起分別妄想不生名為無記佛說菴摩羅識名白淨無記然無記者以無可記録故蓋外道迷於因果實義故無實果可記録者故名無記而佛說菴摩羅識亦名如來藏亦即是真如楞嚴云如來藏中求於去來迷悟生死了不可得以如來藏不屬因果不可以言議心思無可記録故亦名無記以佛說無記非是外道二乘所可知故故應止彼是為止論也法華云正使滿十方皆如舍利弗如稻竹葦不退諸菩薩亦滿十方剎盡思共度量不能測佛智何者以佛智非心識可到故以非心識所到故身子三請如來三止云止止不須說我法妙難思噫身子尚然況外道乎故應止彼也云何止彼大慧若攝所攝計著者不知自心現量故止彼記曰此言止論之所以也所以止彼而不置答者以彼外道執著能取所取妄法不了唯是自心所現若與彼說離心意識境界彼則恐怖驚疑不信返生誹謗破法墮惡或依名言習氣復執言說更增邪見是故佛誡弟子於後惡世無智人中莫說此經為遮此輩惡見故應止彼而不答也大慧如來應供等正覺以四種記論為衆生說法大慧止記論者我時時說為根未熟不為熟者記曰此釋伏難以明如來說法大權應變不執一也難云佛既於彼等無記置而不答然亦有答者何也故此釋云如來說法應變不一或時一向直說或時反詰或時廣為分別如來調伏衆生應機施設如摩尼圓照五色相鮮與奪隨宜殺活自在故有時說有時不說有時說即不說有時不說即說所謂默時說說時默大施門開無擁塞然說與不說無非顯示第一義諦離言說處豈可定執說與不說耶故云如來以四種記論為衆生說法恐聞者又致疑云既以四種記論說法何以此中特為外道明止論耶故此答云止記論者不但今日我時時說然非為外道一類之機即我弟子中亦有根機利鈍成熟未成熟者若根未熟者且止不說以待時故或為激發當機令生欣慕如法華身子華嚴剛藏三請三止然非祕而不說亦非絶然不說也即止外道不說但為遮其惡見而止即是說亦非痛絶之意也以如來不捨一衆生故復次大慧一切法離所作因緣不生無作者故一切法不生記曰此下至一切法常通明佛以止論制諸外道不同外道所說也然佛雖以四論說法普被三根故其止論亦有時而說至若對外道說法一向單用止論以說與不說皆止論故何也且如外道不達諸法本自無生妄計有作者生或妄計因生以妄執別有異因能生諸法蓋無因也是故我說因緣不生魏譯云一切諸法離作者及因是故不生以無作者故是故我說一切諸法不生且彼外道妄執諸法一定有能生我但以不字止之耳然我何嘗別有所說耶以外道計諸法自生或計他生或計共生或計無因生中論云諸法不自生亦不從他生不共不無因是故說無生此所謂但以不字止之故為止論大慧何故一切性離自性以自覺觀時魏譯云以自智觀察自共性相不可得故說一切法不生記曰此重徵釋無生義以破外道生見也由上佛言我說諸法無性者以離自性故大慧疑云何故一切法皆離自性耶故此世尊牒而答之曰我以自覺聖智觀察時見一切法自相共相皆不可得故說一切法本自無性故不生也問曰既云一切法離自性故說無生何以又言自相共相不可得方名離自性耶答曰以彼外道不達諸法唯心所現故妄計神我為作者實有自性能生諸法又計他梵天能生諸法又計他四大極微時等各有自性能生諸法又計諸法八萬劫來無因自有自然而生然神我作者自生也從他梵大四大等他生共生也自然無因生也以妄計此四各有自體能生諸法謂之自相以不了唯心妄見諸法從彼四生謂之共相故此世尊破云諸法不從彼四法生何也以彼四法皆無自性不能和合而生諸法故云自相共相不可得彼四既不可得足知一切諸法無自性矣既無自性則諸法又何從而生耶此所以一切法離自性故故說諸法本自不生也然彼以妄見自相共相皆不離自性故生我以正智觀察一切皆離故不生耳下文何故云云皆牒疑詞也何故一切法不可持來不可持去魏譯云一切諸法亦無取相亦無捨相以自共相欲持來無所來欲持去無所去唐譯云以自共相來無所從去無所至是故一切法離持來去記曰此釋上自共相不可得義以破相見也以彼外道妄見諸法計自共相實有自體我以正智而觀皆不可得何者若自共相果有自體則可取可取則可持來既可取則可捨可捨則可持去今觀諸法來無所從去無所至既無來去則不可得於不可得中而妄計實有自共相者皆邪見也故永嘉云取不得捨不得不可得中秪麼得以不可得故說諸法離自性不生所以云體即無生故二祖乞師安心師云將心來與汝安祖云覔心了不可得故僧問雲門一物不將來時如何門云放下著僧云一物不將來放下箇甚麼門云放不下擔取去大慧何故一切諸法不滅謂性自性相無故一切法不可得故一切法不滅記曰此破外道死後斷滅見也由一切法無自性故不生不生故不滅殆非生而後滅亦非死後斷滅也大慧何故一切法無常謂相起無常性是故說一切法無常記曰此破凡夫外道確定常見也由凡夫妄認四大為自身相執定一期果報及作千秋百歲之計以為常外道妄計十方衆生生滅循環不曾散失咸皆體恆執以為常以認無常為常故此佛說一切法無常以相起速滅剎那不住無有常性故我說無常遮彼常見殆非真無常也大慧何故一切法常謂相起無生性無常常故說一切法常記曰此破二乘以真常為無常見也以二乘不了諸法當體真常而橫生厭離故此佛說一切法常以諸法相起即是不起故如電速滅以無所有故故無常性常故我說一切法常以初生即有滅本無生性故故云相起無生性無常常殆非離此諸法外別求真常也以一切皆同如故除真如外無片事可得故即彼諸法生無生性當體真常即前所云惑亂常也爾時世尊欲重宣此義而說偈言記論有四種一向反詰問分別及止論記曰此頌如來以四種記論為衆生說法也四種記論者一謂隨問而答名為一向魏云直答二謂反詰所問而答名為反詰唐云反質答三謂簡辨而答名為分別四謂折伏外道故置而不答名為止論魏唐二譯皆云置答以制諸外道有及非有生僧佉毗舍師記曰此偈意謂佛以四論不獨為弟子說法然亦為制諸外道也唐譯云數論與勝論以梵語僧佉正云僧佉耶此云數術數即慧數謂度諸法根立名從數故立神我主諦從冥初生覺等謂之二十五冥諦故亦名數論毗舍亦名毗世具云吠世史迦沙多羅此云勝論立六句義為最勝故或勝人所造故六句者一實二德三業四大有五同異六和合雖云六句而以和合因緣為我能生諸法師即二論師也一切悉無記彼如是顯示記曰此結示外道所說皆無記也唐譯云如是等諸法一切皆無記正覺所分別唐譯云正智觀察時自性不可得以離於言說故說離自性記曰此頌離自性已下五節義也以一切法皆無自性平等如如離言說相以離言說故說離自性耳以無自性故生滅斷常等皆妄見也從前大慧難問佛說緣起即是說因緣起止此通破外道言說自性事自性相二種計著有無斷常等四句邪見以明外道邪禪後章示聲聞通別相以明二乘偏禪總上章通釋四種禪中愚夫禪爾時大慧菩薩摩訶薩復白佛言世尊惟願為說諸須陀洹須陀洹趣差別通相記曰此問明二乘通別行相以釋前愚夫禪中二乘偏禪之行相也差別通相者謂聲聞名通而有四果行相各別故從初果問起意在歷四果以明亦有頓漸不同也若菩薩摩訶薩善解須陀洹趣差別通相及斯陀含阿那含阿羅漢方便相分別知已如是如是為衆生說法謂二無我相及二障淨度諸地相究竟通達得諸如來不思議究竟境界如衆色摩尼善能饒益一切衆生以一切法境界無盡身財攝養一切記曰此陳述請問利益也由前一往世尊歷斥勿墮外道二乘惡見且云如來又以二種神力加持令其行人不墮外道魔業及聲聞地禪故此大慧聞上來佛說外道邪禪行相已但不知聲聞禪通別行相何如意謂聲聞名雖通稱是一而有四果差別不同若一一了知差別行相則可以自淨二障不墮其中亦可以教化衆生捨離增慢不致得少為足庶可超越諸地究竟佛果而以無盡身財教育衆生也有此勝益故此請問所云方便相者謂四果修行各有方便行相即觀行也須陀洹此云預流謂三界四諦下八十八使見惑斷盡即證初果以初入聖流故名預流斯陀含此云一往來謂於三界九地八十一品思惑中方斷欲界一地前六品盡則證二果從此命終更須一往上二界一來欲界方得斷除後三品殘思故云一來阿那含此云不來謂欲界九品思惑斷盡則證三果從此永絶欲界受生更不還來故云不來已上三果名有學位阿羅漢此云無生又云殺賊又云應供謂上二界八地七十二品思惑斷盡則證四果阿羅漢名無學位高超三界遠越四生故名無生此以證滅諦理不受後有得無生名殆非八地真無生也以能破煩惱故名殺賊堪為福田故名應供佛告大慧諦聽諦聽善思念之今為汝說大慧白佛言善哉世尊唯然聽受佛告大慧有三種須陀洹須陀洹果差別云何為三謂下中上記曰前問諸須陀洹及須陀果差別通相故此答云總有三種謂人有三果亦有三以根有利鈍遲速故有三非是實有三種也故云下中上下者極七有生記曰此言極鈍根也唐譯云於諸有中極七反生謂欲界一地九品俱生煩惱共潤七生也潤七生者謂初品潤二生次三品各潤一生次二品共潤一生後三品共潤一生以初粗猛後力微弱故以天上耽樂無力斷惑故須下生人間歷境方斷以根鈍故故極七返生而後斷也此中俱生煩惱謂愛欲也非俱生無明中者三五有生而般涅槃記曰此中機也以根稍利故歷生不同故三生五生而般涅槃上者即彼生而般涅槃記曰此上機也謂上機須陀洹即此一生便得阿羅漢果名現滅須陀洹不說中間經二三果觀此中上二機有涅槃之言則中機亦不歷後二是則歷後位者皆下機也若約四十二章經云須陀洹七死七生便得阿羅漢愛欲斷者如四肢斷則下亦不歷此三種有三結下中上記曰此言所斷結有三種而一種中各有下中上故諸結地地通有九品共有八十一品云何三結謂身見疑戒取是三結差別記曰此是三結之名也此三結乃十使煩惱中之三種疑乃鈍使之一身見戒取乃利使之二也問曰十使煩惱為三界生死之本聲聞乘人十使斷盡方出三界今何獨言斷三結耶答曰五鈍獨言疑者以身見斷則貪癡自然不生既佛教調伏其心故不行嗔慢心四果未斷故不言慢以未入佛法時初尊天魔反疑於佛今既令入正信則不疑佛疑法已見諦理亦不疑已故獨言斷疑耳五利不言餘三者彼皆外道邪見今既依佛教門故此不言又意癡乃無明以戀著涅槃雖斷欲貪而未斷涅槃貪故二皆非所斷故不言上上升進得阿羅漢記曰此總示斷結得果之相也上上升進者謂能頓斷上上品惑即證上上阿羅漢果大慧身見有二種謂俱生及妄想唐譯云分別如緣起妄想自性妄想記曰此示身見以釋初果行相也身即五蘊身心所謂名色是已俱生者名也謂受等四蘊本無自性但以名言而為體故無始時來一類妄執故名俱生身見妄想分別者色也謂此四大幻色本來不有但以因緣力故和合妄成譬如幻者假名為人愚夫不達妄計實有自性分別妍醜橫生貪欲故云分別身見譬如依緣起自性種種妄想自性計著生以彼非有非無非有無無實妄想相故愚夫妄想種種妄想自性相計著如熱時𦦨鹿渴水想是須陀洹妄想身見彼以人無我攝受無性斷除久遠無知計著記曰此釋斷分別身見行相也然自他幻妄色身本來不有但依妄想業幻四大假合成形譬如幻人依緣而起所謂如世巧幻師幻作諸男女愚人不了妄生分別計著好醜故云如依緣起有計著性且彼緣生假蘊無而忽有其實非有非無既非有無則無實體而凡夫愚癡妄生計著取以為實如熱時𦦨本非是水而渴鹿妄生水想此則是名須陀洹分別身見相魏譯云以無智故無始世來虗妄取相此身見垢見人無我乃能遠離故云是須陀洹妄想身見彼以人無我攝受無性斷除久遠無知計著謂初見道位證得我空乃能斷除是乃單破色陰則斷分別我見也大慧俱生者須陀洹身見自他身等四陰無色相故色生造及所造故展轉相因相故大種及色不集故記曰此釋斷俱生身見行相也唐譯云以普觀察自他之身受等四蘊無色相故色由大種而得生故是諸大種互相因故謂例觀自他受等四蘊但有名字本無實體且色陰雖有假相但從四大種所造展轉相因而成此形既有此形受生則彼四陰俱時而有故云俱生然四大中各無主宰誰能合集以成色乎故云色不集故色陰有質尚空況受等四陰本無色相但有名字豈非空耶然此俱生但約四蘊依色妄執身心自相而言殆非俱生無明也學者應知須陀洹觀有無品不現身見則斷如是身見斷貪則不生是名身見相記曰此結身見觀行成就也有品色也無品四蘊也謂須陀洹能觀自他五蘊悉空無主身見則斷身見若斷則貪愛不生貪愛不生則生因永絶再不受生故法華云諸苦所因貪欲為本若滅貪欲無所依止是故身見斷則證初果是名斷身見相大慧疑相者謂得法善見相故及先二種身見妄想斷故疑法不生不於餘處起大師見為淨不淨是名疑相須陀洹斷記曰此釋斷疑之行相也論云疑者於諸諦理猶豫為性能障不疑決定信故疑有三種謂疑理疑法疑師得法善見相者謂於所得真諦法善能觀察見彼真理故於理不疑及先二種身見斷故於諸法中疑不得生是於法不疑以向於理法有疑亦疑其人但知所尊天魔外道以為大師返疑於佛是淨不淨今見理既真於法不疑則不疑其人故云不於餘處生大師想是名須陀洹所斷疑相大慧戒取者云何須陀洹不取戒謂善見受生處苦相故是故不取大慧取者謂愚夫決定受習苦行為衆具樂故求受生彼則不取除回向自覺勝離妄想無漏法相行方便受持戒支是名須陀洹取戒相斷記曰此釋斷戒取行相也然有漏戒善乃人天之因而須陀洹所以不取者以明見生處苦相故夫其取者乃諸凡愚於諸有中貪著世樂故苦行持戒願生於彼是故凡夫願生人天中故持五戒十善而外道愚人恐未來有苦相故持牛狗等戒拔髮熏鼻臥棘投針種種苦行謂今生受苦若盡將來一味受樂此乃取相邪戒而須陀洹人不取是相然其亦有所持戒品乃是唯求最勝無漏無分別法故所修者乃定共戒殆非凡愚取相邪戒是名取戒相斷須陀洹斷三結貪癡不生若須陀洹作是念此諸結我不成就者應有二過墮身見及諸結不斷記曰此結名離過也然貪愛從身見生癡從疑戒取生今三結斷是則因斷而緣不生也三結已斷若存能斷之心則亦墮身見反不能斷諸結是為二過故魏譯云彼若如是不離三結大慧白佛言世尊世尊說衆多貪欲彼何者貪斷唐譯云貪有多種捨何等貪佛告大慧愛樂女人纏綿貪著種種方便身口惡業受現在樂種未來苦彼則不生所以者何得三昧正受樂故是故彼斷非趣涅槃貪斷記曰此示所斷生死根本也經云一切衆生皆以淫欲而正性命能令一切衆生生死不絶者愛與欲也須陀洹以知現在欲樂是未來苦因故永斷淫心故云彼則不生何者以禪定解脫之樂非世間五欲之樂可比由得禪定樂故能斷彼欲樂也然彼但斷欲貪未斷趣涅槃貪何也以彼二乘貪著三昧寂滅之樂不生一念度生之心故佛呵云飲寂滅酒臥無為牀又謂之焦芽敗種故此特云非趣涅槃貪斷觀此不斷涅槃貪則此初果不分利鈍但斷三結徑證四果也大慧云何斯陀含相謂頓照色相妄想生相見相不生善見禪趣相故頓來此世盡苦際得涅槃是故名斯陀含記曰此釋二果行相也斯陀含名一往來頓者一往也色相者色蘊也妄想者受等四蘊也謂以生空觀智頓照五蘊生相不起心分別故魏譯云非虗妄分別想見故云見相不生善見禪趣相故此乃凡夫利根不歷三五七生斷結不入初果一往發心便登二果只須一來便證涅槃故云頓來此世盡苦際得涅槃也由此觀之是則前須陀洹人自有三根以根有利鈍惑有厚薄故斷結有遠近不同今此二果并後那含皆約凡夫根利惑薄發心便登當果一生取證者殆非次第從前至後也何者以前云即彼惑亂起聲聞種性故此乃直觀五蘊淺深以約位耳大慧云何阿那含謂過去未來現在色相性非性生見過患使妄想不生故及結斷故名阿那含記曰此釋三果行相也阿那含此云不來然前斯陀含人但能觀現在五蘊不生分別未觀未來故須一來而後得涅槃今此阿那含人根性大利能觀三世色蘊悉皆無性又見未來生處皆有諸苦過患故厭苦斷集使後四蘊妄想不生即能頓斷三結即此當生取證再不復來故云不來此亦從凡夫直入三果頓證無生者大慧阿羅漢者謂諸禪三昧解脫力明煩惱苦妄想非性故名阿羅漢記曰此釋四果行相也謂此阿羅漢位乃前三位頓漸二根所同趣究竟之地若至此位則諸禪三昧及八解脫自然了達亦能分證十力三明六通皆悉成就至於煩惱發業所招諸苦皆已永斷一切妄想滅盡無餘故此得名阿羅漢也然此四果皆約直觀五蘊妄法以明即彼惑亂起聲聞種性但由根有利鈍故有前三差別不同其實通名聲聞以顯差別通相非若他經所明實有定位也大慧白佛言世尊世尊說三種阿羅漢此說何等阿羅漢世尊為得寂靜一乘道魏譯云得決定寂滅唐譯云一向趣寂為菩薩摩訶薩方便示現阿羅漢為佛化化唐譯云佛所變化佛告大慧得寂靜一乘道聲聞非餘唐譯云此說趣寂非是其餘餘者行菩薩行及佛化化巧方便本願故於大衆中示現受生為莊嚴佛眷屬故記曰此結示非真果也大慧意在揀別真僞故問三種阿羅漢中此屬何等佛言我所說者乃是趣寂定性聲聞斷四住結出生死苦得涅槃者乃名字羅漢非真羅漢也華嚴地上菩薩為真阿羅漢即此中行菩薩行乃方便願者謂內祕菩薩行外現是聲聞其佛所化化者乃為莊嚴諸佛國土及衆會眷屬故彼二聲聞非我此中所說故然此聲聞果既非真而因亦非真故下文結過大慧於妄想處種種說法謂得果得禪禪者入禪悉遠離故唐譯云禪者及禪皆性離故示現得自心現量得果相說名得果記曰此結二乘因非真因故果非究竟也然彼趣寂聲聞但證偏空未達實相真理以無明全在故依妄想處種種說法故法非真法以但盡生死謂為解脫其實未得一切解脫而妄謂得果但起滅定未得首楞嚴大定而妄為得禪於無所得中妄有證得以不達禪者及禪悉遠離故妄取涅槃以為真果然彼所得滅度亦非真滅但從自心妄見說有得果相耳故前文云前後轉進相不除滅故此為愚夫所行禪也論云現前立少物謂是唯識性以有所得故非實住唯識菩薩尚然況定性乎復次大慧欲超禪無量無色界者當離自心現量相唐譯云若欲超過諸禪無量無色界者應離自心所現諸相大慧受想正受超自心現量者不然何以故有心量故記曰此總結上外道聲聞愚夫所行禪俱非真因誡令離過絶非也禪通指二乘及外道禪無量乃別指廣果天人所修四無量心異生有漏禪無色界乃別指四空處定已上諸禪雖有世出世間之別其實總皆未離心量相故故此誡勉修如實行者若欲超彼二乘外道諸禪應當遠離自心現量相也因明論云現量有二謂真及似此乃似現量以心量未忘有有取相故故勉超之然者猶許也謂不但外道邪禪不許親習即二乘滅受想正受在我法中超自心現量者決不許可何者以彼有心量故固當遠離也首楞嚴云諸修行人不能得成無上菩提乃至別成聲聞緣覺及成外道諸天魔王及魔眷屬皆由不知二種根本錯亂修習猶如煮沙欲成嘉饌縱經塵劫終不能得以沙非飯本故是故欲證無生當遠離心相為第一義也故特勉之爾時世尊欲重宣此義而說偈言諸禪四無量無色三摩提一切受想滅心量彼無有記曰此頌總結愚夫禪也四無量即慈悲喜捨四無量心乃廣果天人為除衆生嗔惱不悅憎愛故修此四心此乃異生有漏禪殆非佛之四無量心也謂彼外道二乘諸禪行相皆是各各妄見取自心相其實彼等元無所有須陀槃那果往來及不還及與阿羅漢斯等心惑亂禪者禪及緣斷知見真諦唐譯云禪者禪所緣斷惑見真諦此則妄想量若覺得解脫記曰此別頌二乘非真也謂四果聖人而心未離惑亂即所修禪定入我空觀而所觀骨璅無常苦不淨等相皆不離計著即斷惑所見真諦亦不離妄見取涅槃相故云禪者禪所緣斷知見真諦此則妄想量若覺此等非真即得究竟解脫矣知者分別也此上總明愚夫禪已竟次下明觀察義禪復次大慧有二種覺謂觀察覺及妄想相攝受計著建立覺記曰此示真妄二覺以釋前四種禪中觀察義禪之行相也唐譯云有二種覺智謂觀察智及取相分別執著建立智然法非有無但隨智轉若依正智而觀則諸法非有若以邪智而觀則諸法不無不無則四句橫生非有則一真獨立一真立則四句離四句離則心境絶心境既絶則人法雙亡故此觀察義禪為破法執故前文云謂人無我自相共相外道自他俱無性已觀法無我彼地相義漸次增進是名觀察義禪後文自明然此真妄雙舉者意令捨邪歸正故大慧觀察覺者謂若覺性自性相選擇離四句不可得是名觀察覺記曰此釋觀察正智也謂外道二乘妄執諸法實有自性故橫生四句今以正智觀察諸法本無自性既法無自性故四句無依選擇推求離四句外竟不可得以不可得故見諸法無性者是名觀察義禪大慧彼四句者謂離一異俱不俱有無非有非無常無常是名四句大慧此四句離是名一切法唐譯云是故說言一切法離大慧此四句觀察一切法應當修學記曰此教行人當離四句而觀諸法是名正觀若他觀者即邪觀也故勉修學大慧云何妄想相攝受計著建立覺謂妄想相攝受計著堅濕暖動不實妄想相四大種宗因相譬喻計著不實建立而建立是名妄想相攝受計著建立覺是名二種覺相記曰此明外道邪智也然彼外道不了諸法無性妄計諸法實有自性故於彼堅濕暖動四大種性取相執著虗妄分別以宗因喻而妄建立是名取相分別執著建立邪智依此邪智故於諸法妄計一異有無等四句邪見意令行人捨此邪見即名正智故離四句即名觀察義禪也宗因喻者謂外道以此三支建立自果以謬解故俱不極成故因明論出彼三十三過故云不實建立而建立若菩薩摩訶薩成就此二覺相人法無我相究竟善知方便無所有覺觀察行地得初地唐譯云知此智相即能通達人法無我以無相智於解行地善巧觀察入於初地入百三昧得差別三昧見百佛及百菩薩知前後際各百劫事光照百剎土記曰此明觀成得果之相也謂菩薩摩訶薩創志即以無相智善巧觀察諸法本無自性頓斷我法二執乃於解行地即入初地以及後後如來地也解即十住行即十行此雖云解行意在不歷三賢以顯初發心時便登佛地耳華嚴云初發心時即得阿耨多羅三藐三菩提知一切法即心自性成就慧身不由他悟故入百三昧等者舊引攝論云菩薩入初地時證十百明門謂一於一剎那頃證百三摩地二以淨天眼見百佛國三以神通力能動百佛世界四能往百佛剎教化衆生五能以一身化百類身形令有情見六能成就百類所化有情七若為利益能留身住世百劫八能知前後際百劫事九能以智慧入百法明門十能以身觀百類眷屬餘地倍倍增勝華嚴具明知上上地相大願殊勝神力自在法雲灌頂當得如來自覺地善繫心十無盡句成熟衆生種種變化光明莊嚴得自覺聖樂三昧正受記曰此言由初地以極如來地行相也善繫心十無盡句成熟衆生者謂善說法能以一句演無盡句能以一法演無盡法等華嚴九地行相如此問曰此經頓教法門所詮直顯頓悟一心便登佛地何以前後每於正智現前或觀行成就處必歷舉十地行相豈不落階級耶答曰此經聖諦亦不立何階級之有蓋舉果以驗因也然十地亦名佛地蓋平等無相真如是佛遊履之地吾人苟能頓超有相心契一真而與法身同遊步步頭頭居然自在廣大業用非是漸次從地至地也舉此勝果要顯真因若夫邪因無因又何足以臻此且令行人知此亦不得少為足以冀上上增進必得安住白覺聖三昧勝樂而後已也上釋觀察義禪竟下釋攀緣如禪初觀四大如復次大慧菩薩摩訶薩當善四大造色云何菩薩善四大造色大慧菩薩摩訶薩作是覺彼真諦者四大不生於彼四大不生作如是觀察觀察已覺名相妄想分齊自心現分齊外性非性是名心現妄想分齊謂三界唐譯云觀彼諸大種真實不生以諸三界但是分別唯心所見無有外物觀彼四大造色性離四句通淨離我我所如實相自相分段住無生自相成記曰此言四大本自不生以釋攀緣如禪也攀緣者妄想也四大者名相也然妄想元是正智名相本自如如以彼愚夫不達三界唯心所現故妄見四大及所造四塵以為實有故妄執大種以為生因是迷正智為妄想變如如為名相是以但起攀緣作四句謬解種種邪執故於如不如今菩薩以正智觀察彼諸大種當體寂滅真實不生洞見三界一切名相但是妄想分別唯心所現本無外物如是觀時則大種所造悉皆性離若大種性離則四計頓絶物我皆空如此則即妄想為正智了名相本如如一心住如實處萬法皆悉不生故唐譯云住如實處成無生相此所以觀四大不生為攀緣如禪以攀緣即如非攀緣如也故云善四大造色等以達四大不生故云善外道不達故不善大慧彼四大種云何生造色謂津潤妄想大種生內外水界堪能唐譯云作炎盛妄想大種生內外火界飄動妄想大種生內外風界斷截色妄想大種生內外地界記曰此言四大從妄想生以破外道妄計四大為生因以明不善四大造色成前妄想相攝受計著建立覺義也以彼外道不達五蘊諸法唯心變現乃妄計四大種以為生因能造諸法故此責云彼所計四大種云何能生造色耶云何猶言如何乃責問之詞也然我但說四大從妄想生非從四大生是則妄想為四大種非四大為四大種也且妄想無性即四大本自不生今彼愚夫邪執謬解不獨見四大生抑且妄執四大能生生此所以不善四大造色妄起四計故於如不如斯乃愚夫言說非聖賢也故下結云非我所說然此經文簡古佛意幽深最難潛通血脉舊注引楞嚴世界相續文對釋此段然雖消文有據其實義難會通何也以彼說世界生起之由以言次第相生之情狀今此但說四大從妄想生以破外道妄計四大為生因耳二處言同義別若執彼明文則返晦此經旨觀者幸勿以臆斷下文自當證之文云謂地等四大及造色等有四大緣非彼四大緣謂妄想是四大因非四大為四大因也色及虗空俱計著邪諦五陰集聚四大造色生記曰此承上文牒外道計以明四大不能造色生以破外道妄計即色是我等四句也邪諦冥諦也即數論師所立二十五冥諦謂從神我為冥初主諦從冥生覺從覺生我心從我心生五塵從五塵生五大從五大生十一根然此中色及虗空五大也五陰即十一根也然彼外道妄計五大生五陰以虗空無形唯能和色故但云五陰集聚從四大造色生俱和合也又勝論師計六句為生因謂一實二德三業四大有五同異六和合又於實句中執有九法謂五大時方和合此九能生五陰諸法故妄執即色是我我在色中等四句邪見今世尊將欲破之乃先出其計云色及虗空俱乃是計著邪諦妄說五陰積聚四大造色生下文先破色不即我我不在色中等後破四大造色不能生五陰且先破色不即我以外道妄計八識為神我故約識破之大慧識者因樂種種跡境界故餘趣相續記曰此破色不即我等四計意也然彼外道妄計四大造色能生五陰故妄計我在色中色即是我等佛謂彼所計神我即我法中識也若言色即是我且人死時四大色滅而識不滅以此識因愛樂貪著六塵境界故造善惡業又招未來果報復於餘趣受生相續不斷若果然色即是識其色滅時而識亦與之俱滅矣豈非斷滅耶今既餘趣受生相續足知識不滅識既不滅則色非即我明矣不但色不即我抑且四大造色不能生五蘊故下文破之大慧地等四大及造色等有四大緣非彼四大緣記曰此言四大不能造色也以外道計四大為能造五蘊諸法為所造是四大與四大為生緣矣緣即因也故佛牒其計而破之曰四大及所造五蘊等色法自有與彼為因者乃妄想耳但非彼四大與五陰為因也何者以彼四大不能造色生五陰故故下文徵破所以者何謂性形相處所作方便無性大種不生大慧性形相處所作方便和合生非無形是故四大造色相外道妄想非我記曰此徵破四大不能造五陰之所以也性謂四大自體形相處即彼諸法上長短高下大小等形狀方便即造作之方法也以上佛言四大不能造色故此徵而破之曰何故不能造以推求能造四大自體形相及造作方法皆不可得以無自性故既無自性則大種本自不生本自無生又豈能生他諸法耶是計四大能造者妄也若謂所造五蘊諸法從四大生此亦不成何者以能造大種是有體相形狀之物今能造者既是有形而所造五蘊亦應有形非無形也意謂縱許四大能造但能造五蘊中色法一陰耳然彼四陰無形者彼安得而造之耶是計所造者妄也且彼計色即是我況色滅而識不滅足知五陰非四大所造今觀四大本不能造色是故計四大造色相者乃外道妄想分別顛倒見耳非我所說也故云非我由上佛言四大有形不能造無形故下文釋成以明觀五陰如復次大慧當說諸陰自性相云何諸陰自性相謂五陰云何五謂色受想行識彼四陰非色謂受想行識記曰佛言有形不能造無形故說五陰自性相以明四陰非色所造將顯五陰本如也大慧色者四大及造色各各異相大慧非無色有四數如虗空譬如虗空過數相離於數而妄想言一虗空記曰此釋四陰無形非色所造也四大外四大也造色內四大也謂五陰中色之一陰可說是四大所造以有堅濕暖動四法各各異相故是有形不比無色四陰如虗空故至若受等四陰無有形相猶若虗空但以妄想名言說為四陰譬如虗空超過數相但分別言一虗空耳豈有虗空無形屬彼四大所造耶是則妄計四大能造五陰者皆邪見也大慧如是陰過數相離於數離性非性離四句數相者愚凡言說非聖賢也記曰此通釋五陰皆空也如是陰通指五陰也性色陰非性四陰謂不但四陰如空而色陰推求各無自性大種不生而色本空也是則五陰皆空超過數相又豈可以五數目之耶故云如是陰超數相離於數然既超名數則五陰元無五陰既無則離性非性矣離性則色不可謂之有離非性則四陰不必謂之無是則有無既離四句安寄故云離性非性離四句然而四句既離則百非俱遣名言路絶則陰本如如又豈可以數相求之耶是故計數相者乃愚夫言說耳殆非聖賢真知見力也永嘉云一切數句非數句與吾靈覺何交涉深證乎此大慧聖者如幻種種色像離異不異施設又如夢影士夫身離異不異故大慧聖智趣同陰妄想現記曰此釋伏難以明五陰本如也由上佛說五陰皆空恐愚者疑謂現見五陰聖凡皆有何以言無故此釋云我說五陰皆空不是絶無但聖智觀之如幻不實所謂了達緣生無性其體皆空但不作一異等妄見施設耳豈是絶然滅無耶然此五陰乃法身影明如夢中身如鏡中影無別所有故說非異非不異是故我言五陰本如而愚夫不達乎此乃妄作一異等分別見永嘉云幻化空身即法身是則五陰當體元是法身五陰妄想現時而法身齊現但隨聖凡所見不同耳若以妄想分別則法身隱而五陰現若以聖智而觀則法身現而五陰消故前文云然彼惑亂諸聖亦現而非顛倒故云聖智趣同陰妄想現斯實妄想本如能觀察此所謂攀緣如禪下文結云是名諸陰自性相汝當除滅滅已說寂靜法斷一切佛剎諸外道見記曰此結名離過也然未達五陰本如故作一異生滅妄見其所說者皆生滅法故此結云五陰如此空寂汝當除滅自性相見滅此生見即證無生其所說者皆寂滅法又當以此所證斷一切外道邪見大慧說寂靜時法無我見淨及入不動地入不動地已無量三昧自在及得意生身得如幻三昧通達究竟力明自在救攝饒益一切衆生猶如大地載育衆生菩薩摩訶薩普濟衆生亦復如是記曰此結攀緣如禪行成得果之相也前觀察義禪行成從凡夫入解行即登初地漸觀深入至上上地以頓見真理漸斷無明故所謂頓悟漸修者是也今攀緣如禪觀行成就頓登八地頓證無生頓斷無明頓捨藏識所謂頓悟頓修者是也已上三種禪乃三乘行相然二乘禪固在所呵後二雖勝猶屬迷悟因果故彼偈云諸乘非究竟何也以宗門縱然親證真如猶是法身邊事非法身向上事也至若如來清淨禪則不屬因果故為最上一乘乃此經之宗趣所以但說前三種禪已即便說邪正二果而如來禪則不容有說意令吾人默契不言之表耳及其向後大慧特請世尊但云前聖所知轉相傳受妄想無性一語而已此直指從上佛祖所傳心印以為禪宗的訣意顯此經之宗趣也觀者深察之已上釋邪正因行不同已竟下文釋邪正果德不同先示邪果復次大慧諸外道有四種涅槃云何為四謂性自性非性涅槃種種相性非性涅槃自相自性非性覺涅槃諸陰自共相相續流注斷涅槃是名諸外道四種涅槃非我所說法記曰此辨果德不同初示邪果也由上佛說因行既有真僞故所感果亦有邪正故此先言四種涅槃以顯外道二乘因行之不真也性自性非性涅槃者謂數論師妄立神我以為主諦實有自體以非究竟涅槃故佛隨便而斥之曰彼所計自性其實非性但妄執耳故云性自性非性涅槃種種相性非性涅槃者謂外道妄計色究竟天以為涅槃謂盡虗空界十二類生皆我身中一類流出又計大自在天以為涅槃謂自己身心并十方虗空皆從彼出又順世外道計四大是實是常能生諸法故求火光明樂水清淨愛風周流觀塵成就各各從事以為常住以計彼種種相實有自性故佛斥之曰彼所計者其實非性但妄執耳故云種種相性非性涅槃自相自性非性覺涅槃者謂勝論師計一切無情有知立六句義謂有實德業大有同異和合以極微為常住故以十方草木皆稱有知與人無異草木為人人死還為十方草木故唐譯云覺自相猶言微塵自相而有知覺也故佛斥之曰彼自相自性本無自性亦非有覺但妄計耳故云自相自性非性覺涅槃諸陰自共相相續流注斷涅槃者謂無想天人以永滅依為歸寧地及定性聲聞證滅諦已居滅已休更不前進及定性辟支并不回心諸緣覺倫觀化知無緣離證滅執諸陰已滅不受後有永斷生機取為涅槃故云諸陰自共相相續流注斷涅槃此四皆外道自取以為涅槃故云非我所說然二乘不達自心心外取法故亦云外道下示正果大慧我所說者妄想識滅名為涅槃記曰此明佛所說涅槃正果也然彼外道所取涅槃皆妄想識耳佛謂我所說涅槃者非別有體即彼妄想識寂滅處當體便是涅槃非離此外別有涅槃可證也故云妄想識滅名為涅槃問曰前初云證自智境界轉所依藏識為大涅槃次復云一切識自性習氣藏識意識見習轉已我及諸佛說名涅槃此獨言妄想識滅名為涅槃者何也答曰此三立言意旨不同不可作佛說涅槃有差別會也前初乃責二乘以不知證自智境界轉所依藏識為大涅槃故妄計未來諸根境界滅以為涅槃果耳然舉大涅槃言意在責彼不知非正說涅槃也次乃勘校邪正因果不同意謂彼外道二乘以依有無斷常等四句修行愚夫所行禪為因故所感果亦非究竟我以離四句法修行觀察攀緣如禪故轉生死為涅槃故云一切識自性習氣藏識意識見習轉已我及諸佛方說為涅槃謂不同外道以妄見習氣為涅槃也今乃釋前不同之所以正示涅槃行相以顯此經之宗極故但言妄想識滅為涅槃蓋言妄想當體寂滅即是涅槃更不待轉何者以妄想無性故是則即彼外道二乘見習盡是涅槃不必別求以當體無生更何所轉此正最上一乘實此經宗極故上文云七識不生以立意不同故言亦異也然此妄想即第六意識故次辨之大慧白佛言世尊不建立八識耶佛言建立大慧白佛言若建立者云何離意識非七識佛告大慧彼因及彼攀緣故七識不生記曰此問明八識本來涅槃義也由佛前言轉藏識妄見習氣為涅槃然藏識八識也見習七識也今此但言六識滅為涅槃故此疑問不建立八識耶佛言建立又問既建立者且七識為生死根云何但言六識滅為涅槃而不言七識耶佛言八識者乃如來藏清淨真心也本來寂滅而七識無體本自不生但彼六識依八識而起攀緣八識因六識攀緣而有生滅故云彼因及攀緣故今意識若寂滅則七識不生而八識當體元是清淨涅槃又何待轉而後方為涅槃耶意識者境界分段計著生習氣長養藏識意俱我我所計著思惟因緣生不壞身相記曰此釋上七識不生義也唐譯云意識分別境界起執著時生諸習氣長養藏識由是意俱我我所執思量隨轉無別體相謂七識所以不生者以無體故但因意識攀緣五塵境界時生起習氣熏彼藏識而藏識受熏以習氣力影現根身器界而妄見此影執為我我所者乃名七識故云意俱是則七識思量但隨六八內外門轉乃八識之影明如燈毛輪無別有體雖有名而無實以唯一精真故云不壞身相藏識因攀緣自心現境界計著心聚生展轉相因記曰此言藏識元是不動智體但因六識攀緣自心境界諸識相因而生故得藏識之名也由意識一起而諸識齊起故云心聚生然八識湛淵本無生滅秪因六識攀緣而有生滅七識因八識而起執著六識因七識而起分別五識因六識而攬境六識又因五識而攀緣七識又因六識而增長見習識八又因七識我執染污而不解脫故云展轉相因是則生從六識相因而生滅則六識滅而諸識齊滅此所謂一根既返源六根俱解脫也譬如海浪自心現境界風吹若生若滅亦如是是故意識滅七識亦滅記曰此以喻顯七識本不生也海喻藏識浪喻七識境界如風謂藏海澄淵本無七識波浪但自意識攀緣六塵境界風吹故有起滅今若意識不起境界風停則七識當體寂滅是則生但因緣生滅但因緣滅非七識也故云七識不生爾時世尊欲重宣此義而說偈言我不涅槃性所作及與相妄想爾𦦨識此滅我涅槃記曰此總頌外道涅槃非我所說義也謂外道妄計涅槃實有自性及有所作相佛言我不如此然我所說者但以妄想所知識滅名為涅槃耳爾𦦨所知也彼因彼攀緣意趣等成身與因者是心為識之所依記曰此頌七識不生也謂彼藏識因彼意識攀緣故有七識身生然而與意為因者乃是藏識心王非七識也故云與因者是心以藏識為諸識之所依故是則藏識之生滅前五之攬境及七識之假名總因意識而有故意識若滅則諸識當體不生故下以喻成如水大流盡波浪則不起如是意識滅種種識不生記曰此以喻結成也問諸教皆言七識為意根乃生滅之樞機今言七識不生但言意識滅即為涅槃者何也答此直示頓悟無生之旨乃禪宗修心之的訣也若謂定有七識以為意根則相續長劫何由一切頓證無生耶今了七識不生則意識脫體無依意識無依則妄想無性當下寂滅妄想寂滅則一切內外心境無不寂滅淨名云一切衆生本來涅槃不復更滅謂是故也故云如是意識滅種種識不生此實自覺聖智境界豈彼外道邪見三乘比智所可入耶故古德云靈光獨耀逈脫根塵體露真常不拘文字心性無染本自圓成但離妄緣即如如佛已上廣釋前三種禪以顯三乘差別因果相竟次下廣釋如來禪融會五法自性總歸如如以顯一乘平等因果相有三初即妄即真以顯平等復次大慧今當說妄想自性分別通相若妄想自性分別通相善分別汝及餘菩薩摩訶薩離妄想到自覺聖外道通趣善見覺攝所攝妄想斷緣起種種相妄想自性行不復妄想記曰此即妄想差別以示平等行相也因上一往佛說妄想為十界五性三乘生死涅槃之本恐其行人不知何等妄想故此特示其相欲令行人即妄想以證如如也然妄想名雖通稱其實有多種差別不同若不善知其相抑將認妄為真故楞嚴云譬如國王為賊所侵發兵討除是兵要當知賊所在唐譯云我今當說妄計自性差別相令汝及諸菩薩摩訶薩善知此義超諸妄想證聖智境知外道法遠離能取所取分別於依他起種種相中不更取著妄所計相大慧云何妄想自性分別通相唐譯云妄計自性差別相謂言說妄想所說事妄想相妄想利妄想自性妄想因妄想見妄想成妄想生妄想不生妄想相續妄想縛不縛妄想是名妄想自性分別通相記曰此標妄想差別相也前說轉一切自性習氣藏意意識見習為涅槃故隨說二種自性相謂言說自性相計著事自性相計著此蓋示其所當轉者也言說自性相計著者從無始言說虗僞習氣計著生乃名也事自性相計著者從不覺自心現分齊計著生乃相也以妄想因名相而生故此二乃妄想總相今列十二妄想蓋亦不出前二但廣示其相乃前二之差別相耳由妄想因他名相而有是謂緣起今顯妄想無性本自圓成則彼名相自如如矣故云通相故此科云真妄平等大慧云何言說妄想謂種種妙音歌詠之聲美樂計著是名言說妄想記曰此計世俗言語音聲及歌詠詞句等以為實有自性者也大慧云何所說事妄想謂有所說事自性聖智所知依彼而生言說妄想是名所說事妄想記曰此計出世聖言量以為實有所說自證境界依之妄起分別者也謂於佛所說菩提涅槃真如佛性第一義諦自證聖智出世等法以為實有自性依之復起種種言說分別以作實法故唐譯云謂執有所說事是聖智自證境界依此起說大慧云何相妄想謂即彼所說事如鹿渴想種種計著而計著謂堅濕暖動相一切性妄想是名相妄想記曰此合上二而言也以於佛所說出世法中執以為實妄有所得故云於彼所說事中如渴鹿想又於所說世諦法中根塵四大等法計著實有自性故云種種計著而計著等此上三乃言說自性計著也大慧云何利妄想謂樂種種金銀珍寶是名利妄想記曰此下七種妄想乃事自性計著妄想也於諸財寶不達性空故云利妄想大慧云何自性妄想謂自性持此如是不異惡見妄想是名自性妄想記曰此妄計世間諸法一一各有自性執之決定如是不可更易即外道執四大種各有自性而能生物故云惡見妄想大慧云何因妄想謂若因若緣有無分別因相生是名因妄想記曰此外道妄計諸法有從有因生無從無因生故唐譯云謂於因緣分別有無以此因相而能生故故云因妄想大慧云何見妄想謂有無一異俱不俱惡見外道妄想計著妄想是名見妄想記曰此外道依有無等起四句見故云見妄想大慧云何成妄想謂我我所想成決定論是名成妄想記曰此外道妄計即色是我離色是我等成決定論故魏譯云取我我所相說虗妄法唐譯云理分別謂於無理處以宗因喻成立有理故云成妄想大慧云何生妄想謂緣有無性生計著是名生妄想記曰此生見也謂計諸法若有若無皆悉有生以有有生無亦有生故如云太極從無極而生然太極無形而妄見有生此無而有生也至若兩儀八卦三才萬物皆一定有生此有而有生也故唐譯云若有若無從緣而生是名生分別大慧云何不生妄想謂一切性本無生無種因緣生無因身是名不生妄想記曰此不生見也謂一切諸法本來不生者以未生已前先有不生之體此體不從因生故云無種因緣生無因身如莊子云生生者不生即所謂有物先天地者是也故唐譯云計著一切法本來不生未有諸緣而先有體不從因起既不從因起是無因也無因則無果既無因果則成斷滅是則名雖不生實斷見耳故前百丈錯答學人不落因果一轉語五百生墮野狐身正墮此不生見錯會無生義耳觀此痛令識法者懼大慧云何相續妄想謂彼俱相續如金縷是名相續妄想記曰此相續妄想有二一謂世法即如世之五行相生相尅八卦四時往復不斷謂之相續二謂佛法說衆生世界業果相續不斷亦謂之妄想何者以達無生者若一念不生則前後際斷一人發真歸元十方虗空悉皆消殞何況空中所有國土而不振裂如此則又何從而相續耶是則不達諸法唯心所現者乃妄計諸法實有相續自性特妄想耳大慧云何縛不縛妄想謂縛不縛因緣計著如士夫方便若縛若解是名縛不縛妄想記曰此計實有煩惱可縛涅槃可脫也前十一種妄想屬凡夫外道此一屬二乘以彼二乘不達煩惱性空故以生死為可縛不達涅槃性空故欲斷煩惱而取證故如人被縛必待解縛而後為脫也如楞嚴云根塵同源縛脫無二則非彼所知於此妄想自性分別通相一切愚夫計著有無記曰此結過也凡所分別皆妄想耳愚夫不達妄執以為實有實無大慧計著緣起而計著者種種妄想計著自性如幻示現種種之身凡夫妄想見種種異幻記曰此言遍計執性乃依他緣起由不達圓成故妄以為實也計著緣起而計著種種妄想計著自性者如論所說由彼彼遍計遍計種種物然此遍計本無自性但依他起乃分別緣所生耳凡愚不了妄以為實故唐譯云於緣起中執著種種妄計自性如依於幻見種種物凡愚分別見異於幻經云衆生不異幻了幻無衆生以不能如幻觀衆生而妄分別有無一異故云見異於幻大慧幻與種種非異非不異若異者幻非種種因若不異者幻與種種無差別而見差別是故非異非不異是故大慧汝及餘菩薩摩訶薩如幻緣起妄想自性異不異有無莫計著記曰此結示真妄平等相也謂妄想本自緣生了無自性不可作一異有無分別執著故非異非不異以一異俱非則如如平等矣幻喻心種種喻妄境然種種依幻而起且幻事本無何況復於幻出種種而又作一異有無等見耶故誡之曰如幻緣起妄想自性異不異有無莫計著謂彼妄想自性本無所有乃依如幻緣起耳故不應作一異有無計著也爾時世尊欲重宣此義而說偈言心縛於境界覺想智隨轉無所有及勝平等智慧生記曰此總頌真妄一如以顯平等相也謂三界五蘊一切境界但隨妄想而轉然於實際當體寂滅本自如如故云爾也覺想謂妄覺無明也智即六粗中智相謂分別心也無所有最勝處謂真如實際也以自他俱泯故云平等由無明不覺妄見境界則心縛於境境復牽心故不平等若以正智而觀則心境雙絶故平等耳楞嚴云知見立知即無明本知見無見斯即涅槃妄想自性有於緣起則無妄想或攝受緣起非妄想唐譯云在妄計是有於緣起則無妄計迷惑取緣起離分別種種支分生如幻則不成彼相有種種妄想則不成彼相則是過皆從心縛生記曰此頌泛舉妄想緣起相因而有也謂妄想本無自性所以有自性者以於緣起諸法妄生取著故且彼緣起諸法非妄想也何者以一切諸法緣生如幻故然彼幻事種種支分宛然若生以皆如幻故雖生不生故云如幻則不成然彼幻相雖有種種其實性本無生亦無有相以見彼有相者但妄想耳若了彼如幻則妄想不生以不了如幻依之造業故彼相是過此皆從心縛而生也彼相既因妄想而有若妄想不生諸相自寂則依他性空相本無也然心境互為緣起也今幻相不成則無當心之境妄想不成則無了境之心心境皆無言思路絶本自如如矣妄想無所知於緣起妄想此諸妄想性即是彼緣起妄想有種種於緣起妄想記曰此頌妄想從緣起而生也以妄想實際本無所知之境但於緣起諸法不了無性而復於彼妄生分別計著有無執取美惡故云於緣起妄想且此諸妄想性除緣起外別更無有故云即是彼緣起所以妄想有種種者但於緣起妄想耳世諦第一義第三無因生妄想說世諦斷則聖境界記曰此頌世諦即第一義以明即妄即真也謂若妄計妄想緣起實有自性即第一義諦而為世諦若了妄想緣起無性即世諦而為第一義諦若不知諸法緣生者即是無因生矣又墮外道冥諦也是則本無世諦而世諦但依妄想說耳即妄想斷處便是自覺聖智境界故唐譯云妄計是世俗斷則聖境界譬如修行事於一種種現於彼無種種妄想相如是記曰此頌通喻妄想緣起相因而生也謂第一義諦本無諸相但因妄想妄見諸法而復於彼周遍計度美惡一異有無等堅執為實其實第一義諦中本無此事故云於彼無種種修行者謂鈍根二乘修八背捨四遍處定若觀青時天地萬物皆青若觀黃赤白時一一皆然彼於一色法隨心轉變見種種相以於無中妄見有故以譬於第一義諦離名相處妄見種種諸法然其所見者皆妄想耳非實法也故云妄想相如是論云由彼彼遍計遍計種種物此遍計所執自性無所有譬如種種翳妄想衆色現翳無色非色緣起不覺然記曰此頌以喻轉明上意也謂於第一義諦無一法處而見有種種者蓋因無明不覺依他妄分別緣生一切法故論曰依他起自性分別緣所生譬如翳目於無色相處而妄見有青黃赤白諸色相現凡愚不覺妄執為實故云緣起不覺然譬如鍊真金遠離諸垢穢虗空無雲翳妄想淨亦然記曰此頌喻第一義諦遠離諸過以顯圓成實性也論曰圓成實於彼常遠離前性以圓成實法爾隨緣成一切法而法法皆真但由妄想遍計種種執取故於真不真若情忘執謝則萬法皆如圓成自顯故但云妄想淨亦爾故下文但出妄想之過無有妄想性及有彼緣起建立及誹謗悉由妄想壞記曰此頌特出妄想之過意明緣起從妄想而有也謂所以說有緣起建立及誹謗者蓋因妄想而說耳若無妄想而說有緣起建立及誹謗者此亦是妄想分別乃自破壞如實之見矣故云無有妄想等世尊意謂汝等若無妄想而我為何又說緣起及說汝等建立及誹謗之過耶繇是觀之則十方三世一切諸佛出現世間更無別法特為說破衆生妄想耳故下文云前聖所知轉相傳授妄想無性妄想若無性唐譯云若無妄計性而有緣起性無性而有性有性無性生依因於妄想而得彼緣起相名常相隨而生諸妄想究竟不成就則度諸妄想然後智清淨是名第一義記曰此通頌三性五法皆依妄想而立也謂緣起本無但因妄想而有若無妄想而說有緣起者是則無因而有生有生而從無因生也此翻顯因依妄想方得有緣起因有緣起故名相隨生如影隨形是則名相又因妄想緣起而有既有名相則妄想又從名相而生展轉相因無有窮已皆妄想之過也如何得離妄想過耶故次頌云究竟不成就則度諸妄想然後智清淨是名第一義然究竟不成就者華嚴云如是自性如幻如夢如影如像悉不成就智證云以真如之性法爾隨緣雖即隨緣法爾歸性以隨緣時似有顯現如觀幻法不有而有如觀夢境不見而見如觀水中之影非出非入如觀鏡中之像不內不外以無性隨緣故理不成就以隨緣無性故事不成就理事不成則一切法俱不成也然一切法俱不成就而介爾妄心又何從而寄耶故云究竟不成就則度諸妄想然後智清淨是名第一義斯則緣起名相妄想皆即正智如如矣故下頌結顯之妄想有十二緣起有六種自覺智爾𦦨彼無有差別五法為真實自性有三種修行分別此不越於如如記曰此頌總結前五法三自性等皆不越於如如也良由真如隨緣成一切法法法皆真但以妄想執著而有差別若以自覺聖智觀之則彼諸法本來寂滅此三性不越於如如也以迷真如之理而為名相故正智翻為妄想悟名相之本如即妄想而為正智此五法不越於如如也故誡修行之士能作如是觀則日用頭頭物物皆如如矣緣起有六種即卷初六因爾𦦨所知也衆相及緣起彼名起妄想彼諸妄想相從彼緣起生覺慧善觀察無緣無妄想成已無有性云何妄想覺記曰此言迷悟因依也謂迷時緣起妄想遞互相生悟則性是圓成更無緣起妄想矣唐譯云真實中無物云何起分別故云成已無有性云何妄想覺唐譯此下有圓成若是有此則離有無既已離有無云何有二性四句彼妄想自性建立二自性妄想種種現清淨聖境界記曰此言凡聖二途但依妄想而立也謂若依妄想自性妄見實有根身器界一切諸法則名言事相二種自性從此建立謂之凡愚若能正於種種妄想現處當下以智觀察妄想無性脫體全空即是自覺聖智境界此所謂達妄元虗即凡心而見佛也清淨空之異稱二自性正指言說自性相計著事自性相計著此二蓋即名相二法也妄想如畫色緣起計妄想若異妄想者則依外道論記曰此言邪正二途亦依妄想而立也心如工畫師能畫諸世間是則緣起諸法原從妄想而有然愚夫不知唯在緣起法上而生分別一異有無等見而橫計別有生因殊不知妄想是生法之本也若捨妄想而言諸法別有異因從冥諦微塵自在勝性等而生者則墮外道邪見矣故云若異妄想者則依外道論妄想說所想因見和合生離二妄想者如是則為成記曰此結示正義也唐譯云以諸妄見故妄計於妄計謂彼凡愚外道但以妄見分別於妄計之法所以不出妄想顛倒若能離此妄想則當下本自圓成此正謂狂心不歇歇即菩提勝淨明心本非外得何藉劬勞肯綮修證故云離二妄想者如是則為成此章蓋總觀五法自性都歸妄想而妄想本自如如此所以為一乘平等行相也上明即妄即真以顯平等因相已竟下明即心即境以顯平等果相初即心大慧菩薩摩訶薩復白佛言世尊惟願為說自覺聖智相及一乘若自覺聖智相及一乘我及餘菩薩善自覺聖智相及一乘不由於他通達佛法記曰此明自覺聖智釋上如來禪以顯平等果相也由上佛約所觀妄想緣起行相以明平等因已但不知能觀自覺聖智及究竟一乘果相何如將顯如來禪究竟清淨平等實相最勝第一義諦故興此問佛告大慧諦聽諦聽善思念之當為汝說大慧白佛言唯然受教佛告大慧前聖所知轉相傳授妄想無性菩薩摩訶薩獨一靜處自覺觀察不由於他離見妄想上上升進入如來地是名自覺聖智相記曰此示如如智也所謂教外單傳之旨直指人心見性成佛之密意特揭於此智證曰無性之妙佛祖所祕蓋嘗密演未嘗顯說何以知之圓覺曰圓覺自性非性性有循諸性起無取無證維摩曰不生不滅是無常義十地品曰以不了第一義故號為無明起信論曰以不如實知真如法一故不覺而有妄念夫言非性性有不生滅而無常及不了知皆以無性故也而其言皆遮之欲學者自悟此豫所謂密演者也今則明告無性是謂顯說其曰前聖所知者但妄想無性耳豈真有所傳耶是在默契自知而已古人云得坐披衣向後自看故曰獨一靜處自覺觀察意謂若能觀此則不由於他是名自覺聖智以無如外智能證於如故此科云即心即下境大慧云何一乘相謂得一乘道覺我說一乘云何得一乘道覺謂攝所攝妄想如實處不生妄想是名一乘覺大慧一乘覺者非餘外道聲聞緣覺梵天王等之所能得唯除如來以是故說名一乘記曰此明平等果覺以示如如理也謂離能取所取分別住如實處一念不生乃證如如理所謂不取於相如如不動是名一乘覺也此唯佛與佛乃能究盡諸法實相故云唯除如來非餘外道聲聞緣覺梵天王等之所能得以無智外如為智所入故科云即境由理智一如故云心境平等上即心即境以顯果平等下即權即實以顯法平等大慧白佛言世尊何故說三乘而不說一乘佛告大慧不自般涅槃法故不說一切聲聞緣覺一乘以一切聲聞緣覺如來調伏授寂靜方便而得解脫非自己力是故不說一乘復次大慧煩惱障業習氣不斷故不說一切聲聞緣覺一乘不覺法無我不離分段死唐譯云未名不思議變易死故說三乘不離應云已離記曰此明如來所以不說一乘之意以顯即權即實以離不平等過也意謂一向不為聲聞人說一乘者以有待而然非絶然也然有其二意一則因彼但依如來所授寂靜方便而調伏之雖證解脫非己智分以恐彼驚疑故不敢為說二則以彼未盡所知習氣未覺法無我未名不思議變易死不堪受此法故不為說耳要且待時而說非畢竟不說也若竟不說則有不平等過意謂若離上過亦可得入故下明之大慧彼諸一切起煩惱過習氣斷及覺法無我彼一切起煩惱過習氣斷三昧樂味著非性無漏界覺唐譯云若彼能除一切過習覺法無我是時乃離三昧所醉於無漏界而得覺悟既覺悟已覺已復入出世間上上無漏界滿足衆具當得如來不思議自在法身記曰此言聲聞種性無間以顯法平等也以彼二乘依妄想取涅槃果故為三昧所醉不得法無我若彼能了妄想無性則於所取涅槃三昧及煩惱習氣當下頓離即得如來無上涅槃證不思議自在法身也如此則人法不異何三乘之有爾時世尊欲重宣此義而說偈言諸天及梵乘聲聞緣覺乘諸佛如來乘我說此諸乘乃至有心轉諸乘非究竟若彼心滅盡無乘及乘者無有乘建立我說為一乘記曰此言聖凡見盡分別情亡即是一乘非是此外別有一乘也諸天梵等凡情也聲聞緣覺諸佛如來聖解也若言轉凡成聖縱得聖解亦墮凡情何也所謂菩提心生生滅心滅猶屬生滅以起心動念即乖法體故所以宗門向上事成佛作祖嫌帶污名以不離有心故故云乃至有心轉諸乘非究竟若彼心量滅盡凡聖情忘能所雙寂一念不生即是究竟一乘寂滅場地真解脫也引導衆生故分別說諸乘解脫有三種及與法無我煩惱智慧等解脫則遠離記曰此妨難遣情也恐有疑云三乘既非究竟如來何以說不真之法耶故此釋云如來為引導衆生故說三乘三解脫二無我淨二障等皆是隨他意語如止啼黃葉耳本非實法但鈍根當作實法故為法縛不得解脫若大力量人能頓見自心現量住如實究竟處者一眼覷透則當下脫體無依即能掃除聖凡見量如脫索獅子自在遊行方名真解脫人回視彼諸法如大夢覺未有不離之者故云解脫則遠離譬如海浮木常隨波浪轉聲聞愚亦然相風所飄蕩彼起煩惱滅餘習煩惱愚記曰此言聲聞所以被自共相風之所漂轉者以彼但斷四住煩惱未斷餘習根本無明故也生死流有三種謂欲流有流無明流以彼但斷欲有二流未斷無明流既為無明所流故以五蘊處生死海猶如浮木常隨波浪漂轉耳以彼入塵則墮故也味著三昧樂安住無漏界無有究竟趣亦復不退還得諸三昧身乃至劫不覺記曰此言聲聞之過也以味著三昧故進不能趣究竟之地以安住無漏界故亦不退落三界生死以得三昧持心故雖經劫而不覺譬如昏醉人酒消然後覺彼覺法亦然得佛無上身記曰此頌無間性也然二乘與佛性本無間但自為法縛所謂飲無為酒臥寂滅牀酒醒夢覺未有不到如來地者問曰然上屢斥外道二乘且云闡提亦得成佛而此但許二乘而不言外道者何也答曰以品位言之則大凡不及小聖以根性言之則小聖不及大凡彼外道者雖云邪見而有根性猛利者多能一超便入如廣額屠兒放下屠刀便作佛事日劫相倍者有之若夫二乘沈醉無明至劫不覺最為難化者故此特特言之意在激彼劣解速進寶所斯正引權入實之密意耳如來神力加持殆非以所知心測度不思議妙用之力也此上廣釋邪正因果差別相已竟
